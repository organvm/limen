# ═══════════════════════════════════════════════════════════════════════════════════════════
# EVOCATOR · THE CANON OF TRVTHS
# ═══════════════════════════════════════════════════════════════════════════════════════════
# This is the single declarative source the EVOCATOR organ ("the summoner") reads to keep each
# canonical truth PRESENT in every channel a found truth must live in — FLAME (so every beat
# holds it), the knowledge-corpus collection (so it converges into THE ONE), and a read-only
# verify of the memory dir (so the per-session channel stays honest).
#
# This is what "find" produces. When Anthony says "find X" he is not asking for a chat search
# whose answer dies at session end — he is asking for THE PORTAL that summons the answer into
# every place it must exist, forever. The portal is: excavate the truth → add ONE entry here →
# the organ lands it everywhere, every beat, and self-heals drift.  (See spec/evocator/README.md)
#
# Each truth:
#   id              — stable handle (EVO-NNN). Passes the INDEX·NOMINVM canon (no U/J/W/QU).
#   claim           — the headline, one phrase.
#   line            — the DENSE one-liner rendered into FLAME (rides every beat — keep it tight).
#   summons         — the fuller statement (corpus shot + CANON.md; the rich body lives in memory).
#   source_of_record— the repo/path that OWNS this truth (where to go to change or reverse it).
#   confidence      — high | medium | low (an input to a human's judgment, never a substitute).
#   resolved        — ISO date the truth was determined.
#   reversible_via  — the cheapest path to undo/correct it (kept reversible by design).
#   channels        — where it must live: flame (bool), corpus (bool), memory (<memory-file slug>).
# ═══════════════════════════════════════════════════════════════════════════════════════════
