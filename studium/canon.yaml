# THE STUDIUM CANON — master work list
# Converged from: studium/_seed/transmission-curriculum-spec.md (his 9-phase Western sequence +
# Eastern Tier 1/2) + organvm/linguistic-atomization-framework/corpus/corpus_index.yaml (on-disk
# originals + translations) + the "Finalized 15-Week Macro Schedule" (interleaved arc).
#
# Per-work record. order_indices encode ALL reading paths so the face can switch among them
# (his "all avenues / all paths visualized"). corpus_path is relative to:
#   ~/Workspace/organvm/linguistic-atomization-framework/corpus/
# Detailed per-division force-arcs + curated music live in studium/music/<id>/...
# Names/divisions are derived, never pinned arbitrarily ([[derive-never-pin-hardcodes]]).

meta:
  corpus_root_env: LINGFRAME_CORPUS_ROOT
  corpus_root_default: "~/Workspace/organvm/linguistic-atomization-framework/corpus"
  forces: [wrath, plague, supplication, divine-intervention, exile, return, revelation, law,
           comedy, grief, metamorphosis, ascent, sacrifice, kingship, desire, memory, fate, salvation]

works:
  # ── PROLOGUE (oldest) ───────────────────────────────────────────────────────
  gilgamesh:
    title: The Epic of Gilgamesh
    original_title: "𒄑𒂆𒈦"
    author: Anonymous
    period: "c. 2100–1200 BCE"
    tradition: mesopotamian
    original_language: akk
    script: cuneiform
    corpus_path: classical/gilgamesh
    original_file: null            # corpus holds translations only (Thompson 1928, Jastrow 1920)
    translation_files: [english_thompson_1928.txt, english_jastrow_1920.txt]
    source_rails: ["https://www.sacred-texts.com/ane/eog/"]
    main_question: "What is mortality, and the friendship that defies it?"
    divisions: {kind: tablet, count: 12, label: "Tablet"}
    language: cuneiform
    order_indices: {chronological: 1, western_eastern: "prologue", interleaved_phase: "I. Epic & Oral"}

  # ── I. EPIC & ORAL ──────────────────────────────────────────────────────────
