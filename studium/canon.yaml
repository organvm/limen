    title: The Iliad
    original_title: "Ἰλιάς"
    author: Homer
    period: "c. 8th century BCE"
    tradition: greek
    original_language: grc
    script: greek
    corpus_path: classical/iliad
    original_file: greek_original.txt        # 16,571 lines
    translation_files: [english_butler_1898.txt, english_pope_1715.txt,
                        english_lang_1883.txt, english_cowper_1791.txt]
    source_rails: ["https://www.perseus.tufts.edu/hopper/text?doc=Perseus:text:1999.01.0133",
                   "https://scaife.perseus.org/library/urn:cts:greekLit:tlg0012.tlg001/"]
    main_question: "What is wrath?"
    divisions: {kind: book, count: 24, label: "Book"}
    language: greek
    seeded: true                              # Book I arc seeded verbatim from his hand
    order_indices: {chronological: 2, western_eastern: "M1", interleaved_phase: "I. Epic & Oral"}

  odyssey:
