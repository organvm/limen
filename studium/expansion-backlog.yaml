# ── Pillar E — FILM (the fourth commentary system): a force-matched companion per work ──────
# Iliad = SEED/DONE (studium/film/iliad.yaml is the gold standard). Each task = author one
# studium/film/<work>.yaml: tag the work's forces → pick films that meet each force's register
# (dominant-force.yaml film_hints are gravity, not pins) → justify every choice → adaptation overlay
# where a real film-of-the-work exists → studium-validate.py --film. Watch links resolve to LEGAL rails only.
# Each film carries object_lesson + objects (object-taxonomy.yaml) + divisions + letterboxd, so the daily
# Film of the Day promotes a fitting, NOT-obvious pick per book and feeds objectlessons.film (see object-lessons.md).
film:
  method: "for each work: cover its force spectrum with films that ENCODE the force (not 'movies about it'); reserve grief/lament/mercy films for the work's late divisions, as the music layer reserves the funeral-march; give each film an object_lesson + tracked object + divisions[] + letterboxd slug; the literal adaptation goes in adaptations: (set aside, never promoted)"
