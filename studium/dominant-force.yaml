# DOMINANT-FORCE ENGINE — the spine linking reading ↔ music ↔ film
# Converged verbatim from studium/_seed/transmission-curriculum-spec.md ("Daily Classical Composition
# System"). Each day's passage is tagged with one or more dominant forces; the force drives the music
# selection (curated pairing if present, else synthesized), the film resonance (studium/film/<work>.yaml),
# AND colors the face.
# composer_hints seed the music synthesizer when no curated pairing exists; film_hints seed the film
# layer (studium/film/) the same way — NOT prescriptive, just gravity (a force's cinematic register).

forces:
  wrath:
    requirement: "rhythmic pressure, unresolved harmony"
    color: "#c0392b"
    composer_hints: ["Holst (Mars)", "Stravinsky (Rite of Spring)", "Wagner (Tristan prelude)"]
    film_hints: ["Apocalypse Now (Coppola)", "There Will Be Blood (P.T. Anderson)", "Oldboy (Park Chan-wook)"]
  plague:
    requirement: "descending motion, dark orchestration"
    color: "#6c5b7b"
    composer_hints: ["Berlioz (Les Troyens)", "Shostakovich", "Penderecki"]
    film_hints: ["The Seventh Seal (Bergman)", "Contagion (Soderbergh)", "Andrei Rublev — the raid (Tarkovsky)"]
  supplication:
    requirement: "suspended cadence, exposed melodic line"
    color: "#2980b9"
    composer_hints: ["Bach (Erbarme dich)", "Pärt (Spiegel im Spiegel)", "Barber (Adagio)"]
    film_hints: ["The Passion of Joan of Arc (Dreyer)", "Dekalog (Kieślowski)", "Diary of a Country Priest (Bresson)"]
  divine-intervention:
    requirement: "sudden color shift, brass/strings contrast"
    color: "#f39c12"
    composer_hints: ["Wagner (Das Rheingold)", "Strauss (Also sprach)", "Messiaen"]
    film_hints: ["2001: A Space Odyssey (Kubrick)", "Stalker (Tarkovsky)", "Ordet (Dreyer)"]
  exile:
    requirement: "wandering tonality, open intervals"
    color: "#16a085"
    composer_hints: ["Sibelius", "Dvořák (New World)", "Vaughan Williams"]
    film_hints: ["Nostalghia (Tarkovsky)", "The Immigrant (Gray)", "The Searchers (Ford)"]
  return:
    requirement: "circular form, recognition motif"
    color: "#27ae60"
    composer_hints: ["Beethoven (7th, II)", "Schubert", "Brahms"]
    film_hints: ["The Return (Zvyagintsev)", "Ulysses' Gaze (Angelopoulos)", "Cold Mountain (Minghella)"]
  revelation:
    requirement: "stillness, chant, verticality"
    color: "#ecf0f1"
    composer_hints: ["Pärt", "Tavener", "Gregorian chant", "Messiaen (Quartet for the End of Time)"]
    film_hints: ["The Sacrifice (Tarkovsky)", "Into Great Silence (Gröning)", "Ordet (Dreyer)"]
  law:
    requirement: "formal clarity, repetition, architecture"
    color: "#7f8c8d"
    composer_hints: ["Bach (fugue / Art of Fugue)", "Handel (Royal Fireworks)", "Stravinsky (neoclassical)"]
    film_hints: ["12 Angry Men (Lumet)", "A Man for All Seasons (Zinnemann)", "Judgment at Nuremberg (Kramer)"]
  covenant:
    requirement: "binding obligation, solemn reciprocity, freely assumed form"
    color: "#1f618d"
    composer_hints: ["Bach (Art of Fugue)", "Bruckner", "Pärt"]
    film_hints: ["Dekalog (Kieślowski)", "The Mission (Joffé)", "A Man for All Seasons (Zinnemann)"]
  judgment:
    requirement: "verdict weight, procedural clarity, irreversible sentence"
    color: "#7b241c"
    composer_hints: ["Shostakovich", "Verdi (Dies irae)", "Britten (War Requiem)"]
    film_hints: ["Judgment at Nuremberg (Kramer)", "A Separation (Farhadi)", "The Trial (Welles)"]
  comedy:
    requirement: "dance rhythm, courtly exaggeration"
    color: "#e67e22"
    composer_hints: ["Rameau (Platée)", "Offenbach", "Rossini", "Mozart (opera buffa)"]
    film_hints: ["The Rules of the Game (Renoir)", "Some Like It Hot (Wilder)", "The Grand Budapest Hotel (Anderson)"]
  grief:
    requirement: "slow tempo, inward line"
    color: "#34495e"
    composer_hints: ["Mahler (5th Adagietto)", "Wagner (Siegfried's Funeral March)", "Barber (Adagio)"]
    film_hints: ["Tokyo Story (Ozu)", "Three Colors: Blue (Kieślowski)", "Manchester by the Sea (Lonergan)"]
  metamorphosis:
    requirement: "changing orchestral color, fluid harmony"
    color: "#9b59b6"
    composer_hints: ["Debussy", "Ravel", "Strauss (Metamorphosen)", "Scriabin"]
    film_hints: ["Spirited Away (Miyazaki)", "The Fly (Cronenberg)", "Black Swan (Aronofsky)"]
  ascent:
    requirement: "rising sequence, luminous orchestration"
    color: "#f1c40f"
    composer_hints: ["Mahler (8th / 2nd finale)", "Bruckner", "Strauss (Death and Transfiguration)"]
    film_hints: ["The Tree of Life (Malick)", "A Matter of Life and Death (Powell & Pressburger)", "Wings of Desire (Wenders)"]
  # extended forces (his working-thesis vocabulary), for the wider canon
  sacrifice:
    requirement: "ritual weight, processional, immolation build"
    color: "#a93226"
    composer_hints: ["Stravinsky (Rite — Sacrificial Dance)", "Gluck (Iphigénie)"]
    film_hints: ["The Sacrifice (Tarkovsky)", "Silence (Scorsese)", "Andrei Rublev (Tarkovsky)"]
  kingship:
    requirement: "ceremonial grandeur, sovereign display"
    color: "#b9770e"
    composer_hints: ["Handel (Zadok the Priest)", "Elgar", "Walton"]
    film_hints: ["Ran (Kurosawa)", "Lawrence of Arabia (Lean)", "The Lion in Winter (Harvey)"]
  desire:
    requirement: "chromatic longing, deferred resolution"
    color: "#c2185b"
    composer_hints: ["Wagner (Tristan)", "Scriabin", "Szymanowski"]
    film_hints: ["In the Mood for Love (Wong Kar-wai)", "Vertigo (Hitchcock)", "Phantom Thread (P.T. Anderson)"]
  memory:
    requirement: "nostalgic recall, faded recapitulation"
    color: "#5d6d7e"
    composer_hints: ["Elgar (Nimrod)", "Fauré", "Rachmaninoff"]
    film_hints: ["Wild Strawberries (Bergman)", "8½ (Fellini)", "Hiroshima mon amour (Resnais)"]
  fate:
    requirement: "inexorable motif, hammered insistence"
    color: "#212f3d"
    composer_hints: ["Beethoven (5th)", "Tchaikovsky (4th)", "Verdi (Force of Destiny)"]
    film_hints: ["No Country for Old Men (Coen)", "Ran (Kurosawa)", "Oedipus Rex (Pasolini)"]
  salvation:
    requirement: "resolving radiance, chorale apotheosis"
    color: "#fdfefe"
    composer_hints: ["Bach (chorales)", "Mahler (Resurrection)", "Fauré (Requiem — In Paradisum)"]
    film_hints: ["Ordet (Dreyer)", "The Passion of Joan of Arc (Dreyer)", "Andrei Rublev — the bell (Tarkovsky)"]
