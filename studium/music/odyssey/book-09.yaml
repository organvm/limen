# Odyssey — Book IX — curated music arc
# THE CYCLOPS: the Cicones, the Lotus-Eaters, Polyphemus, the blinding, 'Nobody', the curse.
work: odyssey
book: 9
title: "Odyssey Book IX: Nobody, the Cyclops, and the Curse of the Sea"
length_minutes: 95
principle: >
  Do not score Book IX as "the adventure with the Cyclops." Score it as the book where
  Odysseus discovers that cunning is a trap — that the same mind that outwits the Cyclops
  also cannot stop itself from shouting his name at the escaping ships, summoning Poseidon's
  curse upon the return home he has been trying to make. The book opens in self-narration:
  Odysseus at the Phaeacian court, past his own story to Alcinous, is already twice-removed
  from the events he recounts. That distance matters. Score each scene for its dominant
  transformation: the Cicones are the army that Odysseus still is; the Lotus-Eaters are the
  first confrontation with forgetting; Polyphemus is the book's great metamorphic core —
  a god's son blinded by a man who pretended not to exist. The dominant force is metamorphosis:
  every scene in Book IX enacts a change of state (soldier→wanderer, awake→lotus-dazed,
  man→Nobody→man-who-names-himself), and the culminating metamorphosis is the worst: the
  homecoming itself is transformed, by one shout, into years more of exile.
force_arc: [memory, exile, metamorphosis, supplication, metamorphosis, fate, wrath, revelation, metamorphosis, comedy, metamorphosis, fate, exile]
dominant_force: metamorphosis
tracks:
  - n: 1
    scene: "Odysseus introduces himself — 'I am Odysseus, son of Laertes' — the name as memory-act"
    force: memory
    composer: Fauré
    work: "Requiem, Op. 48 — III. Sanctus"
    decision: added
    why: >
      The self-introduction at the Phaeacian court is not boast but elegy: Odysseus knows who he
      is by reciting where he has been. Fauré's Sanctus is the most lucent piece of nostalgic
      recall in the canon — the soprano line rising over trembling strings, the sound of a man
      holding something that can barely be held. Memory's requirement is nostalgic recall and
      faded recapitulation; the Sanctus places us in an interior register, a man who has survived
      too much speaking of himself in the third person to a court that has not. The choice avoids
      the heavy Elgar weight used for the Iliad's Catalogue and finds instead a private luminosity.
  - n: 2
    scene: "The Cicones — raid, counterattack, six men from every ship lost on the beach"
    force: exile
    composer: Vaughan Williams
    work: "A Sea Symphony — IV. 'The Explorers' (opening)"
    decision: added
    why: >
      The Cicones raid is the last act of the Trojan War playing out on foreign soil: Odysseus
      the captain still giving orders like a general, losing men on a beach for reasons no
      homecoming requires. Vaughan Williams's 'Sea Symphony' closes with a movement that is not
      triumph but departure — open intervals, wandering tonality, the sound of men pushing off
      into an ocean that has not yet become the enemy. Exile's requirement is wandering tonality
      and open intervals; the Cicones scene is the moment Troy ends and exile begins, whether
      Odysseus admits it or not.
  - n: 3
    scene: "The storm off Cape Malea — Zeus drives the ships south into the unknown"
    force: metamorphosis
    composer: Debussy
    work: "La Mer — I. 'De l'aube à midi sur la mer'"
    decision: added
    why: >
      After the Cicones, Zeus sends a north wind that tears the sails for two days and two nights,
      driving the fleet past Cythera. This is the transformation from Mediterranean campaign into
      the uncharted waters that define the Odyssey's interior geography. Debussy's first movement
      of La Mer opens in pre-dawn quiet and builds through a sustained transformation of orchestral
      color — the sea itself changing state from flat calm to surging swell without a single
      dramatic break. Metamorphosis requires changing orchestral color and fluid harmony; Debussy's
      ocean does nothing else. This is the moment the poem becomes itself.
  - n: 4
    scene: "The Lotus-Eaters — men who forget home, held back from the ships"
    force: supplication
    composer: Pärt
    work: "Spiegel im Spiegel"
    decision: added
    why: >
      The men who eat the lotus do not become violent — they become tender. They want to stay.
      They weep when Odysseus drags them back to the ships. This is supplication in reverse: men
      pleading with their captain not to make them remember. Pärt's tintinnabuli line is suspended
      cadence and exposed melodic thread — the supplication requirement exactly — but here the
      suspension is itself the seduction, the loop of the lotus, the note that will not resolve
      because the men who eat it have stopped wanting resolution. Note: this piece appears also in
      Iliad Book X (the sleeping Thracians); the Odyssey is a different work and the re-use is
      deliberate — the Lotus-Eaters and the murdered sleepers share the same register of souls
      released from waking.
  - n: 5
    scene: "Arrival at the Cyclops' island — the untilled paradise, goats, the cave"
    force: metamorphosis
    composer: Ravel
    work: "Daphnis et Chloé — Suite No. 2, 'Lever du jour' (Daybreak)"
    decision: added
    why: >
      The Cyclops' island is described with uncanny abundance: untilled vines, wild goats, a harbor
      without waves, a natural world that has never been claimed by law or labor. The men land at
      night and wake to find themselves in a transformed landscape, mist clearing to reveal the
      island's pastoral immensity. Ravel's Daybreak sequence from Daphnis is among the most luminous
      orchestral sunrises in the canon — fluid harmony, changing color, a world assembling itself
      out of silence. Metamorphosis' requirement of changing orchestral color and fluid harmony
      gives the scene its innocent menace: what looks like paradise is Polyphemus's pantry.
  - n: 6
    scene: "Polyphemus returns — the boulder, the locked cave, men ground on rocks"
    force: fate
    composer: Mussorgsky
    work: "Pictures at an Exhibition — 'Bydlo'"
    decision: added
    why: >
      The Cyclops enters carrying a load of firewood that shakes the ground, throws it down with
      a crash that terrifies the Greeks. Mussorgsky's 'Bydlo' — the ox-cart — is among the most
      crushing pieces of inexorable momentum in the piano/orchestral repertoire: a thing of
      enormous weight moving toward you without deviation or speed change, the rhythm of something
      that will not stop. Fate requires inexorable motif and hammered insistence. Polyphemus does
      not choose to trap the Greeks; he simply is what he is, and what he is cannot be argued with.
      The boulder closing the cave is not malice — it is the indifference of scale.
  - n: 7
    scene: "The eating of the men — Polyphemus dashes them like puppies"
    force: wrath
    composer: Bartók
    work: "The Miraculous Mandarin — 'The Chase' (fugue)"
    decision: added
    why: >
      Homer describes Polyphemus eating the men with terrifying clinical speed — he lifts two,
      dashes their brains on the ground, tears them limb from limb, and eats. Odysseus and the
      remaining men watch and can do nothing. Bartók's chase fugue from The Miraculous Mandarin
      is violence as relentless mechanism: each voice enters in pursuit, the harmonic pressure
      never resolves, the rhythm is asymmetric and brutal. Wrath's requirement is rhythmic pressure
      and unresolved harmony. The scene cannot be made heroic or tragic here — it is raw predation,
      and Bartók's fugue refuses every consolation.
  - n: 8
    scene: "Odysseus devises the plan — the stake, the wine, the name 'Nobody'"
    force: revelation
    composer: Bach
    work: "The Well-Tempered Clavier, Book I — Prelude No. 1 in C major, BWV 846"
    decision: added
    why: >
      In the dark of the cave, surrounded by dead companions, Odysseus sees the sharpened olive
      stake and conceives the plan in its entirety. This is the poem's great cognitive moment —
      not brute force but geometric clarity arriving whole. Bach's C major Prelude is pure
      verticality: a single harmonic progression unfolded into arpeggio, each chord clear and
      inevitable, the structure transparent all the way through. Revelation requires stillness,
      chant, verticality. The Prelude does not argue; it simply unfolds the logic of what must
      be done, the way Odysseus sees the plan — not discovered but recognized.
  - n: 9
    scene: "The blinding of Polyphemus — the stake driven into the eye"
    force: metamorphosis
    composer: Strauss
    work: "Metamorphosen"
    decision: added
    why: >
      The blinding is the book's central metamorphic act: a god's son is transformed in a single
      action from a monster with sight to a monster without it, and simultaneously Odysseus
      transforms from captive to captor, from prey to predator. Strauss's Metamorphosen for
      23 solo strings is the work that most precisely enacts transformation as a sustained
      change of state — the harmonic color shifts continuously, the form is not ABA but a
      single irreversible arc. The piece is also Strauss's elegy for a destroyed civilization,
      which gives the blinding its correct weight: something enormous has been permanently
      altered. The metamorphosis requirement (changing orchestral color, fluid harmony) is
      here taken at full tragic scale.
  - n: 10
    scene: "'Nobody' — Polyphemus tells the other Cyclopes that Nobody hurt him"
    force: comedy
    composer: Rossini
    work: "Il barbiere di Siviglia — Overture"
    decision: added
    why: >
      'Nobody hurt me' — the other Cyclopes return to their caves. This is the poem's great
      comic mechanism: a pun that is also a philosophical claim (Odysseus-as-nobody, the name
      that makes him temporarily sovereign over his own identity). Rossini's Barber overture
      is the most apt comedy in the canon — explosive, quick, a running-joke rhythm that
      accelerates into absurdity. The comedy force requires dance rhythm and courtly exaggeration.
      The Cyclopes walking away because of a grammatical joke is as buffo as Greek epic gets,
      and the overture's comic machinery fits the scene's delighted logic.
  - n: 11
    scene: "Escape under the rams — each man lashed beneath a sheep's belly"
    force: metamorphosis
    composer: Scriabin
    work: "Piano Sonata No. 5, Op. 53"
    decision: added
    why: >
      The men escape by becoming invisible — lashed under the great rams, undetected by
      Polyphemus's searching hands as the flock goes out to pasture. This is metamorphosis as
      concealment: men made into something beneath men, below the threshold of recognition,
      slipping through the gate disguised as animals. Scriabin's Fifth Sonata is a single
      continuous arc of harmonic flux — no clear themes, only transforming color, the music
      perpetually becoming something else, never settling. The metamorphosis requirement of
      fluid harmony and changing orchestral color is here taken to the extreme of sonata-form
      dissolution. The escape is a formal transformation: men who were captured emerge as
      something the Cyclops cannot name.
  - n: 12
    scene: "Odysseus shouts his name — 'I am Odysseus, son of Laertes, from Ithaca'"
    force: fate
    composer: Tchaikovsky
    work: "Symphony No. 6 in B minor, Op. 74, 'Pathétique' — I. Allegro non troppo (development)"
    decision: added
    why: >
      Against every counsel of his own men, Odysseus shouts his real name across the water as
      the ships pull away. He cannot help it. The cunning that saved him is the same pride that
      undoes the saving. Tchaikovsky's Pathétique development section is the canonical movement
      of a thing destroying itself — the relentless march-theme that arrives in the first movement
      is fate as self-inflicted momentum, the hero running directly into what he fears. Fate
      requires inexorable motif and hammered insistence; here the insistence is Odysseus's own
      voice, the name he cannot withhold, the sound of a man who outthought the Cyclops and
      cannot outthink himself.
  - n: 13
    scene: "Poseidon's curse — the sea god hears his son's prayer, Ithaca recedes"
    force: exile
    composer: Sibelius
    work: "The Oceanides, Op. 73"
    decision: added
    why: >
      Polyphemus prays to his father Poseidon: let Odysseus not reach home; or if he must, let
      him arrive late, alone, on a foreign ship, to find trouble in his house. The god hears.
      The sea from here is not a path but an adversary, a long argument that will last ten years.
      Sibelius's The Oceanides is the only major orchestral work that renders the sea as
      unresolved wandering tonality with open intervals — not a storm but a sustained dissolution,
      the horizon that never arrives. Exile's requirement is wandering tonality and open intervals;
      Sibelius gives the curse its correct geography: not thunder but the slow grinding of a sea
      that will not let a man go home.
demoted:
  - composer: Wagner
    work: "Götterdämmerung — 'Siegfried's Funeral March'"
    status: "expressly forbidden before Book XXII equivalent; save for the slaughter of the suitors"
    why: >
      The terminal funeral-march register is blocked until the poem's catastrophe. The deaths in
      Book IX are horrific but not elegized — Homer does not mourn the eaten men in the
      funeral-register; the text moves past them with brutal speed. The Pathétique development
      carries the inexorable-doom weight without crossing into the irreversible monument register.
  - composer: Verdi
    work: "Requiem — 'Dies Irae'"
    status: "forbidden before the suitors' slaughter; save for the terminal books"
    why: >
      The eschatological judgment register belongs to Book 22's mass death. The blinding of
      Polyphemus is violence but not a funeral event; Strauss's Metamorphosen carries the right
      weight — elegy and irreversible transformation without the Dies Irae's finality.
  - composer: Holst
    work: "The Planets — 'Mars, the Bringer of War'"
    status: "demoted — already the Iliad's wrath leitmotif; Book IX needs a different wrath register"
    why: >
      Mars is the established wrath signature of the Iliad cycle. Polyphemus eating men is wrath
      as predation, not heroic combat — Bartók's mechanical brutality is the correct alternative
      register. Reusing Mars would collapse the Odyssey's sonic identity into the Iliad's.
  - composer: Beethoven
    work: "Symphony No. 5 — I. Allegro con brio"
    status: "demoted — fate leitmotif already placed in Iliad Book II; seek fresh fate colorings"
    why: >
      The hammered-motto fate of the Fifth is already the Iliad cycle's fate signature. Book IX's
      fate operates differently — as grinding inexorable weight (Polyphemus/Mussorgsky) and
      self-inflicted pride (Pathétique development) — and benefits from fresh orchestral color
      rather than the canonical four-note sign.
