# Iliad — Book XIII — curated music arc
work: iliad
book: 13
title: "Iliad Book XIII: Poseidon's Surge"
length_minutes: 86
principle: >
  Do not score Book XIII as generic Trojan War attrition. Score it as the structural
  drama of divine defiance and lateral pressure — Poseidon moves against Zeus' prohibition,
  galvanizes a defensive line on the edge of collapse, and the book grinds back and forth
  in sustained melee. The dominant register is not martial triumph but the terrible
  momentum of contested ground: every step pushed, every step answered. Idomeneus' aristeia
  is not a hero's glory-run but an old commander's methodical ferocity, shot through with
  the vertigo of the grinding line.
force_arc:
  - divine-intervention
  - divine-intervention
  - wrath
  - wrath
  - fate
  - wrath
  - wrath
  - law
  - wrath
  - wrath
  - grief
