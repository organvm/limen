# Bhagavad Gita — Chapter 2 — curated music arc
# Sankhya Yoga: The Yoga of Knowledge
work: bhagavad-gita
book: 2
title: "Bhagavad Gita Chapter 2: The First Answer — Eternity, Duty, Equanimity"
length_minutes: 82
principle: >
  Do not score Chapter 2 as "Krishna explains Hindu philosophy." Score it as the moment where the
  first answer arrives — an answer so radical (the soul is immortal, death is not death, the warrior
  must fight without attachment) that it cannot be absorbed in a single hearing. Arjuna is still
  confused at the chapter's end; he asks for more in Chapter 3. The chapter's drama is the distance
  between divine utterance and human comprehension — Krishna speaking from a register Arjuna cannot
  yet inhabit. The teaching is the first effort, not the complete system.
force_arc: [wrath, revelation, fate, law, metamorphosis, ascent, salvation]
dominant_force: revelation
tracks:
  - n: 1
    scene: "Krishna rebukes Arjuna: 'You grieve for those who should not be grieved for — the wise do not mourn the dead or the living'"
    force: wrath
    composer: Wagner
    work: "Tristan und Isolde — Prelude"
    decision: added
    why: >
      Krishna opens not with comfort but with a stinging rebuke: faint-heartedness is shameful,
      unworthy of a warrior, a path to disgrace. Wagner's Tristan Prelude is unresolved tension
      held at the threshold of breaking — a harmonic structure that cannot discharge itself, a
      force suspended in longing for a cadence that never arrives. That is the register of divine
      correction: not anger vented but pressure that demands transformation. The opening bars enter
      without preparation, as Krishna's voice enters without softening.
  - n: 2
    scene: "The immortal soul argument: 'Never was it born, never does it die — unmanifest, unthinkable, unchanging'"
    force: revelation
    composer: Messiaen
    work: "Quartet for the End of Time — V. 'Louange à l'Éternité de Jésus'"
    decision: added
    why: >
      The soul's eternity is the Gita's foundational claim: what exists cannot cease to exist, what
      is unmanifest cannot be grasped by grief. Messiaen's fifth movement — a slow, luminous cello
      melody over piano chords that do not so much accompany as sustain — is a meditation on
      eternity outside human time. The cello line moves as if through a medium thicker than air:
      unhurried, unarguable, existing in a register for which birth and death are not events. The
      force of revelation demands stillness and verticality; Messiaen gives eternity itself a voice.
      The piece does not persuade — it discloses.
  - n: 3
    scene: "The warrior's dharma: 'Fight for the sake of duty — a righteous war is heaven's gate'"
    force: fate
    composer: Tchaikovsky
    work: "Symphony No. 4 — I. Andante sostenuto — Moderato con anima"
    decision: added
    why: >
      This is the passage Krishna's modern readers often resist: the argument that Arjuna must
      fight because it is his dharma, because a warrior cannot renounce the war that is his calling,
      because heaven awaits those who die in a righteous cause. It is duty rendered as mechanical
      inevitability. Tchaikovsky's Fourth opens with the famous fate fanfare — brass and bassoons
      sounding a motif that is less a melody than a judgment. The Allegro that follows is driven by
      a rhythm that cannot be stopped or argued with: the music is in motion before you have chosen
      to hear it, as dharma is in motion before you have chosen to follow it. Fate's requirement
      of inexorable motif and hammered insistence matches the passage where Krishna transforms a
      choice into a necessity.
  - n: 4
    scene: "The yoga of equanimity: 'Be unattached to success or failure — yoga is skill in action'"
    force: law
    composer: Bach
    work: "Brandenburg Concerto No. 3 — I. Allegro"
    decision: added
    why: >
      After the fate-fanfare of dharma, Krishna introduces the yoga of buddhi: act with even mind,
      abandon attachment to the fruit, stand in yoga and do your work. This is the architecture of
      right action — not a feeling, not a mood, but a formal structure that organizes the self
      toward clarity. Bach's Brandenburg No. 3 opens with three violin parts in unison then
      diverging into a polyphonic structure of extraordinary formal equilibrium — each voice equal,
      each carrying its own line, the whole cohering into a single luminous architecture without
      hierarchy. That is the musical equivalent of the even mind: many faculties acting together
      without any one dominating. Law requires formal clarity, repetition, architecture. Bach at
      this scale is its fullest realization.
  - n: 5
    scene: "The senses withdrawn: 'Like a tortoise withdrawing its limbs, the wise withdraw the senses from sense-objects'"
    force: metamorphosis
    composer: Ravel
    work: "Daphnis et Chloé — 'Lever du jour'"
    decision: added
    why: >
      The tortoise-verse is the Gita's most vivid sensory image: the wise person draws the senses
      inward from their objects as a tortoise draws its limbs into its shell. It is not suppression —
      it is a transformation of relationship. Ravel's 'Lever du jour' (Dawn) from Daphnis et Chloé
      is the great musical dawn of the twentieth century: it begins in near-darkness — a rustle of
      flutes, a harp glissando barely audible — and builds toward full orchestral light, the world
      re-sensing itself from first principle. The metamorphosis force requires changing orchestral
      color and fluid harmony; Ravel's dawn is the most exact instance of the senses receding and
      the inner self coming into focus. The tortoise's withdrawal is itself a kind of dawn — the
      senses retreating so that the seer can see clearly.
  - n: 6
    scene: "The self-content soul: 'When one abandons all desires — the self delights in the self alone'"
    force: ascent
    composer: Mahler
    work: "Symphony No. 2 (Resurrection) — IV. 'Urlicht'"
    decision: added
    why: >
      The sthita-prajna passage builds toward this plateau: the human being who has let go of
      every external prop and rests in the self alone. 'Urlicht' (Primal Light) is the alto song
      that precedes the Resurrection finale — a declaration of the soul's divine origin sung with
      extraordinary simplicity over a chamber-orchestra texture. 'O Röschen rot! Der Mensch liegt
      in größter Not — O rosebud red! Humanity lies in deepest need.' The text is different from
      the Gita's, but the register is identical: the soul waking to its own divine nature, the
      ascent from dependence to self-sufficiency in the divine ground. Ascent requires rising
      sequence and luminous orchestration; Mahler's 'Urlicht' rises not through power but through
      transparency — the voice ascending as the veil of the world grows thin.
  - n: 7
    scene: "Established in Brahman: 'He attains peace — the wise one established in the supreme, free from delusion'"
    force: salvation
    composer: Fauré
    work: "Requiem — 'In Paradisum'"
    decision: added
    why: >
      Chapter 2 closes with the description of the person established in Brahman: steady, free,
      untroubled by any event, dwelling in the self that is the Self of all. This is peace not as
      a feeling but as a condition of being. Fauré's 'In Paradisum' is the choral close to his
      Requiem — a procession of voices moving through a space that is no longer mortal time, the
      organ and strings carrying the harmonies upward as the soprano line opens into radiance.
      Salvation's requirement is resolving radiance and chorale apotheosis; Fauré's is the most
      intimate instance in the canon. The text says 'May the angels lead you into paradise' — but
      here the paradise is not a place after death: it is the state of the soul that has understood
      what Krishna has said and is no longer shaken by the world. The chapter ends with this peace
      stated but not yet inhabited. Arjuna has not reached it. He has only heard that it exists.
demoted:
  - composer: Wagner
    work: "Götterdämmerung — 'Siegfried's Funeral March'"
    status: "reserved for Chapter 11 (Vishvarupa) or 18 (Moksha); not for the first teaching"
    why: >
      The Funeral March is terminal grief at cosmic scale. Chapter 2 is the opposite: the
      refutation that death is anything real. The two registers cannot coexist in the same chapter.
  - composer: Debussy
    work: "Prelude to the Afternoon of a Faun"
    status: "used in Chapter 1 for the chariot crossing; metamorphosis slot in this chapter uses Ravel instead"
    why: >
      Chapter 1's metamorphosis (the chariot between armies) used Debussy's Faun for its liminal
      threshold. Chapter 2's metamorphosis (the tortoise withdrawing) needs a different kind of
      change — not crossing a threshold but awakening from within. Ravel's dawn is the right
      replacement.
  - composer: Pärt
    work: "Spiegel im Spiegel"
    status: "used in Chapter 1 for Arjuna's final stillness; not re-used here"
    why: >
      The Spiegel belongs to Chapter 1's dropped bow — stillness as collapse. Chapter 2's end is
      stillness as achievement (the sthita-prajna). Different registers entirely. Fauré's 'In
      Paradisum' is choral and radiant where Pärt is solitary and suspended.
