# Mahabharata — Karna Parva (Book 8) — curated music arc
# Gold-standard form matching iliad/book-01.yaml.
# Score the TWO DAYS OF KARNA'S COMMAND: the son of Surya leading the
# Kaurava army, his battle with Bhima, his duel with Arjuna, the chariot
# wheel sinking into the earth, and the death of the man whose tragedy is
# that he was born to the wrong mother. The dominant force is fate — not
# the structural fate of the dice game or the cosmological fate of the
# war, but the intimate, personal fate of a man who lived his whole life
# under a secret he was not permitted to know.
work: mahabharata
book: 8
title: "Karna Parva: The Son of Surya, the Chariot Wheel, and the Unlived Life"
length_minutes: 104
principle: >
  Do not score Karna Parva as "the battle where Karna dies." Score it as
  the book in which the Mahabharata's most tragic figure finally takes the
  command he has waited his whole life to hold, fights the battle he was
  born to fight, and dies — not in defeat but in the precise moment when
  his chariot wheel sinks into the earth and the god who was his father
  withholds the light. Karna's tragedy is not that he loses but that he
  was never allowed to be who he was: the eldest Pandava, the firstborn
  of Kunti, the brother who should have led. The dominant force is fate
  — the fate of a man whose every achievement is cancelled by the accident
  of his birth.
force_arc: [kingship, wrath, fate, sacrifice, wrath, divine-intervention, fate, grief, supplication, grief]
dominant_force: fate
tracks:
  - n: 1
    scene: "Karna becomes commander — the king of Anga takes the field"
    force: kingship
    composer: Handel
    work: "Music for the Royal Fireworks, HWV 351 — Overture"
    decision: added
    why: >
      After Drona's death, Duryodhana appoints Karna commander-in-chief of
      the Kaurava army. It is the moment Karna has waited for his entire
      life: the son of a charioteer, crowned king of Anga by Duryodhana's
      friendship, now leading the greatest army on earth. Handel's Royal
      Fireworks Overture is ceremonial architecture at full imperial
      register — the French overture dotted rhythms, the brass and timpani
      marking the arrival of sovereignty. But the overture is in D major,
      the key of triumph, and Karna's triumph is the most fragile in the
      epic. Kingship requires ceremonial grandeur; Handel gives it, and
      the grandeur is shadowed by everything the listener knows is coming.
  - n: 2
    scene: "Karna and Bhima — the old hatred consummated"
    force: wrath
    composer: Prokofiev
    work: "Scythian Suite, Op. 20 — I. The Adoration of Veles and Ala"
    decision: added
    why: >
      Bhima and Karna meet on the field. Their hatred is older than the
      war — Bhima has never forgiven Karna for mocking Draupadi during the
      dice game ('a queen with five husbands is a whore'), and Karna has
      never forgiven Bhima for the contempt of the warrior-born toward the
      charioteer's son. Their battle is personal, vicious, and unresolved
      — Bhima withdraws, Karna holds the field. Prokofiev's Scythian Suite
      opens with a primeval roar — the low orchestra in dissonant clusters,
      the percussion driving beneath, the sense of a world older than the
      laws that try to contain it. Wrath requires rhythmic pressure; the
      suite's opening movement is the sound of violence before civilization,
      the hatred of two men who share a secret they do not know they share.
  - n: 3
    scene: "Karna's war — the single day of command"
    force: fate
    composer: Berlioz
    work: "Symphonie fantastique, Op. 14 — IV. 'March to the Scaffold'"
    decision: added
    why: >
      Karna leads the Kaurava army through a day of continuous battle. He
      defeats each Pandava in turn — Nakula, Sahadeva, Bhima — and spares
      them because he has sworn to kill only Arjuna. The day is his finest
      military hour. Berlioz's March to the Scaffold — used in Sabha Parva
      for Draupadi's dragging into the assembly hall — here finds a new
      register: the processional certainty of a man walking toward his own
      death with full knowledge. Karna knows that Arjuna is protected by
      Krishna; he knows that his chariot's wheel is vulnerable; he knows
      the curse of his brahmin teacher is waiting. The march rhythm is
      fate as formal procession: Karna moves through the day as the
      condemned man moves through the streets of the city, with the same
      ceremonial dignity and the same terminus.
  - n: 4
    scene: "Karna wounded — the blood of Surya"
    force: sacrifice
    composer: Stravinsky
    work: "Petrushka — Part I, 'The Shrovetide Fair' (opening)"
    decision: added
    why: >
      Karna is wounded by Bhima's mace but continues to fight. His blood
      is not the blood of a charioteer's son — it is golden, the blood of
      the sun-god, and the Pandavas see it and understand what Kunti has
      told them. But the secret changes nothing. Stravinsky's Petrushka
      opening — the fairground cacophony, the hurdy-gurdy melodies, the
      crowd noise and the puppet-show — is the music of someone performing
      a role that has been assigned in advance. Karna has lived his whole
      life performing the role of the charioteer's son; the revelation of
      his divine blood should change the script, but the script has already
      been performed to its end. Sacrifice requires ritual weight; Petrushka
      is the ritual of a puppet who knows he is a puppet and dances anyway.
  - n: 5
    scene: "Karna and Arjuna — the chariot duel begins"
    force: wrath
    composer: Holst
    work: "The Planets, Op. 32 — 'Mars, the Bringer of War'"
    decision: added
    why: >
      Karna and Arjuna face each other at last. The duel between them is
      the war's central event — the two greatest archers of the age, the
      eldest Pandava and the third Pandava, the rejected son and the prince.
      Holst's Mars — the 5/4 pulse, the grinding brass, the percussive
      unforgiving rhythm — returns from Sabha Parva (Shishupala's death)
      and Drona Parva (Arjuna's vow) for its most authoritative appearance.
      The rhythm here is not the wrath of a single moment but the cumulative
      wrath of the entire war concentrated in two chariots facing each
      other on a field of corpses.
  - n: 6
    scene: "Krishna intervenes — the chariot wheel sinks"
    force: divine-intervention
    composer: Wagner
    work: "Götterdämmerung — 'Siegfried's Funeral March' (full)"
    decision: added
    why: >
      At the height of the duel, Karna's chariot wheel sinks into the
      earth — the result of a curse from a brahmin whose cow he had
      accidentally killed years before. He leaps down to free it, and
      calls on the rules of war: a man without a chariot should not be
      attacked. Krishna tells Arjuna: kill him now. Arjuna does. Wagner's
      Siegfried's Funeral March — the full statement, finally — is the
      sound of the hero's life passing in review: the bassoons and low
      strings in the opening, the great melody in the brass, the sense
      of an entire world mourning something irreplaceable. Divine-
      intervention requires sudden colour shift; Wagner's funeral march
      shifts the colour of the entire war, from the register of battle
      to the register of irreversible loss.
  - n: 7
    scene: "Karna's death — the sun withholds its light"
    force: fate
    composer: Beethoven
    work: "Symphony No. 5 in C minor, Op. 67 — I. Allegro con brio"
    decision: added
    why: >
      Karna, on the ground, tries to free the wheel. Surya, his father,
      does not intervene. Arjuna's arrow takes him in the throat. The
      sun does not darken — the epic does not give him that dignity —
      but the light goes out of the Kaurava cause. Beethoven's Fifth's
      first movement is fate as pure musical structure: the four-note
      motif stated, developed, inverted, fragmented, and finally driven
      into the closing cadence. Fate requires inexorable motif and
      hammered insistence; the Fifth's opening movement is fate as the
      war's longest trajectory — the motif was heard in Adi Parva's
      wheel of time, in Sabha Parva's dice cascade, in Bhishma Parva's
      battle rhythm, and here, finally, at the death of the man who
      should have been king.
  - n: 8
    scene: "Karna's body on the field — the grief of Duryodhana"
    force: grief
    composer: Mahler
    work: "Symphony No. 5 in C-sharp minor — IV. Adagietto (closing)"
    decision: added
    why: >
      Duryodhana finds Karna's body on the battlefield. His friend — the
      only man who believed in him without calculation, who gave him the
      kingdom of Anga when no one else would give him anything — is dead.
      Duryodhana's grief is the first moment in the epic that makes him
      sympathetic: the villain reveals himself capable of love. Mahler's
      Adagietto, in its closing bars, is grief as final recognition: the
      strings settling into the tonic as though the melody has exhausted
      itself, the last chord held into silence. Grief requires slow tempo
      and inward line; the Adagietto's ending is the sound of a man who
      has lost the only person who loved him without condition.
  - n: 9
    scene: "The unlived life — Kunti's grief on the empty field"
    force: supplication
    composer: Bach
    work: "St Matthew Passion, BWV 244 — 'Aus Liebe will mein Heiland sterben'"
    decision: added
    why: >
      Kunti comes to the battlefield at night. Her firstborn son is dead,
      killed by her third son on the field she could have prevented if she
      had spoken the truth thirty years earlier. Her grief is the grief of
      the mother who held the secret too long. Bach's 'Aus Liebe will mein
      Heiland sterben' (Out of love my Saviour is willing to die) is the
      most intimate aria in the St Matthew Passion — the soprano alone
      with a flute and two oboes da caccia, the melody moving through
      suspensions that never fully resolve. Supplication requires suspended
      cadence; Bach's aria is the sound of a mother who knows that her love
      was not enough to save her son because it came too late.
  - n: 10
    scene: "The sun returns — the war continues without Karna"
    force: grief
    composer: Wagner
    work: "Götterdämmerung — 'Siegfried's Funeral March' (closing section)"
    decision: added
    why: >
      After Karna's death, the war continues — one more commander (Shalya),
      one more day (Book 9), the night attack (Book 10), the women's
      lament (Book 11). But the centre has been removed. Karna was the
      only warrior on the Kaurava side who could match Arjuna; with his
      death, the war's outcome is certain. Wagner's Funeral March closes
      with the full orchestra playing the great melody in D-flat major,
      the strings and brass in apotheosis — not triumph but the final
      acknowledgment of a life that mattered. The march ends, the war
      continues, and the epic has crossed into its terminal phase.
demoted:
  - composer: Mozart
    work: "Requiem — 'Lacrimosa'"
    status: "save for Stri Parva (Book 11)"
    why: >
      Karna Parva has the death of Karna but not yet the collective grief
      of the women. The Lacrimosa is the register of Stri Parva, where
      the mothers, wives, and daughters walk the field of the dead.
  - composer: Mahler
    work: "Symphony No. 2 'Resurrection' — V. 'Auferstehung'"
    status: "save for Svarga Arohana (Book 18); Karna's death is grief, not resurrection"
    why: >
      The Resurrection finale is the apotheosis of the poem's end — the
      Pandavas in heaven, the war concluded, the questions answered.
      Karna's death is still loss, not transformation. The terminal
      register of transcendence belongs to the last book.
