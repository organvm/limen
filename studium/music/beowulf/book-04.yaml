work: beowulf
book: 4
title: "Beowulf Fitt IV: The Boast and the King"
length_minutes: 62
principle: >
  Fitt IV is the political center of the first act. Beowulf stands before Hrothgar
  and makes his formal boast, pledging to fight Grendel bare-handed. Hrothgar
  replies not with triumph but with memory, recalling Beowulf's father and the
  terrible toll Grendel has taken. The arc contrasts the young hero's kinetic
  certitude with the old king's heavy, accumulated sorrow.
force_arc: [salvation, kingship, law, sacrifice, memory, grief, revelation]
dominant_force: memory
tracks:
  - n: 1
    scene: "Hrothgar's recognition — 'I knew him as a boy'"
    force: salvation
    composer: Fauré
    work: "Requiem — In Paradisum"
    decision: added
    why: >
      Before Beowulf even enters, Hrothgar hears his name and declares that God has
      sent him as a rescue against Grendel's terror. It is a moment of profound,
      sudden hope breaking through a twelve-year nightmare. Fauré's resolving
      radiance perfectly captures this quiet, almost disbelieving salvation — the
      first ray of light in the hall.
  - n: 2
    scene: "Beowulf enters Heorot — the hero in the light"
    force: kingship
    composer: Walton
    work: "Crown Imperial"
    decision: added
    why: >
      Beowulf walks into the hall, his ring-mail shining, and stands before the king.
      This is sovereign display at its most brilliant: the greatest warrior of his
      age presenting himself to the court. Walton's march is unapologetically
      regal, matching the sheer physical and visual impact of Beowulf taking the floor.
  - n: 3
    scene: "The formal boast — 'I will fight him bare-handed'"
    force: law
    composer: Stravinsky
    work: "Dumbarton Oaks — I. Tempo giusto"
    decision: added
    why: >
      Beowulf does not just promise to fight; he lays out the precise terms of the
      combat. Because Grendel uses no weapons, Beowulf will use no weapons. It is
      a binding legal and heroic contract. Stravinsky's neoclassical clarity reflects
      this rigid, structured commitment — it is the sound of a vow being locked into place.
  - n: 4
    scene: "The possibility of death — 'Fate goes ever as it must'"
    force: sacrifice
    composer: Gluck
    work: "Iphigénie en Tauride — O Toi, Qui Prolongeas Mes Jours"
    decision: added
    why: >
      Having made his boast, Beowulf calmly acknowledges that he might die, instructing
      Hrothgar to send his armor back to Hygelac if Grendel takes him. There is no fear,
      only ritual weight. Gluck's aria carries exactly this noble, sacrificial readiness — a
      willingness to be consumed by the act without complaint.
  - n: 5
    scene: "Hrothgar's reply — the memory of Ecgtheow"
    force: memory
    composer: Rachmaninoff
    work: "Symphony No. 2 — III. Adagio"
    decision: added
    why: >
      Hrothgar does not immediately celebrate. Instead, his mind drifts back decades
      to when he settled a feud for Beowulf's father. It is a deeply nostalgic,
      paternal speech, anchoring the present crisis in old loyalties. Rachmaninoff's
      Adagio provides the necessary faded recapitulation, the long, sweeping backward
      glance of an old man remembering a younger world.
  - n: 6
    scene: "The king's despair — the toll of the hall-guard"
    force: grief
    composer: Mahler
    work: "Symphony No. 5 — IV. Adagietto"
    decision: added
    why: >
      Hrothgar then speaks of his own depleted ranks, the men who boasted they could
      stop Grendel and were found dead in the morning, the hall stained with blood.
      This is intimate, inward pain. Mahler's Adagietto, unlike the collective grief
      of Barber used in Fitt I, fits this personal, exhaustion-hollowed confession
      of a king who has outlived his protectors.
  - n: 7
    scene: "The feast begins — making room for the Geats"
    force: revelation
    composer: Pärt
    work: "Spiegel im Spiegel"
    decision: added
    why: >
      The formal speeches conclude. Hrothgar bids Beowulf sit at the feast. A bench
      is cleared, a cup-bearer pours bright mead, and a scop sings clearly in Heorot.
      It is a restoration of the hall's true purpose, an island of stillness before
      the night falls. Pärt provides this breathless, suspended peace, a moment of
      grace functioning against the dark.
