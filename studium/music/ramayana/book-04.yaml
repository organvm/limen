# Ramayana — Kishkindha Kanda (Book 4) — curated music arc
# Kishkindha Kanda: the book of the alliance. Rama meets Hanuman and Sugriva, swears friendship
# at the fire, kills Vali to restore Sugriva's kingdom (the epic's great dharmic crux), waits out
# the long monsoon while Sugriva forgets his vow in pleasure, and at last launches the four search
# parties — the machinery that will recover Sita. The register is the turn from private grief
# toward collective purpose: the lone exile becomes the leader of an army. The kanda ends with
# Hanuman rising on the southern shore to leap the sea.
work: ramayana
book: 4
title: "Ramayana Kishkindha Kanda: The Pact, the Arrow, the Monsoon, the Search"
length_minutes: 72
principle: >
  Do not score Kishkindha Kanda as a detour. Score it as the book where the grief of Aranya Kanda
  is converted into a machine for RETURN — where a single bereft man, who could only rave at the
  trees, becomes the ally of a king and the commander of a search that spans the world. The
  dominant force is RETURN: every scene either builds the alliance that will recover Sita or
  delays it, and the kanda is bent entirely toward the launching of the quest. But it is also the
  epic's most morally vexed book, because the alliance is sealed with a killing that troubles
  readers to this day — Rama shoots Vali from concealment to win Sugriva's throne, and Vali dies
  reproaching him. Do not smooth this over: let the arrow carry its full moral weight. Score the
  early scenes as recognition and compact (Hanuman is the perfect minister; the fire-pact is a
  sacred bond), the Vali killing as dark necessity with a wound in it, the monsoon as a long
  ache of waiting and a comic lapse (Sugriva, crowned, forgets everything in wine and women), and
  the close as upward thrust — the search dispatched to the four directions, and Hanuman swelling
  on the southern shore to cross the sea. The kanda ends on a leap. Score the rising.
force_arc: [revelation, law, exile, wrath, fate, comedy, grief, return, ascent]
dominant_force: return
tracks:
  - n: 1
    scene: "Rama meets Hanuman — the perfect minister appears"
    force: revelation
    composer: Vaughan Williams
    work: "Fantasia on a Theme by Thomas Tallis"
    decision: added
    why: >
      Wandering south, the brothers reach Rishyamukha, where Sugriva, the exiled monkey-king, sends
      his minister Hanuman to assess the strangers. Hanuman approaches in the form of a mendicant
      and speaks — and his speech is so perfect, so learned, so exactly judged, that Rama marvels:
      here is eloquence itself, the ideal servant, devotion that has not yet declared itself but is
      already total. It is a recognition scene — Rama meeting the being who will become the truest
      heart of the epic. Vaughan Williams's Tallis Fantasia, scored for divided strings that answer
      one another across a luminous space, is the sound of something sacred recognized — antique,
      radiant, devotional without dogma. Revelation requires stillness, chant, and verticality; the
      Fantasia gives the meeting of Rama and Hanuman its proper register of quiet, luminous
      recognition. The greatest devotee of the tradition has just walked onstage, and the music
      knows it before the plot does.
  - n: 2
    scene: "The fire-pact with Sugriva — friendship sworn"
    force: law
    composer: Handel
    work: "Music for the Royal Fireworks — I. Overture"
    decision: added
    why: >
      Hanuman brings Rama to Sugriva, and the two make a formal compact around a sacred fire,
      circling it together: Rama will kill Vali, who has stolen Sugriva's kingdom and wife, and
      Sugriva will marshal the monkey nations to find Sita. It is a treaty, a sworn alliance, law
      made binding by ritual. Handel's "Music for the Royal Fireworks" overture is ceremonial law
      at its most architecturally grand — the dotted rhythms of the French overture, the brass and
      timpani of a state occasion, formality as the very substance of the music. Law requires
      formal clarity, repetition, and architecture; Handel gives the fire-pact the weight of a
      treaty between sovereigns, the alliance that organizes everything to come rendered as
      ceremonial structure. From this fire forward, the recovery of Sita is no longer one man's
      grief but a contract between nations.
  - n: 3
    scene: "Sugriva the exiled brother — driven out by Vali"
    force: exile
    composer: Dvořák
    work: "Symphony No. 9 in E minor (From the New World) — II. Largo"
    decision: added
    why: >
      Sugriva tells his story: his brother Vali, the mighty monkey-king, wrongly believed Sugriva
      had betrayed him, seized his kingdom and his wife, and drove him into hiding on the one
      mountain Vali's curse forbids him to climb. Sugriva lives in fear, a king reduced to a
      fugitive, mirroring Rama's own exile back to him — which is part of why the alliance feels
      fated. Dvořák's "New World" Largo, with its great cor anglais melody, is the most famous
      music of exile and homesickness in the repertoire: the longing of one driven far from home,
      tender and bereft. Exile requires wandering tonality and open intervals; the Largo gives
      Sugriva's dispossession its ache — the wronged brother in hiding, longing for the kingdom and
      the life that were taken from him, recognizing in Rama a fellow exile and binding his fate
      to his.
  - n: 4
    scene: "The duel of the brothers — Vali and Sugriva"
    force: wrath
    composer: Prokofiev
    work: "Romeo and Juliet — Dance of the Knights (Montagues and Capulets)"
    decision: added
    why: >
      To draw Vali out, Sugriva challenges him to single combat. The two enormous monkey-kings
      meet and grapple — a fight of brother against brother, so evenly matched that Rama, hidden,
      cannot at first tell them apart. It is wrath between kin, the most dangerous kind: two
      titanic forces locked in a combat neither can win outright. Prokofiev's "Dance of the
      Knights" is the most implacable music of armored menace in the repertoire — the heavy,
      stamping theme of two houses' enmity, grinding forward with brutal weight. Wrath requires
      rhythmic pressure and unresolved harmony; Prokofiev's relentless tread is the duel of Vali
      and Sugriva, two near-equal powers crashing together. But the fight will not be decided by
      either of them — it will be decided by an arrow from the trees, which is what makes the next
      scene the kanda's moral wound.
  - n: 5
    scene: "Rama kills Vali from concealment — the dying reproach"
    force: fate
    composer: Mahler
    work: "Symphony No. 9 in D major — IV. Adagio"
    decision: added
    why: >
      As the brothers grapple, Rama shoots Vali from hiding. Vali falls — and with his dying breath
      he reproaches Rama bitterly: by what dharma does a prince kill a stranger from concealment, in
      another's quarrel, striking down one who had no fight with him? It is the most debated act in
      the epic, and the poem does not resolve it cleanly: Rama answers, Vali half-accepts, and the
      arrow remains a shadow on the hero's honor. The killing had to happen for the alliance to
      hold — fate as dark necessity — but it costs something that is never quite repaid. Mahler's
      Ninth Adagio is the supreme music of farewell and the wound of mortality — a long, broken,
      heart-stopping leave-taking that fades into silence at the edge of dissolution. Fate requires
      an inexorable motif and hammered insistence, but here fate has the face of a dying king's
      reproach; Mahler gives Vali his death the way the poem does — as something necessary, sorrowful,
      and not without a stain on the one who caused it.
  - n: 6
    scene: "Sugriva crowned — and lost in pleasure, forgetting his vow"
    force: comedy
    composer: Johann Strauss II
    work: "Wein, Weib und Gesang (Wine, Women and Song), Op. 333"
    decision: added
    why: >
      Restored to his throne and his wives, Sugriva promptly forgets everything — he sinks into the
      pleasures of the recovered kingdom, drinking and reveling through the season while Rama waits
      in the forest, and entirely neglects his sworn promise to find Sita. It is a lapse that is
      almost comic in its human ordinariness: the rescued king, drunk on relief and luxury, letting
      the debt slide. Johann Strauss's "Wine, Women and Song" — a glittering, indulgent Viennese
      waltz whose very title names Sugriva's distraction — is courtly pleasure as gorgeous excess.
      Comedy requires dance rhythm and courtly exaggeration; the waltz gives Sugriva's dissipation
      its exact color: not villainy but the seductive forgetfulness of a man who has gotten what he
      wanted and lost sight of what he owes. Lakshmana will have to come, furious, to remind him.
  - n: 7
    scene: "The monsoon — Rama waits, pining for Sita through the rains"
    force: grief
    composer: Chopin
    work: "Prelude No. 15 in D-flat major, Op. 28 (Raindrop)"
    decision: added
    why: >
      The rainy season comes, and with it the kanda's famous interlude: Rama, unable to act while
      the rains make war and travel impossible, sits in a cave through the long wet months and
      grieves for Sita — the lightning reminding him of her, the rain of his tears, every swollen
      river and dripping tree turned into an emblem of his longing. It is grief stretched across a
      season, waiting as a form of suffering. Chopin's "Raindrop" prelude, with its endlessly
      repeating single note beneath a melody that darkens and returns, is the most literal and the
      most inward music of rain and melancholy in the repertoire — the drop that will not stop, the
      sorrow that has nowhere to go. Grief requires a slow tempo and an inward line; Chopin gives
      Rama's monsoon-vigil its precise texture: the patient, dripping, inconsolable wait for a
      season to end so that the search can finally begin.
  - n: 8
    scene: "The search parties dispatched to the four directions"
    force: return
    composer: Beethoven
    work: "Symphony No. 7 in A major — II. Allegretto"
    decision: added
    why: >
      Roused at last, Sugriva summons the monkey nations — armies beyond counting — and sends them
      out to the four quarters of the earth to find Sita, each party given a direction and a deadline.
      The lone grief of the empty hut has become a planetary search: this is the machinery of return
      assembling and setting out. Beethoven's Seventh Allegretto, with its inexorable processional
      tread building from a single rhythm into a vast, measured march of many voices, is the sound
      of a great purposeful movement gathering and going forward. Return requires circular form and
      a recognition motif; the Allegretto's relentless, accumulating procession is the search-armies
      marching out to the horizons, the whole world mobilized to bring one woman home. From here the
      epic's direction is fixed: everything now moves toward recovery.
  - n: 9
    scene: "Hanuman rises on the southern shore — the leap to come"
    force: ascent
    composer: Strauss
    work: "Also sprach Zarathustra, Op. 30 — Sonnenaufgang (Sunrise)"
    decision: added
    why: >
      The southern party, Hanuman among them, reaches the edge of the sea — and learns from the old
      vulture Sampati (Jatayu's brother) that Sita is held in Lanka, across a hundred leagues of
      ocean. The party despairs: who can cross such a gulf? Then Hanuman, reminded of his divine
      parentage and his own forgotten power, begins to swell — growing vast upon the mountain,
      gathering himself for the impossible leap that will open the next kanda. It is the kanda's
      final image and its upward thrust: the servant rising into the hero he was always meant to be.
      Strauss's "Sunrise" from "Also sprach Zarathustra" is the most elemental music of rising in
      the repertoire — the low rumble, the climbing trumpet, the blazing arrival of full orchestra
      and organ, dawn breaking over the world. Ascent requires a rising sequence and luminous
      orchestration; Strauss gives Hanuman's swelling on the shore the exact shape of a sunrise, and
      ends Kishkindha Kanda not on the ground but on the verge of flight.
demoted:
  - composer: Holst
    work: "The Planets — Jupiter, the Bringer of Jollity"
    status: "too unshadowed for a kanda built on a morally vexed killing"
    why: >
      Jupiter's broad, generous joy would erase the kanda's central wound — the arrow that kills Vali
      from hiding. Kishkindha is not a triumphant book; its alliance is sealed in a deed that troubles
      the conscience, and Holst's untroubled exuberance would deny that.
  - composer: Wagner
    work: "Lohengrin — Prelude to Act I"
    status: "spent in Bala Kanda (the breaking of the bow); its recognition belongs there"
    why: >
      The Lohengrin Prelude's arc of luminous accumulation already scored Rama and Sita's recognition
      at the bow. Reusing it would blunt the distinct register Kishkindha needs — alliance and quest,
      not the cosmic marriage-recognition of Book 1.
  - composer: Mahler
    work: "Symphony No. 2 (Resurrection) — V. Finale"
    status: "save for the recovery and coronation; Hanuman's leap is ascent, not yet apotheosis"
    why: >
      The Resurrection finale is full apotheosis — the wrong scale for a kanda that ends poised on the
      verge of a leap rather than at a triumph. Strauss's sunrise gives the rising without spending the
      poem's resurrection-music before Sita is even found.
