# Conference of the Birds — Section 6 — curated music arc
# The Hawk's Objection: service to an earthly king
work: conference-of-birds
book: 6
title: "Conference of the Birds, Section 6: The Hawk's Devotion / The King's Wrist and the King of Kings"
length_minutes: 72
principle: >
  Do not score this as the hawk being a snob or a courtier. Score it as the genuine spiritual
  problem of someone who has already given their life to a worthy master — the hawk serves a
  king, hunts for the king, lives on the king's wrist. He has already made the submission that
  the other birds are being asked to make. His objection is the subtlest in the assembly: I
  have already surrendered myself; why would I leave a real king for an invisible one? The
  hoopoe must show the hawk that the earthly king is an icon of the Simurgh, not a rival to
  it — that the hawk's service has been training for a deeper service, not a substitute for it.
force_arc: [kingship, desire, revelation, sacrifice, kingship, supplication, law, ascent, desire, salvation]
dominant_force: kingship
tracks:
  - n: 1
    scene: "The hawk speaks — I know what service is"
    force: kingship
    composer: Walton
    work: "Orb and Sceptre — Coronation March"
    decision: added
    why: >
      The hawk's opening speech has the quality of a military report: he serves a king — an
      actual king, with an actual scepter and a realm — and he has given his life to that
      service. The hawk's pride is not vanity; it is the dignity of one who has chosen his
      allegiance and kept it. Walton's Orb and Sceptre, written for the coronation of Elizabeth
      II, is ceremonial grandeur at full stretch: the brass intoning sovereign intervals, the
      strings carrying the march forward with the inevitability of a state procession. The
      hawk does not say he is better than the other birds — he says he has already done what
      they are being asked to do.
  - n: 2
    scene: "The hawk's wrist — the king's glove, the leather, the jesses"
    force: desire
    composer: Elgar
    work: "Pomp and Circumstance March No. 1 (Trio — 'Land of Hope and Glory')"
    decision: added
    why: >
      The hawk describes the physical reality of his service: the king's glove, the leather
      jesses, the weight of the gauntlet, the moment of release when the quarry is sighted.
      These are not chains — they are the honored instruments of a shared craft. Elgar's
      'Pomp and Circumstance' Trio is the sound of loyalty to something larger than the self:
      the majestic melody, the strings in full cantabile, the sense of a collective body moving
      in a single direction. The hawk's desire is for the structure of service itself — the
      hierarchy, the discipline, the joy of being used by something greater.
  - n: 3
    scene: "The hoopoe's tale — the falcon who served the Simurgh without knowing it"
    force: revelation
    composer: Messiaen
    work: "L'Ascension — 'Prière du Christ montant vers son Père' (Prayer of Christ ascending to the Father)"
    decision: added
    why: >
      The hoopoe tells the hawk that every earthly king is a veil of the Simurgh — the hawk's
      service has been real and true, but it has been service to the trace, not the source.
      Messiaen's 'Prayer of Christ ascending to the Father' from L'Ascension is revelation as
      vertical movement: the organ holds long, suspended chords in Messiaen's characteristic
      harmony (the added-sixth chords, the non-resolving suspensions), the line ascending not
      linearly but through a series of plateaus, each higher than the last. The hawk's king is
      such a plateau — a real height from which the next height becomes visible. He has not
      been wrong; he has been incomplete.
  - n: 4
    scene: "The hawk's shock — my service has not been enough?"
    force: sacrifice
    composer: Stravinsky
    work: "Symphony of Psalms — I. 'Exaudi orationem meam, Domine'"
    decision: added
    why: >
      The hawk's world cracks: he has given his life to a king, and now he is told the king is
      not enough. Stravinsky's Symphony of Psalms opens with a choked orchestral cry — the
      winds and brass in a tight, dissonant chord that sounds like the world's entire supply
      of lament compressed into a single attack. The hawk's sacrifice of his life to his king
      has been real; the realization that it points beyond itself is a kind of death. Stravinsky's
      setting of 'Hear my prayer, O Lord' is the hawk's involuntary cry: the prayer of one who
      has just discovered that the God he did not know he was serving might be the one he
      actually owes his life to.
  - n: 5
    scene: "The hoopoe speaks of the true sovereign — the Simurgh as king of kings"
    force: kingship
    composer: Handel
    work: "Music for the Royal Fireworks — Overture (Adagio)"
    decision: added
    why: >
      The hoopoe does not diminish the hawk's king — he elevates the category of kingship.
      The Simurgh is not a different kind of ruler; the Simurgh is what every ruler is ruling
      toward when they rule well. Handel's Music for the Royal Fireworks Overture — the
      French-overture form with its dotted rhythms and ceremonial gravity — is sovereignty
      music at the edge of the transcendent: the brass and winds (no strings in the original
      scoring) create a texture of such formal authority that it sounds like a divine order
      being announced. The hoopoe is not arguing with the hawk; he is showing him that the
      structure of his devotion is larger than he knew.
  - n: 6
    scene: "The hawk prays — let me serve the right king"
    force: supplication
    composer: Bach
    work: "Mass in B Minor — 'Agnus Dei'"
    decision: added
    why: >
      The hawk's prayer pivots from defense to petition: he does not want to abandon his king,
      but he wants to serve the reality that his king was serving. Bach's 'Agnus Dei' from the
      B Minor Mass is the most concentrated act of supplication in the Western canon: the alto
      voice (or alto aria) moving above the continuo in a line that is both melody and confession,
      the 'Agnus Dei, qui tollis peccata mundi' repeated as if the confession could never be
      thorough enough. The hawk's prayer has this quality — he is not bargaining but laying
      down his rank, his pride, his jesses, before a king he has not yet seen.
  - n: 7
    scene: "The hoopoe's closing tale — the king who took off his crown"
    force: law
    composer: Bach
    work: "The Art of Fugue — Contrapunctus I"
    decision: added
    why: >
      The hoopoe's final tale is of a king who removed his crown, entered the mosque as a
      beggar, and found that the prayer of a beggar reaches a different God than the prayer
      of a king. The tale is about the structure of submission: the hawk must learn the form
      of service that asks for nothing, even the dignity of serving. Bach's Contrapunctus I
      from The Art of Fugue is law in its purest form: a subject, a countersubject, an
      architecture of musical logic that asks for nothing except to be followed. The fugue does
      not argue; it demonstrates. The hoopoe's tale demonstrates the same thing: the law of
      submission is the same for kings and beggars.
  - n: 8
    scene: "The hawk removes his jesses"
    force: ascent
    composer: Bruckner
    work: "Symphony No. 7 — IV. Finale (coda)"
    decision: added
    why: >
      The hawk, wordlessly, removes his jesses — the leather straps that attach him to the
      king's wrist. They fall to the ground. The assembly is silent. Bruckner's Seventh
      Symphony finale coda is Bruckner's most powerful statement of arrival: the theme returns
      in the brass, the strings surge upward, the harmony resolves into C major with a sense
      of having traveled through the entire structure of a universe to reach this single
      moment. The hawk's act is not renunciation — it is the next step in his service. He has
      not stopped serving; he has begun to serve the reality that his king was pointing to.
  - n: 9
    scene: "The hawk's earthly king — seen now as a fellow seeker"
    force: desire
    composer: Dvořák
    work: "String Quartet No. 12 ('American') — II. Lento"
    decision: added
    why: >
      The hawk thinks of his earthly king with new eyes: not as the end of his service but as
      a fellow creature who also — perhaps — is seeking something beyond his crown. Dvořák's
      'American' Quartet slow movement is desire in the key of homesickness: the viola melody
      over syncopated strings, the harmonies stretching toward a resolution that keeps receding,
      the sense of a continent that is not yet fully seen. The hawk's love for his king has
      not diminished; it has been released into a larger field. The king is now a companion in
      seeking, not a terminus.
  - n: 10
    scene: "The assembly — one king recognized, the journey visible"
    force: salvation
    composer: Bruckner
    work: "Symphony No. 9 — III. Adagio (conclusion)"
    decision: added
    why: >
      The section closes with the assembly at a new level of stillness. The hawk has shown them
      that submission is not the end of freedom but its beginning — and that the thing they
      are submitting to (the Simurgh, the journey, the seven valleys) is not a tyrant but a
      king who rules by being what the seeker most deeply is. Bruckner's Ninth Symphony Adagio
      conclusion — the final pages, dedicated 'to the beloved God,' where the theme returns
      in the horns over a string chorale of almost unbearable radiance — is salvation as
      arrival, not at a destination but at the threshold of a destination that was always
      already present. The birds are not at the Simurgh, but they are no longer anywhere else.
demoted:
  - composer: Elgar
    work: "The Dream of Gerontius — 'Go forth upon thy journey, Christian soul'"
    status: "too explicitly Christian funereal for Attar's Persian court imagery"
    why: >
      Elgar's setting of Cardinal Newman's poem about the soul's judgment after death is the
      wrong register for the hawk's transition — which is not about death and judgment but
      about the expansion of the category of service. The hawk is not dying; he is being
      released into a larger life.
  - composer: Wagner
    work: "Die Meistersinger von Nürnberg — Prelude to Act I"
    status: "the guild-and-craft tradition is too specifically Western European for Attar's Persian court"
    why: >
      The Meistersinger prelude is ceremony as German bourgeois self-celebration; the hawk's
      ceremony is Persian court ceremony, which operates on a different axis of sovereignty
      and submission. The wrong formalism would flatten the spiritual precision of the hawk's
      attachment to his king.
