dominant_force: fate
tracks:
- n: 1
  scene: Medea struck by love for Jason
  force: desire
  composer: Wagner
  work: "Tristan und Isolde \u2014 Prelude"
  decision: added
  why: "Medea, princess of Colchis, is struck by a sudden, consuming passion for the foreign hero Jason. She knows it is madness and treason, yet she cannot resist. The deep, unresolved chromaticism of the Tristan chord is the heavy, subterranean awakening of a desire that will destroy her life."
- n: 2
  scene: Jason yokes the fire-breathing bulls
  force: divine-intervention
  composer: Strauss
  work: "Also sprach Zarathustra \u2014 'Sunrise'"
  decision: added
  why: "Protected by Medea's magic herbs, Jason casually approaches the massive, fire-breathing bronze bulls and yokes them, stunning the Colchians. A sudden color shift and brass fanfare reflect the shocking, superhuman feat made possible by divine (or at least supernatural) intervention."
- n: 3
  scene: Medea rejuvenates Aeson
  force: metamorphosis
  composer: Ravel
  work: "Daphnis et Chlo\xE9 \u2014 Suite No. 2, 'Lever du jour'"
  decision: added
  why: "Under a full moon, Medea gathers herbs, slices Aeson's throat to drain his old blood, and pours in her boiling magical brew. His gray hair turns black, and his wrinkles vanish. The sweeping, colorful orchestration captures the fluid, miraculous transformation from death's door back to youth."
- n: 4
  scene: Medea tricks and boils Pelias
  force: wrath
  composer: Shostakovich
  work: "Symphony No. 5 \u2014 I. Moderato (climax)"
  decision: added
  why: "Pretending to offer the same rejuvenation to King Pelias, Medea tricks his daughters into stabbing him, then throws his bleeding body into a boiling pot of powerless water. Relentless rhythmic pressure and harsh dissonance capture the brutal, deceptive violence of her vengeance."
- n: 5
  scene: Medea flees on her dragon chariot
  force: fate
  composer: Berlioz
  work: "Symphonie fantastique \u2014 IV. 'March to the Scaffold'"
  decision: added
  why: "Her crimes complete, Medea escapes through the air on a chariot drawn by winged dragons, looking down on the lands below. The inexorable, hammered rhythm captures her flight not as heroic ascent, but as the grim departure of a monstrous, fateful force moving to her next target."
- n: 6
  scene: Minos prepares for war
  force: law
  composer: Bach
  work: "The Art of Fugue \u2014 Contrapunctus I"
  decision: added
  why: "King Minos of Crete rallies a massive fleet to avenge the death of his son Androgeos, sending envoys to gather allies across the Aegean. The formal clarity and repetition of the fugue capture the structured, logistical preparation for a widespread, legally justified military campaign."
- n: 7
  scene: The Plague of Aegina
  force: plague
  composer: Penderecki
  work: "Threnody to the Victims of Hiroshima"
  decision: added
  why: "King Aeacus recounts how Juno sent a devastating plague that killed nearly all the animals and people of his island. The air turned thick, and bodies piled up in the temples. The descending motion, shrieking strings, and dark orchestration perfectly embody the agonizing spread of mass death."
- n: 8
  scene: The Myrmidons are born
  force: metamorphosis
  composer: P\xE4rt
  work: "Spiegel im Spiegel"
  decision: added
  why: "In response to Aeacus's prayer, Jupiter transforms an army of ants on a sacred oak tree into a new race of men: the Myrmidons, fiercely loyal and disciplined. Emergence and verticality capture the quiet, miraculous birth of a new society rising from the tiny insects of the earth."
- n: 9
  scene: Laelaps and the uncatchable fox
  force: comedy
  composer: Rossini
  work: "William Tell \u2014 Overture (Finale)"
  decision: added
  why: "Cephalus releases his magical dog Laelaps, who always catches his prey, to hunt a magical fox that can never be caught. The two race endlessly in circles until the gods turn them both to stone. The fast, bouncing rhythm highlights the absurdity and paradox of this impossible pursuit."
- n: 10
  scene: The death of Procris
  force: grief
  composer: Mahler
  work: "Symphony No. 5 \u2014 IV. Adagietto"
  decision: added
  why: "Suspecting her husband Cephalus of infidelity, Procris hides in the bushes. Hearing a rustle, Cephalus hurls his never-missing javelin and fatally strikes his own wife. She dies in his arms. The slow, inward line captures the absolute heartbreak of a tragedy born entirely of misunderstanding."
