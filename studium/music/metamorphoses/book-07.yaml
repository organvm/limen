work: metamorphoses
book: 7
title: 'Metamorphoses Book VII: Medea, Plague, Myrmidons'
length_minutes: 88
principle: "Book VII is the book of Medea — the archetype of the sorceress, the woman who can reverse age, kill kings by deception, and destroy her own children. Her magic makes visible the connection between metamorphosis and violence: every transformation she performs is also a destruction. The book then opens into the plague at Aegina, the Myrmidons (ants turned into men), and the story of Cephalus and Procris — the lover who kills his beloved by accident. The dominant force is metamorphosis, which here is the power of the boundary-crosser: Medea moves between youth and age, life and death, sanity and fury; the Myrmidons move between insect and human; Procris moves between love and death."
