work: metamorphoses
book: 7
title: 'Metamorphoses Book VII: Medea, Magic, Myrmidons'
length_minutes: 86
principle: "Book VII is defined by the terrifying power of witchcraft and the extreme lengths to which mortals will go to secure their desires. Medea’s dark magic dominates the first half, from saving Jason to boiling King Pelias. The second half contrasts this chaotic eastern sorcery with the rigid, organized tragedy of Cephalus and Procris in Athens. The dominant force is fate—the inexorable doom brought on by Medea's poisons and the inescapable tragic misunderstanding between husband and wife."
