work: metamorphoses
book: 8
title: 'Metamorphoses Book VIII: The Labyrinth, The Wing, The Boar'
length_minutes: 95
principle: "Book VIII is the book of fate — the force that catches every person in this book regardless of intention or merit. Scylla's love for Minos leads her to betray her father, who becomes a bird of prey that hunts her forever. Daedalus builds wings to escape and watches his son fall into the sea. Meleager kills the boar and is killed by his mother's vengeance. Philemon and Baucis are the exception — their piety is rewarded — but their reward is to become trees, which is still a transformation they did not choose. Erysichthon cuts down a sacred tree and is cursed to eat until he eats himself. The dominant force is fate — not as the Fates' intervention but as the structure of consequence that turns every act into its irreversible result."
