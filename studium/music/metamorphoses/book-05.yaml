work: metamorphoses
book: 5
title: 'Metamorphoses Book V: The Brawl, The Muses, The Underworld'
length_minutes: 81
principle: "Book V moves from the bloody, chaotic brawl at Perseus's wedding banquet to the elevated, competitive singing of the Muses on Mount Helicon. The central narrative is the abduction of Proserpina and Ceres's desperate, world-withering search for her daughter. The dominant force is grief—the mourning of a mother that freezes the earth, contrasting with the chaotic violence of men and the arrogance of rivals."
