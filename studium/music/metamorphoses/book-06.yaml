work: metamorphoses
book: 6
title: 'Metamorphoses Book VI: The Loom, The Stone, The Tongue'
length_minutes: 92
principle: "Book VI is the book of wrath — divine punishment, human vengeance, the anger that cannot be contained by any civilizing structure. Arachne is destroyed for out-weaving a goddess; Niobe loses all fourteen children for boasting against Latona; Marsyas is flayed for losing a musical contest; and the Tereus-Procne-Philomela cycle ends with a mother killing her own son and serving him to his father. The dominant force is wrath — not as single explosion but as a spectrum: the cold institutional anger of the Olympians, the hot grief-driven rage of a mother avenging her sister, the mechanical cruelty of revenge that reproduces itself across generations."
force_arc:
- law
- wrath
- metamorphosis
