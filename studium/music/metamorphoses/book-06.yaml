work: metamorphoses
book: 6
title: 'Metamorphoses Book VI: Arachne, Niobe, Philomela'
length_minutes: 84
principle: "Book VI is perhaps the darkest book in the epic, entirely concerned with the savage punishment of mortals who challenge or offend the gods. Arachne weaves better than Minerva; Niobe boasts she is greater than Latona; Tereus commits unspeakable crimes against Philomela. The dominant force is wrath—divine and human vengeance carried out with horrific precision, leaving behind weeping stones and screaming birds."
