    director: "Francesco Bertolini, Adolfo Padovan, Giuseppe de Liguoro"
    year: 1911
    letterboxd: linferno
    note: "The classic silent adaptation, heavily inspired by Gustave Doré's illustrations. Visually stunning but inherently limited to illustration. Set aside in favor of the force-companions."
    scenes:
