  - title: "The Message"
    director: "Moustapha Akkad"
    year: 1976
    letterboxd: the-message
    note: "the obvious screen-Qur'an — a reverent, panoramic epic covering the Prophet's mission from the first revelation to the conquest of Mecca. Muhammad is never shown (per Islamic tradition); the camera adopts his perspective. Strong on the Hijra, Badr, and the establishment of the first community; limited by its genre (the Hollywood historical epic) and by the theological discipline of not representing the Prophet. The inner experience of revelation — the force-structure of the Qur'an itself — is not the film's register; it is a respectful chronicle of events. Set aside; we screen the object lessons instead."
    scenes:
      - {division: 1, force: revelation, scene: "The first revelation in the Cave of Hira — 'Iqra!' — the descent of speech"}
      - {division: 2, force: law, scene: "The establishment of the community in Medina — the Constitution of Medina"}
      - {division: 8, force: divine-intervention, scene: "The Battle of Badr — the angels descending, the small army prevailing"}
      - {division: 22, force: sacrifice, scene: "The persecution of the Muslims, the testing of the believers in Mecca"}
      - {division: 48, force: return, scene: "The conquest of Mecca — the return of the exiles, the opening of the Kaaba"}
