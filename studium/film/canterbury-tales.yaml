work: canterbury-tales
title: "The Canterbury Tales — film companion (the human comedy)"
principle: >
  The Canterbury Tales is not a pious pilgrimage; it is a cross-section of humanity thrown together
  on the road, where social types press against their own contradictions. The human comedy is the
  dominant register — not mere jokes, but the formal comedy of society exposing itself through manners,
  lies, and desire. The film companion tracks this plural, horizontal world: the dance of classes
  (The Rules of the Game), the unruly body of the fabliau (Some Like It Hot), the rigid structures
  of judgment (12 Angry Men), and finally the inescapable encounter with mortality that the Pardoner
  preaches (The Seventh Seal). The journey begins in spring and ends in repentance; we reserve the
  films of plague and grief for the late tales, honoring the road's true destination.
force_coverage: [comedy, desire, law, metamorphosis, memory, plague, grief]
films:
  - title: "The Rules of the Game"
    director: "Jean Renoir"
    year: 1939
    force: comedy
    divisions: [1, 2]
    objects: [door]
    letterboxd: the-rules-of-the-game
    scene_or_theme: "The General Prologue — a cross-section of society, manners, and the performance of type"
    object_lesson: >
      Comedy is the structure of society exposing itself through manners. Renoir's country estate is
      the Tabard Inn: a closed environment where different classes mingle, secrets are hidden, and
      everyone plays their role until the structure breaks. The DOOR is the object lesson: passages
      between classes, secrets behind closed rooms, the crossing of thresholds. It is exactly
      Chaucer's General Prologue in motion.
    why: >
      The General Prologue relies on the collision of different social estates. Renoir's masterpiece
      is the ultimate cinematic treatment of this collision — a brilliant, tragicomic dance of people
      trapped by their own social definitions.
    content_note: "social satire, implied infidelity"

  - title: "Some Like It Hot"
    director: "Billy Wilder"
    year: 1959
    force: desire
    divisions: [3, 4]
    objects: [mirror]
    letterboxd: some-like-it-hot
    scene_or_theme: "The Miller's and Reeve's Tales — the unruly body and the fabliau"
    object_lesson: >
      Desire is comic when it forces a person into an impossible disguise. The MIRROR is the object
      lesson: vanity, self-recognition, and the performance of identity. The fabliau structure relies
      on people being trapped by their own bodies and wants, creating farcical collisions.
    why: >
      Wilder captures the exact bawdy, farcical energy of Chaucer's fabliaux. The disguise, the
      chases, the triumph of physical desire over social convention — this is the Miller's Tale
      played out with gangsters and musicians instead of carpenters and clerks.
    content_note: "comic violence, sexual innuendo"

  - title: "Spirited Away"
    director: "Hayao Miyazaki"
    year: 2001
    force: metamorphosis
    divisions: [6, 7]
    objects: [door]
    letterboxd: spirited-away
    scene_or_theme: "The Wife of Bath's Tale — transformations and the fluid boundary of the self"
    object_lesson: >
      Metamorphosis reveals that identity is permeable. The DOOR is the passage between the ordinary
      and the magical. In the Wife of Bath's Tale, the hag transforms into a beautiful woman when
      she is given sovereignty; transformation is both a test and a liberation.
    why: >
      Miyazaki's bathhouse is a world of constant transformation, where shape is dictated by inner
      truth and outer greed. It matches the fluid, fairy-tale logic of Chaucer's romance tales,
      where the world changes based on human choices.
    content_note: "animated peril"

  - title: "12 Angry Men"
    director: "Sidney Lumet"
    year: 1957
    force: law
    divisions: [5, 10]
    objects: [clock]
    letterboxd: 12-angry-men
    scene_or_theme: "The Man of Law's Tale — the adjudication of human error and rigid structures"
    object_lesson: >
      Law is the attempt to build architecture out of human fallibility. The CLOCK is the object
      lesson: time pressing on judgment, the tension between objective procedure and subjective
      prejudice. 
    why: >
      Chaucer's legal and moral tales deal with the rigid structures humans build to contain chaos.
      Lumet's jury room is the crucible of this attempt — formal clarity clashing with messy human
      realities.
    content_note: "tense arguments"

  - title: "Wild Strawberries"
    director: "Ingmar Bergman"
    year: 1957
    force: memory
    divisions: [12, 13]
    objects: [mirror]
    letterboxd: wild-strawberries
    scene_or_theme: "The Franklin's Tale — retrospection and the distance of the past"
    object_lesson: >
      Memory is not an archive but a haunting. The MIRROR again is the self confronting its own aging.
      Many of Chaucer's pilgrims tell tales saturated with the distance between what they were and
      what they are now.
    why: >
      Bergman's old professor traveling to receive an honor is on a pilgrimage of his own, revisiting
      the sites of his past. It is the perfect cinematic match for the nostalgic, reflective
      register of the middle tales.
    content_note: "existential themes"

  - title: "The Seventh Seal"
    director: "Ingmar Bergman"
    year: 1957
    force: plague
    divisions: [14, 15]
    objects: [clock]
    letterboxd: the-seventh-seal
    scene_or_theme: "The Pardoner's Tale — Death as the ultimate destination"
    object_lesson: >
      The plague renders all social distinctions meaningless. The CLOCK measures the time before the
      inevitable encounter. The Pardoner's three rioters seek Death and find him in a pile of gold;
      Block seeks time and plays chess with Death. Both journeys end the same way.
    why: >
      The Pardoner's Tale is a stark, terrifying allegory about the inescapability of death, set
      against the backdrop of pestilence. Bergman's masterpiece is the exact cinematic equivalent,
      mixing dark comedy with the physical reality of the plague.
    content_note: "medieval death, plague imagery"

  - title: "Tokyo Story"
    director: "Yasujiro Ozu"
    year: 1953
    force: grief
    divisions: [23, 24]
    objects: [clock]
    letterboxd: tokyo-story
    scene_or_theme: "The Parson's Tale and Retraction — the fading of generations and final reckoning"
    object_lesson: >
      Grief is the quietest force, the realization that the world moves on without us. The CLOCK
      marks the passage of time that leaves the old behind.
    why: >
      The Canterbury Tales ends not with a joke but with a sermon and a retraction — the author
      turning away from his fictions to face his maker. Ozu's film captures this quiet, profound
      realization of mortality and the turning away from worldly attachments.
    content_note: "quiet grief"

adaptations:
  - title: "The Canterbury Tales"
    director: "Pier Paolo Pasolini"
    year: 1972
    letterboxd: the-canterbury-tales
    note: "Pasolini's earthy, bawdy adaptation focuses heavily on the fabliaux, removing much of the courtly and religious framing. Set aside, as the force-companion captures the full spectrum of the work."
    scenes:
      - {division: 1, force: comedy, scene: "The pilgrims gather at the inn"}
      - {division: 14, force: desire, scene: "The Wife of Bath's Prologue"}
