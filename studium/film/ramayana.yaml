      - {division: 6, force: revelation, scene: "The fire ordeal — Sita walks unharmed from the flames"}
      - {division: 7, force: grief, scene: "Banished while pregnant, Sita returns to the earth"}
  - title: "Ramayana: The Legend of Prince Rama"
    director: "Yugo Sako, Ram Mohan"
    year: 1992
    letterboxd: ramayana-the-legend-of-prince-rama
    note: >
      The Indo-Japanese animated adaptation — the most faithful screen telling of the main arc, reverent and
      sweeping, though it sets aside the bitter Uttara coda for a triumphal close.
    scenes:
