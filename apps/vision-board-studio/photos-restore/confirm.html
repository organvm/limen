<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<title>Confirm your originals — Vision Board Studio</title>
<style>
:root{--bg:#0f1113;--panel:#1a1d21;--ink:#eef1f4;--muted:#9aa4ad;--line:#333a41;--accent:#c9a24b;--good:#4a9d5b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;margin:0}
header p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
.count{font-size:13px;color:var(--muted)}
button{background:var(--accent);color:#1a1408;border:0;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer}
main{padding:20px;max-width:1200px;margin:0 auto}
.tile{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:18px;background:var(--panel)}
.tile h2{font-size:14px;margin:0 0 2px}.tile .d{color:var(--muted);font-size:12px;margin:0 0 10px}
.row{display:flex;gap:12px;align-items:flex-start}
.query{flex:0 0 150px;text-align:center}
.query img{width:150px;height:150px;object-fit:cover;border-radius:8px;border:2px solid var(--accent)}
.query .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.cands{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;flex:1}
.cand{position:relative;border:2px solid transparent;border-radius:8px;overflow:hidden;cursor:pointer;background:#000;aspect-ratio:1}
.cand img{width:100%;height:100%;object-fit:cover;display:block}
.cand:hover{border-color:var(--muted)}
.cand.sel{border-color:var(--good);box-shadow:0 0 0 2px var(--good)}
.cand.sel::after{content:'✓';position:absolute;top:4px;right:4px;background:var(--good);color:#fff;width:20px;height:20px;border-radius:50%;text-align:center;line-height:20px;font-size:13px}
.cand .sc{position:absolute;bottom:0;left:0;right:0;font-size:9px;background:rgba(0,0,0,.6);color:#fff;padding:1px 3px}
.none{flex:0 0 90px}
.none label{display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;align-items:center;justify-content:center;height:150px;border:1px dashed var(--line);border-radius:8px;text-align:center;padding:6px}
.none input{transform:scale(1.3)}
.tile.done{border-color:var(--good)}
</style></head><body>
<header>
  <div><h1>Confirm your originals</h1><p>Click the real image for each tile — or "none / not here". Then export your picks.</p></div>
  <div style="display:flex;gap:14px;align-items:center"><span class="count" id="count">0 / 0 chosen</span><button id="export">Export picks ↓</button></div>
</header>
<main id="main"></main>
<script>
let data={}, picks={};
fetch('candidates.json').then(r=>r.json()).then(d=>{data=d;render()});
function render(){
  const m=document.getElementById('main');m.innerHTML='';
  const ids=Object.keys(data);
  ids.forEach(id=>{
    const t=data[id];const el=document.createElement('div');el.className='tile';el.id='t_'+id;
    el.innerHTML=`<h2>${t.title}</h2><p class="d">${t.desc}</p>
      <div class="row">
        <div class="query"><img src="${t.salvage}"/><div class="lbl">salvaged fragment</div></div>
        <div class="none"><label><input type="radio" name="r_${id}" data-none="1"><span>none /<br>not here</span></label></div>
        <div class="cands">${t.cands.map(c=>`<div class="cand" data-id="${id}" data-uuid="${c.uuid}"><img src="thumbs/${c.uuid}.jpg" loading="lazy"/><span class="sc">${c.score.toFixed(2)}</span></div>`).join('')}</div>
      </div>`;
    m.appendChild(el);
  });
  document.querySelectorAll('.cand').forEach(c=>c.onclick=()=>{
    const id=c.dataset.id;
    document.querySelectorAll(`.cand[data-id="${id}"]`).forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel');picks[id]=c.dataset.uuid;
    const none=document.querySelector(`input[name="r_${id}"]`);if(none)none.checked=false;
    document.getElementById('t_'+id).classList.add('done');upd();
  });
  document.querySelectorAll('input[data-none]').forEach(r=>r.onchange=()=>{
    const id=r.name.slice(2);picks[id]='none';
    document.querySelectorAll(`.cand[data-id="${id}"]`).forEach(x=>x.classList.remove('sel'));
    document.getElementById('t_'+id).classList.add('done');upd();
  });
  upd();
}
function upd(){const tot=Object.keys(data).length;const n=Object.keys(picks).length;document.getElementById('count').textContent=`${n} / ${tot} chosen`;}
document.getElementById('export').onclick=()=>{
  const blob=new Blob([JSON.stringify(picks,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='picks.json';a.click();
};
</script></body></html>
