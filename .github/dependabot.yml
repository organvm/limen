version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/web/app"
      - "/web/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/web/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      pip-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-deps:
        patterns: ["*"]
  - package-ecosystem: "docker"
    directories:
      - "/web/api"
      - "/web/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      docker-deps:
        patterns: ["*"]
