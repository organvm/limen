name: Autonomous Auto-Scaler

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: tabularius-board-publication
  cancel-in-progress: false

jobs:
  auto-scale:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      LIMEN_ROOT: ${{ github.workspace }}
      LIMEN_TASKS: ${{ github.workspace }}/tasks.yaml
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Limen CLI and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "cli[test]"

      - name: Preflight board publication
        id: board-preflight
        run: |
          set +e
          python scripts/tabularius-organ.py --preflight
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 75 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            exit "$rc"
          fi

      - name: Run Auto-Scaler
        if: steps.board-preflight.outputs.ready == 'true'
        run: |
          python scripts/auto-scale.py
          python scripts/tabularius-organ.py --require-published
