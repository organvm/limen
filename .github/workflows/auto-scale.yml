name: Autonomous Auto-Scaler

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-scale:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install pyyaml requests pydantic

      - name: Run Auto-Scaler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/auto-scale.py
          python scripts/tabularius-organ.py

      - name: Commit changes
        run: |
          if git diff --quiet -- tasks.yaml; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks.yaml
          git commit -m "chore: auto-scale tasks.yaml to 100-task depth"
          git pull --rebase origin main
          git push origin HEAD:main
