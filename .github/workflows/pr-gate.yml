name: PR Gate

# The ONE always-on required status check for `main`.
#
# ci.yml is path-filtered on pull_request (cli/web/scripts/spec/tasks.yaml/…),
# so it does NOT run on content-only PRs (e.g. studium essays). A path-filtered
# workflow can't serve as a required check: a PR that doesn't match the filter
# never reports it, and GitHub then blocks the PR forever ("Expected" but never
# reported). This gate runs on EVERY pull request (no path filter) so it can be
# required without bricking content PRs.
#
# It covers exactly the regressions that twice took main red and wedged the
# daemon (PRs #192 and #25ce902): red tests, lint/compile breakage, naming-canon
# violations, and — critically — a torn/corrupt tasks.yaml write that fails to
# parse. The heavier dashboard/worker matrix stays in ci.yml (path-filtered,
# informational); the merge organ still requires all checks green before it
# auto-merges, so non-required ci.yml jobs remain a real gate for the organ.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff -r web/api/requirements.txt -e "cli[test]"

      - name: Lint Python with ruff
        run: python -m ruff check cli/src cli/tests web/api mcp ianva

      - name: Format check Python with ruff
        run: python -m ruff format --check cli/src cli/tests web/api mcp ianva

      - name: Compile Python modules
        run: python -m py_compile web/api/main.py cli/src/limen/*.py mcp/src/limen_mcp/server.py ianva/src/ianva/*.py

      - name: tasks.yaml parses and loads (guards torn/corrupt queue writes)
        run: |
          python -c "import yaml; yaml.safe_load(open('tasks.yaml')); print('tasks.yaml: valid YAML')"
          PYTHONPATH=cli/src python -c "from pathlib import Path; from limen.io import load_limen_file; lf = load_limen_file(Path('tasks.yaml')); print(f'tasks.yaml: loadable, {len(lf.tasks)} tasks')"

      - name: Validate naming canon (NOMENCLATOR · INDEX·NOMINVM)
        run: python scripts/nomenclator.py

      - name: PII containment gate (protects person-adjacent organ paths)
        run: python scripts/check-pii.py

      - name: No-hardcode gate (VIGILIA parameter panel ratchet)
        run: python scripts/check-params.py

      - name: Gate-registry drift (GATES — registry vs workflows vs consumers)
        run: python scripts/check-gates.py

      - name: Personal-facts registry drift (PERSONA-FEDERATA — registry self-coherence)
        run: python scripts/check-personal-facts.py

      - name: Fact-wall (form-fillers may only consume homed personal-fact classes)
        run: python scripts/fact-wall.py --check

      - name: Test-hygiene gate (env-isolation conftest + no new direct os.environ writes)
        run: python scripts/check-test-hygiene.py

      - name: Sensors-registry drift (SENSORS — beat sensors are declared data)
        run: python scripts/check-sensors.py

      - name: Mail-tiers drift (MAIL-TIERS — send-tier decision is declared data)
        run: python scripts/check-mail-tiers.py

      - name: Run API and CLI tests
        run: python -m pytest web/api/tests cli/tests -q
