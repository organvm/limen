name: PR Gate

# The ONE always-on required status check for `main`.
#
# ci.yml is path-filtered on pull_request (cli/web/scripts/spec/tasks.yaml/…),
# so it does NOT run on content-only PRs (e.g. studium essays). A path-filtered
# workflow can't serve as a required check: a PR that doesn't match the filter
# never reports it, and GitHub then blocks the PR forever ("Expected" but never
# reported). This gate runs on EVERY pull request (no path filter) so it can be
# required without bricking content PRs.
#
# Scoped since issue #1048: the job derives its work from the GATES registry
# (institutio/governance/gates.yaml) via scripts/verify.py --changed — a diff
# pays exactly the gates it implicates instead of the full ~13-min matrix, so
# one broken test on main no longer blocks every unrelated PR fleet-wide. PR
# runs may defer gates already covered by another PR workflow. Merge-queue runs
# cannot: they execute every implicated integration gate against GitHub's exact
# merge-group base, while preserving already-green child receipts instead of
# restarting the whole PR matrix whenever main moves.
#
# Fail-closed: pull_request runs require a resolvable base. `--integration`
# implies the same requirement for merge_group runs and suppresses deploy-path
# escalation: the queue commit is already composed from exact-head green PR
# children, so this final pass pays only the genuine cross-branch seams. Gates
# whose ci_job mirror lives in another workflow (web-build → ci.yml:web,
# worker-check → ci.yml:worker, moneta-tests → moneta.yml) defer only on the PR
# path. scripts/check-gates.py (selected whenever this file changes) holds the
# registry↔workflow estate in parity.
#
# LIMEN_PRGATE_SCOPED=0 is the escape hatch back to the full literal matrix —
# flip the job-level default in a one-line PR if the resolver misbehaves.
on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    env:
      LIMEN_PRGATE_SCOPED: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so verify.py --changed always resolves the merge-base;
          # on a shallow clone resolution can fail and the run would fail closed.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pyyaml -r web/api/requirements.txt -e "cli[test]"

      - name: Verify implicated PR gates (scoped, CI mirrors deferred)
        if: env.LIMEN_PRGATE_SCOPED != '0' && github.event_name == 'pull_request'
        env:
          LIMEN_VERIFY_NO_LOCK: "1"
          LIMEN_VERIFY_REQUIRE_BASE: "1"
        run: |
          python scripts/verify.py --changed \
            --base "origin/${GITHUB_BASE_REF:-main}" \
            --skip-ci-covered pr-gate.yml:pr-gate

      # ci.yml (which `npm ci`s the node projects) does NOT run on merge_group, and the
      # integration verify below runs node gates DIRECTLY (no --skip-ci-covered) so it can block
      # the merge on a real composition failure. Provision the implicated node gates' deps here —
      # derived from the SAME registry + implication logic verify.py --integration uses, so a new
      # node gate is covered the moment it lands in gates.yaml (no dir list to keep in lockstep).
      # Ordinary (Python/docs) merge groups implicate no node gate and pay nothing. Without this,
      # the first PR to compose a node gate's paths fails it with ERR_MODULE_NOT_FOUND (empty
      # node_modules), even though its exact-head CI is green (that path defers to the ci.yml jobs).
      - name: Set up Node for merge-group node gates
        if: env.LIMEN_PRGATE_SCOPED != '0' && github.event_name == 'merge_group'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Provision node-gate deps for merge-group integration
        if: env.LIMEN_PRGATE_SCOPED != '0' && github.event_name == 'merge_group'
        env:
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          if [ -z "$MERGE_GROUP_BASE_SHA" ]; then
            echo "merge_group payload has no base_sha; refusing to provision an unknown integration base" >&2
            exit 2
          fi
          python scripts/provision-merge-group-node-deps.py --base "$MERGE_GROUP_BASE_SHA"

      - name: Verify merge-group integration gates (scoped, fail-closed)
        if: env.LIMEN_PRGATE_SCOPED != '0' && github.event_name == 'merge_group'
        env:
          LIMEN_VERIFY_NO_LOCK: "1"
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          if [ -z "$MERGE_GROUP_BASE_SHA" ]; then
            echo "merge_group payload has no base_sha; refusing to verify an unknown integration base" >&2
            exit 2
          fi
          python scripts/verify.py --changed --integration \
            --base "$MERGE_GROUP_BASE_SHA"

      - name: Verify manual run (scoped)
        if: env.LIMEN_PRGATE_SCOPED != '0' && github.event_name == 'workflow_dispatch'
        env:
          LIMEN_VERIFY_NO_LOCK: "1"
        run: |
          python scripts/verify.py --changed \
            --base "origin/${GITHUB_BASE_REF:-main}" \
            --skip-ci-covered pr-gate.yml:pr-gate

      - name: Full literal matrix (LIMEN_PRGATE_SCOPED=0 escape hatch)
        if: env.LIMEN_PRGATE_SCOPED == '0'
        run: |
          python -m ruff check cli/src cli/tests web/api mcp ianva
          python -m ruff format --check cli/src cli/tests web/api mcp ianva
          python -m py_compile web/api/main.py cli/src/limen/*.py mcp/src/limen_mcp/server.py ianva/src/ianva/*.py
          python -c "import yaml; yaml.safe_load(open('tasks.yaml')); print('tasks.yaml: valid YAML')"
          PYTHONPATH=cli/src python -c "from pathlib import Path; from limen.io import load_limen_file; lf = load_limen_file(Path('tasks.yaml')); print(f'tasks.yaml: loadable, {len(lf.tasks)} tasks')"
          python scripts/nomenclator.py
          python scripts/check-params.py
          python scripts/check-gates.py
          python scripts/check-personal-facts.py
          python scripts/fact-wall.py --check
          python scripts/check-test-hygiene.py
          python scripts/check-sensors.py
          python scripts/check-mail-tiers.py
          python -m pytest web/api/tests cli/tests -q -n auto
