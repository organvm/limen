name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "web/app/**"
      - "scripts/assemble-dashboard-data.py"
      - "firebase.json"
      - ".github/workflows/deploy.yml"
  # The cron is the board's freshness rail: tasks.yaml merges no longer trigger a
  # per-merge deploy (the board fast lane) — the hourly rebake picks them up, and
  # the Worker serves the live board at runtime in the meantime.
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  precheck:
    # Cron thrift: an unchanged hour must not pay a cold build+deploy. The
    # fingerprint covers both build inputs (web/app tree, tasks.yaml blob) plus
    # the UTC date, so API-derived surface data (pr-status) still refreshes at
    # most once per idle day. Fail-open by construction: a cache miss or lookup
    # error deploys exactly as before; only a proven already-deployed
    # fingerprint skips.
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      fingerprint: ${{ steps.fp.outputs.hash }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute deploy input fingerprint
        id: fp
        run: echo "hash=$(git rev-parse HEAD:web/app)-$(git rev-parse HEAD:tasks.yaml)-$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Look up last-deployed fingerprint
        if: github.event_name == 'schedule'
        id: seen
        uses: actions/cache/restore@v4
        with:
          path: .deploy-fingerprint
          key: pages-deploy-${{ steps.fp.outputs.hash }}
          lookup-only: true

      - name: Decide whether this state is already live
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.seen.outputs.cache-hit }}" = "true" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::hourly cron: deploy inputs unchanged since the last deploy today — skipping build+deploy"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: precheck
    if: needs.precheck.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY_SET: ${{ secrets.GCP_SA_KEY != '' }}
      CF_PAGES_TOKEN_SET: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/app/package-lock.json

      - run: npm ci
        working-directory: web/app

      - run: npm run build
        working-directory: web/app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ vars.LIMEN_API_URL }}

      - name: Assemble slim dashboard.json into publish dir
        run: python3 scripts/assemble-dashboard-data.py --app web/app

      - name: Check hosting artifact privacy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.LIMEN_API_URL }}
        run: |
          test -f web/app/out/index.html
          test -f web/app/out/client.html
          test -f web/app/out/public.html
          test -f web/app/out/qa.html
          test -f web/app/out/public-status.json
          test -f web/app/out/surface-manifest.json
          test -f web/app/out/public-surface-manifest.json
          test ! -e web/app/out/tasks.json
          test ! -e web/app/out/client-status.json
          test ! -e web/app/out/internal-status.json
          test ! -e web/app/out/readiness.json
          test ! -e web/app/out/qa-status.json
          test ! -e web/app/out/owner-surface-manifest.json
          test ! -e web/app/out/client-surface-manifest.json
          node web/app/scripts/validate-exported-pages.mjs
          node web/app/scripts/validate-surface-contracts.mjs

      - uses: w9jds/firebase-action@v15.23.0
        if: env.GCP_SA_KEY_SET == 'true'
        with:
          args: deploy --only hosting --project device-streaming-067d747a
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Note skipped hosting deploy
        if: env.GCP_SA_KEY_SET == 'false'
        run: echo "::notice::GCP_SA_KEY secret not configured; skipping Firebase hosting deploy (the GCP credential exists nowhere — road-not-taken; the Cloudflare Pages step below is the derived owned rail). Live-boundary verification still runs below."

      - name: Deploy dashboard to Cloudflare Pages (owned headless rail)
        if: env.CF_PAGES_TOKEN_SET == 'true'
        run: npx wrangler@4 pages deploy web/app/out --project-name limen-dashboard --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Note skipped Pages deploy
        if: env.CF_PAGES_TOKEN_SET == 'false'
        run: echo "::notice::CLOUDFLARE_API_TOKEN secret not configured; skipping Cloudflare Pages deploy. The creds-hydrate gh_secret sink lands it on the next beat — see scripts/creds-hydrate.py (cloudflare lane) and scripts/cf-wrangler.sh."

      - name: Verify hosted surface boundary
        run: |
          python3 - <<'PY'
          import json
          import re
          import urllib.error
          import urllib.request

          base = "https://device-streaming-067d747a.web.app"

          def read(path):
              return urllib.request.urlopen(f"{base}/{path}", timeout=20).read().decode()

          public_manifest = json.loads(read("surface-manifest.json"))
          public_surface_manifest = json.loads(read("public-surface-manifest.json"))
          for name, payload in {
              "surface-manifest.json": public_manifest,
              "public-surface-manifest.json": public_surface_manifest,
          }.items():
              ids = [surface.get("id") for surface in payload.get("surfaces", [])]
              if payload.get("persona") != "public" or ids != ["public"]:
                  raise SystemExit(f"{name} exposed wrong persona/surfaces: {payload.get('persona')} {ids}")

          qa_html = read("qa")
          nav = re.search(r'<nav class="surfaceNav"[^>]*>([\s\S]*?)</nav>', qa_html)
          labels = re.findall(r'<a [^>]*>([^<]+)</a>', nav.group(1) if nav else "")
          if labels != ["Internal", "QA", "Client", "Public"]:
              raise SystemExit(f"qa nav drifted: {labels}")
          for needle in ("Owner token required", "Load QA"):
              if needle not in qa_html:
                  raise SystemExit(f"qa page missing {needle}")
          for forbidden in ("LIMEN-015", "Propagate PR #234 completions", "dispatch_log"):
              if forbidden in qa_html:
                  raise SystemExit(f"qa page leaks {forbidden}")

          client_html = read("client")
          for needle in ("Client token required", "Load client"):
              if needle not in client_html:
                  raise SystemExit(f"client page missing {needle}")

          for name in ("tasks.json", "client-status.json", "internal-status.json", "qa-status.json", "owner-surface-manifest.json", "client-surface-manifest.json", "readiness.json"):
              try:
                  urllib.request.urlopen(f"{base}/{name}", timeout=20)
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      continue
                  raise
              raise SystemExit(f"private artifact is hosted: {name}")
          PY

      - name: Verify live runtime adapter schemas
        env:
          LIMEN_WORKER_URL: ${{ vars.LIMEN_API_URL }}
          LIMEN_API_TOKEN: ${{ secrets.LIMEN_API_TOKEN }}
          LIMEN_CLIENT_TOKEN: ${{ secrets.LIMEN_CLIENT_TOKEN }}
        run: |
          if [ -z "$LIMEN_WORKER_URL" ]; then
            echo "LIMEN_API_URL repository variable is required for dashboard deploy runtime verification" >&2
            exit 1
          fi
          if [ -z "$LIMEN_API_TOKEN" ] || [ -z "$LIMEN_CLIENT_TOKEN" ]; then
            echo "LIMEN_API_TOKEN and LIMEN_CLIENT_TOKEN secrets are required for dashboard deploy runtime verification" >&2
            exit 1
          fi
          scripts/probe-runtime-adapter.py \
            --api-url "$LIMEN_WORKER_URL" \
            --owner-token "$LIMEN_API_TOKEN" \
            --client-token "$LIMEN_CLIENT_TOKEN" \
            --task-id "${LIMEN_VERIFY_TASK_ID:-LIMEN-015}"

      - name: Record deployed fingerprint (cron thrift marker)
        run: echo "${{ needs.precheck.outputs.fingerprint }}" > .deploy-fingerprint

      - uses: actions/cache/save@v4
        with:
          path: .deploy-fingerprint
          key: pages-deploy-${{ needs.precheck.outputs.fingerprint }}
