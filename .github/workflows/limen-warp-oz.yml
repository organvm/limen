name: Warp/Oz Agent Dispatch

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Limen task ID
        required: true
        type: string
      repo:
        description: Target repository (owner/name)
        required: true
        type: string
      title:
        description: Task title
        required: true
        type: string
      prompt:
        description: Full agent prompt
        required: true
        type: string
      agent:
        description: Which agent lane (warp or oz)
        required: true
        type: choice
        default: oz
        options:
          - warp
          - oz
      model:
        description: Optional live-validated Warp model override; blank delegates to Warp Auto
        required: false
        type: string
      execution_profile:
        description: Provider-neutral JSON capability request derived from the live task
        required: true
        type: string

jobs:
  run-agent:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - name: Run Oz agent
        uses: warpdotdev/oz-agent-action@v1
        with:
          prompt: |-
            ${{ inputs.prompt }}

            Target repository: ${{ inputs.repo }}
            Execution profile: ${{ inputs.execution_profile }}
          name: limen-${{ inputs.agent }}-${{ inputs.task_id }}
          model: ${{ inputs.model }}
          warp_api_key: ${{ secrets.WARP_API_KEY }}
