name: Operate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Operation to run"
        required: true
        default: "doctor"
        type: choice
        options:
          - doctor
          - qa
          - release-stale-preview
          - release-stale-apply
      agent:
        description: "Agent queue to operate"
        required: true
        default: "jules"
      hours:
        description: "Stale active-claim threshold in hours"
        required: true
        default: "24"

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: tabularius-board-publication
  cancel-in-progress: false

jobs:
  operate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      LIMEN_ROOT: ${{ github.workspace }}
      LIMEN_TASKS: ${{ github.workspace }}/tasks.yaml
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Limen CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "cli[test]"

      - name: Preflight board publication
        id: board-preflight
        if: inputs.mode == 'release-stale-apply'
        run: |
          set +e
          python scripts/tabularius-organ.py --preflight
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 75 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            exit "$rc"
          fi

      - name: Doctor
        if: inputs.mode == 'doctor'
        run: limen doctor --agent "${{ inputs.agent }}" --report-file .limen-reports/doctor.json

      - name: QA steering report
        if: inputs.mode == 'qa'
        run: limen qa --agent "${{ inputs.agent }}" --report-file .limen-reports/qa.json

      - name: Preview stale release
        if: inputs.mode == 'release-stale-preview'
        run: limen release-stale --agent "${{ inputs.agent }}" --hours "${{ inputs.hours }}" --report-file .limen-reports/release-stale-preview.json

      - name: Apply stale release
        if: inputs.mode == 'release-stale-apply' && steps.board-preflight.outputs.ready == 'true'
        run: limen release-stale --agent "${{ inputs.agent }}" --hours "${{ inputs.hours }}" --apply --report-file .limen-reports/release-stale-apply.json

      - name: Upload operation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: limen-operation-${{ inputs.mode }}-${{ github.run_id }}
          path: .limen-reports/*.json
          if-no-files-found: warn

      - name: Show task diff
        if: inputs.mode == 'release-stale-apply' && steps.board-preflight.outputs.ready == 'true'
        run: git diff -- tasks.yaml

      - name: Publish stale release through board PR
        if: inputs.mode == 'release-stale-apply' && steps.board-preflight.outputs.ready == 'true'
        run: python scripts/tabularius-organ.py --require-published
