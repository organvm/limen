name: CI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "web/**"
      - "tasks.yaml"
      - "firebase.json"
      - "scripts/**"
      - "spec/**"
      - "mcp/**"
      - "ianva/**"
      - "institutio/governance/**"
      - ".github/workflows/**"
  pull_request:
    # tasks.yaml is push-only here (the board fast lane): a board-projection PR
    # implicates no code, so the matrix runs post-merge for check-main-green's
    # exact-head evidence, not pre-merge on the PR's critical path.
    paths:
      - "cli/**"
      - "web/**"
      - "firebase.json"
      - "scripts/**"
      - "spec/**"
      - "mcp/**"
      - "ianva/**"
      - "institutio/governance/**"
      - ".github/workflows/**"
  workflow_dispatch:

# One live run per ref: a superseded push cancels its stale run instead of burning
# paid private-repo minutes to completion (pr-gate.yml already does this; CI did not).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mypy>=2.0" ruff -r web/api/requirements.txt -e "cli[test]"

      - name: Lint Python with ruff
        run: python -m ruff check cli/src cli/tests web/api mcp ianva

      # --diff stays fail-closed while printing the exact formatter patch.
      - name: Format check Python with ruff
        run: python -m ruff format --diff cli/src cli/tests web/api mcp ianva

      - name: Type-check Python with mypy
        run: python -m mypy src/limen/
        working-directory: cli

      - name: Type-check mcp and ianva with mypy
        run: python -m mypy --ignore-missing-imports mcp/src/limen_mcp/ ianva/src/ianva/

      - name: Compile Python modules
        run: python -m py_compile web/api/main.py cli/src/limen/*.py mcp/src/limen_mcp/server.py ianva/src/ianva/*.py

      - name: Shell syntax check (bash -n) on all shell scripts
        run: |
          find . -name "*.sh" \
            -not -path "*/node_modules/*" \
            -not -path "*/.venv/*" \
            -not -path "*/.git/*" \
            -exec bash -n {} +

      - name: ShellCheck static analysis
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S error \
            $(find . -name "*.sh" \
              -not -path "*/node_modules/*" \
              -not -path "*/.venv/*" \
              -not -path "*/.git/*")

      - name: Validate naming canon (NOMENCLATOR · INDEX·NOMINVM)
        run: python scripts/nomenclator.py

      - name: No-hardcode gate (VIGILIA parameter panel ratchet)
        run: python scripts/check-params.py

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/app/package-lock.json

      - name: Generate surface snapshots for lifecycle validation
        run: npm ci && npm run generate:data
        working-directory: web/app

      - name: Check adapter lifecycle contracts
        run: python scripts/validate-lifecycle-adapters.py

      # Portable contract schemas are validated in the web job via
      # validate:surfaces, after the full generation pipeline (including
      # pr-status.json) has produced every input the validator reads.

      - name: Run API and CLI tests
        run: python -m pytest web/api/tests cli/tests -q

      - name: Probe local runtime adapter
        run: scripts/probe-local-runtime.sh

  verify:
    needs: [python, worker, web]
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/app/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml -r web/api/requirements.txt -e "cli[test]"

      - name: Install Node dependencies
        run: npm ci
        working-directory: web/app

      - name: Run whole-repo verification (verify-whole.sh)
        run: scripts/verify-whole.sh
        env:
          LIMEN_VERIFY_LIVE: "0"

  python-311:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r web/api/requirements.txt -e "cli[test]"

      - name: Compile Python modules on 3.11
        run: python -m py_compile web/api/main.py cli/src/limen/*.py mcp/src/limen_mcp/server.py ianva/src/ianva/*.py

      - name: Run API and CLI tests on 3.11
        run: python -m pytest web/api/tests cli/tests -q

  worker:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci
        working-directory: web/worker

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        working-directory: web/worker

      - name: Check Worker syntax
        run: npm run check
        working-directory: web/worker

      - name: Probe local Worker runtime adapter
        run: scripts/probe-local-worker.sh

  web:
    runs-on: ${{ vars.LIMEN_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/app/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: web/app

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        working-directory: web/app

      - name: TypeScript type-check
        run: npx --yes -p typescript tsc --noEmit -p tsconfig.json
        working-directory: web/app

      - name: Build static dashboard and surface contracts
        run: npm run build
        working-directory: web/app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble bounded dashboard projection
        run: python3 scripts/assemble-dashboard-data.py --app web/app

      - name: Check exported surface routes and contracts
        run: |
          test -f web/app/out/index.html
          test -f web/app/out/client.html
          test -f web/app/out/public.html
          test -f web/app/out/qa.html
          test -f web/app/out/public-status.json
          test -f web/app/out/surface-manifest.json
          test -f web/app/out/public-surface-manifest.json
          test ! -e web/app/out/tasks.json
          test ! -e web/app/out/client-status.json
          test ! -e web/app/out/internal-status.json
          test ! -e web/app/out/readiness.json
          test ! -e web/app/out/qa-status.json
          test ! -e web/app/out/owner-surface-manifest.json
          test ! -e web/app/out/client-surface-manifest.json
          test -f web/app/.generated/surfaces/client-status.json
          test -f web/app/.generated/surfaces/internal-status.json
          test -f web/app/.generated/surfaces/readiness.json
          test -f web/app/.generated/surfaces/qa-status.json
          test -f web/app/.generated/surfaces/owner-surface-manifest.json
          test -f web/app/.generated/surfaces/client-surface-manifest.json
          node web/app/scripts/validate-exported-pages.mjs
          node web/app/scripts/validate-surface-contracts.mjs
          node scripts/validate-contract-schemas.mjs
          node - <<'NODE'
          const fs = require("fs");
          const publicStatus = JSON.parse(fs.readFileSync("web/app/out/public-status.json", "utf8"));
          const clientStatus = JSON.parse(fs.readFileSync("web/app/.generated/surfaces/client-status.json", "utf8"));
          const qaStatus = JSON.parse(fs.readFileSync("web/app/.generated/surfaces/qa-status.json", "utf8"));
          const readiness = JSON.parse(fs.readFileSync("web/app/.generated/surfaces/readiness.json", "utf8"));
          if (publicStatus.surface !== "public") throw new Error("wrong public surface");
          if (clientStatus.surface !== "client") throw new Error("wrong client surface");
          if (qaStatus.surface !== "qa") throw new Error("wrong qa surface");
          if ("tasks" in publicStatus) throw new Error("public surface leaked tasks");
          if (JSON.stringify(publicStatus).includes("dispatch_log")) throw new Error("public surface leaked dispatch logs");
          if (JSON.stringify(clientStatus).includes("dispatch_log")) throw new Error("client surface leaked dispatch logs");
          if (JSON.stringify(qaStatus).includes("dispatch_log")) throw new Error("qa surface leaked dispatch logs");
          if (!Array.isArray(readiness.next_actions)) throw new Error("readiness missing next_actions");
          if (JSON.stringify(readiness).includes("dispatch_log")) throw new Error("readiness leaked dispatch logs");
          NODE
