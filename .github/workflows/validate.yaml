name: validate
on:
  push:
    branches: [main]
    paths:
      - "tasks.yaml"
      - "SCHEMA.md"
      - "mcp/src/limen_mcp/server.py"
      - "scripts/validate-task-board.py"
      - ".github/workflows/validate.yaml"
  pull_request:
    paths:
      - "tasks.yaml"
      - "SCHEMA.md"
      - "mcp/src/limen_mcp/server.py"
      - "scripts/validate-task-board.py"
      - ".github/workflows/validate.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install validation dependencies
        run: python -m pip install pyyaml

      - name: Validate tasks.yaml schema, budget, and required fields
        run: |
          python3 - <<'PY'
          import yaml

          with open("tasks.yaml") as fh:
              data = yaml.safe_load(fh)

          version = data.get("version")
          if not version:
              raise SystemExit("Missing version")
          print(f"Schema version: {version}")

          budget = data["portal"]["budget"]
          daily = budget["daily"]
          total = sum(budget["per_agent"].values())
          print(f"Daily budget: {daily}, Sum of per-agent: {total}")
          if total > daily * 2:
              raise SystemExit("Per-agent sum exceeds 2x daily budget")

          required = ("id", "title", "status", "target_agent", "priority")
          tasks = data.get("tasks", [])
          for task in tasks:
              missing = [field for field in required if task.get(field) is None]
              if missing:
                  raise SystemExit(f"Task {task.get('id', '<no id>')} missing required fields: {missing}")
          print(f"All {len(tasks)} tasks have required fields")
          PY

      - name: Validate canonical task statuses
        run: python3 scripts/validate-task-board.py
