name: Conductor Report

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conductor-report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Limen CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml -e "cli[test]"

      - name: Run conductor report
        run: scripts/conductor-report.sh

      - name: Upload conductor report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conductor-report-${{ github.run_id }}
          path: .limen-reports/*
          if-no-files-found: warn
