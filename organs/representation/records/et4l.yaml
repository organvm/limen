schema_version: representation.v3
kind: representation_record
id: et4l
name: ET4L artist/project representation record
report_grade: true
subject:
  type: project
  name: ET4L
  roles:
    - creative_series
    - exhibition_project
  representation_modes:
    - canon_dossier
    - public_presence_draft
    - authority_scorecard
    - private_dossier
    - creator_presence_preview
    - project_page
    - collaboration_packet
  organ_bridges:
    - artist
    - media
    - publication_policy
standing:
  current: RESEARCHING
  next: PROJECT_PACKET_REVIEW
mandate:
  description: Represent an artist-owned thematic series as a source-backed canon dossier, public presence draft, and gated project packet.
artifacts:
  next_reviewable_output: ET4L authority packet, private dossier, and project page packet generated from one representation record
authority_program:
  goal: civilizational_gravitas
  archetype_functions:
    canonical_institution: Build the museum, archive, provenance, and exhibition apparatus that can accumulate institutional gravity over time without claiming final canon status.
    mass_readership: Build a discoverable public-project surface that can grow readership over time without claiming a mass audience already exists.
  axes:
    canonical_institution:
      summary: Stages body of work, provenance, exhibition argument, and public project proof as a reviewable canon dossier.
      claim_ids:
        - et4l-artist-chamber
        - et4l-exhibition-logic
        - et4l-public-proof
      public_claim_ids:
        - et4l-public-proof
      public_copy: ET4L can be introduced as a sourced artist and project record visible through public artist-organ proof.
      output_gates:
        - Artist confirms selection and provenance before any institution-facing use.
        - Dossier remains internal until artist-approved exhibition language exists.
    mass_readership:
      summary: Stages discoverable project proof as the first readership surface without asserting audience scale.
      claim_ids:
        - et4l-public-proof
      public_claim_ids:
        - et4l-public-proof
      public_copy: ET4L's public presence can point to public project proof while readership remains staged rather than claimed.
      output_gates:
        - Public copy uses only public project proof.
        - Public export remains locked until project-page approval exists.
    hybrid_presence:
      summary: Joins artist organ provenance, media/project-page staging, and authority review gates in one record.
      claim_ids:
        - et4l-artist-chamber
        - et4l-exhibition-logic
        - et4l-public-proof
      public_claim_ids:
        - et4l-public-proof
      public_copy: ET4L can be drafted as a public project-facing proof while private exhibition and provenance work stays review-only.
      output_gates:
        - Hybrid project presence remains review-only before artist approval.
        - No generated image or caption is treated as source work.
works:
  - id: et4l-series
    type: exhibition_series
    title: ET4L thematic series
    relation: artist_owned
    claim_ids:
      - et4l-artist-chamber
      - et4l-public-proof
  - id: et4l-statement-and-captions
    type: draft_packet
    title: ET4L statement and caption set
    relation: staged_for_artist_rewrite
    claim_ids:
      - et4l-exhibition-logic
relations:
  - id: artist-organ-provenance
    relation_type: provenance_bridge
    posture_source: artist_organ
    claim_ids:
      - et4l-artist-chamber
      - et4l-exhibition-logic
    consent_constraints:
      - Artist approves selection before staging.
      - Artist rewrites and signs exhibition language.
      - No public release without event-level approval.
claims:
  - id: et4l-artist-chamber
    label: Artist organ chamber
    summary: The artist organ records ET4L as a curated thematic series extracted from the photo archive.
    visibility: private
    report_grade: true
    source_ids:
      - local-et4l-chamber
      - remote-et4l-chamber
    public_ok: false
  - id: et4l-exhibition-logic
    label: Exhibition logic
    summary: ET4L is governed as an exhibition argument with statement, caption set, sequencing, and staged-package gates.
    visibility: private
    report_grade: true
    source_ids:
      - local-artist-kernel
      - local-et4l-chamber
      - remote-artist-kernel
    public_ok: false
  - id: et4l-public-proof
    label: Public project proof
    summary: The public Limen repository surfaces ET4L as part of the artist organ chamber fleet.
    visibility: public
    report_grade: true
    source_ids:
      - web-limen-artist-organ
    public_ok: true
sources:
  - id: local-et4l-chamber
    source_type: local_repo
    privacy_level: private
    source_ref: organs/artist/chambers/et4l.yaml
    captured_at: "2026-07-08T00:00:00Z"
    claim_ids:
      - et4l-artist-chamber
      - et4l-exhibition-logic
    confidence: high
    note: Local artist chamber records ET4L standing, mandate, gates, and next output.
  - id: local-artist-kernel
    source_type: local_repo
    privacy_level: private
    source_ref: organs/artist/KERNEL.md
    captured_at: "2026-07-08T00:00:00Z"
    claim_ids:
      - et4l-exhibition-logic
    confidence: high
    note: Local artist kernel defines provenance, exhibition, and artist-gate logic.
  - id: remote-et4l-chamber
    source_type: remote_repo
    privacy_level: public
    source_ref: https://github.com/organvm/limen/blob/main/organs/artist/chambers/et4l.yaml
    captured_at: "2026-07-08T00:00:00Z"
    claim_ids:
      - et4l-artist-chamber
    confidence: high
    note: Remote Limen repo is the canonical public repository source for the ET4L chamber record.
  - id: remote-artist-kernel
    source_type: remote_repo
    privacy_level: public
    source_ref: https://github.com/organvm/limen/blob/main/organs/artist/KERNEL.md
    captured_at: "2026-07-08T00:00:00Z"
    claim_ids:
      - et4l-exhibition-logic
    confidence: high
    note: Remote artist kernel records the reusable provenance and exhibition contract.
  - id: web-limen-artist-organ
    source_type: web
    privacy_level: public
    source_ref: https://github.com/organvm/limen/tree/main/organs/artist
    captured_at: "2026-07-08T00:00:00Z"
    claim_ids:
      - et4l-public-proof
    confidence: high
    note: Public GitHub web surface exposes the artist organ and chamber files.
approvals:
  - id: public-export-not-requested
    approval_type: public_export
    status: not_requested
    claim_ids: []
    note: Public presence export is locked until the artist approves copy.
  - id: project-page-not-requested
    approval_type: project_page
    status: not_requested
    claim_ids: []
    note: Project page export is locked until the artist approves copy and release context.
  - id: collaboration-outreach-not-requested
    approval_type: outreach
    status: not_requested
    claim_ids: []
    note: Collaboration packets are review-only until artist-approved outreach exists.
outputs:
  - id: et4l-canon-dossier
    mode: canon_dossier
    report_grade: true
    claim_ids:
      - et4l-artist-chamber
      - et4l-exhibition-logic
      - et4l-public-proof
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms the canon dossier summarizes provenance without raw source material.
      - Reviewer confirms civilizational gravitas is a program goal, not an achieved status claim.
  - id: et4l-public-presence-draft
    mode: public_presence_draft
    report_grade: true
    claim_ids:
      - et4l-public-proof
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms public presence copy uses only public-source claims.
      - Public export approval remains locked before outward use.
  - id: et4l-authority-scorecard
    mode: authority_scorecard
    report_grade: true
    claim_ids:
      - et4l-artist-chamber
      - et4l-exhibition-logic
      - et4l-public-proof
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms every axis reports BLOCKED, STAGED, or PUBLIC_READY.
      - Reviewer confirms blockers are reported instead of achieved canon status.
  - id: et4l-private-dossier
    mode: private_dossier
    report_grade: true
    claim_ids:
      - et4l-artist-chamber
      - et4l-exhibition-logic
      - et4l-public-proof
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms artist-organ provenance is source-backed.
      - Reviewer confirms no exhibition language is final or outward-facing.
  - id: et4l-creator-presence-preview
    mode: creator_presence_preview
    report_grade: true
    claim_ids:
      - et4l-public-proof
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms the preview uses only public repository proof.
      - Artist approval remains required before public export.
  - id: et4l-project-page
    mode: project_page
    report_grade: true
    claim_ids:
      - et4l-public-proof
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms the page draft uses only public project proof.
      - Project page approval is recorded before export.
  - id: et4l-collaboration-packet
    mode: collaboration_packet
    report_grade: true
    claim_ids:
      - et4l-artist-chamber
      - et4l-exhibition-logic
    no_outward_action: true
    acceptance_gates:
      - Reviewer confirms collaborator-facing language remains internal.
      - Outreach approval is recorded before any collaborator-facing send.
