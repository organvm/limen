# Financial Office — Entity Registry
# MACRO: generic template. MICRO: Anthony's entities populated below.
# Each entity is a Member in the 5-primitive kernel.
#
# Add/update entities by editing this file. The consolidate.py script
# reads this to produce balance-sheet, cashflow, and payrail artifacts.
schema_version: "1.0"
organ: "financial"
repo: "organvm/limen"
generated_at: "2026-07-03T00:00:00Z"

# ── Entity taxonomy ──────────────────────────────────────────────────────
# Each entity has: id, name, type, jurisdiction, ownership, and accounts.
# Types: individual | llc | nonprofit | trust | joint
entity_taxonomy:
  individual:
    description: "Natural person — the principal or a dependent"
    required_fields: [name, jurisdiction, accounts]
  llc:
    description: "Limited liability company — business vehicle"
    required_fields: [name, jurisdiction, ownership, accounts, ein]
  nonprofit:
    description: "Non-profit organization — mission vehicle"
    required_fields: [name, jurisdiction, ownership, accounts, ein]

# ── Account classification (asset vs liability) ────────────────────────
# Every account type maps to asset or liability for net worth calculation.
#   asset -> positive contribution to net worth
#   liability -> negative contribution to net worth
account_classification:
  checking: asset
  savings: asset
  credit: liability
  investment: asset
  cash: asset
  receivable: asset
  payable: liability
  crypto: asset
  loan: liability
  mortgage: liability
  retirement: asset

# ── MACRO: The generic field template every entity follows ─────────────
# When adding a new person/organization, copy the structure below.
# Fields marked (A) are auto-populated; (H) need human input; (D) derived.
entity_template:
  id: null                       # (H) unique slug, e.g. "anthony-personal"
  name: null                     # (H) legal name
  type: null                     # (H) individual | llc | nonprofit | trust
  jurisdiction: null             # (H) country/state of formation
  ownership: null                # (H) beneficial owner(s)
  ein_tin: null                  # (H) EIN / TIN / SSN (last-4 only in registry)
  notes: ""                      # (H) free-text
  accounts:                      # (H) financial accounts belonging to this entity
    - id: null                   #     account slug
      institution: null          #     bank / broker / platform name
      type: null                 #     asset: checking|savings|investment|cash|receivable|crypto  liability: credit|payable|loan|mortgage
      currency: USD
      balance_known: false       # (H) false = needs manual entry
      balance: null              # (H) current balance (null if unknown)
      as_of: null                # (H) date balance was last confirmed
      url: null                  # (H) login URL or portal
      notes: ""

