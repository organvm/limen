  - {id: workspaces, class: repo, location: "a-organvm/contrib--* + organvm/contrib--*", presence: remote, role: the per-upstream tracking workspaces (~22; authoritative list = the hub ledger / this cache)}

  # ---- backflow: the inward product (what looking outward taught) ----
