# ESTATE.yaml — the certified register of EVERY artifact of the contributions practice.
#
# The completeness rule ([[completeness-claims-need-a-sweep]]): scripts, protocols, rules,
# memories, logs, sessions, plans, repos — each has exactly one entry here, and the beat
# VERIFIES it (scripts/contributions-organ.py renders the Estate section of MIRROR.md;
# a non-optional local artifact that goes absent surfaces as DRIFT, never rots silently).
# Certified by a 3-scout sweep 2026-07-05 (memories/sessions/logs; engine scripts/protocols/
# rules; limen-internal). Add new artifacts HERE first — an artifact not in the register
# does not exist to the organ.
#
# entry: {id, class, location, presence: local|remote|receipt (default local),
#         optional: bool (default false), role}
#   local   -> existence-checked on the beat (repo-relative, ~/, or absolute)
#   remote  -> cited (a GitHub repo or repo-set; the ledger cache is its liveness proxy)
#   receipt -> a durable citation whose source has rotated (hash/receipt is the artifact)

version: 1
artifacts:
  # ---- the organ itself (limen, repo-relative) ----
  - {id: kernel, class: organ, location: organs/contributions/KERNEL.md, role: the 5-primitive institution architecture}
  - {id: charter, class: organ, location: organs/contributions/CHARTER.md, role: org-chart, workflows, standing-estate table}
  - {id: lifecycle-rules, class: rule, location: organs/contributions/LIFECYCLE.md, role: the full lifecycle state machine + git/repo processes + reap policy}
  - {id: estate-register, class: rule, location: organs/contributions/ESTATE.yaml, role: this register (self-entry — the register registers itself)}
  - {id: mirror, class: organ, location: organs/contributions/MIRROR.md, role: the generated public proof surface}
  - {id: ledger-cache, class: data, location: organs/contributions/ledger-cache.json, role: committed hub-ledger snapshot (offline beat source)}
  - {id: opportunities, class: data, location: organs/contributions/opportunities.json, role: the autopoietic pool — inward-derived outward opportunities (generated)}
  - {id: organ-script, class: script, location: scripts/contributions-organ.py, role: the mirror/scout/estate/lifecycle generator (SPECVLVM)}
  - {id: heartbeat-rung, class: script, location: scripts/heartbeat-loop.sh, role: C_CONTRIB beat wiring (offline render every 12 beats)}
  - {id: params, class: param, location: institutio/governance/parameters.yaml, role: all LIMEN_CONTRIB* + LIMEN_BACKFLOW_MANIFEST knobs, declared}
  - {id: plan-06, class: plan, location: docs/current-session-fanout/PLAN-06-contrib-mirror.md, role: the 4 owner packets (hub, engine A, engine B, mirror) — the convergence lineage}
  - {id: plan-08, class: plan, location: docs/current-session-fanout/PLAN-08-current-session-intake.md, role: session-intake routing of the contrib-mirror owner packet}
  - {id: fanout-theme, class: script, location: scripts/current-session-fanout.py, role: contrib-mirror work-theme detection (keywords contrib/external/community/mirror)}
  - {id: product-ledger, class: script, location: scripts/product-ledger.py, role: records_from_contrib — contributions as products (outward_path=contrib-mirror)}
  - {id: product-ledger-face, class: doc, location: docs/product-ledger.md, role: generated ledger face carrying the contrib-mirror counts}
  - {id: vvltvs-radar, class: script, location: scripts/vvltvs-organ.py, role: the public-face contribution-mix radar (sibling lens on the same practice)}
  - {id: workstream-lane, class: script, location: cli/src/limen/workstream.py, role: the `contributions` workstream lane routing in the task board}
  - {id: board-tasks, class: task, location: tasks.yaml, role: workstream:contributions tasks + the outreach/CONTRIBUTING tasks (GH-organvm-v-logos-github-5/6/8)}

  # ---- the hub + engines (the machinery) ----
  - {id: hub, class: repo, location: organvm/contrib, presence: remote, role: the state surface — generated LEDGER.yaml/LEDGER.md via refresh-ledger.py (PLAN-06-OWNER-01)}
