  - {id: memory-constellation, class: memory, location: ~/Workspace/organvm/claude-runtime-state/projects, role: ~20 contribution memories across project dirs (upstream-PR tracking, adenhq-hive, portfolio, contrib-hub, protocols feedback, phase transition, force-push axes, session handoffs)}
  - {id: memory-sweep, class: memory, location: ~/Workspace/organvm/my-knowledge-base/intake/memory/project_oss_contribution_sweep.md, role: the 2026-04-21 21-PR sweep record (incl. the batch-bump protocol violation, now a LIFECYCLE rule)}
