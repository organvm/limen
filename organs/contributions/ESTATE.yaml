  - {id: engine-b, class: script, location: ~/Workspace/a-organvm/orchestration-start-here/contrib_engine, role: engine B — scanner/orchestrator/monitor/campaign/outreach/fieldwork/backflow/absorption/cli (PLAN-06-OWNER-03)}
