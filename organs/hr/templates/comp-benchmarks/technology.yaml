## Recommended Sources

- Levels.fyi: crowdsourced, self-reported, good for tech companies
- Radford (Aon): survey-based, high quality, cost-prohibitive for solo practitioners
- BLS Occupational Employment Statistics: free, national, less granular
- LinkedIn Salary: user-contributed, broad coverage
- Built In / Indeed / Glassdoor: market-rate signals, noisy

## Practitioner Notes

- P50-P75 is the typical "hire-ready" band for most roles.
- Equity compensation is excluded from base salary benchmarks.
- Remote-first companies may use national bands or location-agnostic pay.
- *Practitioner validates these benchmarks against experience before any offer.*
