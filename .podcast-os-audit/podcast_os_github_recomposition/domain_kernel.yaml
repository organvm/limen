version: 0.1.0
working_name: conversation-operations-system
central_aggregate: AppearanceOpportunity
tenancy:
  hierarchy:
  - Network
  - Show
  - Workspace
  invariants:
  - Every record belongs to a tenant boundary.
  - A network-level relationship is not automatically usable by every show.
  - Protected relationships require explicit owner approval before outreach.
  - Customer contact data is never pooled or sold.
entities:
- Tenant
- Network
- Show
- Host
- Person
- Organization
- ContactRoute
- Relationship
- RelationshipEdge
- AppearanceOpportunity
- Episode
- Studio
- AvailabilityWindow
- Booking
- Touchpoint
- Commitment
- ConsentRecord
- GuestCareProfile
- ResearchClaim
- EvidenceObject
- Segment
- Artifact
- MediaAsset
- TranscriptSegment
- ContentUnit
- DistributionJob
- SponsorCampaign
- ApprovalRequest
- AuditEvent
relationship_classes:
  C0: no_connection
  C1: public_adjacency
  C2: prior_professional_interaction
  C3: recurring_colleague
  C4: friend
  C5: close_friend_mentor_or_sensitive
hard_rules:
- No automatic messages from a host's personal account.
- No C4/C5 outreach without explicit relationship-owner approval.
- No invented familiarity, praise, consumption, or mutual connection.
- No contact-route use without source provenance and verification timestamp.
- No raw home-address inference or scraping.
- No contractual, financial, editorial-removal, or reputational commitment without
  human approval.
- Every outbound action writes an AuditEvent.
- Every external thread has a real human owner.
