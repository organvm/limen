# ESTATE — the GitHub-governance registry (the parameter-panel pattern, one estate over).
#
# Declarative desired-state for the whole ~301-repo organvm GitHub estate, and the single owner of
# "GitHub" as a domain. The ideal form: GitHub is ONE declarative resource graph under ONE closed
# loop — observe → diff → reconcile, invariant drift = ∅ (control-theory / GitOps, applied to
# GitHub-as-the-cloud). This file is the desired-state; the loop is scripts/gitvs.py.
#
#   scripts/gitvs.py census    → observe() : the live estate → docs/github-estate-ledger.json (the Lens)
#   scripts/gitvs.py doctor     → diff()   : desired − observed, exit 0 ⟺ drift == ∅ (the Predicate)
#   scripts/gitvs.py reconcile  → apply()  : drive drift → policy through the three total effector sinks
#
# Consumers DERIVE from this file instead of hardcoding (the gates.yaml discipline): gitvs.py buckets
# every enumerated repo into a `classes` row by glob; setup-rulesets.py reads `classes[].required_checks`
# once the ratchet arms; session-lifecycle-pressure.py reads the census ledger's branches block.
#
# Identity is ALWAYS derived at run-time from the git remote owner/repo ("names are outputs"); NO
# individual repo, branch, or PR is enumerated here — with ONE sanctioned exception: `repo_overrides`,
# the durable per-repo publication judgments (each row a human decision with a required `why:`).
# Everything pattern-derivable stays a glob; an override exists only where judgment was applied.
# Classes are GLOBS (`**` crosses slashes, `*` does not — the check-gates.py glob semantics), plus
# optional `match_facts` (diffed against the census facts: fork/archived/private). First-match-wins,
# most-specific first; an explicit override row outranks every class.
#
# THIS FILE IS WORLD-READABLE (organvm/limen is public). Private repo NAMES are accepted precedent
# (value-repos.json already names them); rationale text is the leak surface — keep every `why:` terse
# and clinical. Sensitive rationale lives in the gitignored overlay institutio/github/estate.private.yaml
# (shallow-merged into repo_overrides at load time when present; arca-sealed for durability).
#
# Field discipline (parameters.yaml / gates.yaml): `owner` and `note` are REQUIRED on every class,
# budget, and resource type. scripts/gitvs.py doctor --parity-only is this registry's OWN drift
# predicate — the check-gates.py analogue for the GitHub plane.

schema_version: 0.1

pr_debt_policy:
  active_owner_max_age_hours: 168
  owner_label_prefix: "owner:"
  preservation_labels: ["custody:preservation"]
  preservation_markers:
    - "Lifecycle preservation PR opened by `scripts/worktree-pr-receipts.py`."
  owner: gitvs
  note: "Runtime policy for typing every exhaustively enumerated open PR without encoding owners, repositories, or provider names in the engine."

# ── the machine identity contract ────────────────────────────────────────────────────────────
# The App is the estate's actor. `expected_permissions` is the least-privilege posture the doctor
# holds the live App installation to — it fails on an OVER-grant (drift toward more-than-declared),
# never on an unused-scope under-grant. Install owners are DERIVED (do not pin an install list).
app:
  slug: "limen[bot]"                       # working handle — final name via nomenclator (see naming note)
  token_source: "scripts/gh-app-token.sh"  # the executable identity (App → PAT → gh cascade)
  bootstrap: "scripts/bootstrap-github-app.py"
  architecture_doc: "docs/github-app-architecture.md"
  expected_permissions:
    contents: write
    pull_requests: write
    actions: read
    metadata: read
  posture: least_privilege
  install_owners_derived: true
  owner: gitvs
  note: "The one human atom (App creation + install) is his-hand (L-LIMENBOT-INSTALL); the token cascade already ships in gh-app-token.sh, so the fleet runs on the PAT fallback until the App is born."

# ── the resource graph ───────────────────────────────────────────────────────────────────────
# Every GitHub thing is a Resource: an addressable node with a derived identity, a declared desired
# state, an observed actual state. Each descriptor declares `identity`, `desired` (the desired-state
# field keys), an `observe` adapter (the Lens), an `effector` (the sink), and `status`.
#
# THE WIRING-INTEGRITY LAW (sensor-without-effector = defect; #881/#883): a `status: active` type MUST
# carry a wired observe + effector + identity, or gitvs.py doctor --parity-only turns RED — GITVS cannot
# declare governance it can't enact. A `status: envisioned` type is desired-but-not-yet-enacted: it is
# surfaced as OWED work in the ledger and does NOT gate — the registry OWNING the answer to "what about
# webhooks/releases/teams?" rather than prose scoping them out. "Owns all" is then literal: extending
# GITVS to a new surface is a row here, never new engine code.
#
# The effector's THREE TOTAL SINKS (there is no fourth way to change GitHub). Each row declares its
# own adapter argv and optional approval lever; the engine contains no script-name table, interpreter
# assumption, or target-specific exception. Runtime executable discovery decides whether an adapter is
# currently reachable.
resource_types:
  repo:
    identity: derived
    desired: ["visibility", "archived", "default_branch", "app_installed", "topics", "description", "homepage"]
    observe: "gh api /repos/{owner}/{repo}"
    effector:
      - {kind: delegate, argv: [python3, scripts/apply-visibility.py, --apply]}
      - {kind: delegate, argv: [python3, scripts/repo-metadata-sync.py, --apply]}
      - {kind: file-atom, target: L-REPO-SETTINGS}
      - {kind: manual}
    status: active
    owner: gitvs
    note: "The 308-repo body; desired-state bucketed by the `classes` globs + repo_overrides below. The visibility effector self-gates ASYMMETRICALLY (autonomy from reversibility): demote-to-private is the standing leak-posture auto-guard; publish is triple-gated IN the script (double-dark LIMEN_VISIBILITY_APPLY + a released L-PORTAL-PUBLISH-* lever naming the repo + a green fresh publish-sweep receipt) — the flip exposes history, so publish-sweep.py scans every reachable blob first."
  branch_protection:
    identity: derived
    desired: ["required_checks", "enforce_admins", "required_pull_request_reviews"]
    observe: "gh api /repos/{owner}/{repo}/branches/{branch}/protection"
    effector:
      - kind: delegate
        argv: [python3, scripts/setup-rulesets.py]
        approval: {lever: L-BRANCH-PROTECTION}
      - {kind: file-atom, target: L-BRANCH-PROTECTION}
    status: active
    owner: gitvs
    note: "Read predicate is the doctor (class A/G); applying rulesets is human-gated (#257) — GITVS never auto-runs setup-rulesets.py."
  pull_request:
    identity: derived
    desired: ["mergeable_when_green", "current_base"]
    observe: "GitHub GraphQL repositories.pullRequests(states: OPEN).totalCount"
    effector:
      - {kind: delegate, argv: [python3, scripts/merge-drain.py]}
      - {kind: delegate, argv: [python3, scripts/self-heal.py]}
    status: active
    owner: gitvs
    note: "Mergeable → merge-drain (inherits merge-policy.sh guardrail + stale-base gate free); red/stale → self-heal emits a HEAL/rebase task."
  remote_branch:
    identity: derived
    desired: ["reaped_when_landed_past_grace"]
    observe: "scripts/reap-branches.py::classify (remote refs)"
    effector:
      - {kind: reap, argv: [python3, scripts/reap-remote-branches.py, --apply]}
    status: active                         # reaper landed (#901) → the wiring-integrity law now holds it
    owner: gitvs
    note: "The ~730 unresolved orphaned remote branches; the reaper (reap-remote-branches.py, #901) is live, so this is now active and the reconcile loop dispatches it. Ships DOUBLE-DARK (--apply AND LIMEN_REMOTE_REAP_APPLY=1) — remote deletes are not reflog-recoverable — so reconcile --apply plans it but the delete still needs its own dark-arming."
  local_branch:
    identity: derived
    desired: ["reaped_when_landed"]
    observe: "scripts/reap-branches.py::classify"
    effector:
      - {kind: reap, argv: [python3, scripts/reap-branches.py, --apply]}
    status: active
    owner: gitvs
    note: "The orphaned BRANCH-REAP organ, finally beat-wired via the GITVS reconcile loop."
  secret:
    identity: derived
    desired: ["homed", "present_in_actions"]
    observe: "gh secret list (names only — the _scrub firewall; never a value)"
    effector:
      - {kind: delegate, argv: [python3, scripts/creds-hydrate.py, --apply]}
      - {kind: file-atom, target: "credential-wall#320"}
    status: active
    owner: gitvs
    note: "Class-B delegates home-checking to credential-wall.py --check; values never touch GITVS."
  issue:
    identity: derived
    desired: ["mirrors_live_residuals", "levers_homed"]
    observe: "gh issue list --label"
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-censor-issues.py, --apply]}
      - {kind: delegate, argv: [python3, scripts/sync-hishand-issues.py, --apply]}
    status: active
    owner: gitvs
    note: "Censor findings and his-hand levers mirror to labelled issues; each organ keeps its own apply arming."
  app_installation:
    identity: derived
    desired: ["installed_on_governed_owners", "permissions_least_privilege"]
    observe: "gh api /app/installations"
    effector:
      - {kind: file-atom, target: L-LIMENBOT-INSTALL}
    status: active
    owner: gitvs
    note: "App creation/install is irreducibly human (GitHub App ownership); the doctor cites the lever, never recites a token."
  actions_usage:
    identity: derived
    desired: ["rate_limit_headroom_ok", "actions_budget_ok"]
    observe: "gh api /rate_limit"
    effector:
      - {kind: file-atom, target: L-CARD-FRAUD-HOLD}
    status: active
    owner: gitvs
    note: "Public repos = free unlimited Actions; the keystone was account-level billing (#182), not per-repo minutes."
  org:
    identity: derived
    desired: ["plan_ok", "repo_custody", "enterprise_subscription"]
    observe: "gh api /orgs/{org} (.plan.name + repo counts; user-scoped token — cross-org, the app_estate contract)"
    effector:
      - {kind: file-atom, target: L-ORG-TEAM-UPGRADE}
    status: active
    owner: gitvs
    note: "The ACCOUNT layer above the repo graph: each org's billing plan + repo custody vs the `orgs:` block below (doctor class L). Plan/subscription changes are account-level human acts — the doctor cites the lever, never touches billing. (Enterprise emptied by machine 2026-07-17, #1185; the surviving atom is the Team upgrade.)"

  # ── envisioned — declared (owed), surfaced in the ledger, not yet gating ──────────────────────
  # These are the surfaces the ask ("everything GitHub") names but GITVS does not yet enact. They are
  # OWNED here as owed work, not scoped out in prose. Activating one = wire an observe + effector and
  # flip status: active; the wiring-integrity law then holds it. NO new engine code.
  release:
    identity: derived
    desired: ["tagged_from_policy"]
    observe: ""
    effector: []
    status: envisioned
    owner: gitvs
    note: "Release/tag governance — owed; activate by wiring gh release + a policy source."
  webhook:
    identity: derived
    desired: ["declared_endpoints_only"]
    observe: ""
    effector: []
    status: envisioned
    owner: gitvs
    note: "Webhook governance — owed; drift = an undeclared endpoint."
  team:
    identity: derived
    desired: ["declared_membership"]
    observe: ""
    effector: []
    status: envisioned
    owner: gitvs
    note: "Org team/role governance — owed."
  org_member:
    identity: derived
    desired: ["declared_roster"]
    observe: ""
    effector: []
    status: envisioned
    owner: gitvs
    note: "Org membership governance — owed; drift = an unexpected collaborator."
  environment:
    identity: derived
    desired: ["declared_protection_rules"]
    observe: ""
    effector: []
    status: envisioned
    owner: gitvs
    note: "Deployment-environment governance — owed."
  dependabot:
    identity: derived
    desired: ["security_updates_on"]
    observe: "python3 scripts/dependabot-security-guard.py --check (per audit-CI repo: automated_security_fixes + vulnerability-alerts)"
    effector:
      - {kind: delegate, argv: [python3, scripts/dependabot-security-guard.py, --apply]}
    status: active
    owner: gitvs
    note: "Dependabot security-update posture — the Tier-2 owner for estate-audit-heal's deferred (framework-major) advisories. Wired 2026-07-22: dependabot-security-guard.py observes + (armed) re-enables security-updates/alerts across the org's audit-CI repos, so the deferral can't silently break. Scoped to audit-CI repos (limen uses Renovate). Config .github/dependabot.yml is a separate concern (version-updates, pushed by sync-marketplace-config.py)."
  marketplace_app:
    identity: derived
    desired: ["installed_on_scope_classes", "config_present"]
    observe: "gh api /orgs/{owner}/installations (app_slug) + config_file presence"
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: "L-INTEGRATION-<APP>"}
    status: active                         # sync-marketplace-config.py landed (§3 D2) → wiring-integrity holds it
    owner: gitvs
    note: "The free third-party ecosystem (CodeRabbit/Trunk/Renovate/...) harnessed as $0 labor. The concrete apps are the `integrations:` registry below (what `classes:` is for repos). Effector SPLITS: the config half is machine-pushed by sync-marketplace-config.py (double-dark); the OAuth-install half is the per-app file-atom lever (L-INTEGRATION-<APP>), cited by doctor class I, never by this resource type."

# ── org-level desired posture (the ACCOUNT layer) ────────────────────────────────────────────
# Which orgs exist, which ONE holds the code, and what billing plan each may sit on. Ground truth
# 2026-07-17: ALL 307 repos live in `organvm` (free plan) while 8 EMPTY orgs ride the paid
# Enterprise plan — inverted custody, the "why do I have 10 orgs / why am I paying for Enterprise"
# question, settled here as registry data. Rows are org-login globs (first-match-wins, most-specific
# first — the `classes` discipline one level up). `plan_ok` is the SET of acceptable plans (a list,
# so the planned free→team upgrade on the canonical org is not drift); `repos` is `sole_owner`
# (all code lives here) or an exact ceiling. Observed by census (_org_posture); diffed by doctor
# class L; drift cites L-ORG-TEAM-UPGRADE — never a per-session chat re-derivation.
orgs:
  canonical:
    match: ["organvm"]
    plan_ok: ["free", "team"]
    repos: sole_owner
    actions_spending_limit_usd: 25
    owner: gitvs
    note: "The one repo-holding org (307 repos). Spending limit + plan are account-level his-hand acts (GitHub billing UI, cited via L-CARD-FRAUD-HOLD / the runbook) — the doctor observes, never mutates billing."
  reserved:
    match: ["organvm-*", "meta-organvm", "a-organvm"]
    plan_ok: ["free"]
    repos: 0
    enterprise_subscription: none
    owner: gitvs
    note: "Name-reservation shells: keep the names at $0, hold ZERO repos. The 2026-07-17 plan=enterprise drift on 8 of these was CLEARED by machine the same day (all removed from the meta-organvm enterprise, #1185); recurrence cites L-ORG-TEAM-UPGRADE. Consolidation history: scripts/consolidate-github.py; deletion stays an optional future lever (names are brand)."

# ── per-repo-CLASS governance posture ────────────────────────────────────────────────────────
# The desired-state of the `repo` / `branch_protection` types, bucketed by owner/repo glob. `required_checks`
# names real .github/workflows job ids (the parity predicate asserts each names a real job — a dead
# reference is a red check, not a silent typo). First-match-wins; put the most specific class first.
classes:
  conductor:
    match: ["organvm/limen"]
    visibility: public                     # 2026-07-22 owner decision: conductor stays public (free-tier CI dependency; resolves the observed-public drift); supersedes the 2026-07-16 private flip
    branch_protection: required
    required_checks: ["pr-gate", "python", "web", "worker"]
    app_installed: required
    secret_hygiene: enforced
    stale_branch_grace_min: 60             # reuses the reap-branches grace default
    archive_policy: never
    seo: {description: required, topics_min: 5, homepage: required, readme: portal}
    owner: gitvs
    note: "The live daemon body: strictest posture. required_checks mirror the ci.yml / pr-gate.yml job ids."
  contrib_fork:
    match: ["**"]
    match_facts: {fork: true}
    visibility: any                        # forks mirror upstream; G-exempt
    branch_protection: exempt
    required_checks: []
    app_installed: optional
    secret_hygiene: enforced
    stale_branch_grace_min: null
    archive_policy: reap_after_stale
    owner: gitvs
    note: "Contribution/symbiote staging forks (contrib--*). No SEO demand — the lure is the upstream PR, not the fork."
  frozen:
    match: ["**"]
    match_facts: {archived: true}
    visibility: any                        # live-archived repos keep whatever visibility they froze with; G-exempt
    branch_protection: exempt
    required_checks: []
    app_installed: optional
    secret_hygiene: enforced
    stale_branch_grace_min: null
    archive_policy: frozen
    owner: gitvs
    note: "GitHub-archived (fact-matched, not name-matched). Read-only; a leaked secret is STILL a red predicate."
  vault_private:
    match: []                              # membership ONLY via repo_overrides — never name-guessable
    visibility: private
    branch_protection: exempt
    required_checks: []                    # private-repo Actions are billed; CI posture is per-repo judgment
    app_installed: optional
    secret_hygiene: enforced
    stale_branch_grace_min: null
    archive_policy: never
    publish_eligible: never
    owner: gitvs
    note: "Actual private data (vaults, matters, people, raw session corpora). Never publishes; never a form twin."
  operation_private:
    match: []                              # membership ONLY via repo_overrides
    visibility: private
    branch_protection: required
    required_checks: []                    # private-repo Actions are billed; CI posture is per-repo judgment
    app_installed: required
    secret_hygiene: enforced
    stale_branch_grace_min: 1440
    archive_policy: never
    publish_eligible: form_twin
    owner: gitvs
    note: "Secret sauce — the OPERATION half of publish-the-form. A public FORM twin may exist (split: rows); the operation itself stays the moat."
  portal_public:
    match: ["4444J99/**"]                  # the profile repo + personal surface; organvm portal repos join via repo_overrides
    visibility: public
    branch_protection: required
    required_checks: ["pr-gate"]
    app_installed: required
    secret_hygiene: enforced
    stale_branch_grace_min: 1440
    archive_policy: never
    seo: {description: required, topics_min: 5, homepage: required, readme: portal}
    owner: gitvs
    note: "The SEO lure tier (value repos ∪ positioning-seeded ∪ star leaders): full portal-v1 README standard + rich metadata; every repo an inbound edge."
  private_unreviewed:
    match: ["**"]
    match_facts: {private: true}
    visibility: private                    # safe holding posture — matches current state, ZERO flip demand
    branch_protection: exempt
    required_checks: []
    app_installed: optional
    secret_hygiene: enforced
    stale_branch_grace_min: null
    archive_policy: never
    owner: gitvs
    note: "Private repos pending publication judgment — the safe default (a private repo never flips by omission). The doctor cites the count as owed judgment; classify proposals + override rows migrate repos to vault_private / operation_private / the publish wave."
  governed_public:
    match: ["organvm/**"]
    visibility: public
    branch_protection: required
    required_checks: ["pr-gate"]           # the always-on floor; empty-CI repos are exempt (setup-rulesets detects)
    app_installed: required
    secret_hygiene: enforced
    stale_branch_grace_min: 1440
    archive_policy: reap_after_stale
    seo: {description: required, topics_min: 3, homepage: optional, readme: minimal}
    owner: gitvs
    note: "The public long-tail floor: App installed; branch protected on CI, not on human review (blanket review is lever #257). Private repos no longer fall here — overrides + fact classes above outrank this glob (the class-G latent-flip bug is defused by data, not code)."
  archived:
    match: ["**"]                          # catch-all floor
    visibility: any
    branch_protection: exempt
    required_checks: []
    app_installed: optional
    secret_hygiene: enforced
    stale_branch_grace_min: null
    archive_policy: frozen
    owner: gitvs
    note: "Read-only tail: no protection expected, but a leaked secret is STILL a red predicate."

