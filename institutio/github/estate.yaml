expected_orgs:
  list: [4444J99, a-organvm, meta-organvm, organvm, organvm-i-theoria, organvm-ii-poiesis, organvm-iii-ergon, organvm-iv-taxis, organvm-v-logos, organvm-vi-koinonia, organvm-vii-kerygma]
  owner: gitvs
  note: "The nine empty orgs are reserved namespaces ($0 — they hold the names). An org observed on /user/orgs but absent here is cited drift; org deletion is lever-only, never proposed by the engine."

# ── ecosystem integrations — the free third-party Apps GITVS harnesses as $0 labor (§3) ─────────
# "Everything GitHub" is not only the resources we OWN; it is the ecosystem of free/OSS-tier Apps we
# RENT across the governed repos. Each row is one App: its `category`, the `app_slug` the census
# observes on the org installations, the `config_file` the effector pushes (the machine-ownable half),
# the `install_scope` class globs it should cover, and its `effector` (the same three total sinks).
# The effector SPLITS: config half → machine-pushed via the ship-docs primitive; OAuth-install half →
# a one-time file-atom lever (Dependabot is native, so it needs none). `status: envisioned` until the
# config-push effector (scripts/sync-marketplace-config.py) + the L-INTEGRATION-* levers land (§3 D2) —
# the wiring-integrity law then holds an active integration. Adding an App = ONE row + one template.
integrations:
  dependabot:
    category: deps
    app_slug: "dependabot[bot]"
    config_file: ".github/dependabot.yml"
    free_scope: all
    install_scope: ["conductor", "governed_public"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
    status: envisioned
    owner: gitvs
    note: "The one ALREADY-SATISFIED integration (config present on the conductor). Native GitHub — no Marketplace OAuth, so no L-INTEGRATION lever. Unifies the envisioned `dependabot` resource_type."
  coderabbit:
    category: review
    app_slug: "coderabbitai[bot]"
    config_file: ".coderabbit.yaml"
    free_scope: public
    install_scope: ["conductor", "governed_public"]   # the review ENGINE: fleet-wide, not conductor-only
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-CODERABBIT}
    status: active                         # config lives at the repo root; sync-marketplace-config.py exists → wiring-integrity holds
    owner: gitvs
    note: "AI PR review, free for public repos. Config .coderabbit.yaml is present at the conductor root (its live config + the fan-out template). Already OAuth-installed on organvm-i-theoria (an EMPTY org — it reviews nothing there); extending the install to organvm is L-INTEGRATION-CODERABBIT (#933, the one human atom)."
  # gemini-code-assist: REMOVED 2026-07-17 — Google sunset "Gemini Code Assist on GitHub" (consumer);
  # the install flow dead-ends at codeassist.google "is being retired and is no longer available".
  # Do not re-propose this row unless Google ships a successor product. The review engine's
  # private-repo reviewers are Claude/Codex/Copilot (+CodeRabbit).
  claude-review:
    category: review
    app_slug: "claude"                     # the claude GitHub App is ALREADY installed on organvm
    config_file: ".github/workflows/claude-review.yml"
    free_scope: all                        # API-token cost, not marketplace cost; private minutes gated by vars.LIMEN_CLAUDE_REVIEW
    install_scope: ["conductor", "governed_public"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
    status: active                         # workflow at the conductor root; fan-out via sync-marketplace-config.py
    owner: gitvs
    note: "The Claude lane of the review engine: auto-review on PR open + @claude mention ping-pong (anthropics/claude-code-action@v1). Needs the ORG-level ANTHROPIC_API_KEY secret — landed by creds-hydrate's gh-org sink, never a paste. Private repos opt in via the LIMEN_CLAUDE_REVIEW Actions variable until billing (#182) clears."
  review-fanout:
    category: review
    app_slug: "github-actions"             # posts via the native Actions token; no marketplace install
    config_file: ".github/workflows/pr-review-fanout.yml"
    free_scope: all
    install_scope: ["conductor", "governed_public"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
    status: active
    owner: gitvs
    note: "The REQUESTER: one idempotent marker comment per PR pinging the mention-driven agents (@codex review). CodeRabbit/Claude auto-trigger. Responders are the babysit loop + self-heal REVIEW-FEEDBACK — this row only requests. Canary-validate that bot-authored mentions actually trigger Codex before fleet fan-out. (Gemini lane removed 2026-07-17 — product sunset.)"
  trunk:
    category: quality
    app_slug: "trunk-io[bot]"
    config_file: ".trunk/trunk.yaml"
    free_scope: public
    install_scope: ["conductor"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-TRUNK}
    status: envisioned
    owner: gitvs
    note: "Meta-linter + merge-queue, free tier. Start on the conductor (strictest posture) before fanning out."
  renovate:
    category: deps
    app_slug: "renovate[bot]"
    config_file: "renovate.json"
    free_scope: all
    install_scope: ["conductor", "governed_public"]   # fleet-wide with the review engine
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-RENOVATE}
    status: active                         # config lives at the repo root; sync-marketplace-config.py exists → wiring-integrity holds
    owner: gitvs
    note: "Dependency automation; config renovate.json is present at the conductor root. Already OAuth-installed on organvm-i-theoria; extending to organvm is L-INTEGRATION-RENOVATE. NOTE: adopting Renovate means trimming .github/dependabot.yml's version-updates to avoid duplicate PRs (part of the lever)."
  semgrep:
    category: security
    app_slug: "semgrep-app[bot]"
    config_file: ".semgrep.yml"
    free_scope: public
    install_scope: ["conductor", "governed_public"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-SEMGREP}
    status: envisioned
    owner: gitvs
    note: "SAST, free for OSS. Complements native CodeQL (also free-for-public)."
  codecov:
    category: coverage
    app_slug: "codecov[bot]"
    config_file: "codecov.yml"
    free_scope: public
    install_scope: ["conductor"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-CODECOV}
    status: envisioned
    owner: gitvs
    note: "Coverage reporting, free for OSS. Config-file driven."
  sonarcloud:
    category: quality
    app_slug: "sonarcloud[bot]"
    config_file: "sonar-project.properties"
    free_scope: public
    install_scope: ["conductor"]
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-SONARCLOUD}
    status: envisioned
    owner: gitvs
    note: "Code-quality/SAST, free for OSS."
  mergify:
    category: merge
    app_slug: "mergify[bot]"
    config_file: ".mergify.yml"
    free_scope: public
    install_scope: []
    effector:
      - {kind: delegate, argv: [python3, scripts/sync-marketplace-config.py]}
      - {kind: file-atom, target: L-INTEGRATION-MERGIFY}
    status: envisioned
    owner: gitvs
    note: "Merge automation/queue. install_scope empty — merge-drain.py + merge-policy.sh already own the merge lane; declared here for completeness, not to be adopted until it beats the native organ."

# ── usage budgets ─────────────────────────────────────────────────────────────────────────────
budgets:
  api_rate_limit:
    headroom_pct_min: 15                   # symmetric with _pr_scan.avg_headroom_pct / the accelerator reserve
    expected_limit_per_hr: 15000           # App installation-token limit (vs 5k PAT) per the architecture doc
    owner: gitvs
    note: "Doctor reads gh api /rate_limit; below headroom_pct_min is exhaustion → red (class E)."
  actions_minutes:
    budget: unlimited_public
    owner: gitvs
    note: "Public repos = free unlimited; private-repo minutes now BILL (the conductor went private 2026-07-16) — metered by actions_spend below; the durable fix was account-level billing (#182/#265)."
  actions_spend:
    monthly_net_usd_max: 25                # mirrors orgs.canonical.actions_spending_limit_usd; env override LIMEN_ACTIONS_BUDGET
    owner: gitvs
    note: "Projected monthly NET Actions spend ceiling — the gitvs.py usage --check predicate (beat sensor github-actions-usage). The $0 relief for private heavy lanes is the self-hosted runner (scripts/runner-install.sh); this budget is the net under it."
  token_cascade:
    expected: "app > pat > gh"             # gh-app-token.sh --which should resolve to `app` once the App is born
    owner: gitvs
    note: "Currently resolves to `pat` (GITHUB_TOKEN fallback); the App path is the pending human atom (L-LIMENBOT-INSTALL)."

# ── human atoms — cited, never recited ─────────────────────────────────────────────────────────
# The irreducible human acts live in their registries (his-hand-levers.json / the credential wall),
# NOT in this prose. The doctor resolves id → object → issue and cites it; it never prints a value.
human_atoms:
  app_creation:            {lever: "L-LIMENBOT-INSTALL", doc: "docs/github-app-architecture.md", hand: "his — generates a private key, installs the App"}
  branch_protection:       {lever: "L-BRANCH-PROTECTION", issue: "#257", hand: "his — org-lever to arm protection fleet-wide"}
  billing_keystone:        {issue: "#182", hand: "his — card 0186 fraud hold (root of billing-gated private-repo CI)"}
  gemini_billing_downstream: {issue: "#265"}
  enterprise_cancel:       {lever: "L-ORG-TEAM-UPGRADE", doc: "docs/github-estate-runbook.md", hand: "his — Team upgrade on organvm ($4/mo, arms #257); the enterprise itself was emptied by machine 2026-07-17 (#1185: 0 orgs, 0 consumed licenses)"}
  copilot_restore:         {doc: "docs/github-estate-runbook.md", hand: "DONE 2026-07-17 (#1186 closed) — Copilot Pro granted FREE under the maintainer program; privacy set (public-code match Blocked, AI training Disabled). Org Business seats remain a possible future lever; individual Pro needs none."}

# ── consumers-derive ratchets (armed per-PR as each consumer converts — the gates.yaml discipline) ──
ratchets:
  setup_rulesets_derives_checks: false     # ARM when setup-rulesets.py reads classes[].required_checks
  session_pressure_derives_remote: false   # ARM when session-lifecycle-pressure.py delegates remote-branch counts to the census ledger
  visibility_gate_armed: true              # ARMED with the decision registry (308/308 classified) — class G diffs desired visibility per repo; pending lever-gated flips are CITED, never failed
  seo_drift_gates: false                   # ARM post-backfill — class K (SEO floor) flips from cited-owed to a red predicate
