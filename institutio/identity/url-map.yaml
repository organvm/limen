      attached (the existing Netlify deploy 4444j99-portfolio.netlify.app is the
      links-registry observed entry; organvm.github.io/portfolio is the live Pages face).
    current_url: https://organvm.github.io/portfolio
    canonical_secondary:
      - https://4444j99-portfolio.netlify.app
      - https://organvm.github.io/portfolio
    deploy_mechanism: github-pages
