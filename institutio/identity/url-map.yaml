schema_version: "1.0"

_doc: |
  THE INTENDED URL HIERARCHY — the desired-state registry for the public-facing URL estate.

  OBSERVED vs INTENDED:
    Observed (ground truth): the links-registry.json in organvm/organvm-corpvs-testamentvm
      (generated by scripts/build-links-registry.py; do NOT edit it — it is derived from
      live sources and will be overwritten on the next metrics-refresh run).
    Intended (this file): the taxonomy declared here describes WHERE each surface SHOULD
      live, not where it currently lives. The current_url field carries the observed URL;
      the hostname field carries the intended custom-domain target.

  LIFECYCLE:
    status=live              -> custom domain is already attached and serving
    status=proposed          -> intended hostname declared; DNS/custom-domain attach is
                               organ-drivable via scripts/cf-wrangler.sh once
                               L-URL-HIERARCHY-SIGNOFF is pulled
    status=proposed-lever-gated -> proposed but gated by a separate human lever
                               (see owner_lever); that lever must be pulled first

  DNS EFFECTOR:
    The actual DNS attach waits on L-URL-HIERARCHY-SIGNOFF (his-hand-levers.json).
    Once approved, scripts/cf-wrangler.sh can attach each proposed Cloudflare Pages
    custom domain headlessly using the already-hydrated CLOUDFLARE_API_TOKEN.
    No wrangler login is required; the token is proven via GET /accounts each beat.

  CANONICAL-SECONDARY:
    Each entry records its github.io and/or pages.dev URL as canonical_secondary.
    These remain valid even after a custom domain is attached (they serve as
    fallbacks and are recorded here for redirect planning).

entries:

  - id: apex-4444j99-dev
