  LIMEN_RECLAIM_STANDING_ACCEPTANCE:
    default: "1"
    env: LIMEN_RECLAIM_STANDING_ACCEPTANCE
    self_update: none
    owner: continuity
    note: "Honor the covenant standing grant (2026-07-09): clean+merged+idle worktree roots are pre-accepted for removal without a per-root ledger event. Set 0 to restore per-root human acceptance for that class (docs/removal-acceptance-covenant.md)."
  LIMEN_RECLAIM_PUSHED_OK:
    default: "0"
    env: LIMEN_RECLAIM_PUSHED_OK
    self_update: none
    owner: continuity
    note: "Pushed-reap escape hatch — DEFAULT OFF. The standing policy is merge-before-reap (pushed preservation is not closure), so a clean, idle, pushed-but-unmerged worktree is KEPT as not-merged-to-default (enacted by test_reclaim_keeps_clean_pushed_unmerged_branch). Set 1 to flip that class to reapable: reachable_from_remote ⇒ every byte is on origin and re-cloneable, so removing the local checkout loses zero work and the branch + its PR/babysitting lifecycle continue on origin. This is the opt-in lever that drains the pushed-but-unmerged backlog (the dominant boot-disk pin — hundreds of roots) toward the free-space target; classified clean+pushed+idle under the standing grant. Enabling it is an operator policy decision (it overrides merge-before-reap), homed as a lever, not defaulted on. The unpushed/dirty/active guardrails are unchanged — unpreserved work is NEVER reaped."
  LIMEN_RECLAIM_ORPHANS:
    default: "1"
    env: LIMEN_RECLAIM_ORPHANS
    self_update: none
    owner: continuity
    note: "Dead-gitdir orphan sweep — observable-first criterion satisfied 2026-07-16: first full bounded drain clean moved 431 orphans loss-free, 431 receipts written, re-run finds 0 (fixed point). Now DEFAULT ON. A worktree checkout under a THROWAWAY root (dispatch/scratch) whose `.git` pointer targets a superproject gitdir that no longer exists is prune-race debris: `git worktree prune` (clone-maintenance.sh) reaped the gitdir while the worktree's volume (Scratch) was briefly unmounted, and the checkout returned orphaned on remount — classified not-a-git-dir, uncleanable by the git-dependent loss-free gates, and the dominant cause of the 2026-07-15 worktree-debt tripling (372/537 roots). CRITICAL: it does NOT delete — because git is dead on the checkout, the reaper cannot prove the orphan walked its lifecycle (merged/pushed), so it PRESERVES it by MOVE into an off-worktree quarantine (LIMEN_ORPHAN_QUARANTINE), reversible, losing nothing walked-or-not, which resolves the debt. Deleting a quarantined orphan is a SEPARATE proof-gated step (branch provably on origin, or an operator grace). Confined to throwaway roots only — never .claude/worktrees, repo-local, or registered cells. The prune GUARD in clone-maintenance.sh stops new orphans being manufactured; this quarantines the existing backlog. Set 0 to disarm."
  LIMEN_ORPHAN_QUARANTINE:
    default: ""
    env: LIMEN_ORPHAN_QUARANTINE
    self_update: none
    owner: continuity
    note: "Off-worktree MOVE target for orphans preserved by the LIMEN_RECLAIM_ORPHANS sweep — a quarantine, not a delete. Empty (default) → a `_limen-orphan-quarantine` sibling of the worktree root on the SAME volume (an instant rename that clears the debt without freeing the volume; data preserved). Set to a path on a backup volume (e.g. /Volumes/Archive4T/limen-orphan-quarantine) to also free the working volume — a cross-volume copy that still never deletes until the move is complete. Must never point under a worktree root (that would re-create the debt)."
  LIMEN_CLONE_REAP_STANDING_ACCEPTANCE:
    default: "1"
    env: LIMEN_CLONE_REAP_STANDING_ACCEPTANCE
    self_update: none
    owner: continuity
    note: "Round-two covenant standing grant (2026-07-09): a local clone whose loss-free verdict is 'pushed-mirror' (classify() proves every local byte is on the live remote, re-cloneable, nothing unpushed/untracked — adversarially audited against 14 data-loss paths) is pre-accepted for reap without a per-clone ledger event. Matches the worktree sibling (LIMEN_RECLAIM_STANDING_ACCEPTANCE). Set 0 to restore the docs/clone-reap-acceptance.jsonl per-clone gate."
  LIMEN_REAP_CLONES_APPLY:
