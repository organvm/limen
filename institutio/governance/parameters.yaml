    self_update: none
    owner: gitvs
    note: "Self-throttle: reap-remote-branches.py --apply skips if it ran within this many minutes (--force overrides). Keeps the estate-wide remote sweep off the tight beat."
  LIMEN_REMOTE_REAP_GRACE_MIN:
    default: 1440
    env: LIMEN_REMOTE_REAP_GRACE_MIN
