    note: "How often the life office refreshes the briefing/open-actions + derives the purge clock. Read-only, lockless, fail-open → safe to run often."
  LIMEN_LIFE_DIR:
    default: "~/Workspace/_life-private"
    env: LIMEN_LIFE_DIR
    self_update: none
    owner: life
    note: "Off-repo home of the Life Chart (digital-accounts.json). Structurally uncommittable; the organ reads it and never mutates it. No account ID reaches logs/, web/, or stdout."
  LIMEN_LIFE_OVERDUE_DAYS:
    default: 0                  # a purge deadline is overdue the moment it passes
    env: LIMEN_LIFE_OVERDUE_DAYS
    self_update: none
    owner: life
    note: "Grace days before a derived subscription-purge deadline is treated as overdue. The deadline itself is always derived (lapse + purge rule), never pinned."
  LIMEN_MEMORY_DIR:
    default: "~/.claude/projects/<workspace-slug>/memory"   # derived from LIMEN_WORKDIR; override here
    env: LIMEN_MEMORY_DIR
    self_update: none
    owner: evocator
    note: "Per-session memory dir the organ verifies (read-only) for each truth's file + MEMORY.md index line."

  # --- SEED of the existing scattered surface (illustrative; not exhaustive) -----
  # The real work: migrate ALL of these from heartbeat-loop.sh / tasks.yaml / *.json
  # into this panel, then point the code here. (~70 total — see registry residual.)
  LIMEN_ROOT:
    default: "~/Workspace/limen"
    env: LIMEN_ROOT
    self_update: none
    owner: limen-daemon
  LIMEN_LIVE_ROOT:
    default: "~/Workspace/limen"
    env: LIMEN_LIVE_ROOT
    self_update: none
    owner: limen-daemon
    note: "Live checkout that launchd is expected to run. dispatch-health.py compares this root to the verified conductor worktree before async/heartbeat receipts are trusted."
  LIMEN_HEARTBEAT_PLIST:
    default: "~/Library/LaunchAgents/com.limen.heartbeat.plist"
    env: LIMEN_HEARTBEAT_PLIST
    self_update: none
    owner: limen-daemon
    note: "LaunchAgent plist inspected by dispatch-health.py. Probe-only; changing it does not reload launchd or mutate the daemon."
  LIMEN_HEARTBEAT_LABEL:
    default: "com.limen.heartbeat"
    env: LIMEN_HEARTBEAT_LABEL
    self_update: none
    owner: limen-daemon
    note: "launchctl service label used by dispatch-health.py to compare loaded heartbeat env with the plist. Probe-only, never a launchd write."
  LIMEN_RELEASE_BRANCH:
    default: "main"
    env: LIMEN_RELEASE_BRANCH
    self_update: none
    owner: limen-daemon
    note: "Release branch that sync-release.sh and live-root-gate.py compare the live daemon checkout against. Changing it changes convergence evidence only; branch switches remain human-gated."
  LIMEN_SYNC_RECEIPT_GLOBS:
    default: "docs/worktree-preservation-receipts.json docs/pr-receipts.json docs/*-receipts.json docs/*-receipt.json"
    env: LIMEN_SYNC_RECEIPT_GLOBS
    self_update: none
    owner: limen-daemon
    note: "Space-separated globs of REGENERABLE daemon receipt files. sync-release.sh re-converges a diverged live checkout when its unique local commits touch ONLY these (loss-free — the beat rewrites them), instead of failing open forever and pinning the daemon to stale code. Genuinely-unique history still fails open to hand-reconcile."
  LIMEN_DISPATCH_CEILING:
    default: null              # currently in heartbeat-loop.sh
    env: LIMEN_DISPATCH_CEILING
    self_update: "may lower under VITALS pressure"
    owner: arms-agents
    note: "First cross-organ link: VITALS pressure should drive this ceiling down."
  LIMEN_DISPATCH_LANES:
    default: "auto"
    env: LIMEN_DISPATCH_LANES
    self_update: none
    owner: arms-agents
    note: "Fleet dispatch boundary selector. `auto` derives reachable registered lanes from the capacity registry; explicit comma lists are normalized and filtered for down lanes."
  LIMEN_PR_CONTEXT_TIMEOUT:
    default: 20
    env: LIMEN_PR_CONTEXT_TIMEOUT
    self_update: none
    owner: arms-agents
    note: "Seconds allowed for fail-open GitHub PR context lookup before local isolated dispatch falls back to default-branch worktree creation."
  LIMEN_JULES_BATCH_FILL:
    default: "1"
    env: LIMEN_JULES_BATCH_FILL
    self_update: none
    owner: arms-agents
    note: "When 1, route.py treats healthy Jules as a normal repo-capable remote batch lane so its daily run budget is actively filled instead of waiting only for slow/fallback work."
  LIMEN_REMOTE_BATCH_BIAS:
    default: "0"
    env: LIMEN_REMOTE_BATCH_BIAS
    self_update: none
    owner: arms-agents
    note: "When 1, historical route ledger bias may down-weight remote batch-fill lanes. Default 0 preserves explicit daily utilization targets for lanes such as Jules."
  LIMEN_ASYNC_DEFUNCT_GRACE:
    default: 120
    env: LIMEN_ASYNC_DEFUNCT_GRACE
    self_update: none
    owner: arms-agents
    note: "Seconds to wait before a live async worker with a zombie child is treated as defunct and reaped through the queue-locked reopen path."
  LIMEN_QUEUE_LOCK_HELD:
    default: ""
    env: LIMEN_QUEUE_LOCK_HELD
    self_update: none
    owner: limen-daemon
    note: "Internal reentrancy marker exported only while heartbeat-loop.sh holds the queue lock, allowing child board writers to share the parent critical section instead of deadlocking on their own lock probe."
  LIMEN_QUEUE_LOCK_STALE_SEC:
    default: 900
    env: LIMEN_QUEUE_LOCK_STALE_SEC
    self_update: none
    owner: limen-daemon
    note: "Conservative age threshold before Python lock users may reap a metadata-free queue lock directory. PID-bearing locks are reaped only when the holder process is dead."
  LIMEN_OPENCODE_CLOCK:
    default: ""
    env: LIMEN_OPENCODE_CLOCK
    self_update: none
    owner: arms-agents
    note: "When set to '1', instructs the OpenCode lane to activate its usage-clock telemetry so the fleet can track its consumption. Injected into the opencode run environment by dispatch.py."
  LIMEN_TASK_ID:
    default: ""
    env: LIMEN_TASK_ID
    self_update: none
    owner: arms-agents
    note: "The Limen task ID injected into the opencode lane run environment so the agent knows which task it is executing. Set by dispatch.py at dispatch time."
  LIMEN_ISOLATION_PROMPT_GUARD:
    default: "1"
    env: LIMEN_ISOLATION_PROMPT_GUARD
    self_update: none
    owner: arms-agents
    note: "Prompt-level guard for isolated async/local worker packets. 1=explicitly forbid live-root and tasks.yaml mutation inside isolated worktrees; 0=omit the extra prompt block for tests or emergency rollback."
  # --- the non-bypassable Claude model chokepoint (scripts/shims/claude) ----------
  LIMEN_CLAUDE_SHIM_FLOOR:
    default: "haiku"           # the cheapest rung — the SAME tier the per-task ladder assigns to unclassed work
    env: LIMEN_CLAUDE_SHIM_FLOOR
    self_update: none
    owner: arms-agents
    note: "Floor the non-bypassable `claude` shim injects when a fleet spawn carries no --model. Spawns that earned more declare --model and pass through untouched; subagents inherit it. Capped by LIMEN_CLAUDE_MAX_INHERITED_TIER so this cannot silently become an Opus/Fable/1M default. See fleet-model-floor-bleed."
  LIMEN_CLAUDE_MAX_INHERITED_TIER:
    default: "sonnet"
    env: LIMEN_CLAUDE_MAX_INHERITED_TIER
    self_update: none
    owner: arms-agents
    note: "Maximum tier allowed for inherited/default Claude choices such as shim floors and global LIMEN_CLAUDE_MODEL pins. Default Sonnet keeps routine fan-out cheap; task-specific declaration sites may still earn Opus/Fable through the ladder and acceptance gates."
  LIMEN_CLAUDE_FABLE_FALLBACK_TIER:
    default: "sonnet"
    env: LIMEN_CLAUDE_FABLE_FALLBACK_TIER
    self_update: none
    owner: arms-agents
    note: "Fallback tier when a Fable-class task or Fable model pin lacks a current LIMEN_FABLE_ACCEPTANCE receipt. Default Sonnet prevents unaccepted Fable requests from becoming default Opus spend; set to opus only for an explicit emergency policy change."
  LIMEN_ALLOW_EXPENSIVE_CLAUDE_MODEL_PIN:
    default: "0"
    env: LIMEN_ALLOW_EXPENSIVE_CLAUDE_MODEL_PIN
    self_update: none
    owner: arms-agents
    note: "Emergency override allowing a global LIMEN_CLAUDE_MODEL pin to route inherited/default fleet spawns to Opus or explicit large-context models. Default 0 forces expensive defaults back under LIMEN_CLAUDE_MAX_INHERITED_TIER."
  LIMEN_ALLOW_CLAUDE_1M_CONTEXT:
    default: "0"
    env: LIMEN_ALLOW_CLAUDE_1M_CONTEXT
    self_update: none
    owner: arms-agents
    note: "Emergency override allowing explicit 1M/large-context Claude model pins. Default 0 strips large-context pins from tier resolution unless a current Fable acceptance receipt is present."
  LIMEN_CLAUDE_FABLE_CLASSES:
    default: "fable,long-horizon,huge-context,ambiguous-root-cause,final-canonical-decision"
    env: LIMEN_CLAUDE_FABLE_CLASSES
    self_update: none
    owner: arms-agents
    note: "Comma-separated task classes that may select the reserved Fable rung. Class membership is not enough by itself: LIMEN_FABLE_ACCEPTANCE must point at a written scripts/fable-allotment.py receipt before dispatch may return fable instead of falling back to LIMEN_CLAUDE_FABLE_FALLBACK_TIER."
  LIMEN_FABLE_ACCEPTANCE:
    default: ""
    env: LIMEN_FABLE_ACCEPTANCE
    self_update: none
    owner: arms-agents
    note: "Path to the current-week written Fable acceptance receipt emitted by scripts/fable-allotment.py accept. Empty, stale, malformed, or arbitrary paths make Fable selections fall back to Opus; value `1` is accepted only under pytest."
  LIMEN_CLAUDE_RETRY_BUMP_TO_FABLE:
    default: "0"
    env: LIMEN_CLAUDE_RETRY_BUMP_TO_FABLE
    self_update: none
    owner: arms-agents
    note: "Opt-in gate for tried:claude retry escalation from Opus to Fable. Requires LIMEN_FABLE_ACCEPTANCE as well; default caps retry bumping at Opus so Fable is never reached by inherited escalation."
  LIMEN_ALLOW_FABLE_FANOUT:
    default: "0"
    env: LIMEN_ALLOW_FABLE_FANOUT
    self_update: none
    owner: arms-agents
    note: "Emergency override for claude-workflow-guard's Fable fan-out check. Default 0 enforces one bounded accepted Fable objective instead of broad Fable worker pools."
  LIMEN_MAX_FABLE_SESSION_TOKENS:
    default: "1000000"
    env: LIMEN_MAX_FABLE_SESSION_TOKENS
    self_update: none
    owner: arms-agents
    note: "Maximum billable-ish Fable transcript tokens allowed by claude-workflow-guard before it flags the session. Counts input + output + cache creation, excluding cache reads."
  LIMEN_ALLOW_FABLE_SESSION_BURN:
    default: "0"
    env: LIMEN_ALLOW_FABLE_SESSION_BURN
    self_update: none
    owner: arms-agents
    note: "Emergency override for claude-workflow-guard's Fable session token cap. Default 0 keeps accepted Fable runs bounded even when they do not fan out."
  LIMEN_ALLOW_UNACCEPTED_FABLE:
    default: "0"
    env: LIMEN_ALLOW_UNACCEPTED_FABLE
    self_update: none
    owner: arms-agents
    note: "Emergency override for claude-workflow-guard's written-acceptance check when transcript evidence is incomplete. Default 0 blocks Fable runs that lack a visible acceptance command or receipt reference."
  LIMEN_REAL_CLAUDE:
    default: null              # DERIVED: heartbeat-loop.sh captures `command -v claude` BEFORE prepending the shim dir
    env: LIMEN_REAL_CLAUDE
    self_update: "derived each beat by heartbeat-loop.sh"
    owner: arms-agents
    note: "Absolute path to the REAL claude binary so scripts/shims/claude can exec it without recursing into itself. Never pinned — captured at fleet start; shim also falls back to a PATH scan that skips its own dir."
  LIMEN_USE_1PASSWORD_SSH:
    default: "0"               # OFF — never route SSH through 1Password by default
    env: LIMEN_USE_1PASSWORD_SSH
    self_update: none
    owner: limen-daemon
    note: "Opt-in (=1) to route SSH_AUTH_SOCK through the 1Password agent (domus-genoma 02-1password.zsh). OFF by default: the app's BiometricsOnly/never-cache policy turns every agent hit into a Touch-ID prompt, and git here is HTTPS with no keys in the agent — so routing buys nothing and only risks the prompt storm. See macos-tcc-gatekeeper-dialogs-solved."

  # --- FULL-SWEEP credential catch-all (scripts/creds-hydrate.py --sweep-all) ---
  CREDS_SWEEP_VAULTS:
    default: ""                # empty ⇒ derive from the vaults DEFAULT_MAP already draws from
    env: LIMEN_CREDS_SWEEP_VAULTS
    self_update: none
    owner: limen-daemon
    note: "Comma-separated 1Password vaults --sweep-all enumerates for the catch-all credential materialization. Empty (default) DERIVES the list from the op:// vaults the curated DEFAULT_MAP already uses (never a hardcoded vault). Promptless-only — the sweep refuses to run unless a service-account token makes op silent. See wrangler-login-and-op-ping-disease."
  CREDS_SWEEP_LOGINS:
    default: "0"               # OFF — LOGIN items are personal web logins, not fleet automation creds
    env: LIMEN_CREDS_SWEEP_LOGINS
    self_update: none
    owner: limen-daemon
    note: "Whether --sweep-all includes 1Password LOGIN-category items. OFF by default: those are personal web logins and a plaintext ~/.limen.env is the wrong home for them; the sweep targets API-credential/password/secret items. Set =1 only to deliberately include logins."

  # --- credential Wall (scripts/credential-wall.py): the pinned secret/credential index ---
  LIMEN_CRED_WALL_ISSUE:
    default: 320               # the pinned GitHub issue regenerated as the canonical secret index
    env: LIMEN_CRED_WALL_ISSUE
    self_update: none
    owner: limen-daemon
    note: "Which pinned issue scripts/credential-wall.py --sync rewrites as the secret/credential Wall. Identity, not a knob — override only if the Wall issue is ever renumbered."

  # --- MCP-CONNECTOR CONSENT — Lane B (scripts/mcp-auth-verify.py): the claude.ai OAuth connectors ---
  LIMEN_MCP_VERIFY:
    default: "1"               # ON — surface lapsed connectors in the beat log, never in chat
    env: LIMEN_MCP_VERIFY
    self_update: none
    owner: limen-daemon
    note: "Gate for the metabolize 0b step that probes claude.ai MCP-connector consent (the Lane-B sibling of creds-hydrate --verify). =0 skips it. Non-fatal + fail-open offline; a lapsed connector surfaces with its cure L-IANVA-CLOUD. See ianva-mcp-doorway."
  LIMEN_MCP_REQUIRED:
    default: ""                # empty ⇒ no connector is hard-required; every lapse is informational
    env: LIMEN_MCP_REQUIRED
    self_update: none
    owner: limen-daemon
    note: "Comma list of MCP connectors (substring match) that MUST be authenticated; mcp-auth-verify exits 1 if any lapses, else 0. Empty (default) DERIVES nothing as required — the hosted connectors are optional conveniences, so a lapse is logged, not fatal."
  LIMEN_MCP_NEEDS_AUTH_CACHE:
    default: "~/.claude/mcp-needs-auth-cache.json"
    env: LIMEN_MCP_NEEDS_AUTH_CACHE
    self_update: none
    owner: limen-daemon
    note: "Path to the daemon's needs-auth marker cache that mcp-auth-verify reads offline (connector names + internal ids only — no token material). Identity, not a knob — override only if Claude Code relocates the cache."

  # --- HOST-IS-FACTORY / CARTRIDGE INTEGRITY (scripts/cartridge-connected.py): is chezmoi plugged into the real cartridge ---
  LIMEN_CARTRIDGE_CHECK:
    default: "1"               # ON — surface an unplugged cartridge in the beat log (0c), never in chat
    env: LIMEN_CARTRIDGE_CHECK
    self_update: none
    owner: limen-daemon
    note: "Gate for the metabolize 0c step that asserts chezmoi's source IS the real cartridge (organvm/domus-genoma), not a scratch/dummy source. =0 skips it. Non-fatal + fail-open when chezmoi is absent; nothing else checks source IDENTITY (chezmoi verify/status/health only validate whatever source is wired), so a disconnected cartridge would otherwise return a meaningless green. See host-is-factory-system-is-cartridge."
  LIMEN_CARTRIDGE_REPO:
    default: "organvm/domus-genoma"
    env: LIMEN_CARTRIDGE_REPO
    self_update: none
    owner: limen-daemon
    note: "The expected cartridge repo (owner/repo) whose remote chezmoi's source must match for cartridge-connected to pass. DERIVED default, not pinned per host — another person's prosthesis overrides this to their own fork; a same-repo-name fork under a different owner still validates. See derive-never-pin-hardcodes."

  # --- WORKTREE LIFECYCLE / parallel CELLS (scripts/cells.sh + scripts/reclaim-worktrees.py) ---
  LIMEN_RECLAIM_CLAUDE_WT:
    default: "1"               # ON — sweep .claude/worktrees too (the historical ~50GB blind spot)
    env: LIMEN_RECLAIM_CLAUDE_WT
    self_update: none
    owner: limen-daemon
    note: "Whether reclaim-worktrees.py ALSO sweeps LIMEN_ROOT/.claude/worktrees (EnterWorktree/bg/interactive cells), not just the dispatch root. Set 0 to disable. Same loss-free gates (clean+content-preserved+idle) + a longer idle age + a self/live-checkout guard. See worktree-lifecycle-blind-spot."
  LIMEN_RECLAIM_CLAUDE_AGE_H:
    default: 24                # interactive sessions can sit idle-but-alive; 24h clean+content-preserved ⇒ provably dead
    env: LIMEN_RECLAIM_CLAUDE_AGE_H
    self_update: none
    owner: limen-daemon
    note: "Min idle hours before a .claude/worktrees cell is eligible for reclaim. Longer than the dispatch root's 6h because an interactive/bg session can legitimately sit idle between beats."
  LIMEN_RECLAIM_AGY_SCRATCH:
    default: "auto"
    env: LIMEN_RECLAIM_AGY_SCRATCH
    self_update: none
    owner: limen-daemon
    note: "Whether reclaim/debt discovery includes children of LIMEN_AGY_SCRATCH_ROOT. Auto means enabled in live sessions and disabled when a test/probe supplies an explicit LIMEN_WORKTREE_ROOT. Physical scratch-root deletion remains governed by antigravity-scratch-bridge acceptance; generated-only cleanup may remove ignored cache/build payloads after the idle gate."
  LIMEN_RECLAIM_REPO_LOCAL_WT:
    default: "auto"
    env: LIMEN_RECLAIM_REPO_LOCAL_WT
    self_update: none
    owner: limen-daemon
    note: "Whether reclaim/debt discovery includes repo-local .worktrees roots, such as Portvs triptych worktrees. Auto means enabled in live sessions and disabled when a test/probe supplies an explicit LIMEN_WORKTREE_ROOT."
  LIMEN_RECLAIM_REPO_LOCAL_AGE_H:
    default: 24
    env: LIMEN_RECLAIM_REPO_LOCAL_AGE_H
    self_update: none
    owner: limen-daemon
    note: "Min idle hours before a repo-local .worktrees child can be reclaimed. Same loss-free gates as other worktrees."
  LIMEN_RECLAIM_REPO_LOCAL_ROOTS:
    default: ""
    env: LIMEN_RECLAIM_REPO_LOCAL_ROOTS
    self_update: none
    owner: limen-daemon
    note: "Optional colon-separated direct list of repo-local .worktrees roots. Empty means discover under LIMEN_RECLAIM_WORKSPACE_ROOTS."
  LIMEN_RECLAIM_REGISTERED_WT:
    default: "auto"
    env: LIMEN_RECLAIM_REGISTERED_WT
    self_update: none
    owner: limen-daemon
    note: "Whether reclaim/debt discovery includes registered sibling git worktrees from LIMEN_RECLAIM_MAIN_REPOS. Auto means enabled in live sessions and disabled when a test/probe supplies an explicit LIMEN_WORKTREE_ROOT."
  LIMEN_RECLAIM_REGISTERED_AGE_H:
    default: 24
    env: LIMEN_RECLAIM_REGISTERED_AGE_H
    self_update: none
    owner: limen-daemon
    note: "Min idle hours before a registered sibling worktree can be reclaimed. Covers sibling Limen branches such as limen-main-trench-* that are not inside the central worktree roots."
  LIMEN_RECLAIM_MAIN_REPOS:
    default: "$LIMEN_ROOT:$HOME/Workspace/4444J99/portvs"
    env: LIMEN_RECLAIM_MAIN_REPOS
    self_update: none
    owner: limen-daemon
    note: "Colon-separated main repos whose git worktree lists define registered sibling worktrees for lifecycle pressure and reclaim discovery."
  LIMEN_RECLAIM_WORKSPACE_ROOTS:
    default: "$HOME/Workspace"
    env: LIMEN_RECLAIM_WORKSPACE_ROOTS
    self_update: none
    owner: limen-daemon
    note: "Colon-separated workspace roots searched for repo-local .worktrees directories, with cache/vendor folders pruned."
  LIMEN_RECLAIM_WORKSPACE_MAX_DEPTH:
    default: 5
    env: LIMEN_RECLAIM_WORKSPACE_MAX_DEPTH
    self_update: none
    owner: limen-daemon
    note: "Maximum directory depth for repo-local .worktrees discovery under LIMEN_RECLAIM_WORKSPACE_ROOTS."
  LIMEN_RECLAIM_SIZE_TIMEOUT_SEC:
    default: 10
    env: LIMEN_RECLAIM_SIZE_TIMEOUT_SEC
    self_update: none
    owner: limen-daemon
    note: "Per-root du timeout for non-destructive worktree reclaim candidate size measurement."
  LIMEN_RECLAIM_SIZE_BUDGET_SEC:
    default: 60
    env: LIMEN_RECLAIM_SIZE_BUDGET_SEC
    self_update: none
    owner: limen-daemon
    note: "Total best-effort time budget for worktree reclaim candidate size measurement."
  LIMEN_DISK_HIGH_WATER:
    default: 85
    env: LIMEN_DISK_HIGH_WATER
    self_update: none
    owner: limen-daemon
    note: "Percent-used high-water mark for the workspace data volume. INFORMATIONAL/legacy — kept for display. The pressure DECISION now keys off absolute free (LIMEN_DISK_FREE_FLOOR_GIB), because df/statvfs percent counts ~100GB of purgeable APFS space as used (the meter-lie: a 95%-by-percent disk can have ~120GB effectively free)."
  LIMEN_DISK_FREE_FLOOR_GIB:
    default: 15
    env: LIMEN_DISK_FREE_FLOOR_GIB
    self_update: none
    owner: limen-daemon
    note: "GiB of ABSOLUTE raw free space below which disk pressure is ON (emergency reap waives the loss-free age gate; the beat ramps hygiene to every tick). Honest signal on a large APFS volume where df% is inflated by ~100GB of purgeable-but-reclaimable space. Consumed by reap-clones.py and heartbeat-loop.sh's hygiene ramp."
  LIMEN_DISK_PRESSURE_ESCALATE:
    default: "1"
    env: LIMEN_DISK_PRESSURE_ESCALATE
    self_update: none
    owner: limen-daemon
    note: "ON — when absolute free space is at/below LIMEN_DISK_FREE_FLOOR_GIB the heartbeat drops hygiene cadence to every beat until it drains. Set 0 to keep hygiene on its fixed LIMEN_BEAT_HYGIENE cadence regardless of fullness."
  LIMEN_CLONE_REAP_APPLY:
    default: "1"
    env: LIMEN_CLONE_REAP_APPLY
    self_update: none
    owner: limen-daemon
    note: "ON — clone-maintenance reaps pure pushed-mirror clones for real (the last step of clone→work→push→DELETE). Loss-free by construction (re-cloneable from origin; unpushed/untracked/dirty/active/core all skipped), so it is reversible and ungated. Set 0 for dry-run (report reapable clones without removing)."
  LIMEN_REAP_IDLE_DAYS:
    default: 2
    env: LIMEN_REAP_IDLE_DAYS
    self_update: none
    owner: limen-daemon
    note: "Min idle days before a pure pushed-mirror clone is reaped by reap-clones.py — WAIVED under disk pressure (a pushed mirror is loss-free at any age; when full we reclaim now)."
  LIMEN_REAP_MAX:
    default: 50
    env: LIMEN_REAP_MAX
    self_update: none
    owner: limen-daemon
    note: "Max clones reap-clones.py removes per run; the remainder is logged (never silently dropped) and reaped on the next beat."
  LIMEN_REAP_MAXDEPTH:
    default: 3
    env: LIMEN_REAP_MAXDEPTH
    self_update: none
    owner: limen-daemon
    note: "find -maxdepth for reap-clones.py clone discovery under LIMEN_WORKSPACE (repos nest one level under org dirs like organvm/*)."
  LIMEN_BRANCH_REAP_APPLY:
    default: "1"
    env: LIMEN_BRANCH_REAP_APPLY
    self_update: none
    owner: limen-daemon
    note: "ON — clone-maintenance reaps provably-landed LOCAL branch refs for real (the ref sibling of clone/worktree reaping). Loss-free by construction (tip is an ancestor of main, or the PR is MERGED with an un-advanced tip; reflog-recoverable), so reversible and ungated. Set 0 for dry-run (report reapable branches without deleting)."
  LIMEN_BRANCH_REAP_MAX:
    default: 100
    env: LIMEN_BRANCH_REAP_MAX
    self_update: none
    owner: limen-daemon
    note: "Max branches reap-branches.py deletes per run; the remainder is logged (never silently dropped) and reaped on the next hygiene beat."
  LIMEN_BRANCH_REAP_EVERY_MIN:
    default: 30
    env: LIMEN_BRANCH_REAP_EVERY_MIN
    self_update: none
    owner: limen-daemon
    note: "Self-throttle for a real --apply beat of reap-branches.py — it deletes at most once per this many minutes (a --check gate always runs). Mirrors the reclaim-worktrees throttle."
  LIMEN_BRANCH_REAP_PROTECT:
    default: ""
    env: LIMEN_BRANCH_REAP_PROTECT
    self_update: none
    owner: limen-daemon
    note: "Extra branch names (space-separated) reap-branches.py NEVER deletes, on top of the built-in trunks (main/master/develop/trunk) and the default branch. Empty by default."
  LIMEN_REAP_CORE:
    default: "limen session-meta sovereign-systems--elevate-align portfolio portvs universal-mail--automation"
    env: LIMEN_REAP_CORE
    self_update: none
    owner: limen-daemon
    note: "Space-separated CORE repos reap-clones.py never removes even when they are a clean pushed mirror (the operator lives in them / the conductor needs them local)."
  LIMEN_REAP_VERIFY_REMOTE:
    default: "1"
    env: LIMEN_REAP_VERIFY_REMOTE
    self_update: none
    owner: limen-daemon
    note: "ON — before deleting a reap candidate, git ls-remote confirms origin STILL holds HEAD (guards the deleted/renamed-origin case where the local clone is the only copy). Fail-safe: unreachable/offline → skip, never reap. Set 0 to trust local remote-tracking refs without the network round-trip."
  LIMEN_RECLAIM_APPLY:
    default: "1"               # ON — default beat removes only clean+content-preserved+idle roots
    env: LIMEN_RECLAIM_APPLY
    self_update: none
    owner: limen-daemon
    note: "When 1, scripts/drain.sh passes --apply to reclaim-worktrees.py. The reaper still refuses dirty, unique-unpushed, unmerged, active, or live/self roots. Set 0 for preview-only operation."
  LIMEN_WORKTREE_DEBT_GATE:
    default: "1"               # ON — debt suppresses routine generated build-out, not recovery work
    env: LIMEN_WORKTREE_DEBT_GATE
    self_update: none
    owner: limen-daemon
    note: "When enabled, generate-backlog.py and dispatch selection suppress routine generated build-out if preserved worktree debt exceeds LIMEN_WORKTREE_DEBT_MAX. Explicit targeted/recovery work still runs."
  LIMEN_WORKTREE_DEBT_MAX:
    default: 12                # above this, the fleet must metabolize existing work before making more
    env: LIMEN_WORKTREE_DEBT_MAX
    self_update: none
    owner: limen-daemon
    note: "Maximum preserved dirty/unique-unpushed/not-Git worktree roots tolerated before routine generated build-out pauses. Keeps prompt-started work visible and prevents the conductor from outrunning its own closeout lifecycle."
  LIMEN_BRANCH_PREFIX:
    default: null              # DERIVED per scope — cells.sh sets cell-<slug>- for a cell's own conductor
    env: LIMEN_BRANCH_PREFIX
    self_update: "set per-cell by cells.sh conduct (cell-<slug>-) to namespace a scoped conductor's branches"
    owner: limen-daemon
    note: "Branch-name namespace a scoped conductor uses so parallel cells never collide on branch names or fight over main. Unset ⇒ the daemon's default cadence; cells.sh sets it per cell."
  LIMEN_WORKSTREAM:
    default: null              # DERIVED per scope — cells.sh sets it when `cell conduct --workstream <handle>` pins a cell to ONE channel
    env: LIMEN_WORKSTREAM
    self_update: "set per-cell by cells.sh conduct (--workstream <handle>) to pin a scoped conductor to a single workstream channel"
    owner: limen-daemon
    note: "The purpose channel a scoped conductor is pinned to (the one-worker-one-workstream invariant). cells.sh filters the cell board to this channel via `limen channels --emit`, so the conductor structurally sees only its lane. Unset ⇒ the cell sees the full board. See docs/lanes/ and limen.workstream."

  # --- BOARD INTEGRITY — the SSOT can never collapse, and self-heals if it somehow does ---
  # (limen.io.save_limen_file collapse-guard + scripts/heal-board.py). Root-caused 2026-06-26:
  # a writer atomically replaced the live 1449-task queue with one freshly-built task (missing
  # `created`), so every beat's load threw and the whole institution idled for hours.
  LIMEN_BOARD_GUARD:
    default: "1"               # ON — refuse any save that catastrophically shrinks the board
    env: LIMEN_BOARD_GUARD
    self_update: none
    owner: limen-daemon
    note: "Whether save_limen_file refuses a catastrophic board shrink (a clobber). The board only ever grows/holds steady — all callers load→mutate→save — so a collapse toward zero is always a bug. Set 0 to disable; pass allow_shrink=True in code for an intentional bulk archive. See io.py BoardCollapseError."
  LIMEN_BOARD_SHRINK_FLOOR:
    default: 5                 # never guard tiny boards (tests, fresh bootstrap); only substantial queues
    env: LIMEN_BOARD_SHRINK_FLOOR
    self_update: none
    owner: limen-daemon
    note: "The guard fires only when the prior on-disk board has MORE than this many tasks (so small/test/bootstrap boards are never blocked), and the refusal threshold is max(floor, fraction×prior). Also the collapse floor heal-board.py treats as a dead queue."
  LIMEN_BOARD_SHRINK_FRACTION:
    default: 0.10              # a new board < 10% of the prior count is a collapse, not an edit
    env: LIMEN_BOARD_SHRINK_FRACTION
    self_update: none
    owner: limen-daemon
    note: "Refuse a save whose new task count is below max(LIMEN_BOARD_SHRINK_FLOOR, this×prior). 0.10 catches 1449→1 (a clobber) while passing every legitimate append/status-update and even a heavy archive that keeps the active set."
  LIMEN_BOARD_HEAL:
    default: "1"               # ON — auto-restore a collapsed/unloadable board from the last good snapshot
    env: LIMEN_BOARD_HEAL
    self_update: none
    owner: limen-daemon
    note: "Whether scripts/heal-board.py (heartbeat preflight) auto-restores the live board from `git show HEAD:tasks.yaml` when it is unloadable or collapsed (≤ LIMEN_BOARD_SHRINK_FLOOR tasks). Idempotent: a healthy board is a no-op. The recovery net behind the save-time guard. Set 0 to disable."
  LIMEN_TABVLARIVS:
    default: "1"               # ON — the record-keeper drains the ticket inbox onto the board each beat
    env: LIMEN_TABVLARIVS
    self_update: none
    owner: tabularius
    note: "Master gate for TABVLARIVS (scripts/tabularius-organ.py), the single-writer record-keeper. Each beat it drains logs/tickets/inbox, folds each worker's ticket onto the healed board under the queue lock, and seals via the collapse-guarded atomic write. Idempotent: an empty inbox is an instant no-op, so it is safe every beat while no producers exist. Set 0 to silence the rung. The single-writer principle that dissolves the ~32-writer torn-write class — sibling of LIMEN_BOARD_HEAL."
  LIMEN_TICKETS_PRODUCE:
    default: "0"               # SAFE CODE DEFAULT — a bare manual script run stays legacy (no surprise); the FLEET opts in (see below)
    env: LIMEN_TICKETS_PRODUCE
    fleet_runtime: "1"         # ENACTMENT CONTRACT — the LIVE fleet MUST resolve this to 1 (heartbeat-loop.sh wires it). scripts/enactment-audit.py fails if the running beat diverges. This is the field #576 lacked: the note *claimed* the fleet enabled it, but nothing machine-checked that the wiring did — so the switch shipped dark and green.
    self_update: none
    owner: tabularius
    note: "Cutover flag for the TABVLARIVS single-writer transition (Step 2). When 1, converted task-CREATION writers (mine-backlog, ingest-backlog, generate-backlog, generate-revenue-backlog, generate-organ-backlog, discover-value) STOP writing tasks.yaml directly and instead submit an upsert ticket per new task via limen.tabularius.submit_task_upsert; the keeper folds them next beat. This default 0 is the SAFE CODE FALLBACK (an ad-hoc manual run stays legacy), but the LIVE FLEET DELIBERATELY ENABLES IT: scripts/heartbeat-loop.sh sets LIMEN_TICKETS_PRODUCE=1 (overridable to 0 in ~/.limen.env to revert instantly) — the cutover, taken after the keeper was watched draining a real batch. Coverage = the task-creation tier; the status-mutator tier (route/dispatch-async/heal-dispatch/rebalance/recover/quicken) stays direct until Step 2.2 (those need INTENT_STATUS tickets, not upsert). Mixed-mode (some producers, some direct writers) is strictly safer than all-direct, so the tiers flip incrementally."
  LIMEN_ENACTMENT_CHECK:
    default: "1"               # ON — surface un-enacted fleet flags (declared ON but dark/stale in the running beat) in the beat log
    env: LIMEN_ENACTMENT_CHECK
    self_update: none
    owner: tabularius
    note: "Master gate for the enactment advisory (scripts/enactment-audit.py --check) run each beat by metabolize.sh section 0d. It proves every parameters.yaml flag declaring a fleet_runtime intent is actually LIVE: the WIRING rung checks the beat resolves the flag to the declared value (catches the #576 dark-switch — declared ON, wired nowhere), the LIVENESS rung checks the running daemon started AFTER its last wiring change (catches wired-but-not-kickstarted, since a `while true` loop never re-sources itself). verify-whole.sh enforces the wiring rung as a HARD gate so 'done' can never again go green on a dark switch; this beat advisory surfaces live-host liveness in the log (never chat), like creds-hydrate --verify. Set 0 to silence."

  LIMEN_VALVE_AUDIT:
    default: "1"               # ON — separate PARKED levers from SILENTLY-OFF deliverable valves each beat
    env: LIMEN_VALVE_AUDIT
    self_update: none
    owner: tabularius
    note: "Beat gate for the armed-valve audit (scripts/armed-valve-audit.py --check) run each beat by metabolize.sh section 0e (RETRO-0708-ARMED-VALVE-AUDIT; PREC-2026-07-08-armed-valve-outcome). It derives every boolean ${LIMEN_*:-0|1} gate from the beat sources and classifies via spec/armed-valves.json: ARMED / PARKED (a his-hand lever cites it — owned, never nagged) / SILENT-OFF (a deliverable-IS-the-behavior valve disarmed with NO lever — the retro finding-8 failure class: the censor mirror's permanent dry-run, MONETA's dark URL) / UNCLASSIFIED (registry lags the code — self-surfacing). verify-whole.sh enforces the repo-deterministic --contract rung (no UNCLASSIFIED); the env/url liveness rungs stay beat-side so CI never flaps on host env. Set 0 to silence."

  LIMEN_SHIP_GATE:
    default: "1"               # ON — probe product artifacts + product-facing done-claims each beat
    env: LIMEN_SHIP_GATE
    self_update: none
    owner: tabularius
    note: "Beat gate for the ship gate (scripts/ship-gate.py --check) run each beat by metabolize.sh section 0f (RETRO-0708-SHIP-GATE; retro findings 4 + gap-model). Product-facing done requires a REACHABLE external artifact — a deployed URL returning 200, a served artifact still carrying its rail — never a merged PR, a receipt, or a filed lever. Probes every entry in spec/ship-surfaces.json plus every done/archived task labelled product-facing (urls or last dispatch_log must contain a live artifact; PR urls never count). verify-whole.sh runs the deterministic fixture test; the live probes stay beat-side. Set 0 to silence."

  LIMEN_HEAL_CONVERGENCE:
    default: "1"               # ON — trip on chronic heal non-convergence (>=3 open heal PRs failing the same check >48h)
    env: LIMEN_HEAL_CONVERGENCE
    self_update: none
    owner: tabularius
    note: "Beat gate for the heal-convergence report (scripts/heal-convergence.py --check) run each beat by metabolize.sh section 0g (RETRO-0708-HEAL-RECEIPT-OUTCOME; retro findings 1-2). CHRONIC rung: open heal PRs (title-prefixed '[limen HEAL-') grouped by (repo, failing check); >=3 PRs older than 48h on the SAME check = the healer is re-spending capacity on a wall (growth-auditor #16-#22 / theoria #492-#500 class) -> exit 1. COVERAGE rung: archived heal receipts must carry the {outcome: already_green|fixed|gave_up, failing_checks} field derived MECHANICALLY post-run by async-run-one.py (gh pr view of the target PR - never agent prose), reported as a ratio so the 855-emitted-vs-384-receipts gap class is a number. verify-whole runs the fixture test (fixture PRs + fixture clock - deterministic); live counts stay beat-side. Set 0 to silence."

  LIMEN_ASK_GATE:
    default: "1"               # ON — report-only intake audit (observable-before-autonomous; keeper-seam enforcement arms later)
    env: LIMEN_ASK_GATE
    self_update: none
    owner: tabularius
    note: "Beat gate for the intake ask audit (scripts/ask-gate.py --audit --since 7) run each beat by metabolize.sh section 0h (RETRO-0708-ASK-GATE; retro gap model + evolution 3). Encodes the measured drift predictors STRUCTURALLY: a task converges iff it names one executable done-predicate, is a single bounded objective (no (1)..(n) bundles), and is owned (repo + agent); narrative-success vocabulary and ungated armed-behavior deliverables surface as ADVISE findings. Verdicts: PASS / SPLIT (decompose into predicate-shaped children; --task-file offers the skeleton) / ADVISE. Report-only in the beat for now — the LIMEN_CENSOR_APPLY observable-before-autonomous pattern; the enforcement seam is ask-gate --task-file --check on every keeper ticket, to be armed once logs/ask-gate.json proves the predicate. Set 0 to silence."

  LIMEN_CENSOR_ISSUES_APPLY:
    default: "0"               # SAFE CODE DEFAULT — dry-run; ships observable-before-autonomous (the LIMEN_CENSOR_APPLY constitutional pattern). NO fleet_runtime yet: arming is deliberately a human act.
    env: LIMEN_CENSOR_ISSUES_APPLY
    self_update: none
    owner: censor
    note: "Arms scripts/sync-censor-issues.py — the censor→GitHub mirror that makes the system's own findings part of the public graph. When 1, every live `warning` residual in logs/censor-residual.json gets exactly one open `censor`-labelled issue (marker `<!-- censor:<id> -->`), auto-closed with a citation when the lineage clears; a HUMAN close is a veto, respected forever; creations capped per pass (--cap, default 8); stamps logs/censor-issues.json. Wired in heartbeat-loop.sh (C_CENSOR lane, after insight-route) and metabolize.sh 5b — both dry-run until armed, so the plan is observable in the beat log first. WHEN ARMING: set 1 in the daemon env AND add fleet_runtime: \"1\" here in the same change, so enactment-audit.py locks it live (the #576 dark-switch lesson — never a note that claims what no rung checks)."

  LIMEN_INSIGHT_ROUTE_APPLY:
    default: "0"               # SAFE CODE DEFAULT — a bare manual run is a dry-run; the FLEET arms it (see note)
    env: LIMEN_INSIGHT_ROUTE_APPLY
    fleet_runtime: "1"         # ENACTMENT CONTRACT — the LIVE fleet MUST resolve this to 1 (heartbeat-loop.sh wires it); enactment-audit.py fails if the beat diverges, so the route organ can never silently go dark again (it shipped as an orphan once — tests+gate, no caller, #596)
    self_update: none
    owner: insight-route
    note: "Arms scripts/insight-route.py — the insights→owners route organ that closes the insight-cadence loop. When 1, the latest report per cadence tier routes each insight to its durable owner: anthony → his-hand-levers.json (+ issue sync), org/repo → a board task via the TABVLARIVS keeper (submit_task_upsert when LIMEN_TICKETS_PRODUCE=1; board-echo insights sourced from tasks.yaml are skipped — the failed task IS the record), organ → logs/<organ>-residual.json. Default 0 keeps an ad-hoc run observe-only, but the LIVE FLEET ARMS IT: scripts/heartbeat-loop.sh exports LIMEN_INSIGHT_ROUTE_APPLY=1 (overridable to 0 in ~/.limen.env), and metabolize.sh section 5b runs it right after insight-cadence."

  LIMEN_INSIGHT_ROUTE_MAX:
    default: "5"
    env: LIMEN_INSIGHT_ROUTE_MAX
    self_update: none
    owner: insight-route
    note: "Per-pass cap on NEW board tasks created by insight-route.py. Overflow is counted in the summary line and self-corrects next beat (the insight persists in the latest report until routed). Bounds a first arming or an insight burst so the route organ can never flood the board in one pass — the same board-hygiene reflex as the sync 8/beat cap."

  # --- DEMAND-SURFACE ORGANS: keep the front door reachable + launch posts homed ---
  # (scripts/link-health.py + scripts/launch-organ.py). A 404 on a public identity surface is silent
  # demand-loss; a launch with no home is a one-off. Both are REPEATABLE processes, not chores — the
  # link organ probes every beat like creds-hydrate --verify, the launch organ homes every product ship.
  LIMEN_LINK_HEALTH:
    default: "1"               # ON — probe public surfaces for dead links each beat (throttled ~6h)
    env: LIMEN_LINK_HEALTH
    self_update: none
    owner: link-health
    note: "Beat gate for the link-health organ (scripts/link-health.py --verify). 1=probe the tracked identity/demand surfaces for 404s each beat, self-throttled to ~6h so it never floods the network; 0=off. Fail-open, never fatal — a dead link surfaces in the beat log the same way a dead credential does. See link-surfaces.json."
  LIMEN_LINK_HEAL:
    default: "1"               # ON — when a dead link has a verified-live remap, open a reviewable fix-PR
    env: LIMEN_LINK_HEAL
    self_update: none
    owner: link-health
    note: "Beat gate for the link-health organ's SELF-HEAL (scripts/link-health.py --heal --apply). 1=when a dead link has a verified-live replacement, auto-open a reversible fix-PR at the source; 0=detect only. Boundary: heal OPENS a PR, never MERGES — publishing the fix into a live identity surface stays the human's hand / merge-policy (the same stage-vs-send boundary the launch organ draws). Idempotent + self-limiting: the fix-PR branch embeds a hash of the exact fix-set, so a standing dead link is PR'd once and never re-nagged. Fail-open, never fatal."
  LIMEN_LINK_SURFACES:
    default: "$LIMEN_ROOT/link-surfaces.json"
    env: LIMEN_LINK_SURFACES
    self_update: none
    owner: link-health
    note: "Path to the declarative registry of public surfaces + host remap rules the link-health organ checks. Add a surface or a known-good remap = one entry there, never a code change. Publishes public URLs only — never a private URL or token."
  LIMEN_LAUNCHES:
    default: "$LIMEN_ROOT/organs/launch/launches.json"
    env: LIMEN_LAUNCHES
    self_update: none
    owner: launch
    note: "Path to the launch organ's product registry (scripts/launch-organ.py). Add a product = one entry; channel-native drafts stage under organs/launch/staged/<product>/<channel>.md and the organ NEVER sends — publishing stays the human's hand."
  LIMEN_BEAT_GOVERNANCE:
    default: "8"               # every 8 beats
    env: LIMEN_BEAT_GOVERNANCE
    self_update: none
    owner: governance
    note: "Beat cadence for the governance organ (scripts/governance-organ.py): run the cursus-honorum seed validator + governance standing report every N beats. Read-only, lockless, fail-open."
  LIMEN_GOVERNANCE:
    default: "1"               # ON — run the governance organ each due beat
    env: LIMEN_GOVERNANCE
    self_update: none
    owner: governance
    note: "Beat gate for the governance organ. 1=validate every seed.yaml in the estate + stamp the governance voice each due beat; 0=off. Never gates the beat."
  LIMEN_BEAT_FINANCIAL:
    default: "8"               # every 8 beats
    env: LIMEN_BEAT_FINANCIAL
    self_update: none
    owner: financial
    note: "Beat cadence for the financial organ (scripts/financial-organ.py): run the financial-office consolidator and maturity advance every N beats. Idempotent and fail-open."
  LIMEN_FINANCIAL:
    default: "1"               # ON — run the financial organ each due beat
    env: LIMEN_FINANCIAL
    self_update: none
    owner: financial
    note: "Beat gate for the financial organ. 1=refresh balance/cashflow/status and advance maturity when criteria are met; 0=off. Never gates the beat."
  LIMEN_BEAT_PUBPOLICY:
    default: "8"               # every 8 beats
    env: LIMEN_BEAT_PUBPOLICY
    self_update: none
    owner: pubpolicy
    note: "Beat cadence for the publication-policy organ (scripts/publication-policy.py --verify): re-prove the content-disposition engine stays sound (redactor owner-scoped, matrix + classifier intact) every N beats. Read-only self-test, stamps logs/publication-policy-state.json."
  LIMEN_PUBPOLICY:
    default: "1"               # ON — verify the disposition engine each due beat
    env: LIMEN_PUBPOLICY
    self_update: none
    owner: pubpolicy
    note: "Beat gate for the publication-policy organ (the ONE content-disposition decision: repo visibility x content class -> disposition). 1=self-verify each due beat; 0=off. Fail-open, never gates the beat. See organs/governance/PUBLICATION-POLICY.md."
  LIMEN_OWNER_IDENTITY:
    default: ""                # unset — the redactor uses its built-in owner instance
    env: LIMEN_OWNER_IDENTITY
    self_update: none
    owner: pubpolicy
    note: "Optional JSON override of the OWNER identity the publication-policy redactor is scoped to (handles/email_domains/names/username/phone). Fractal: the macro form works for anyone; unset uses the default instance. NEVER add a category-wide (@domain / any-phone) rule — redaction is owner-scoped only."
  LIMEN_CODEX_SLIM:
    default: "1"               # ON — distill Codex skill/plugin descriptions each due beat
    env: LIMEN_CODEX_SLIM
    self_update: none
    owner: limen-daemon
    note: "Beat gate for the Codex skill-description slimmer (scripts/codex-skill-slim.py --apply): distill every plugin/skill description to a thin, meaning-preserving lead so Codex's ~2% skills budget is not exceeded — keeping EVERY skill (distillation, not reduction; the session-noise-containment doctrine's Rule 1 bans disable-to-silence). 1=re-slim each beat (self-heals a marketplace-cache revert); 0=off. Idempotent, reversible (--restore), fail-open."
  LIMEN_CODEX_SLIM_CAP:
    default: "240"             # max chars per distilled description
    env: LIMEN_CODEX_SLIM_CAP
    self_update: none
    owner: limen-daemon
    note: "Per-description character cap the Codex slimmer distills to. Lower it if Codex still warns that descriptions were shortened; raise it to preserve more of each description. The knob, not a hardcode."
  LIMEN_ARCA:
    default: "1"               # ON — seal the private estate every beat
    env: LIMEN_ARCA
    self_update: none
    owner: limen-daemon
    note: "Beat gate for ARCA (scripts/arca.sh backup, step 5c): every ~/Workspace/_*-private store, AES-256-encrypted with a key that lives only in the macOS Keychain, roundtrip-verified, pushed as ciphertext to the private organvm/arca repo. 1=seal each beat (no-op in seconds when unchanged); 0=off. Fails soft (locked Keychain / offline). Script-level knobs are ARCA_WORKSPACE / ARCA_REPO / ARCA_VAULT_DIR / ARCA_KEY_SERVICE / ARCA_MAX_MB."
