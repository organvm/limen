    default: "$HOME/.gemini/antigravity-cli/scratch"
    env: LIMEN_AGY_SCRATCH_ROOT
    self_update: none
    owner: cvstos
    note: "Antigravity/Agy scratch checkout root audited by antigravity-scratch-bridge.py and surfaced by CVSTOS. Inventory only; deletion is a separate receipt-gated action."
  LIMEN_AGY_SCRATCH_MIN_IDLE_H:
    default: 24
    env: LIMEN_AGY_SCRATCH_MIN_IDLE_H
    self_update: none
    owner: cvstos
    note: "Minimum idle hours before the Antigravity scratch bridge may label a clean remote-preserved root as a safe-reap candidate."
  # --- VVLTVS: the countenance — verify the public face reflects the live SSOT (sibling of CVSTOS) ---
  LIMEN_BEAT_VVLTVS:
    default: 24                 # cadence: verify the public face every 24 beats (offline file reads ⇒ cheap)
    env: LIMEN_BEAT_VVLTVS
    self_update: none
    owner: vvltvs
    note: "How often VVLTVS verifies the public face reflects the live SSOT (profile/portfolio drift) + surfaces the contribution-mix radar. Offline on the beat (reads the SSOT + face files + cached mix), read-only, fail-open."
  LIMEN_VVLTVS:
    default: 1                  # default-ON: the surface pass rides the beat (read-only, offline)
    env: LIMEN_VVLTVS
    self_update: none
    owner: vvltvs
    note: "Master gate for the VVLTVS beat. ON by default (surface-only, never writes his public face). Set 0 to silence the rung. The --apply remediation plan is never run by the beat."
  LIMEN_VVLTVS_REVIEW_FLOOR:
    default: 10                 # review-contribution % below this ⇒ flagged FDE-lane liability
    env: LIMEN_VVLTVS_REVIEW_FLOOR
    self_update: none
    owner: vvltvs
    note: "Code-review contribution percent below which the activity shape is flagged a liability (a low review share reads as a high-volume solo operator). A derived threshold, not a pinned truth."
  LIMEN_VVLTVS_REFRESH:
    default: 0                  # default-OFF: the beat never hits `gh api` — reads the cached mix only
    env: LIMEN_VVLTVS_REFRESH
    self_update: none
    owner: vvltvs
    note: "When 1, the beat MAY recompute the contribution mix via one `gh api graphql` call if the cache is stale. Default 0 keeps the beat fully offline; `--refresh` always forces a recompute regardless."
  LIMEN_VVLTVS_MIX_STALE_DAYS:
    default: 7                  # cached contribution mix older than this ⇒ marked stale (advisory)
    env: LIMEN_VVLTVS_MIX_STALE_DAYS
    self_update: none
    owner: vvltvs
    note: "Age (days) after which the cached contribution mix is treated as stale. Only surfaced as an advisory (and triggers a refresh when LIMEN_VVLTVS_REFRESH=1); never fails the predicate."
  # --- SPECVLVM: the contributions mirror — outward to learn inward; proof, never outreach ---
  LIMEN_BEAT_CONTRIB:
    default: 12                 # cadence: re-render the contributions mirror every 12 beats (offline file reads => cheap)
    env: LIMEN_BEAT_CONTRIB
    self_update: none
    owner: contributions
    note: "How often SPECVLVM re-renders organs/contributions/MIRROR.md + logs/contributions.json from hub-ledger outputs. Offline on the beat, idempotent (writes only on change), fail-open."
  LIMEN_CONTRIB:
    default: 1                  # default-ON: the mirror rides the beat (read-only outward, never sends)
    env: LIMEN_CONTRIB
    self_update: none
    owner: contributions
    note: "Master gate for the SPECVLVM beat. ON by default — the organ never sends (no comments/bumps/PRs/posts; outbound stays his hand per the PLAN-06 planner decision). Set 0 to silence the rung."
  LIMEN_CONTRIB_REFRESH:
    default: 0                  # default-OFF: the beat never hits `gh api` — reads the local hub ledger or the committed cache only
    env: LIMEN_CONTRIB_REFRESH
    self_update: none
    owner: contributions
    note: "When 1, the beat MAY refresh the ledger cache via one read-only `gh api` contents call. Default 0 keeps the beat fully offline; `--refresh` always forces it regardless."
  LIMEN_CONTRIB_HUB_REPO:
    default: "organvm/contrib"  # the hub whose generated LEDGER.yaml is the one state surface
    env: LIMEN_CONTRIB_HUB_REPO
    self_update: none
    owner: contributions
    note: "The contribution hub repo (PLAN-06-OWNER-01). The mirror consumes its LEDGER outputs only — never raw sessions or private archaeology."
  LIMEN_BACKFLOW_MANIFEST:
    default: "~/Workspace/organvm-corpvs-testamentvm/data/atoms/backflow-manifest.yaml"
    env: LIMEN_BACKFLOW_MANIFEST
    self_update: none
    owner: contributions
    note: "Where the inward-lens tally reads what each contribution taught (signals routed per receiving organ). Optional: an absent manifest renders as such, never fails the mirror."
  LIMEN_CONTRIB_STALE_DAYS:
    default: 14                 # an open PR untouched this long (vs the SOURCE stamp) renders protocol-due
    env: LIMEN_CONTRIB_STALE_DAYS
    self_update: none
    owner: contributions
    note: "The LIFECYCLE.md staleness rule, executable: open upstream PRs whose last update predates source-stamp minus this many days derive protocol-due (a bump is owed, staged, fired one-at-a-time by his hand — never batch-bumped). Measured against the source stamp, not the clock, so renders stay deterministic."
  LIMEN_CONTRIB_SCOUT:
    default: 1                  # default-ON: the autopoietic limb rides the beat (bounded local walk, no network)
    env: LIMEN_CONTRIB_SCOUT
    self_update: none
    owner: contributions
    note: "Gate for the autopoietic scout: walk our own workspace dependency manifests (bounded, offline) and derive the outward opportunity pool — upstreams we lean on hardest and have never engaged. Set 0 to render the mirror without the pool."
  LIMEN_CONTRIB_SCOUT_CAP:
    default: 12                 # the pool renders at most this many opportunities (heaviest-used first)
    env: LIMEN_CONTRIB_SCOUT_CAP
    self_update: none
    owner: contributions
    note: "Max opportunities in the autopoietic pool. A derived bound on surface size, not a judgment — the full usage map is recomputed every beat."
  # --- ORGANS (VLTIMA): convert idle capacity into institutional weight (legal/financial/education/...) ---
  LIMEN_ORGAN_BACKLOG:
    default: 1                  # default-ON: organ-ladder -> bounded build tasks each FEED beat
    env: LIMEN_ORGAN_BACKLOG
    self_update: none
    owner: vltima
    note: "Toggle for the VLTIMA organ-backlog generator (sibling of revenue-backlog). 1=on. Reads organ-ladder.json, appends bounded `open` tasks via the limen schema; floor-gated, lockless, fail-open."
  LIMEN_ORGAN_TIMEOUT:
    default: 120                # seconds: cap the generator run inside the beat
    env: LIMEN_ORGAN_TIMEOUT
    self_update: none
    owner: vltima
    note: "Hard timeout (s) for the organ-backlog generator inside the FEED beat so a slow run never wedges the heartbeat."
  LIMEN_GENERATE_BACKLOG_TIMEOUT:
    default: 120
    env: LIMEN_GENERATE_BACKLOG_TIMEOUT
    self_update: none
    owner: vltima
    note: "Heartbeat timeout in seconds for the general build-out backlog generator."
  LIMEN_ORGAN_LADDER:
    default: "organ-ladder.json"   # repo-root census the generator reads (override for tests)
    env: LIMEN_ORGAN_LADDER
    self_update: none
    owner: vltima
    note: "Path to the VLTIMA institutional census (organ-ladder.json). Identity is DERIVED from this file, never pinned in code."
  LIMEN_ORGAN_FLOOR:
    default: 9                  # only emit organ work when the active-task floor leaves room
    env: LIMEN_ORGAN_FLOOR
    self_update: none
    owner: vltima
    note: "Floor gate: skip organ-backlog generation when active tasks already exceed this, so it fills idle capacity rather than flooding."
  LIMEN_ORGAN_MAX:
    default: 9                  # cap new organ tasks appended per run (bounded, no flood)
    env: LIMEN_ORGAN_MAX
    self_update: none
    owner: vltima
    note: "Max new organ-build tasks appended per run. Bounded output; id-deduped against existing tasks."
  # --- SELF-HEAL: the PR-repair FACTORY — turn REFUSED PRs (CI-red / conflicting) into fixable tasks ---
  LIMEN_SELF_HEAL:
    default: 1                  # default-ON: emit HEAL-cifix / HEAL-rebase tasks each HEAL beat
    env: LIMEN_SELF_HEAL
    self_update: none
    owner: heal
    note: "Toggle for the self-heal PR-repair factory (scripts/self-heal.py) wired into the HEAL beat. 1=on. Classifies the fleet's refused PRs and emits bounded HEAL-cifix/HEAL-rebase tasks so the router+dispatcher fix them and merge-drain lands them — merge-drain is the bouncer, this is the factory. Self-acquires the queue-lock (skips cleanly when the daemon holds it), already-queued-deduped, fail-open. 0=off."
  LIMEN_SELF_HEAL_TIMEOUT:
    default: 150                # seconds: cap the network-touching classify+emit run inside the beat
    env: LIMEN_SELF_HEAL_TIMEOUT
    self_update: none
    owner: heal
    note: "Hard timeout (s) for the self-heal factory inside the HEAL beat so a slow gh enumeration never wedges the heartbeat."
  LIMEN_SELF_HEAL_SCAN:
    default: 30                 # rotating window: PRs classified per beat (self-heal.py --scan)
    env: LIMEN_SELF_HEAL_SCAN
    self_update: none
    owner: heal
    note: "How many PRs the factory classifies per beat (a rotating window over the full fleet), so each beat does a bounded slice rather than the whole backlog at once."
  # --- LANE FITNESS (dispatch proactive reroute): per-(agent, class) conversion evidence ---
  LIMEN_FITNESS_MIN_N:
    default: 5                  # minimum dispatch_log attempts before a pair is judged fit/unfit
    env: LIMEN_FITNESS_MIN_N
    self_update: none
    owner: dispatch
    note: "Minimum attempted entries in dispatch_log (within the rolling window) before a (agent, task_class) pair is classified as fit or unfit by lane-fitness.py. Below this threshold the pair is unknown (null). Env-overridable; derive-not-pin."
  LIMEN_FITNESS_UNFIT_RATE:
    default: 0.25               # conversion rate below which a (agent, class) pair is marked unfit
    env: LIMEN_FITNESS_UNFIT_RATE
    self_update: none
    owner: dispatch
    note: "Fraction of dispatch_log 'done' outcomes required before a (agent, task_class) pair is NOT marked unfit. Below this rate (with >= LIMEN_FITNESS_MIN_N attempts) the pair is deprioritized at pick time via lane-fitness.py. Fail-open: missing ledger keeps today's behavior exactly. Derive-not-pin."
  LIMEN_FITNESS_WINDOW_DAYS:
    default: 30                 # rolling window in days for dispatch_log entries
    env: LIMEN_FITNESS_WINDOW_DAYS
    self_update: none
    owner: dispatch
    note: "Rolling window (in days) lane-fitness.py uses when counting dispatch_log attempts. Entries older than this are excluded, so the fitness table stays current with recent fleet behavior rather than anchoring on stale history. Derive-not-pin."
  LIMEN_LANE_FITNESS:
    default: "1"
    env: LIMEN_LANE_FITNESS
    self_update: none
    owner: dispatch
    note: "Beat-wire the lane-fitness table refresh (sensor 0h2). When 1, `python3 scripts/lane-fitness.py --write` runs on cadence (LIMEN_BEAT_LANE_FITNESS) so logs/lane-fitness.json stays current and dispatch._lane_fitness always has a fresh signal. Fail-open: a missing/stale ledger leaves dispatch behavior unchanged. Set 0 to silence the refresh rung."
  LIMEN_BEAT_LANE_FITNESS:
    default: 4                  # beats between refreshes; cheap I/O, no external calls
    env: LIMEN_BEAT_LANE_FITNESS
    self_update: none
    owner: dispatch
    note: "Beat cadence for the lane-fitness-refresh sensor. Every N metabolize beats, lane-fitness.py --write recomputes the per-(agent, task_class) conversion table from dispatch_log. 4 beats keeps the signal fresh without per-beat tasks.yaml reads."
  LIMEN_LANE_FITNESS_TIMEOUT:
    default: 60                 # seconds; tasks.yaml read + json write in-process is well under 10s
    env: LIMEN_LANE_FITNESS_TIMEOUT
    self_update: none
    owner: dispatch
    note: "Hard timeout (s) for the beat-wired lane-fitness.py --write run. The computation reads tasks.yaml and writes logs/lane-fitness.json; 60s is a generous ceiling for any reasonable fleet size."
    # --- LANE FLOORS (route proactive fill): ensure every healthy lane gets a daily minimum ---
  LIMEN_LANE_FLOORS:
    default: "1"                 # 1=enabled (under-floor lanes get a 0.5× load boost in _pick_local); 0=disabled
    env: LIMEN_LANE_FLOORS
    self_update: none
    owner: route
    note: "When 1, route.py's _pick_local halves the effective load of any lane below its derived daily floor so under-filled healthy lanes sort before above-floor lanes. Fixes the Jul 3-5 starvation (Jules 0 tasks, Codex 5/100 daily) where the raw budget-ratio ordering never prioritized empty lanes over partially-filled ones. Set 0 to restore prior budget-ratio-only ordering."
  LIMEN_LANE_FLOOR_FRAC:
    default: 0.25                # fraction of per-agent budget cap used as the daily floor (clamp to (0,1])
    env: LIMEN_LANE_FLOOR_FRAC
    self_update: none
    owner: route
    note: "Fraction of a lane's per-agent daily budget cap that becomes its daily task floor for the under-floor boost in route.py and capacity_fill reporting. E.g. codex budget=100 → floor=25. Parsed defensively; clamped to (0,1]; result floored at 1 when the lane has any budget. LIMEN_<AGENT>_DAILY_TASKS overrides per-agent. Derive-not-pin."
  # --- SELF-IMPROVE (route SI-weighting): clamp per-lane weight so no lane starves or swamps the fleet ---
  LIMEN_SI_WEIGHT_FLOOR:
    default: 0.25               # lower clamp: a down-weighted lane is still picked sometimes (never starved)
    env: LIMEN_SI_WEIGHT_FLOOR
    self_update: none
    owner: route
    note: "Floor on the self-improvement lane-weight multiplier in route.py. A down-weighted lane gets a proportionally higher effective load (picked less) but is clamped here so it is never fully starved. Derive-not-pin."
  LIMEN_SI_WEIGHT_CEILING:
    default: 2.0                # upper clamp: a boosted lane can be favored, but never swamps the fleet
    env: LIMEN_SI_WEIGHT_CEILING
    self_update: none
    owner: route
    note: "Ceiling on the self-improvement lane-weight multiplier in route.py (clamped to >= floor). Keeps a boost-underused lane from swamping the fleet. Was referenced in code but undeclared — folded into the panel to clear the NO-HARDCODE gate."
  # --- WALLS: keep the published walls (credential #320, his-hand #330) from drifting ---
  LIMEN_BEAT_WALLS:
    default: 12                 # cadence: regenerate the walls every 12 beats
    env: LIMEN_BEAT_WALLS
    self_update: none
    owner: walls
    note: "How often the credential Wall (#320) + his-hand aggregate Wall (#330) are regenerated so they never drift from reality. Idempotent, fail-open."

  # --- LIFE: the Executive Life Office (digital accounts/assets + subscription purge clock) ---
  LIMEN_BEAT_LIFE:
    default: 6                  # cadence: refresh the digital-life office every 6 beats
    env: LIMEN_BEAT_LIFE
    self_update: none
    owner: life
    note: "How often the life office refreshes the briefing/open-actions + derives the purge clock. Read-only, lockless, fail-open → safe to run often."
  LIMEN_LIFE_DIR:
    default: "~/Workspace/_life-private"
    env: LIMEN_LIFE_DIR
    self_update: none
    owner: life
    note: "Off-repo home of the Life Chart (digital-accounts.json). Structurally uncommittable; the organ reads it and never mutates it. No account ID reaches logs/, web/, or stdout."
  LIMEN_LIFE_OVERDUE_DAYS:
    default: 0                  # a purge deadline is overdue the moment it passes
    env: LIMEN_LIFE_OVERDUE_DAYS
    self_update: none
    owner: life
    note: "Grace days before a derived subscription-purge deadline is treated as overdue. The deadline itself is always derived (lapse + purge rule), never pinned."
  LIMEN_MEMORY_DIR:
    default: "~/.claude/projects/<workspace-slug>/memory"   # derived from LIMEN_WORKDIR; override here
    env: LIMEN_MEMORY_DIR
    self_update: none
    owner: evocator
    note: "Per-session memory dir the organ verifies (read-only) for each truth's file + MEMORY.md index line."

  # --- SEED of the existing scattered surface (illustrative; not exhaustive) -----
  # The real work: migrate ALL of these from heartbeat-loop.sh / tasks.yaml / *.json
  # into this panel, then point the code here. (~70 total — see registry residual.)
  LIMEN_ROOT:
    default: "~/Workspace/limen"
    env: LIMEN_ROOT
    self_update: none
    owner: limen-daemon
  LIMEN_LIVE_ROOT:
    default: "~/Workspace/limen"
    env: LIMEN_LIVE_ROOT
    self_update: none
    owner: limen-daemon
    note: "Live checkout that launchd is expected to run. dispatch-health.py compares this root to the verified conductor worktree before async/heartbeat receipts are trusted."
  LIMEN_ALLOW_LIVE_COMMIT:
    default: "0"
    env: LIMEN_ALLOW_LIVE_COMMIT
    self_update: none
    owner: limen-daemon
    note: "Break-glass for scripts/hooks/worktree-commit-guard.sh: 1 disables the PreToolUse deny of git commit in the live checkout on main. Mirrors the LIMEN_ALLOW_OPUS_FANOUT escape-hatch precedent; leave 0 — the deny is the charter's no-direct-main-commit rule made mechanical."
  LIMEN_ALLOW_FULL_PYTEST:
    default: "0"
    env: LIMEN_ALLOW_FULL_PYTEST
    self_update: none
    owner: verify
    note: "Break-glass for scripts/hooks/pytest-scope-guard.sh AND the pytest-scope audit in scripts/claude-workflow-guard.py: 1 disables the PreToolUse deny of full-suite pytest outside verify.py and waives the SessionEnd violation. Mirrors LIMEN_ALLOW_LIVE_COMMIT; leave 0 — the deny is the charter's scoped-verification rule made mechanical (2026-07-15 host-thrash incident)."
  LIMEN_INSIGHTS_ARCHIVE:
    default: "~/Workspace/organvm/claude-runtime-state/usage-data/snapshots"
    env: LIMEN_INSIGHTS_ARCHIVE
    self_update: none
    owner: censor
    note: "Archived /insights snapshot directory scanned by insight-cadence.py's suggestion-coverage gatherer: every snapshot must appear in a `reports` list in censor/insights-suggestions.jsonl or it is surfaced as an unaudited report each due tier. Fails open when absent (CI / other hosts)."
  LIMEN_HEARTBEAT_PLIST:
    default: "~/Library/LaunchAgents/com.limen.heartbeat.plist"
    env: LIMEN_HEARTBEAT_PLIST
    self_update: none
    owner: limen-daemon
    note: "LaunchAgent plist inspected by dispatch-health.py. Probe-only; changing it does not reload launchd or mutate the daemon."
  LIMEN_HEARTBEAT_LABEL:
    default: "com.limen.heartbeat"
    env: LIMEN_HEARTBEAT_LABEL
    self_update: none
    owner: limen-daemon
    note: "launchctl service label used by dispatch-health.py to compare loaded heartbeat env with the plist. Probe-only, never a launchd write."
  LIMEN_RELEASE_BRANCH:
    default: "main"
    env: LIMEN_RELEASE_BRANCH
    self_update: none
    owner: limen-daemon
    note: "Release branch that sync-release.sh and live-root-gate.py compare the live daemon checkout against. sync-release resolves origin's actual default independently: an override may select convergence evidence but can never reclassify, commit, or push the actual default branch as parked work."
  LIMEN_SYNC_RECEIPT_GLOBS:
    default: "docs/worktree-preservation-receipts.json docs/pr-receipts.json docs/*-receipts.json docs/*-receipt.json"
    env: LIMEN_SYNC_RECEIPT_GLOBS
    self_update: none
    owner: limen-daemon
    note: "Space-separated globs of REGENERABLE daemon receipt files. sync-release.sh re-converges a diverged live checkout when its unique local commits touch ONLY these (loss-free — the beat rewrites them), instead of failing open forever and pinning the daemon to stale code. Genuinely-unique history still fails open to hand-reconcile."
  LIMEN_DISPATCH_CEILING:
    default: null              # currently in heartbeat-loop.sh
    env: LIMEN_DISPATCH_CEILING
    self_update: "may lower under VITALS pressure"
    owner: arms-agents
    note: "First cross-organ link: VITALS pressure should drive this ceiling down."
  LIMEN_DISPATCH_LANES:
    default: "auto"
    env: LIMEN_DISPATCH_LANES
    self_update: none
    owner: arms-agents
    note: "Fleet dispatch boundary selector. `auto` derives reachable registered lanes from the capacity registry; explicit comma lists are normalized and filtered for down lanes."
  LIMEN_PR_CONTEXT_TIMEOUT:
    default: 20
    env: LIMEN_PR_CONTEXT_TIMEOUT
    self_update: none
    owner: arms-agents
    note: "Seconds allowed for fail-open GitHub PR context lookup before local isolated dispatch falls back to default-branch worktree creation."
  LIMEN_JULES_BATCH_FILL:
    default: "1"
    env: LIMEN_JULES_BATCH_FILL
    self_update: none
    owner: arms-agents
    note: "When 1, route.py treats healthy Jules as a normal repo-capable remote batch lane so its daily run budget is actively filled instead of waiting only for slow/fallback work."
  LIMEN_REMOTE_BATCH_BIAS:
    default: "0"
    env: LIMEN_REMOTE_BATCH_BIAS
    self_update: none
    owner: arms-agents
    note: "When 1, historical route ledger bias may down-weight remote batch-fill lanes. Default 0 preserves explicit daily utilization targets for lanes such as Jules."
  LIMEN_ASYNC_DEFUNCT_GRACE:
    default: 120
    env: LIMEN_ASYNC_DEFUNCT_GRACE
    self_update: none
    owner: arms-agents
    note: "Seconds to wait before a live async worker with a zombie child is treated as defunct and reaped through the queue-locked reopen path."
  LIMEN_QUEUE_LOCK_HELD:
    default: ""
    env: LIMEN_QUEUE_LOCK_HELD
    self_update: none
    owner: limen-daemon
    note: "Internal reentrancy marker exported only while heartbeat-loop.sh holds the queue lock, allowing child board writers to share the parent critical section instead of deadlocking on their own lock probe."
  LIMEN_QUEUE_LOCK_STALE_SEC:
    default: 900
    env: LIMEN_QUEUE_LOCK_STALE_SEC
    self_update: none
    owner: limen-daemon
    note: "Conservative age threshold before Python lock users may reap a metadata-free queue lock directory. PID-bearing locks are reaped only when the holder process is dead."
  LIMEN_OPENCODE_CLOCK:
    default: ""
    env: LIMEN_OPENCODE_CLOCK
    self_update: none
    owner: arms-agents
    note: "When set to '1', instructs the OpenCode lane to activate its usage-clock telemetry so the fleet can track its consumption. Injected into the opencode run environment by dispatch.py."
  LIMEN_TASK_ID:
    default: ""
    env: LIMEN_TASK_ID
    self_update: none
    owner: arms-agents
    note: "The Limen task ID injected into the opencode lane run environment so the agent knows which task it is executing. Set by dispatch.py at dispatch time."
  LIMEN_ISOLATION_PROMPT_GUARD:
    default: "1"
    env: LIMEN_ISOLATION_PROMPT_GUARD
    self_update: none
    owner: arms-agents
    note: "Prompt-level guard for isolated async/local worker packets. 1=explicitly forbid live-root and tasks.yaml mutation inside isolated worktrees; 0=omit the extra prompt block for tests or emergency rollback."
  # --- the non-bypassable Claude model chokepoint (scripts/shims/claude) ----------
  LIMEN_CLAUDE_SHIM_FLOOR:
    default: "haiku"           # the cheapest rung — the SAME tier the per-task ladder assigns to unclassed work
    env: LIMEN_CLAUDE_SHIM_FLOOR
    self_update: none
    owner: arms-agents
    note: "Floor the non-bypassable `claude` shim injects when a fleet spawn carries no --model. Spawns that earned more declare --model and pass through untouched; subagents inherit it. Capped by LIMEN_CLAUDE_MAX_INHERITED_TIER so this cannot silently become an Opus/Fable/1M default. See fleet-model-floor-bleed."
  LIMEN_CLAUDE_MAX_INHERITED_TIER:
    default: "sonnet"
    env: LIMEN_CLAUDE_MAX_INHERITED_TIER
    self_update: none
    owner: arms-agents
    note: "Maximum tier allowed for inherited/default Claude choices such as shim floors and global LIMEN_CLAUDE_MODEL pins. Default Sonnet keeps routine fan-out cheap; task-specific declaration sites may still earn Opus/Fable through the ladder and acceptance gates."
  LIMEN_CLAUDE_FABLE_FALLBACK_TIER:
    default: "sonnet"
    env: LIMEN_CLAUDE_FABLE_FALLBACK_TIER
    self_update: none
    owner: arms-agents
    note: "Fallback tier when a Fable-class task or Fable model pin lacks a current LIMEN_FABLE_ACCEPTANCE receipt. Default Sonnet prevents unaccepted Fable requests from becoming default Opus spend; set to opus only for an explicit emergency policy change."
  LIMEN_ALLOW_EXPENSIVE_CLAUDE_MODEL_PIN:
    default: "0"
    env: LIMEN_ALLOW_EXPENSIVE_CLAUDE_MODEL_PIN
    self_update: none
    owner: arms-agents
    note: "Emergency override allowing a global LIMEN_CLAUDE_MODEL pin to route inherited/default fleet spawns to Opus or explicit large-context models. Default 0 forces expensive defaults back under LIMEN_CLAUDE_MAX_INHERITED_TIER."
  LIMEN_ALLOW_CLAUDE_1M_CONTEXT:
    default: "0"
    env: LIMEN_ALLOW_CLAUDE_1M_CONTEXT
    self_update: none
    owner: arms-agents
    note: "Emergency override allowing explicit 1M/large-context Claude model pins. Default 0 strips large-context pins from tier resolution unless a current Fable acceptance receipt is present."
  LIMEN_CLAUDE_FABLE_CLASSES:
    default: "fable,long-horizon,huge-context,ambiguous-root-cause,final-canonical-decision"
    env: LIMEN_CLAUDE_FABLE_CLASSES
    self_update: none
    owner: arms-agents
    note: "Comma-separated task classes that may select the reserved Fable rung. Class membership is not enough by itself: LIMEN_FABLE_ACCEPTANCE must point at a written scripts/fable-allotment.py receipt before dispatch may return fable instead of falling back to LIMEN_CLAUDE_FABLE_FALLBACK_TIER."
  LIMEN_FABLE_ACCEPTANCE:
    default: ""
    env: LIMEN_FABLE_ACCEPTANCE
    self_update: none
    owner: arms-agents
    note: "Path to the current-week written Fable acceptance receipt emitted by scripts/fable-allotment.py accept. Empty, stale, malformed, or arbitrary paths make Fable selections fall back to Opus; value `1` is accepted only under pytest."
  LIMEN_CLAUDE_RETRY_BUMP_TO_FABLE:
    default: "0"
    env: LIMEN_CLAUDE_RETRY_BUMP_TO_FABLE
    self_update: none
    owner: arms-agents
    note: "Opt-in gate for tried:claude retry escalation from Opus to Fable. Requires LIMEN_FABLE_ACCEPTANCE as well; default caps retry bumping at Opus so Fable is never reached by inherited escalation."
  LIMEN_ALLOW_FABLE_FANOUT:
    default: "0"
    env: LIMEN_ALLOW_FABLE_FANOUT
    self_update: none
    owner: arms-agents
    note: "Emergency override for claude-workflow-guard's Fable fan-out check. Default 0 enforces one bounded accepted Fable objective instead of broad Fable worker pools."
  LIMEN_MAX_FABLE_SESSION_TOKENS:
    default: "1000000"
    env: LIMEN_MAX_FABLE_SESSION_TOKENS
    self_update: none
    owner: arms-agents
    note: "Maximum billable-ish Fable transcript tokens allowed by claude-workflow-guard before it flags the session. Counts input + output + cache creation, excluding cache reads."
  LIMEN_ALLOW_FABLE_SESSION_BURN:
    default: "0"
    env: LIMEN_ALLOW_FABLE_SESSION_BURN
    self_update: none
    owner: arms-agents
    note: "Emergency override for claude-workflow-guard's Fable session token cap. Default 0 keeps accepted Fable runs bounded even when they do not fan out."
  LIMEN_ALLOW_UNACCEPTED_FABLE:
    default: "0"
    env: LIMEN_ALLOW_UNACCEPTED_FABLE
    self_update: none
    owner: arms-agents
    note: "Emergency override for claude-workflow-guard's written-acceptance check when transcript evidence is incomplete. Default 0 blocks Fable runs that lack a visible acceptance command or receipt reference."
  LIMEN_FABLE_WEEKLY_TOKENS:
    default: "1000000000"
    env: LIMEN_FABLE_WEEKLY_TOKENS
    self_update: none
    owner: arms-agents
    note: "Weekly Fable token budget the balance meter (scripts/fable-allotment.py balance) divides actual weekly Fable tokens by when Anthropic's weekly ratelimit-header percent is not captured. Default ~1B ≈ the observed weekly allotment ceiling; used only for the transcript-token-sum fallback source."
  LIMEN_FABLE_BALANCE:
    default: "1"
    env: LIMEN_FABLE_BALANCE
    self_update: none
    owner: arms-agents
    note: "Beat toggle for metabolize.sh step 0e: refresh logs/fable-allotment.json and surface an over-cap/unaccepted interactive Fable run in the beat log. Default 1; set 0 to skip the meter refresh."
  LIMEN_FABLE_BALANCE_PATH:
    default: ""
    env: LIMEN_FABLE_BALANCE_PATH
    self_update: none
    owner: arms-agents
    note: "Override path to the live weekly Fable balance file (default $LIMEN_ROOT/logs/fable-allotment.json). Read by the model_selection cap gate, the session guard, and the vendor advisor; used by tests to seed a mock balance. Empty means the default location."
  LIMEN_CLAUDE_FABLE_CAP_TIER:
    default: "opus"
    env: LIMEN_CLAUDE_FABLE_CAP_TIER
    self_update: none
    owner: arms-agents
    note: "Tier an OVER-CAP but acceptance-valid Fable selection lands on (the live weekly-cap downgrade in model_selection). Default Opus (the nearest tier below Fable for legitimately high-value work), capped to the ladder; distinct from the acceptance-absent LIMEN_CLAUDE_FABLE_FALLBACK_TIER."
  LIMEN_LATEST_SESSION_JSONL:
    default: ""
    env: LIMEN_LATEST_SESSION_JSONL
    self_update: none
    owner: arms-agents
    note: "Optional path to the latest interactive session transcript for metabolize.sh step 0e's per-beat Fable audit (claude-workflow-guard audit-transcript). Empty or absent means the per-beat transcript audit is skipped; the balance meter still refreshes."
  LIMEN_SESSION_MODEL:
    default: ""
    env: LIMEN_SESSION_MODEL
    self_update: none
    owner: arms-agents
    note: "Fallback source for the interactive session model in scripts/fable-session-guard.py when the SessionStart hook payload and ANTHROPIC_MODEL/CLAUDE_MODEL are absent. Empty means the guard resolves the model only from the payload/other env; a `fable`-bearing value triggers the interactive Fable guard."
  LIMEN_VENDOR_IDLE_HEADROOM_PCT:
    default: "90"
    env: LIMEN_VENDOR_IDLE_HEADROOM_PCT
    self_update: none
    owner: arms-agents
    note: "Headroom percent at/above which a metered vendor with no rate-limit health is judged persistently idle (CANCEL-CANDIDATE) by scripts/vendor-cancel-advisor.py. Default 90 is conservative: only a nearly-untouched pool is ever a cancel candidate; a pool that hits its caps is always KEEP."
  LIMEN_REAL_CLAUDE:
    default: null              # DERIVED: heartbeat-loop.sh captures `command -v claude` BEFORE prepending the shim dir
    env: LIMEN_REAL_CLAUDE
    self_update: "derived each beat by heartbeat-loop.sh"
    owner: arms-agents
    note: "Absolute path to the REAL claude binary so scripts/shims/claude can exec it without recursing into itself. Never pinned — captured at fleet start; shim also falls back to a PATH scan that skips its own dir."
  LIMEN_USE_1PASSWORD_SSH:
    default: "0"               # OFF — never route SSH through 1Password by default
    env: LIMEN_USE_1PASSWORD_SSH
    self_update: none
    owner: limen-daemon
    note: "Opt-in (=1) to route SSH_AUTH_SOCK through the 1Password agent (domus-genoma 02-1password.zsh). OFF by default: the app's BiometricsOnly/never-cache policy turns every agent hit into a Touch-ID prompt, and git here is HTTPS with no keys in the agent — so routing buys nothing and only risks the prompt storm. See macos-tcc-gatekeeper-dialogs-solved."

  # --- FULL-SWEEP credential catch-all (scripts/creds-hydrate.py --sweep-all) ---
  CREDS_SWEEP_VAULTS:
    default: ""                # empty ⇒ derive from the vaults DEFAULT_MAP already draws from
    env: LIMEN_CREDS_SWEEP_VAULTS
    self_update: none
    owner: limen-daemon
    note: "Comma-separated 1Password vaults --sweep-all enumerates for the catch-all credential materialization. Empty (default) DERIVES the list from the op:// vaults the curated DEFAULT_MAP already uses (never a hardcoded vault). Promptless-only — the sweep refuses to run unless a service-account token makes op silent. See wrangler-login-and-op-ping-disease."
  CREDS_SWEEP_LOGINS:
    default: "0"               # OFF — LOGIN items are personal web logins, not fleet automation creds
    env: LIMEN_CREDS_SWEEP_LOGINS
    self_update: none
    owner: limen-daemon
    note: "Whether --sweep-all includes 1Password LOGIN-category items. OFF by default: those are personal web logins and a plaintext ~/.limen.env is the wrong home for them; the sweep targets API-credential/password/secret items. Set =1 only to deliberately include logins."

  # --- credential Wall (scripts/credential-wall.py): the pinned secret/credential index ---
  LIMEN_CRED_WALL_ISSUE:
    default: 320               # the pinned GitHub issue regenerated as the canonical secret index
    env: LIMEN_CRED_WALL_ISSUE
    self_update: none
    owner: limen-daemon
    note: "Which pinned issue scripts/credential-wall.py --sync rewrites as the secret/credential Wall. Identity, not a knob — override only if the Wall issue is ever renumbered."

  # --- MCP-CONNECTOR CONSENT — Lane B (scripts/mcp-auth-verify.py): the claude.ai OAuth connectors ---
  LIMEN_MCP_VERIFY:
    default: "1"               # ON — surface lapsed connectors in the beat log, never in chat
    env: LIMEN_MCP_VERIFY
    self_update: none
    owner: limen-daemon
    note: "Gate for the metabolize 0b step that probes claude.ai MCP-connector consent (the Lane-B sibling of creds-hydrate --verify). =0 skips it. Non-fatal + fail-open offline; a lapsed connector surfaces with its cure L-IANVA-CLOUD. See ianva-mcp-doorway."
  LIMEN_MCP_REQUIRED:
    default: ""                # empty ⇒ no connector is hard-required; every lapse is informational
    env: LIMEN_MCP_REQUIRED
    self_update: none
    owner: limen-daemon
    note: "Comma list of MCP connectors (substring match) that MUST be authenticated; mcp-auth-verify exits 1 if any lapses, else 0. Empty (default) DERIVES nothing as required — the hosted connectors are optional conveniences, so a lapse is logged, not fatal."

  # --- MCP-SERVER BOOT — Lane A (scripts/mcp-server-boot.py): the local/stdio servers every agent spawns ---
  LIMEN_MCP_BOOT_VERIFY:
    default: "1"               # ON — surface configured-but-dead local MCP servers in the beat log
    env: LIMEN_MCP_BOOT_VERIFY
    self_update: none
    owner: limen-daemon
    note: "Gate for the metabolize 0b2 step that spawn-pings every local/stdio MCP server across every agent CLI config (copilot, codex, gemini, agy, claude, cline, opencode) and confirms it boots/reaches — the Lane-A sibling of mcp-auth-verify (Lane B, hosted claude.ai connectors). Two of Copilot's four servers sat red for weeks (docker-on-a-docker-less-host, corrupt npx cache) with no sensor to see it; this closes that blind spot. =0 skips it. Non-fatal + fail-open (no agent configs => exit 0, so CI never false-reds). Ω predicate: scripts/verify-mcp-estate.sh. See mcp-estate-health-ownership-organ."
  LIMEN_MCP_BOOT_HEAL:
    default: "0"               # OFF — the effector. Arm once to auto-heal MCP-server boot failures.
