    env: LIMEN_SESSION_ID
    self_update: none
    owner: continuity
    note: "The opaque session ID recorded in the dispatch log during task claims."
  LIMEN_CONTINUATION:
    default: "1"
    env: LIMEN_CONTINUATION
    self_update: none
    owner: continuity
    note: "Master gate for the daemon-driven continuation beat. 1=enabled; 0=skip."
