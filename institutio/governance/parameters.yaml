  OBSERVATORY_APPLY:
    default: 0
    env: OBSERVATORY_APPLY
    self_update: none
    owner: observatory
    note: "Arms the OBSERVATORY human-gated proposal write: 0 (default) records the daily experiment only in the organ-owned logs/observatory/proposals.jsonl; 1 additionally homes the lever in his-hand-levers.json (idempotent by id). Never auto-applies a public surface change."
  OBSERVATORY_CAPTURE:
    default: 0
