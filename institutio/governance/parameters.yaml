    self_update: none
    owner: limen-daemon
    note: "--check only: a landed branch younger than this many minutes is the beat mid-digestion, not lingering — keeps the closeout gate satisfiable beside a continuously-merging fleet. --apply eligibility is ungraced."
  LIMEN_BRANCH_REAP_PROTECT:
