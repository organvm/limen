# VIGILIA — THE PARAMETER PANEL (the spine; the "100x").
#
# Mandate: every name, path, threshold, and secret-REFERENCE the body uses is ONE
# declared parameter here — with a default, an env override, and (where it makes
# sense) a self-update rule. No hardcodes. This is enforced by a CI gate (build
# order #3), the same way the nomenclator gate already fails the build on a bad name.
#
# This file is a SEED, not the finished panel. The excavation found ~70 LIMEN_* vars
# scattered across 5 env files + 7 YAML + 3 JSON + 3 py-defaults. Folding all of them
# in here — and pointing the code at this panel — is its own focused PR.
#
# param schema:
#   <KEY>:
#     default:     the reversible default
#     env:         the env var that overrides it (usually the key itself)
#     self_update: none | <rule>   # how/whether the body may re-tune it
#     owner:       which organ owns it (see registry/organs.yaml)
#     note:        optional

schema_version: 0.1

parameters:

  # --- autonomy governor: stale-pause-marker auto-clear -------------------------
  LIMEN_AUTONOMY_MARKER_AUTOCLEAR:
    default: 1
    env: LIMEN_AUTONOMY_MARKER_AUTOCLEAR
    self_update: none
    owner: vigilia
    note: "When 1 (default), autonomy-governor.current_mode() auto-clears an AUTONOMY_PAUSED 'integration drain' marker once its owner: branch has a MERGED PR (fail-closed via gh). Prevents the 2026-07-10 21h respawn-spin freeze (owner codex/dynamic-routing-closeout-20260710, PR #921 merged, marker never cleaned up). 0 = never auto-clear (a marker outlives its owner PR)."
  LIMEN_AUTONOMY_MARKER_RECHECK_SECS:
    default: 120
    env: LIMEN_AUTONOMY_MARKER_RECHECK_SECS
    self_update: none
    owner: vigilia
    note: "Throttle window for the marker auto-clear gh check — at most one `gh pr list` per this many seconds while a pause marker is present, so rapid current_mode() callers (dispatch admission) don't hammer GitHub."
  LIMEN_AUTONOMY_MARKER_AUTOMERGE:
    default: "1"
    env: LIMEN_AUTONOMY_MARKER_AUTOMERGE
    self_update: none
    owner: vigilia
    note: "When 1 (default), the governor COMPLETES a PR-owned pause release instead of merely checking it: a marker whose owner:/pr: names one identifiable PR, whose release_predicate declares the merge, and whose prohibitions do NOT mention merge gets merge-policy.sh run on that PR and, on CLEARED (exit 0), a head-pinned squash merge — so a pause can never deadly-embrace the paused beat that would have merged its own release (the 2026-07-15 endless-watcher incident: sessions babysat the pause-owner PR by hand because merge-drain lives inside the paused heartbeat). Operator pauses (merge in prohibitions, or owner_surface:-only identity) are structurally ineligible and never touched. 0 = check-only (pre-2026-07-15 behavior). Follows the LIMEN_AUTONOMY_MARKER_AUTOCLEAR / LIMEN_MERGE_DRAIN default-on precedent; the five-clause discriminator is the safety, and its worst failure mode is staying paused."
  LIMEN_HEARTBEAT_PAUSED_SECONDS:
    default: 300
    env: LIMEN_HEARTBEAT_PAUSED_SECONDS
    self_update: none
    owner: vigilia
    note: "Low-frequency sleep cadence while the autonomy governor is paused. The singleton stays alive and writes one byte-stable paused receipt instead of exiting into a launchd KeepAlive respawn loop."

  # --- the institution names ITSELF as the first parameter ---------------------
  INSTITVTIO_NOMEN:
    default: "VIGILIA"          # provisional codename — NOT ratified
    env: INSTITVTIO_NOMEN
    self_update: "ratified once, via INDEX·NOMINVM"
    owner: index-nominum
    note: "Even the name is a parameter. Do not treat VIGILIA as final."

  INSTITVTIO_HOME:
    default: "limen/institutio"  # provisional; may extract to its own repo
    env: INSTITVTIO_HOME
    self_update: none
    owner: the-seat
    note: "Repo home is a decision, not a constant. Extracting later is a clean git subtree."

  LIMEN_ASYNC_MAX:
    default: "hw.ncpu — derived at plist generation, override only via env"
    env: LIMEN_ASYNC_MAX
    self_update: none
    owner: dispatch
    note: "Host-sized concurrency ceiling for local async dispatch workers. It derives from live CPU count with no literal fleet cap; per-lane limits prevent monopolization and VITALS supplies runtime memory backpressure. Remote lanes do not consume it. A manual override remains an escape hatch."
  LIMEN_ASYNC_LOCAL_PER_LANE:
    default: "$LIMEN_LOCAL_LIMIT"
    env: LIMEN_ASYNC_LOCAL_PER_LANE
    self_update: none
    owner: dispatch
    note: "Per-lane launch room for local async workers. Remote lanes such as Jules use live provider runway and --per-lane; this knob prevents a remote burst command from becoming 100 local OpenCode/Agy processes."
  LIMEN_REMOTE_BASE_REF:
    default: "HEAD"
    env: LIMEN_REMOTE_BASE_REF
    self_update: none
    owner: dispatch
    note: "Public target ref resolved through the remote GitHub owner to an exact pushed SHA before deterministic off-box verification."
  LIMEN_GITHUB_ACTIONS_CONTROL_REF:
    default: "<live remote default branch>"
    env: LIMEN_GITHUB_ACTIONS_CONTROL_REF
    self_update: none
    owner: dispatch
    note: "Optional explicit short branch/tag name. When unset, discovery uses the live remote default branch. HEAD, raw SHAs, pull refs, unprotected branches, ambiguous branch/tag names, and unsafe ref syntax fail closed. The branch/tag and its exact re-resolved SHA are packet- and receipt-bound."
  LIMEN_REMOTE_RECEIPT_ROOT:
    default: "$LIMEN_ROOT/logs/remote-execution"
    env: LIMEN_REMOTE_RECEIPT_ROOT
    self_update: none
    owner: dispatch
    note: "Local content-addressed observation store for public GitHub Actions run IDs, URLs, exact SHAs, predicate digests, and durable receipt identities. Raw provider output and credentials are excluded."
  LIMEN_FACTS_APPLY:
    default: 0
    env: LIMEN_FACTS_APPLY
    self_update: none
    owner: identity
    note: "Arms identity.py `need` to APPEND a pending row to personal-facts.yaml (and file an L-FACT lever) for an un-homed personal-fact class. Dry-run (0) by default — surfaces the pending row without writing. The write path is single-writer/scrubbed: class-NAME only, never a value."
  LIMEN_IDENTITY_VERIFY:
    default: 1
    env: LIMEN_IDENTITY_VERIFY
    self_update: none
    owner: identity
    note: "Toggles the beat's personal-fact presence check (identity.py verify, sensor 0a2 in sensors.yaml). 1=on: a blank applicable&required atom surfaces in the beat log, never chat. Sibling of LIMEN_CREDS_HYDRATE — creds rotate, identity atoms don't."
  LIMEN_DISPATCH_ASYNC:
    default: 1
    env: LIMEN_DISPATCH_ASYNC
    self_update: none
    owner: dispatch
    note: "Async dispatch is the enacted fleet mode (overnight-watch expects 1). Generator default was 0 until 2026-07-09, when a regen under a bare session env silently rendered async OFF — the default now matches the enacted state."

  LIMEN_PROBE_ATTEMPTS:
    default: "40 for the API runtime; 80 for the Worker runtime"
    env: LIMEN_PROBE_ATTEMPTS
    self_update: none
    owner: dispatch
    note: "Maximum readiness attempts for either local runtime probe. Tests lower this value to exercise the terminal-failure cleanup path without a long wait."
  LIMEN_PROBE_RETRY_DELAY:
    default: 0.25
    env: LIMEN_PROBE_RETRY_DELAY
    self_update: none
    owner: dispatch
    note: "Seconds between local runtime readiness attempts."
  LIMEN_PROBE_TERM_GRACE:
    default: 2
    env: LIMEN_PROBE_TERM_GRACE
    self_update: none
    owner: dispatch
    note: "Seconds allowed for a directly owned probe server to exit after TERM before its isolated process group receives KILL."

  LIMEN_LOCAL_FLOOR:
    default: 0
    env: LIMEN_LOCAL_FLOOR
    self_update: none
    owner: dispatch
    note: "MANVMISSIO local-floor arm switch — DARK by default (operator rule 2026-07-09: nothing switches over until the math maths). Arm to 1 only when the parity gate (organvm/manumissio) passes each floor class at threshold."

  LIMEN_LOCAL_FLOOR_CLASSES:
    default: "scan,verify,link-check,classify,summarize"
    env: LIMEN_LOCAL_FLOOR_CLASSES
    self_update: "per-class: add only on parity-gate pass; ledger waste_classes auto-rolls a class back at runtime"
    owner: dispatch
    note: "Job classes the unmetered ollama floor may absorb (capacity.local_floor_classes). Reserved opus/fable classes are excluded in code regardless of this list."

  # --- VITALS: the missing executive's thresholds (build order #1) --------------
  # These are the published 'reaction function' the heartbeat will enact. Seeds —
  # tune against _diagnostics FIND-005 ('treat 16GB as a budget, not a floor').
  VITALS_PRESSURE_GAUGE:
    default: "kern.memorystatus_vm_pressure_level"
    env: LIMEN_VITALS_GAUGE
    self_update: none
    owner: vitals
    note: "The kernel's own jetsam signal — correct gauge; free-pages stays ~0 even when healthy."
  VITALS_PRESSURE_WARN:
    default: 2                  # macOS gauge: 1=normal, 2=warn, 4=critical
    env: LIMEN_VITALS_WARN
    self_update: none
    owner: vitals
    note: "At >=warn (2): THROTTLE — dispatch continues with the async cap divided by VITALS_THROTTLE_DIVISOR. A 16GB host lives at warn under normal load; the old skip-at-warn idle beat starved the fleet for a night (2026-07-08: 273 skipped beats, budget unused)."
  VITALS_PRESSURE_CRITICAL:
    default: 4
    env: LIMEN_VITALS_CRIT
    self_update: none
    owner: vitals
    note: "At >=critical (4): block new local checkout work and shed running discretionary load (e.g. ollama) before jetsam escalates; off-box provider lanes remain eligible."
  VITALS_THROTTLE_DIVISOR:
    default: 2
    env: LIMEN_VITALS_THROTTLE_DIVISOR
    self_update: none
    owner: vitals
    note: "Divisor applied to both async local slots and synchronous local workers while memory pressure is at warn (floor 1). At critical, local admission sheds while off-box lanes continue."
  VITALS_HEAVY_SURFACE_LIMIT:
    default: 1
    env: LIMEN_VITALS_HEAVY_LIMIT
    self_update: none
    owner: vitals
    note: "FIND-005: one heavy AI surface at a time on a 16GB host."
  LIMEN_HOST_ADMISSION_ROOT:
    default: "auto"
    env: LIMEN_HOST_ADMISSION_ROOT
    self_update: none
    owner: vitals
    note: "Machine-wide, per-UID lease state. 'auto' derives a private directory under the host temp root so leases are shared by every Limen worktree but never promoted to backed-up governance output."
  LIMEN_HOST_ADMISSION_LEASE_SECONDS:
    default: 900
    env: LIMEN_HOST_ADMISSION_LEASE_SECONDS
    self_update: none
    owner: vitals
    note: "Finite lease TTL for execution and heavy-surface admission. Bounded entrypoints refresh live leases; dead PID, PID-start mismatch, and TTL cleanup never signal or restart peers."
  LIMEN_HOST_ADMISSION_PROBE_TIMEOUT:
    default: 5
    env: LIMEN_HOST_ADMISSION_PROBE_TIMEOUT
    self_update: none
    owner: vitals
    note: "Hard timeout in seconds for the two-interval iostat pressure observation used only when deciding whether to admit new heavy work."
  LIMEN_HOST_ADMISSION_BACKBLAZE_CPU_PERCENT:
    default: 50
    env: LIMEN_HOST_ADMISSION_BACKBLAZE_CPU_PERCENT
    self_update: none
    owner: vitals
    note: "Deny a new heavy lease when aggregate Backblaze client CPU is strictly above this percentage. Existing work is not killed or restarted."
  LIMEN_HOST_ADMISSION_BACKBLAZE_RSS_BYTES:
    default: 1073741824
    env: LIMEN_HOST_ADMISSION_BACKBLAZE_RSS_BYTES
    self_update: none
    owner: vitals
    note: "Deny a new heavy lease when aggregate Backblaze client RSS is strictly above one GiB."
  LIMEN_HOST_ADMISSION_SWAP_FRACTION:
    default: 0.25
    env: LIMEN_HOST_ADMISSION_SWAP_FRACTION
    self_update: none
    owner: vitals
    note: "Deny a new heavy lease when live swap use is strictly above this fraction of physical RAM."
  LIMEN_HOST_ADMISSION_SWAP_GROWTH_BYTES_PER_MINUTE:
    default: 536870912
    env: LIMEN_HOST_ADMISSION_SWAP_GROWTH_BYTES_PER_MINUTE
    self_update: none
    owner: vitals
    note: "Deny a new heavy lease when two bounded observations prove swap is growing strictly faster than 512 MiB per minute."
  LIMEN_HOST_ADMISSION_DISK_MIB_PER_SECOND:
    default: 100
    env: LIMEN_HOST_ADMISSION_DISK_MIB_PER_SECOND
    self_update: none
    owner: vitals
    note: "Deny a new heavy lease only when both post-baseline iostat samples are strictly above this aggregate MiB/s threshold."
  VITALS_SHED_OLLAMA:
    default: "1"
    env: LIMEN_VITALS_SHED_OLLAMA
    self_update: none
    owner: vitals
    note: "Kill switch for the critical-pressure ollama shed. 1=shed loaded models at >=critical; 0=record only."
  VITALS_LOAD_WARN_PER_CORE:
    default: 1.5
    env: LIMEN_VITALS_LOAD_WARN
    self_update: none
    owner: vitals
    note: "Second VITALS axis (2026-07-15 host-thrash incident: Backblaze crawl + concurrent full pytest suites pinned CPU while the memory gauge alone couldn't see the storm coming). 1-min load average per core >= this: THROTTLE. Deliberately loose so memory stays the primary gauge and load only catches CPU-only storms — the 2026-07-08 starved-fleet night (273 skipped beats) is the precedent against tight thresholds."
  VITALS_LOAD_CRIT_PER_CORE:
    default: 3.0
    env: LIMEN_VITALS_LOAD_CRIT
    self_update: none
    owner: vitals
    note: "1-min load average per core >= this: SHED — block new local checkout work; off-box provider lanes remain eligible. Combined with the memory axis by max severity (either gauge can throttle/shed; neither can mask the other)."
  VITALS_SWAP_WARN_RATIO:
    default: 0.75
    env: LIMEN_VITALS_SWAP_WARN
    self_update: none
    owner: vitals
    note: "Third VITALS axis (2026-07-16 host-thrash incident: swap 17.3/18 GiB, 94 MB free RAM, while the jetsam gauge reported only 'warn' for hours). Swap USED >= this ratio x physical RAM: THROTTLE. Cold swap stock with a modest swap estate stays ok — the ratio is against RAM, not the swap file."
  VITALS_SWAP_TOTAL_CRIT_RATIO:
    default: 1.0
    env: LIMEN_VITALS_SWAP_CRIT
    self_update: none
    owner: vitals
    note: "Swap TOTAL allocated >= this ratio x physical RAM: SHED. macOS grows the swap estate on demand, so the estate reaching RAM size is the OS's own overcommit declaration (18 GiB > 16 GiB during the 2026-07-16 thrash; the healthy same-day baseline 12 GiB < 16 stays green)."
  VITALS_WARN_SUSTAIN_BEATS:
    default: 3
    env: LIMEN_VITALS_WARN_SUSTAIN
    self_update: none
    owner: vitals
    note: "A combined-axis 'warn' that persists this many consecutive gate beats escalates to SHED — 2026-07-16 sat at warn for hours while swap filled; sustained warn IS critical. Streak persists in logs/vigilia/vitals-streak.json, counts only on the gate path (beat_gate(shed=True)) at most once per 60 s, resets on ok. 0 disables the escalation."
  VITALS_STALE_BEATS:
    default: 3
    env: LIMEN_VITALS_STALE_BEATS
    self_update: none
    owner: vitals
    note: "host-pressure-stale sensor threshold: the vitals record in logs/vigilia/status.json is stale after this many worst-case beats (x LIMEN_LOOP_MAX seconds, the heartbeat's adaptive ceiling). A silent gauge means the throttle/shed valve is flying blind — that is the alarm, not the pressure itself."
  LIMEN_HOST_PRESSURE_STALE:
    default: "1"
    env: LIMEN_HOST_PRESSURE_STALE
    self_update: none
    owner: vitals
    note: "Gate for the host-pressure-stale beat sensor (institutio/governance/sensors.yaml section 0o): scripts/host-pressure-stale.py fails when the VITALS record hasn't been written within VITALS_STALE_BEATS worst-case beats while LIMEN_VIGILIA=1. Watches the watcher; a silent gauge also fires one onset-deduped notification (scripts/_notify.py, IF-HOST-PRESSURE form 4). Read by the beat-sensors runner via the SENSORS registry. 0 disables the pass."
  VITALS_RSS_CEILING_MB:
    default: 1024
    env: LIMEN_VITALS_RSS_CEILING_MB
    self_update: none
    owner: substrate
    note: "host-relief per-agent RSS ceiling: a running com.limen.* launchd agent over this is a relief candidate (kickstart -k restart) when the VITALS gate says shed. 2026-07-16 precedent: com.limen.overnight-watch at 3.1 GiB restarted to ~105 MB."
  VITALS_ROOT_HOG_MB:
    default: 4096
    env: LIMEN_VITALS_ROOT_HOG_MB
    self_update: none
    owner: substrate
    note: "host-relief escalation threshold for root-owned processes the fleet cannot touch: over this RSS while the gate is not ok, one onset-deduped notification carries the pre-formed `sudo kill <pid>` one-liner (2026-07-16: bztransmit -updatebackupstats at 8.6 GiB). Observation + escalation only — host-relief never signals foreign processes itself."
  LIMEN_HOST_RELIEF:
    default: "1"
    env: LIMEN_HOST_RELIEF
    self_update: none
    owner: substrate
    note: "Gate for the host-relief beat sensor (institutio/governance/sensors.yaml section 0q): the SHED effector census — bloated com.limen agents, root hogs, onset notifications. 0 disables the pass (IF-HOST-PRESSURE form 4)."
  LIMEN_HOST_RELIEF_APPLY:
    default: "1"
    env: LIMEN_HOST_RELIEF_APPLY
    self_update: none
    owner: substrate
    note: "Arms the host-relief effector: 1 (default — operator directive 2026-07-16: the machine relieves what it owns, never a hand chore) appends --apply so over-ceiling com.limen agents are actually kickstarted when the gate says shed. 0 reverts the rung to report-only. Foreign/root processes are never touched at any setting — only escalated."
  LIMEN_BEAT_HOST_RELIEF:
    default: 1
    env: LIMEN_BEAT_HOST_RELIEF
    self_update: none
    owner: substrate
    note: "Cadence (every N beats) of the host-relief sensor. Default every beat: the census is one ps + one launchctl list, and pressure is a per-beat condition."
  LIMEN_HOST_RELIEF_TIMEOUT:
    default: 60
    env: LIMEN_HOST_RELIEF_TIMEOUT
    self_update: none
    owner: substrate
    note: "Per-run timeout (seconds) resolved by the generic sensor runner for host-relief. The runner kills the command group on overrun and the beat continues fail-open."
  LIMEN_NOTIFY:
    default: "1"
    env: LIMEN_NOTIFY
    self_update: none
    owner: vitals
    note: "Kill switch for the scripts/_notify.py escalation path (macOS display notification, onset-deduped via logs/vigilia/relief-state.json). 0 keeps the dedup bookkeeping but never calls osascript — also how hermetic tests stay silent."
  LIMEN_WATCH_RSS_MB:
    default: 512
    env: LIMEN_WATCH_RSS_MB
    self_update: none
    owner: substrate
    note: "overnight-watch.py --watch self-bound: peak RSS above this exits clean after receipts (launchd/StartInterval respawns fresh at ~100 MB). Issue #1148: one tick accumulated 3.1 GiB. 0 disables."
  LIMEN_WATCH_WALL_S:
    default: 240
    env: LIMEN_WATCH_WALL_S
    self_update: none
    owner: substrate
    note: "overnight-watch.py per-tick wall-clock bound (SIGALRM, exit 0 fail-open): a one-shot receipt tick that runs longer than this is wedged, not working — 2026-07-16: one tick ran 51 minutes under an I/O storm. 0 disables."

  # --- CONTINUITY: make hand-recovery automatic (build order #1) ----------------
  CONTINUITY_MIN_SUMMARY_CHARS:
    default: 400
    env: LIMEN_CONTINUITY_MIN_SUMMARY
    self_update: none
    owner: continuity
    note: "A handoff summary shorter than this is degenerate (this session got 200). Trigger transcript reconstruction."
  CONTINUITY_TRANSCRIPT_GLOB:
    default: "~/.claude/projects/*/*.jsonl"
    env: LIMEN_CONTINUITY_TRANSCRIPTS
    self_update: none
    owner: continuity

  # --- INTEGRITY: govern the autoupdater lever (build order #1) ------------------
  INTEGRITY_AUTOUPDATER:
    default: "disabled"        # the institution's POLICY: keep the autoupdater off
    env: LIMEN_INTEGRITY_AUTOUPDATER
    self_update: none
    owner: integrity
    note: "Intended policy state ('disabled'|'enabled'). The MECHANISM is the DISABLE_AUTOUPDATER=1 env lever, checked separately as 'actual' (don't conflate the two value spaces). Version-path churn is the root of the corrupt-app dialog + TCC re-prompts."
  INTEGRITY_VERIFY_TARGETS:
    default:
      - "/Applications/Claude.app"
      - "~/.local/bin/claude"
    env: LIMEN_INTEGRITY_TARGETS
    self_update: none
    owner: integrity
    note: "codesign --verify on the heartbeat; alert on signature/version drift."

  # --- EVOCATOR: the summoner (keep canonical truths present in every channel) ---
  LIMEN_EVOCATOR:
    default: "1"               # ON — a portal that doesn't run isn't a portal
    env: LIMEN_EVOCATOR
    self_update: none
    owner: evocator
    note: "Gate for the EVOCATOR organ. =0 rolls it back; the FLAME canon block persists regardless (git-tracked)."
  LIMEN_BEAT_EVOCATOR:
    default: 6                  # cadence: summon every 6 beats
    env: LIMEN_BEAT_EVOCATOR
    self_update: none
    owner: evocator
    note: "How often the summoner reconciles every channel. Idempotent (writes only on change) → safe to run often."
  LIMEN_EVOCATOR_CANON:
    default: "limen/spec/evocator/canon.yaml"
    env: LIMEN_EVOCATOR_CANON
    self_update: none
    owner: evocator
    note: "The declarative canon of truths the organ summons everywhere."
  LIMEN_KNOWLEDGE_CORPUS:
    default: "~/Workspace/knowledge-corpus"
    env: LIMEN_KNOWLEDGE_CORPUS
    self_update: none
    owner: evocator
    note: "Path to the knowledge-corpus repo; the corpus channel writes a collection shot here (guarded, fail-open)."
  LIMEN_PRIVATE_ROOT:
    default: "$LIMEN_ROOT/.limen-private"
    env: LIMEN_PRIVATE_ROOT
    self_update: none
    owner: continuity
    note: "Ignored local private cartridge root (parent of session-corpus, photos-universe, etc.). Full media-dedup paths/hashes live here and are never committed; public receipts carry aggregates only."
  LIMEN_PRIVATE_SESSION_CORPUS:
    default: "$LIMEN_ROOT/.limen-private/session-corpus"
    env: LIMEN_PRIVATE_SESSION_CORPUS
    self_update: none
    owner: continuity
    note: "Ignored local raw/private session cartridge. Stores manifests and optional content-addressed object copies; never committed."
  LIMEN_STATE_ROOT:
    default: "$LIMEN_ROOT"
    env: LIMEN_STATE_ROOT
    self_update: none
    owner: continuity
    note: "Canonical read-side Limen state root for estate and lifecycle ledgers. Lets tests or isolated worktrees read from one root while writing redacted receipts elsewhere."
  LIMEN_OUTPUT_ROOT:
    default: "$LIMEN_ROOT"
    env: LIMEN_OUTPUT_ROOT
    self_update: none
    owner: continuity
    note: "Writable output root for redacted public receipts emitted by estate and lifecycle scripts."
  LIMEN_OUTPUT_PRIVATE_SESSION_CORPUS:
    default: "$LIMEN_OUTPUT_ROOT/.limen-private/session-corpus"
    env: LIMEN_OUTPUT_PRIVATE_SESSION_CORPUS
    self_update: none
    owner: continuity
    note: "Ignored private receipt root paired with LIMEN_OUTPUT_ROOT when scripts separate read-side state from write-side outputs."
  LIMEN_ALWAYS_WORKING_INDEX:
    default: "$LIMEN_PRIVATE_SESSION_CORPUS/lifecycle/always-working.json"
    env: LIMEN_ALWAYS_WORKING_INDEX
    self_update: none
    owner: continuity
    note: "Private lifecycle index written by always-working.py to classify user promises as done, assigned, needs assignment, or blocked before dispatch opens more work."
  LIMEN_ALWAYS_WORKING_DOC:
    default: "$LIMEN_ROOT/docs/always-working.md"
    env: LIMEN_ALWAYS_WORKING_DOC
    self_update: none
    owner: continuity
    note: "Public receipt document emitted from the always-working lifecycle index. Contains aggregate statuses and receipt paths, not private raw prompt content."
  LIMEN_ALWAYS_WORKING_SCRIPT:
    default: "$LIMEN_ROOT/scripts/always-working.py"
    env: LIMEN_ALWAYS_WORKING_SCRIPT
    self_update: none
    owner: continuity
    note: "Executable producer used by overnight-watch for the bounded alternate-work snapshot. Tests and isolated deployments may replace the path without changing dispatch code."
  LIMEN_ALWAYS_WORKING_BEFORE_DISPATCH:
    default: "1"
    env: LIMEN_ALWAYS_WORKING_BEFORE_DISPATCH
    self_update: none
    owner: limen-daemon
    note: "When enabled, live dispatch runs always-working.py --write --emit-task-tickets before reserving more work, so promise/owner tickets are emitted before the fleet fans out."
  LIMEN_ALWAYS_WORKING_HARD_GATE:
    default: "1"
    env: LIMEN_ALWAYS_WORKING_HARD_GATE
    self_update: none
    owner: limen-daemon
    note: "When true, dispatch refuses to reserve new live work if the pre-dispatch always-working reconciliation fails or times out."
  LIMEN_ALWAYS_WORKING_TIMEOUT:
    default: 180
    env: LIMEN_ALWAYS_WORKING_TIMEOUT
    self_update: none
    owner: limen-daemon
    note: "Timeout in seconds for the pre-dispatch always-working reconciliation gate."
  LIMEN_ALWAYS_WORKING_TIMEOUT_HARD_GATE:
    default: "0"
    env: LIMEN_ALWAYS_WORKING_TIMEOUT_HARD_GATE
    self_update: none
    owner: limen-daemon
    note: "Whether an always-working timeout alone blocks dispatch reservation. The broader hard gate still blocks non-timeout failures; default 0 preserves live dispatch if lifecycle reconciliation exceeds its timeout."
  LIMEN_ALWAYS_WORKING_TARGET_FREE_GIB:
    default: 200
    env: LIMEN_ALWAYS_WORKING_TARGET_FREE_GIB
    self_update: none
    owner: continuity
    note: "Local-system free-space target used by always-working to keep the laptop as hot cache instead of durable storage."
