# VIGILIA — THE PARAMETER PANEL (the spine; the "100x").
#
# Mandate: every name, path, threshold, and secret-REFERENCE the body uses is ONE
# declared parameter here — with a default, an env override, and (where it makes
# sense) a self-update rule. No hardcodes. This is enforced by a CI gate (build
# order #3), the same way the nomenclator gate already fails the build on a bad name.
#
# This file is a SEED, not the finished panel. The excavation found ~70 LIMEN_* vars
# scattered across 5 env files + 7 YAML + 3 JSON + 3 py-defaults. Folding all of them
# in here — and pointing the code at this panel — is its own focused PR.
#
# param schema:
#   <KEY>:
#     default:     the reversible default
#     env:         the env var that overrides it (usually the key itself)
#     self_update: none | <rule>   # how/whether the body may re-tune it
#     owner:       which organ owns it (see registry/organs.yaml)
#     note:        optional

schema_version: 0.1

parameters:

  # --- the institution names ITSELF as the first parameter ---------------------
  INSTITVTIO_NOMEN:
    default: "VIGILIA"          # provisional codename — NOT ratified
    env: INSTITVTIO_NOMEN
    self_update: "ratified once, via INDEX·NOMINVM"
    owner: index-nominum
    note: "Even the name is a parameter. Do not treat VIGILIA as final."

  INSTITVTIO_HOME:
    default: "limen/institutio"  # provisional; may extract to its own repo
    env: INSTITVTIO_HOME
    self_update: none
    owner: the-seat
    note: "Repo home is a decision, not a constant. Extracting later is a clean git subtree."

  # --- VITALS: the missing executive's thresholds (build order #1) --------------
  # These are the published 'reaction function' the heartbeat will enact. Seeds —
  # tune against _diagnostics FIND-005 ('treat 16GB as a budget, not a floor').
  VITALS_PRESSURE_GAUGE:
    default: "kern.memorystatus_vm_pressure_level"
    env: LIMEN_VITALS_GAUGE
    self_update: none
    owner: vitals
    note: "The kernel's own jetsam signal — correct gauge; free-pages stays ~0 even when healthy."
  VITALS_PRESSURE_WARN:
    default: 2                  # macOS gauge: 1=normal, 2=warn, 4=critical
    env: LIMEN_VITALS_WARN
    self_update: none
    owner: vitals
    note: "At >=warn (2): stop opening new dispatch lanes (idle beat, mirror #224 offline gate). Seed said 1, but 1 IS normal — that would idle every beat; corrected to the kernel's warn level."
  VITALS_PRESSURE_CRITICAL:
    default: 4
    env: LIMEN_VITALS_CRIT
    self_update: none
    owner: vitals
    note: "At >=critical (4): also shed running discretionary load (e.g. ollama) before jetsam escalates."
  VITALS_HEAVY_SURFACE_LIMIT:
    default: 1
    env: LIMEN_VITALS_HEAVY_LIMIT
    self_update: none
    owner: vitals
    note: "FIND-005: one heavy AI surface at a time on a 16GB host."
  VITALS_SHED_OLLAMA:
    default: "1"
    env: LIMEN_VITALS_SHED_OLLAMA
    self_update: none
    owner: vitals
    note: "Kill switch for the critical-pressure ollama shed. 1=shed loaded models at >=critical; 0=record only."

  # --- CONTINUITY: make hand-recovery automatic (build order #1) ----------------
  CONTINUITY_MIN_SUMMARY_CHARS:
    default: 400
    env: LIMEN_CONTINUITY_MIN_SUMMARY
    self_update: none
    owner: continuity
    note: "A handoff summary shorter than this is degenerate (this session got 200). Trigger transcript reconstruction."
  CONTINUITY_TRANSCRIPT_GLOB:
    default: "~/.claude/projects/*/*.jsonl"
    env: LIMEN_CONTINUITY_TRANSCRIPTS
    self_update: none
    owner: continuity

  # --- INTEGRITY: govern the autoupdater lever (build order #1) ------------------
  INTEGRITY_AUTOUPDATER:
    default: "disabled"        # the institution's POLICY: keep the autoupdater off
    env: LIMEN_INTEGRITY_AUTOUPDATER
    self_update: none
    owner: integrity
    note: "Intended policy state ('disabled'|'enabled'). The MECHANISM is the DISABLE_AUTOUPDATER=1 env lever, checked separately as 'actual' (don't conflate the two value spaces). Version-path churn is the root of the corrupt-app dialog + TCC re-prompts."
  INTEGRITY_VERIFY_TARGETS:
    default:
      - "/Applications/Claude.app"
      - "~/.local/bin/claude"
    env: LIMEN_INTEGRITY_TARGETS
    self_update: none
    owner: integrity
    note: "codesign --verify on the heartbeat; alert on signature/version drift."

  # --- EVOCATOR: the summoner (keep canonical truths present in every channel) ---
  LIMEN_EVOCATOR:
    default: "1"               # ON — a portal that doesn't run isn't a portal
    env: LIMEN_EVOCATOR
    self_update: none
    owner: evocator
    note: "Gate for the EVOCATOR organ. =0 rolls it back; the FLAME canon block persists regardless (git-tracked)."
  LIMEN_BEAT_EVOCATOR:
    default: 6                  # cadence: summon every 6 beats
    env: LIMEN_BEAT_EVOCATOR
    self_update: none
    owner: evocator
    note: "How often the summoner reconciles every channel. Idempotent (writes only on change) → safe to run often."
  LIMEN_EVOCATOR_CANON:
    default: "limen/spec/evocator/canon.yaml"
    env: LIMEN_EVOCATOR_CANON
    self_update: none
    owner: evocator
    note: "The declarative canon of truths the organ summons everywhere."
  LIMEN_KNOWLEDGE_CORPUS:
    default: "~/Workspace/knowledge-corpus"
    env: LIMEN_KNOWLEDGE_CORPUS
    self_update: none
    owner: evocator
    note: "Path to the knowledge-corpus repo; the corpus channel writes a collection shot here (guarded, fail-open)."
  LIMEN_PRIVATE_SESSION_CORPUS:
    default: "$LIMEN_ROOT/.limen-private/session-corpus"
    env: LIMEN_PRIVATE_SESSION_CORPUS
    self_update: none
    owner: continuity
    note: "Ignored local raw/private session cartridge. Stores manifests and optional content-addressed object copies; never committed."
  LIMEN_CAPABILITY_ROOTS:
    default: ""
    env: LIMEN_CAPABILITY_ROOTS
    self_update: none
    owner: continuity
    note: "Optional colon-separated override for counts-only capability-substrate discovery (skills/plugins/MCP/ACP). Empty means use the local default roots; never read or activate private skill bodies in lifecycle closeout."
  LIMEN_CAPABILITY_REPO_ROOT:
    default: "$LIMEN_ROOT"
    env: LIMEN_CAPABILITY_REPO_ROOT
    self_update: none
    owner: continuity
    note: "Canonical Limen checkout used for repo-local capability roots when a detached conductor worktree writes receipts. It changes only which .agents/.claude/skills/mcp paths are counted; it does not activate tools or read skill bodies."
  LIMEN_CAPABILITY_SCAN_LIMIT:
    default: 50000
    env: LIMEN_CAPABILITY_SCAN_LIMIT
    self_update: none
    owner: continuity
    note: "Per-root file scan cap for counts-only capability-substrate discovery. A safety bound only; raising it still must not read skill bodies or plugin manifest contents."
  LIMEN_CODEX_QUICKEN_STALE_MIN:
    default: 20
    env: LIMEN_CODEX_QUICKEN_STALE_MIN
    self_update: none
    owner: continuity
    note: "Idle minutes before codex-quicken treats a Codex session as no longer alive. Classifier-only; it never resumes or mutates sessions."
  LIMEN_PUBLIC_SITE_URL:
    default: "https://device-streaming-067d747a.web.app"
    env: LIMEN_PUBLIC_SITE_URL
    self_update: none
    owner: continuity
    note: "Public hosted Limen surface probed by the prompt lifecycle ledger. Override for another deployed instance; never include credentials."
  LIMEN_GH_RECEIPT_RETRIES:
    default: 3
    env: LIMEN_GH_RECEIPT_RETRIES
    self_update: none
    owner: continuity
    note: "Retry count for transient GitHub CLI/API failures while collecting prompt lifecycle PR receipts. Keeps network blips out of durable blocker ledgers."
  LIMEN_CONSOLIDATION_GATE_TIMEOUT:
    default: 180
    env: LIMEN_CONSOLIDATION_GATE_TIMEOUT
    self_update: none
    owner: continuity
    note: "Seconds allowed for read-only GitHub consolidation gate probes. It bounds dry-run receipt refreshes only; irreversible rename/transfer/App/credential actions remain human-gated."

  # --- HEALTH: the Executive Health Office (clinical loops + visit prep + monitoring) ---
  LIMEN_BEAT_HEALTH:
    default: 6                  # cadence: refresh the health office every 6 beats
    env: LIMEN_BEAT_HEALTH
    self_update: none
    owner: health
    note: "How often the health office refreshes chart digest + visit-prep + clinical-loop chase. Read-only, lockless, fail-open."
  LIMEN_HEALTH_DIR:
    default: "~/Workspace/_health-private"
    env: LIMEN_HEALTH_DIR
    self_update: none
    owner: health
    note: "Off-repo home of the medical chart (chart.json). Structurally uncommittable; the organ reads it and never mutates it. No PII reaches logs/, web/, or stdout."
  LIMEN_HEALTH_OVERDUE_DAYS:
    default: 14                 # a clinical follow-up is overdue 14 days past its due date
    env: LIMEN_HEALTH_OVERDUE_DAYS
    self_update: none
    owner: health
    note: "Grace days before a derived clinical follow-up deadline is treated as overdue. The deadline is always derived, never pinned."

  LIMEN_HEALTH_LEARN_DAYS:
    default: 21                 # window over which the learning dept aggregates observations
    env: LIMEN_HEALTH_LEARN_DAYS
    self_update: none
    owner: health
    note: "Lookback window (days) for the health office learning department to aggregate logged observations. Read-only, derived."
  LIMEN_HEALTH_MIN_OBS:
    default: 3                  # min observations before the learning dept infers a pattern
    env: LIMEN_HEALTH_MIN_OBS
    self_update: none
    owner: health
    note: "Minimum logged observations before the learning department surfaces a pattern (avoids inferring from noise)."
  # --- ORGANS (VLTIMA): convert idle capacity into institutional weight (legal/financial/education/...) ---
  LIMEN_ORGAN_BACKLOG:
    default: 1                  # default-ON: organ-ladder -> bounded build tasks each FEED beat
    env: LIMEN_ORGAN_BACKLOG
    self_update: none
    owner: vltima
    note: "Toggle for the VLTIMA organ-backlog generator (sibling of revenue-backlog). 1=on. Reads organ-ladder.json, appends bounded `open` tasks via the limen schema; floor-gated, lockless, fail-open."
  LIMEN_ORGAN_TIMEOUT:
    default: 120                # seconds: cap the generator run inside the beat
    env: LIMEN_ORGAN_TIMEOUT
    self_update: none
    owner: vltima
    note: "Hard timeout (s) for the organ-backlog generator inside the FEED beat so a slow run never wedges the heartbeat."
  LIMEN_ORGAN_LADDER:
    default: "organ-ladder.json"   # repo-root census the generator reads (override for tests)
    env: LIMEN_ORGAN_LADDER
    self_update: none
    owner: vltima
    note: "Path to the VLTIMA institutional census (organ-ladder.json). Identity is DERIVED from this file, never pinned in code."
  LIMEN_ORGAN_FLOOR:
    default: 9                  # only emit organ work when the active-task floor leaves room
    env: LIMEN_ORGAN_FLOOR
    self_update: none
    owner: vltima
    note: "Floor gate: skip organ-backlog generation when active tasks already exceed this, so it fills idle capacity rather than flooding."
  LIMEN_ORGAN_MAX:
    default: 9                  # cap new organ tasks appended per run (bounded, no flood)
    env: LIMEN_ORGAN_MAX
    self_update: none
    owner: vltima
    note: "Max new organ-build tasks appended per run. Bounded output; id-deduped against existing tasks."
  # --- WALLS: keep the published walls (credential #320, his-hand #330) from drifting ---
  LIMEN_BEAT_WALLS:
    default: 12                 # cadence: regenerate the walls every 12 beats
    env: LIMEN_BEAT_WALLS
    self_update: none
    owner: walls
    note: "How often the credential Wall (#320) + his-hand aggregate Wall (#330) are regenerated so they never drift from reality. Idempotent, fail-open."

  # --- LIFE: the Executive Life Office (digital accounts/assets + subscription purge clock) ---
  LIMEN_BEAT_LIFE:
    default: 6                  # cadence: refresh the digital-life office every 6 beats
    env: LIMEN_BEAT_LIFE
    self_update: none
    owner: life
    note: "How often the life office refreshes the briefing/open-actions + derives the purge clock. Read-only, lockless, fail-open → safe to run often."
  LIMEN_LIFE_DIR:
    default: "~/Workspace/_life-private"
    env: LIMEN_LIFE_DIR
    self_update: none
    owner: life
    note: "Off-repo home of the Life Chart (digital-accounts.json). Structurally uncommittable; the organ reads it and never mutates it. No account ID reaches logs/, web/, or stdout."
  LIMEN_LIFE_OVERDUE_DAYS:
    default: 0                  # a purge deadline is overdue the moment it passes
    env: LIMEN_LIFE_OVERDUE_DAYS
    self_update: none
    owner: life
    note: "Grace days before a derived subscription-purge deadline is treated as overdue. The deadline itself is always derived (lapse + purge rule), never pinned."
  LIMEN_MEMORY_DIR:
    default: "~/.claude/projects/<workspace-slug>/memory"   # derived from LIMEN_WORKDIR; override here
    env: LIMEN_MEMORY_DIR
    self_update: none
    owner: evocator
    note: "Per-session memory dir the organ verifies (read-only) for each truth's file + MEMORY.md index line."

  # --- SEED of the existing scattered surface (illustrative; not exhaustive) -----
  # The real work: migrate ALL of these from heartbeat-loop.sh / tasks.yaml / *.json
  # into this panel, then point the code here. (~70 total — see registry residual.)
  LIMEN_ROOT:
    default: "~/Workspace/limen"
    env: LIMEN_ROOT
    self_update: none
    owner: limen-daemon
  LIMEN_DISPATCH_CEILING:
    default: null              # currently in heartbeat-loop.sh
    env: LIMEN_DISPATCH_CEILING
    self_update: "may lower under VITALS pressure"
    owner: arms-agents
    note: "First cross-organ link: VITALS pressure should drive this ceiling down."
  # --- the non-bypassable Claude model chokepoint (scripts/shims/claude) ----------
  LIMEN_CLAUDE_SHIM_FLOOR:
    default: "haiku"           # the cheapest rung — the SAME tier the per-task ladder assigns to unclassed work
    env: LIMEN_CLAUDE_SHIM_FLOOR
    self_update: none
    owner: arms-agents
    note: "Floor the non-bypassable `claude` shim injects when a fleet spawn carries no --model. Spawns that earned more declare --model and pass through untouched; subagents inherit it. NOT a blanket downgrade — it is the ladder's own default for unsignaled work. See fleet-model-floor-bleed."
  LIMEN_REAL_CLAUDE:
    default: null              # DERIVED: heartbeat-loop.sh captures `command -v claude` BEFORE prepending the shim dir
    env: LIMEN_REAL_CLAUDE
    self_update: "derived each beat by heartbeat-loop.sh"
    owner: arms-agents
    note: "Absolute path to the REAL claude binary so scripts/shims/claude can exec it without recursing into itself. Never pinned — captured at fleet start; shim also falls back to a PATH scan that skips its own dir."
  LIMEN_USE_1PASSWORD_SSH:
    default: "0"               # OFF — never route SSH through 1Password by default
    env: LIMEN_USE_1PASSWORD_SSH
    self_update: none
    owner: limen-daemon
    note: "Opt-in (=1) to route SSH_AUTH_SOCK through the 1Password agent (domus-genoma 02-1password.zsh). OFF by default: the app's BiometricsOnly/never-cache policy turns every agent hit into a Touch-ID prompt, and git here is HTTPS with no keys in the agent — so routing buys nothing and only risks the prompt storm. See macos-tcc-gatekeeper-dialogs-solved."

  # --- credential Wall (scripts/credential-wall.py): the pinned secret/credential index ---
  LIMEN_CRED_WALL_ISSUE:
    default: 320               # the pinned GitHub issue regenerated as the canonical secret index
    env: LIMEN_CRED_WALL_ISSUE
    self_update: none
    owner: limen-daemon
    note: "Which pinned issue scripts/credential-wall.py --sync rewrites as the secret/credential Wall. Identity, not a knob — override only if the Wall issue is ever renumbered."

  # --- WORKTREE LIFECYCLE / parallel CELLS (scripts/cells.sh + scripts/reclaim-worktrees.py) ---
  LIMEN_RECLAIM_CLAUDE_WT:
    default: "1"               # ON — sweep .claude/worktrees too (the historical ~50GB blind spot)
    env: LIMEN_RECLAIM_CLAUDE_WT
    self_update: none
    owner: limen-daemon
    note: "Whether reclaim-worktrees.py ALSO sweeps LIMEN_ROOT/.claude/worktrees (EnterWorktree/bg/interactive cells), not just the dispatch root. Set 0 to disable. Same loss-free gates (clean+content-preserved+idle) + a longer idle age + a self/live-checkout guard. See worktree-lifecycle-blind-spot."
  LIMEN_RECLAIM_CLAUDE_AGE_H:
    default: 24                # interactive sessions can sit idle-but-alive; 24h clean+content-preserved ⇒ provably dead
    env: LIMEN_RECLAIM_CLAUDE_AGE_H
    self_update: none
    owner: limen-daemon
    note: "Min idle hours before a .claude/worktrees cell is eligible for reclaim. Longer than the dispatch root's 6h because an interactive/bg session can legitimately sit idle between beats."
  LIMEN_RECLAIM_APPLY:
    default: "0"               # OFF — default beat reports reclaim candidates, explicit operator acceptance removes them
    env: LIMEN_RECLAIM_APPLY
    self_update: none
    owner: limen-daemon
    note: "When 1, scripts/drain.sh passes --apply to reclaim-worktrees.py. Default 0 keeps automated beats preview-only so clean+content-preserved roots do not disappear until their ledger/PR/blocker receipt has operator acceptance."
  LIMEN_WORKTREE_DEBT_GATE:
    default: "1"               # ON — debt suppresses routine generated build-out, not recovery work
    env: LIMEN_WORKTREE_DEBT_GATE
    self_update: none
    owner: limen-daemon
    note: "When enabled, generate-backlog.py and dispatch selection suppress routine generated build-out if preserved worktree debt exceeds LIMEN_WORKTREE_DEBT_MAX. Explicit targeted/recovery work still runs."
  LIMEN_WORKTREE_DEBT_MAX:
    default: 12                # above this, the fleet must metabolize existing work before making more
    env: LIMEN_WORKTREE_DEBT_MAX
    self_update: none
    owner: limen-daemon
    note: "Maximum preserved dirty/unique-unpushed/not-Git worktree roots tolerated before routine generated build-out pauses. Keeps prompt-started work visible and prevents the conductor from outrunning its own closeout lifecycle."
  LIMEN_BRANCH_PREFIX:
    default: null              # DERIVED per scope — cells.sh sets cell-<slug>- for a cell's own conductor
    env: LIMEN_BRANCH_PREFIX
    self_update: "set per-cell by cells.sh conduct (cell-<slug>-) to namespace a scoped conductor's branches"
    owner: limen-daemon
    note: "Branch-name namespace a scoped conductor uses so parallel cells never collide on branch names or fight over main. Unset ⇒ the daemon's default cadence; cells.sh sets it per cell."

  # --- BOARD INTEGRITY — the SSOT can never collapse, and self-heals if it somehow does ---
  # (limen.io.save_limen_file collapse-guard + scripts/heal-board.py). Root-caused 2026-06-26:
  # a writer atomically replaced the live 1449-task queue with one freshly-built task (missing
  # `created`), so every beat's load threw and the whole institution idled for hours.
  LIMEN_BOARD_GUARD:
    default: "1"               # ON — refuse any save that catastrophically shrinks the board
    env: LIMEN_BOARD_GUARD
    self_update: none
    owner: limen-daemon
    note: "Whether save_limen_file refuses a catastrophic board shrink (a clobber). The board only ever grows/holds steady — all callers load→mutate→save — so a collapse toward zero is always a bug. Set 0 to disable; pass allow_shrink=True in code for an intentional bulk archive. See io.py BoardCollapseError."
  LIMEN_BOARD_SHRINK_FLOOR:
    default: 5                 # never guard tiny boards (tests, fresh bootstrap); only substantial queues
    env: LIMEN_BOARD_SHRINK_FLOOR
    self_update: none
    owner: limen-daemon
    note: "The guard fires only when the prior on-disk board has MORE than this many tasks (so small/test/bootstrap boards are never blocked), and the refusal threshold is max(floor, fraction×prior). Also the collapse floor heal-board.py treats as a dead queue."
  LIMEN_BOARD_SHRINK_FRACTION:
    default: 0.10              # a new board < 10% of the prior count is a collapse, not an edit
    env: LIMEN_BOARD_SHRINK_FRACTION
    self_update: none
    owner: limen-daemon
    note: "Refuse a save whose new task count is below max(LIMEN_BOARD_SHRINK_FLOOR, this×prior). 0.10 catches 1449→1 (a clobber) while passing every legitimate append/status-update and even a heavy archive that keeps the active set."
  LIMEN_BOARD_HEAL:
    default: "1"               # ON — auto-restore a collapsed/unloadable board from the last good snapshot
    env: LIMEN_BOARD_HEAL
    self_update: none
    owner: limen-daemon
    note: "Whether scripts/heal-board.py (heartbeat preflight) auto-restores the live board from `git show HEAD:tasks.yaml` when it is unloadable or collapsed (≤ LIMEN_BOARD_SHRINK_FLOOR tasks). Idempotent: a healthy board is a no-op. The recovery net behind the save-time guard. Set 0 to disable."
