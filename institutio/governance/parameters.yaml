    self_update: none
    owner: observatory
    note: "Arms P3-CAPTURE — the live-homepage fetch (surface.capture_site, stdlib urllib, no new dep). 0 (default) = README-only surface features, byte-identical. 1 = for a winner/control with a declared homepage, fetch it and merge site_* first-impression features (demo above fold, visible CTA, outcome-in-headline) into the snapshot. Read-only against public web surfaces; fail-open on unreachable/blocked/JS-only sites."
  OBSERVATORY_LLM:
