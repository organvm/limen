  LIMEN_WORKSPACE_UNIT_TIMEOUT_SEC:
    default: 600                # seconds: per-entry rsync cap so one big repo copy never wedges the beat
    env: LIMEN_WORKSPACE_UNIT_TIMEOUT_SEC
