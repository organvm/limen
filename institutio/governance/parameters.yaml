    note: "Arms the backblaze-exclusions self-heal effector: 1 (default — operator directive 2026-07-16: the exclusion estate is organ-tended, never a pane chore; bzinfo.xml proved user-owned, retiring lever L-BACKBLAZE-EXCLUDE) appends --apply so the daily rung inserts any missing REQUIRED_EXCLUDES bzdirfilter (timestamped backup alongside + XML validation + atomic replace; idempotent no-op when green; blocked-not-torn if the file is ever re-rooted). 0 reverts the rung to report-only."
