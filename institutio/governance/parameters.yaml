    note: "Throttle window (seconds) for check-main-green.py's `gh run list` call. Within the window the cached verdict (logs/main-green.json) is reused so a RED trunk still surfaces every beat without re-querying GitHub each tick. Also settable via --throttle. Default 1800 (30 min)."

  LIMEN_CI_JAM_RERUN:
    default: "1"               # ARMED (organ-tended precedent): jam recovery reruns fire by default
    env: LIMEN_CI_JAM_RERUN
    self_update: none
    owner: tabularius
    note: "Recovery valve for the CI-jam class (2026-07-17 billing outage: every job dies in 3-4 s with zero steps — the runner never started). When a RED main classifies as ci-jam-billing/ci-jam-infra, check-main-green.py attempts one bounded `gh run rerun --failed` per jammed run (main + fresh jammed PR heads) per beat with per-run exponential backoff, so the first beat after the outage ends re-greens CI with zero hands and merge-drain lands the green PRs. 0 = classify + notify only, never rerun."
  LIMEN_CI_JAM_BACKOFF_S:
    default: "1800"            # base backoff between rerun attempts on one run id (~one per beat)
    env: LIMEN_CI_JAM_BACKOFF_S
    self_update: none
    owner: tabularius
    note: "Base of the per-run exponential rerun backoff in check-main-green.py's jam recovery: attempt N waits min(BACKOFF_S * 2^(N-1), BACKOFF_MAX_S) after attempt N-1. Deliberately no hard attempt cap — recovery must still fire if the outage ends days later; the growing delay keeps API spam logarithmic while it persists."
  LIMEN_CI_JAM_BACKOFF_MAX_S:
    default: "14400"           # backoff ceiling (4 h): worst-case recovery lag after a long outage
    env: LIMEN_CI_JAM_BACKOFF_MAX_S
    self_update: none
    owner: tabularius
    note: "Ceiling of the jam-recovery rerun backoff. 4 h bounds the worst-case lag between billing being restored and the rerun that re-greens CI, at ~6 attempts/day/run during a persistent outage."
  LIMEN_CI_JAM_RERUN_CAP:
    default: "6"               # max distinct run ids rerun per beat (the trunk run + jammed PR heads)
    env: LIMEN_CI_JAM_RERUN_CAP
    self_update: none
    owner: tabularius
    note: "Per-beat bound on how many distinct jammed runs check-main-green.py will attempt to rerun (the red main run first, then fresh jammed PR-head runs from the wedge scan). Keeps a fleet-wide jam from turning one beat into an API storm; the rotating freshness window covers the rest over subsequent beats."

  LIMEN_MAIN_GREEN_WORKFLOW:
    default: "ci.yml"          # the workflow that runs on push:[main] and mirrors pr-gate's suite
    env: LIMEN_MAIN_GREEN_WORKFLOW
    self_update: none
    owner: tabularius
    note: "Which workflow check-main-green.py reads as the main-trunk-health proxy. Default ci.yml (runs the same pytest as pr-gate, on push:[main]); pr-gate.yml itself runs on pull_request only so it never runs on main."

  LIMEN_MAIN_GREEN_REPO:
    default: "organvm/limen"   # the repo whose main trunk is watched
    env: LIMEN_MAIN_GREEN_REPO
    self_update: none
    owner: tabularius
    note: "Repo (owner/name) whose main-branch CI check-main-green.py watches and, when armed, emits the HEAL-mainred task for. Default organvm/limen. Derived so the sensor survives relocation."
  LIMEN_MAIN_GREEN_WEDGE_K:
    default: 5                 # >= K fresh PRs sharing one failing required check = queue-wedge blast radius
    env: LIMEN_MAIN_GREEN_WEDGE_K
    self_update: none
    owner: tabularius
    note: "Blast-radius threshold (integrated from PR #882): the minimum number of FRESH open PRs that must share a single failing REQUIRED check before check-main-green reports a queue wedge — quantifying the RED alarm's urgency and catching a wedge that persists even when trunk ci.yml is green (a required check diverging from ci.yml)."
  LIMEN_MAIN_GREEN_FRESH_HOURS:
    default: 36                # only PRs updated within this window count toward the wedge (excludes chronic backlog)
    env: LIMEN_MAIN_GREEN_FRESH_HOURS
    self_update: none
    owner: tabularius
    note: "Freshness window (h) for the wedge blast-radius scan: a pile of stale fleet PRs each failing pr-gate on its own stale base is chronic backlog, not an acute trunk break — only recently-updated PRs count toward wedged_prs."

  LIMEN_CONTINUITY_CHECK:
    default: "1"               # ON — detect silent dispatch lanes while queue + budget exist each beat
    env: LIMEN_CONTINUITY_CHECK
    self_update: none
    owner: continuity
    note: "Beat gate for the dispatch-continuity check (scripts/dispatch-continuity-check.py) run each beat by metabolize.sh section 0h (Jul 3–5 starvation precedent). Classifies each known lane as flowing / idle-ok / starved / unknown every beat. Two consecutive starved readings hang an idempotent ASK-lane-starved-<lane> needs_human atom. Fail-open — missing data yields 'unknown', never an alarm. Set 0 to silence."

  LIMEN_CONTINUITY_WINDOW_H:
    default: "24"              # hours of dispatch silence before a lane is considered potentially starved
    env: LIMEN_CONTINUITY_WINDOW_H
    self_update: none
    owner: continuity
    note: "Starvation window in hours for dispatch-continuity-check.py. A lane silent for longer than this value while holding open targeted tasks and a healthy budget is classified as 'starved'. Two consecutive starved beats hang a needs_human atom. Default 24h; lower for tighter detection, raise for noisy queues."

  LIMEN_ASK_GATE:
    default: "1"               # ON — report-only intake audit (observable-before-autonomous; keeper-seam enforcement arms later)
    env: LIMEN_ASK_GATE
    self_update: none
    owner: tabularius
    note: "Beat gate for the intake ask audit (scripts/ask-gate.py --audit --since 7) run each beat by metabolize.sh section 0i (RETRO-0708-ASK-GATE; retro gap model + evolution 3). Encodes the measured drift predictors STRUCTURALLY: a task converges iff it names one executable done-predicate, is a single bounded objective (no (1)..(n) bundles), and is owned (repo + agent); narrative-success vocabulary and ungated armed-behavior deliverables surface as ADVISE findings. Verdicts: PASS / SPLIT (decompose into predicate-shaped children; --task-file offers the skeleton) / ADVISE. Report-only in the beat for now — the LIMEN_CENSOR_APPLY observable-before-autonomous pattern; the enforcement seam is ask-gate --task-file --check on every keeper ticket, to be armed once logs/ask-gate.json proves the predicate. Set 0 to silence."

  LIMEN_OMEGA:
    default: "1"               # ON — compute the autonomic fixed-point verdict each beat
    env: LIMEN_OMEGA
    self_update: none
    owner: tabularius
    note: "Beat gate for the omega fixed-point predicate (scripts/omega.sh --offline --quiet) run each beat by metabolize.sh section 0i. omega.sh is the CONJUNCTION of every gate's --check (enactment-audit, armed-valve-audit, ship-gate, heal-convergence, ask-gate, handoff-relay, no-tasks-on-me, credential-wall): the retro (06-24→07-08) defined 'omega' — runs nights unattended, products reachable, healing converges, nothing hangs on the session — but no script asserted the WHOLE. A rung it cannot verify here is SKIP, never a silent PASS (the MONETA curl-000 lesson); rungs are tagged det (repo-deterministic) or live (host/network); --offline runs det only, --full adds verify-whole.sh for authoritative main-green. Exit 0 ⟺ zero FAIL. Stamps logs/omega.json (verdict + PASS/FAIL/SKIP) for session-orient section_omega. verify-whole.sh runs the deterministic stub test (scripts/tests/omega.test.sh); the live fixed-point verdict stays beat-side. Set 0 to silence."

  LIMEN_CENSOR_ISSUES_APPLY:
    default: "0"               # SAFE CODE DEFAULT — dry-run; ships observable-before-autonomous (the LIMEN_CENSOR_APPLY constitutional pattern). NO fleet_runtime yet: arming is deliberately a human act.
    env: LIMEN_CENSOR_ISSUES_APPLY
    self_update: none
    owner: censor
    note: "Arms scripts/sync-censor-issues.py — the censor→GitHub mirror that makes the system's own findings part of the public graph. When 1, every live `warning` residual in logs/censor-residual.json gets exactly one open `censor`-labelled issue (marker `<!-- censor:<id> -->`), auto-closed with a citation when the lineage clears; a HUMAN close is a veto, respected forever; creations capped per pass (--cap, default 8); stamps logs/censor-issues.json. Wired in heartbeat-loop.sh (C_CENSOR lane, after insight-route) and metabolize.sh 5b — both dry-run until armed, so the plan is observable in the beat log first. WHEN ARMING: set 1 in the daemon env AND add fleet_runtime: \"1\" here in the same change, so enactment-audit.py locks it live (the #576 dark-switch lesson — never a note that claims what no rung checks)."

  LIMEN_INSIGHT_ROUTE_APPLY:
    default: "0"               # SAFE CODE DEFAULT — a bare manual run is a dry-run; the FLEET arms it (see note)
    env: LIMEN_INSIGHT_ROUTE_APPLY
    fleet_runtime: "1"         # ENACTMENT CONTRACT — the LIVE fleet MUST resolve this to 1 (heartbeat-loop.sh wires it); enactment-audit.py fails if the beat diverges, so the route organ can never silently go dark again (it shipped as an orphan once — tests+gate, no caller, #596)
    self_update: none
    owner: insight-route
    note: "Arms scripts/insight-route.py — the insights→owners route organ that closes the insight-cadence loop. When 1, the latest report per cadence tier routes each insight to its durable owner: anthony → his-hand-levers.json (+ issue sync), org/repo → a board task via the TABVLARIVS keeper (submit_task_upsert when LIMEN_TICKETS_PRODUCE=1; board-echo insights sourced from tasks.yaml are skipped — the failed task IS the record), organ → logs/<organ>-residual.json. Default 0 keeps an ad-hoc run observe-only, but the LIVE FLEET ARMS IT: scripts/heartbeat-loop.sh exports LIMEN_INSIGHT_ROUTE_APPLY=1 (overridable to 0 in ~/.limen.env), and metabolize.sh section 5b runs it right after insight-cadence."

  LIMEN_INSIGHT_ROUTE_MAX:
    default: "5"
    env: LIMEN_INSIGHT_ROUTE_MAX
    self_update: none
    owner: insight-route
    note: "Per-pass cap on NEW board tasks created by insight-route.py. Overflow is counted in the summary line and self-corrects next beat (the insight persists in the latest report until routed). Bounds a first arming or an insight burst so the route organ can never flood the board in one pass — the same board-hygiene reflex as the sync 8/beat cap."

  # --- DEMAND-SURFACE ORGANS: keep the front door reachable + launch posts homed ---
  # (scripts/link-health.py + scripts/launch-organ.py). A 404 on a public identity surface is silent
  # demand-loss; a launch with no home is a one-off. Both are REPEATABLE processes, not chores — the
  # link organ probes every beat like creds-hydrate --verify, the launch organ homes every product ship.
  LIMEN_LINK_HEALTH:
    default: "1"               # ON — probe public surfaces for dead links each beat (throttled ~6h)
    env: LIMEN_LINK_HEALTH
