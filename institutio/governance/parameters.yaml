    self_update: none
    owner: gitvs
    note: "Master on/off for the seo-drift beat sensor (audit sweep -> metadata drift check -> bounded backlog filing). All three steps are read-only/dry until their own valves arm; 0 disables the pass."
  LIMEN_BEAT_SEO:
