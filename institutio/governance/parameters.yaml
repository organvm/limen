# VIGILIA — THE PARAMETER PANEL (the spine; the "100x").
#
# Mandate: every name, path, threshold, and secret-REFERENCE the body uses is ONE
# declared parameter here — with a default, an env override, and (where it makes
# sense) a self-update rule. No hardcodes. This is enforced by a CI gate (build
# order #3), the same way the nomenclator gate already fails the build on a bad name.
#
# This file is a SEED, not the finished panel. The excavation found ~70 LIMEN_* vars
# scattered across 5 env files + 7 YAML + 3 JSON + 3 py-defaults. Folding all of them
# in here — and pointing the code at this panel — is its own focused PR.
#
# param schema:
#   <KEY>:
#     default:     the reversible default
#     env:         the env var that overrides it (usually the key itself)
#     self_update: none | <rule>   # how/whether the body may re-tune it
#     owner:       which organ owns it (see registry/organs.yaml)
#     note:        optional

schema_version: 0.1

parameters:

  # --- the institution names ITSELF as the first parameter ---------------------
  INSTITVTIO_NOMEN:
    default: "VIGILIA"          # provisional codename — NOT ratified
    env: INSTITVTIO_NOMEN
    self_update: "ratified once, via INDEX·NOMINVM"
    owner: index-nominum
    note: "Even the name is a parameter. Do not treat VIGILIA as final."

  INSTITVTIO_HOME:
    default: "limen/institutio"  # provisional; may extract to its own repo
    env: INSTITVTIO_HOME
    self_update: none
    owner: the-seat
    note: "Repo home is a decision, not a constant. Extracting later is a clean git subtree."

  # --- VITALS: the missing executive's thresholds (build order #1) --------------
  # These are the published 'reaction function' the heartbeat will enact. Seeds —
  # tune against _diagnostics FIND-005 ('treat 16GB as a budget, not a floor').
  VITALS_PRESSURE_GAUGE:
    default: "kern.memorystatus_vm_pressure_level"
    env: LIMEN_VITALS_GAUGE
    self_update: none
    owner: vitals
    note: "The kernel's own jetsam signal — correct gauge; free-pages stays ~0 even when healthy."
  VITALS_PRESSURE_WARN:
    default: 2                  # macOS gauge: 1=normal, 2=warn, 4=critical
    env: LIMEN_VITALS_WARN
    self_update: none
    owner: vitals
    note: "At >=warn (2): stop opening new dispatch lanes (idle beat, mirror #224 offline gate). Seed said 1, but 1 IS normal — that would idle every beat; corrected to the kernel's warn level."
  VITALS_PRESSURE_CRITICAL:
    default: 4
    env: LIMEN_VITALS_CRIT
    self_update: none
    owner: vitals
    note: "At >=critical (4): also shed running discretionary load (e.g. ollama) before jetsam escalates."
  VITALS_HEAVY_SURFACE_LIMIT:
    default: 1
    env: LIMEN_VITALS_HEAVY_LIMIT
    self_update: none
    owner: vitals
    note: "FIND-005: one heavy AI surface at a time on a 16GB host."
  VITALS_SHED_OLLAMA:
    default: "1"
    env: LIMEN_VITALS_SHED_OLLAMA
    self_update: none
    owner: vitals
    note: "Kill switch for the critical-pressure ollama shed. 1=shed loaded models at >=critical; 0=record only."

  # --- CONTINUITY: make hand-recovery automatic (build order #1) ----------------
  CONTINUITY_MIN_SUMMARY_CHARS:
    default: 400
    env: LIMEN_CONTINUITY_MIN_SUMMARY
    self_update: none
    owner: continuity
    note: "A handoff summary shorter than this is degenerate (this session got 200). Trigger transcript reconstruction."
  CONTINUITY_TRANSCRIPT_GLOB:
    default: "~/.claude/projects/*/*.jsonl"
    env: LIMEN_CONTINUITY_TRANSCRIPTS
    self_update: none
    owner: continuity

  # --- INTEGRITY: govern the autoupdater lever (build order #1) ------------------
  INTEGRITY_AUTOUPDATER:
    default: "disabled"        # the institution's POLICY: keep the autoupdater off
    env: LIMEN_INTEGRITY_AUTOUPDATER
    self_update: none
    owner: integrity
    note: "Intended policy state ('disabled'|'enabled'). The MECHANISM is the DISABLE_AUTOUPDATER=1 env lever, checked separately as 'actual' (don't conflate the two value spaces). Version-path churn is the root of the corrupt-app dialog + TCC re-prompts."
  INTEGRITY_VERIFY_TARGETS:
    default:
      - "/Applications/Claude.app"
      - "~/.local/bin/claude"
    env: LIMEN_INTEGRITY_TARGETS
    self_update: none
    owner: integrity
    note: "codesign --verify on the heartbeat; alert on signature/version drift."

  # --- EVOCATOR: the summoner (keep canonical truths present in every channel) ---
  LIMEN_EVOCATOR:
    default: "1"               # ON — a portal that doesn't run isn't a portal
    env: LIMEN_EVOCATOR
    self_update: none
    owner: evocator
    note: "Gate for the EVOCATOR organ. =0 rolls it back; the FLAME canon block persists regardless (git-tracked)."
  LIMEN_BEAT_EVOCATOR:
    default: 6                  # cadence: summon every 6 beats
    env: LIMEN_BEAT_EVOCATOR
    self_update: none
    owner: evocator
    note: "How often the summoner reconciles every channel. Idempotent (writes only on change) → safe to run often."
  LIMEN_EVOCATOR_CANON:
    default: "limen/spec/evocator/canon.yaml"
    env: LIMEN_EVOCATOR_CANON
    self_update: none
    owner: evocator
    note: "The declarative canon of truths the organ summons everywhere."
  LIMEN_KNOWLEDGE_CORPUS:
    default: "~/Workspace/knowledge-corpus"
    env: LIMEN_KNOWLEDGE_CORPUS
    self_update: none
    owner: evocator
    note: "Path to the knowledge-corpus repo; the corpus channel writes a collection shot here (guarded, fail-open)."
  LIMEN_PRIVATE_ROOT:
    default: "$LIMEN_ROOT/.limen-private"
    env: LIMEN_PRIVATE_ROOT
    self_update: none
    owner: continuity
    note: "Ignored local private cartridge root (parent of session-corpus, photos-universe, etc.). Full media-dedup paths/hashes live here and are never committed; public receipts carry aggregates only."
  LIMEN_PRIVATE_SESSION_CORPUS:
    default: "$LIMEN_ROOT/.limen-private/session-corpus"
    env: LIMEN_PRIVATE_SESSION_CORPUS
    self_update: none
    owner: continuity
    note: "Ignored local raw/private session cartridge. Stores manifests and optional content-addressed object copies; never committed."
  LIMEN_STATE_ROOT:
    default: "$LIMEN_ROOT"
    env: LIMEN_STATE_ROOT
    self_update: none
    owner: continuity
    note: "Canonical read-side Limen state root for estate and lifecycle ledgers. Lets tests or isolated worktrees read from one root while writing redacted receipts elsewhere."
  LIMEN_OUTPUT_ROOT:
    default: "$LIMEN_ROOT"
    env: LIMEN_OUTPUT_ROOT
    self_update: none
    owner: continuity
    note: "Writable output root for redacted public receipts emitted by estate and lifecycle scripts."
  LIMEN_OUTPUT_PRIVATE_SESSION_CORPUS:
    default: "$LIMEN_OUTPUT_ROOT/.limen-private/session-corpus"
    env: LIMEN_OUTPUT_PRIVATE_SESSION_CORPUS
    self_update: none
    owner: continuity
    note: "Ignored private receipt root paired with LIMEN_OUTPUT_ROOT when scripts separate read-side state from write-side outputs."
  LIMEN_ALWAYS_WORKING_INDEX:
    default: "$LIMEN_PRIVATE_SESSION_CORPUS/lifecycle/always-working.json"
    env: LIMEN_ALWAYS_WORKING_INDEX
    self_update: none
    owner: continuity
    note: "Private lifecycle index written by always-working.py to classify user promises as done, assigned, needs assignment, or blocked before dispatch opens more work."
  LIMEN_ALWAYS_WORKING_DOC:
    default: "$LIMEN_ROOT/docs/always-working.md"
    env: LIMEN_ALWAYS_WORKING_DOC
    self_update: none
    owner: continuity
    note: "Public receipt document emitted from the always-working lifecycle index. Contains aggregate statuses and receipt paths, not private raw prompt content."
  LIMEN_ALWAYS_WORKING_BEFORE_DISPATCH:
    default: "1"
    env: LIMEN_ALWAYS_WORKING_BEFORE_DISPATCH
    self_update: none
    owner: limen-daemon
    note: "When enabled, live dispatch runs always-working.py --write --emit-task-tickets before reserving more work, so promise/owner tickets are emitted before the fleet fans out."
  LIMEN_ALWAYS_WORKING_HARD_GATE:
    default: "1"
    env: LIMEN_ALWAYS_WORKING_HARD_GATE
    self_update: none
    owner: limen-daemon
    note: "When true, dispatch refuses to reserve new live work if the pre-dispatch always-working reconciliation fails or times out."
  LIMEN_ALWAYS_WORKING_TIMEOUT:
    default: 180
    env: LIMEN_ALWAYS_WORKING_TIMEOUT
    self_update: none
    owner: limen-daemon
    note: "Timeout in seconds for the pre-dispatch always-working reconciliation gate."
  LIMEN_ALWAYS_WORKING_TARGET_FREE_GIB:
    default: 200
    env: LIMEN_ALWAYS_WORKING_TARGET_FREE_GIB
    self_update: none
    owner: continuity
    note: "Local-system free-space target used by always-working to keep the laptop as hot cache instead of durable storage."
  LIMEN_PROFILE_REPO:
    default: "$LIMEN_WORKSPACE_ROOT/organvm/4444J99"
    env: LIMEN_PROFILE_REPO
    self_update: none
    owner: continuity
    note: "Local profile/front-door repository used by always-working public-face checks."
  LIMEN_VISIBLE_PROFILE_REPO:
    default: "4444J99/4444J99"
    env: LIMEN_VISIBLE_PROFILE_REPO
    self_update: none
    owner: continuity
    note: "Canonical GitHub profile repository queried for public profile proof before trusting local copies."
  LIMEN_CHECK_GITHUB_PROFILE:
    default: "1"
    env: LIMEN_CHECK_GITHUB_PROFILE
    self_update: none
    owner: continuity
    note: "Gate for live GitHub profile verification in always-working. 1 checks remote source of truth; 0 disables only for offline predicates."
  LIMEN_CORPVS_ROOT:
    default: "$LIMEN_WORKSPACE_ROOT/organvm-corpvs-testamentvm"
    env: LIMEN_CORPVS_ROOT
    self_update: none
    owner: continuity
    note: "Local corpus/metrics repository used by always-working to compare public profile claims with system proof."
  LIMEN_MAIL_STORY_LOG:
    default: "$LIMEN_ROOT/logs/mail-story-ledger.json"
    env: LIMEN_MAIL_STORY_LOG
    self_update: none
    owner: continuity
    note: "Private/generated mail-story JSON index used to prove mailbox work from atoms and receipts without sending mail."
  LIMEN_CONTRIBUTION_BALANCE_LOGIN:
    default: "4444J99"
    env: LIMEN_CONTRIBUTION_BALANCE_LOGIN
    self_update: none
    owner: continuity
    note: "GitHub login used by contribution-balance gates to keep public activity from becoming commit-only churn."
  LIMEN_CONTRIBUTION_BALANCE_PUBLIC_ROOT:
    default: "~/Workspace/limen"
    env: LIMEN_CONTRIBUTION_BALANCE_PUBLIC_ROOT
    self_update: none
    owner: continuity
    note: "Stable operator-facing Limen root used in public contribution-balance receipts, so CI checkout paths do not leak into durable owner packets."
  LIMEN_ARCHIVE4T_ROOT:
    default: "/Volumes/Archive4T"
    env: LIMEN_ARCHIVE4T_ROOT
    self_update: none
    owner: continuity
    note: "External archive SSD root used for durable custody receipts and run-and-gun substrate checks."
  LIMEN_INGRESS_ROOT:
    default: "/Volumes/Ingress"
    env: LIMEN_INGRESS_ROOT
    self_update: none
    owner: continuity
    note: "External ingress SSD root used by estate/substrate checks for intake and staging capacity."
  LIMEN_SCRATCH_ROOT:
    default: "/Volumes/Scratch"
    env: LIMEN_SCRATCH_ROOT
    self_update: none
    owner: continuity
    note: "External scratch SSD root used by generated worktree and bulk-processing lifecycle checks."
  LIMEN_T7RECOVERY_ROOT:
    default: "/Volumes/T7Recovery"
    env: LIMEN_T7RECOVERY_ROOT
    self_update: none
    owner: continuity
    note: "External recovery SSD root used by estate custody checks before any local deletion or dedupe action."
  LIMEN_EXTERNAL_SESSION_ROOTS:
    default: ""
    env: LIMEN_EXTERNAL_SESSION_ROOTS
    self_update: none
    owner: continuity
    note: "Optional os.pathsep-separated archive/external roots for session-corpus-ledger.py inventory. Bounded scan only; never a deletion target."
  LIMEN_EXTERNAL_SESSION_MAX_FILES_PER_ROOT:
    default: 2000
    env: LIMEN_EXTERNAL_SESSION_MAX_FILES_PER_ROOT
    self_update: none
    owner: continuity
    note: "Per-root file cap for external/archive session inventory so large mounted volumes cannot turn a ledger refresh into an unbounded crawl."
  LIMEN_EXTERNAL_SESSION_MAX_DEPTH:
    default: 5
    env: LIMEN_EXTERNAL_SESSION_MAX_DEPTH
    self_update: none
    owner: continuity
    note: "Maximum directory depth for external/archive session inventory roots."
  LIMEN_EXTERNAL_SESSION_MAX_DIRS_PER_ROOT:
    default: 5000
    env: LIMEN_EXTERNAL_SESSION_MAX_DIRS_PER_ROOT
    self_update: none
    owner: continuity
    note: "Per-root directory visit cap for external/archive session inventory roots."
  LIMEN_CURRENT_SESSION_JSONL:
    default: ""
    env: LIMEN_CURRENT_SESSION_JSONL
    self_update: none
    owner: continuity
    note: "Optional explicit Codex session JSONL for current-session fanout. Blank means derive the latest local Codex transcript."
  LIMEN_ORIENT_TASKS:
    default: ""
    env: LIMEN_ORIENT_TASKS
    self_update: none
    owner: continuity
    note: "Optional session-orientation verifier snapshot for tasks.yaml. Blank means the live board is read; predicates set this only to prove generator idempotence against a stable input while dispatch may be moving the live board."
  LIMEN_ORIENT_GIT_SECTION:
    default: ""
    env: LIMEN_ORIENT_GIT_SECTION
    self_update: none
    owner: continuity
    note: "Optional pinned Git summary line for the session-orientation verifier. Blank means read live git state; predicates set this only to avoid confusing live dirty-state changes with generator non-determinism."
  LIMEN_ORIENT_NO_WRITE:
    default: "0"
    env: LIMEN_ORIENT_NO_WRITE
    self_update: none
    owner: continuity
    note: "When 1, session-orient.py prints the digest without refreshing logs/session-orientation.md. Used by idempotence predicates; normal hooks leave it unset."
  LIMEN_INSIGHT_CADENCE_VERIFY_ROOT:
    default: ""
    env: LIMEN_INSIGHT_CADENCE_VERIFY_ROOT
    self_update: none
    owner: continuity
    note: "Optional retained sandbox root for done-insight-cadence.sh verification. Blank means create a private temporary proof root and retain it for inspection instead of deleting it."
  LIMEN_MIN_CODEX_PLANNERS:
    default: 10
    env: LIMEN_MIN_CODEX_PLANNERS
    self_update: none
    owner: continuity
    note: "Minimum Codex planner packets emitted by current-session fanout before executor waterfalling."
  LIMEN_CURRENT_SESSION_FANOUT_REPO:
    default: "organvm/limen"
    env: LIMEN_CURRENT_SESSION_FANOUT_REPO
    self_update: none
    owner: continuity
    note: "Owner/repo used when current-session fanout seeds queue tasks; normally derived from the checkout remote."
  LIMEN_STORAGE_ROOTS:
    default: "$LIMEN_ROOT"
    env: LIMEN_STORAGE_ROOTS
    self_update: none
    owner: continuity
    note: "Comma-separated roots for bounded substrate storage discovery. Missing roots are recorded as blockers; no root is mounted or mutated."
  LIMEN_REPO_ROOTS:
    default: "$LIMEN_ROOT"
    env: LIMEN_REPO_ROOTS
    self_update: none
    owner: continuity
    note: "Comma-separated local roots scanned for git repository surfaces by repo-surface ledger. Read-only discovery only."
  LIMEN_WORKSPACE_ROOT:
    default: "$HOME/Workspace"
    env: LIMEN_WORKSPACE_ROOT
    self_update: none
    owner: continuity
    note: "Optional local workspace root scanned for repo/product surfaces by repo-surface ledger. Read-only discovery only."
  LIMEN_WORKTREES:
    default: "/Volumes/Scratch/limen-worktrees if mounted and writable, otherwise $LIMEN_WORKDIR/.limen-worktrees"
    env: LIMEN_WORKTREES
    self_update: none
    owner: continuity
    note: "Dispatch isolation root for generated lane checkouts. Heartbeat and launchd derive this onto the external Scratch SSD when available so completed/generated worktrees do not creep on the local system disk."
  LIMEN_WORKTREE_ROOT:
    default: "$LIMEN_WORKTREES"
    env: LIMEN_WORKTREE_ROOT
    self_update: none
    owner: continuity
    note: "Worktree root used by reclaim and repo-surface discovery. Defaults to the dispatch isolation root so lifecycle cleanup watches the same generated checkout surface it creates."
  LIMEN_WORKTREE_DEBT_TIMEOUT:
    default: 120
    env: LIMEN_WORKTREE_DEBT_TIMEOUT
    self_update: none
    owner: continuity
    note: "Timeout in seconds for the lifecycle-pressure worktree-debt scan. On timeout, hooks fail open with an explicit pressure receipt instead of crashing closeout."
  LIMEN_CLOSEOUT_RUN_LIFECYCLE_TESTS:
    default: "0"
    env: LIMEN_CLOSEOUT_RUN_LIFECYCLE_TESTS
    self_update: none
    owner: continuity
    note: "Opt-in switch for running the slower lifecycle pytest tranche during closeout-fast. Default closeout stays interactive and uses smoke predicates."
  LIMEN_CLOSEOUT_LIFECYCLE_TEST_TIMEOUT:
    default: 90
    env: LIMEN_CLOSEOUT_LIFECYCLE_TEST_TIMEOUT
    self_update: none
    owner: continuity
    note: "Timeout in seconds for the opt-in lifecycle pytest tranche in closeout-fast."
  LIMEN_RECLAIM_GENERATED:
    default: "1"
    env: LIMEN_RECLAIM_GENERATED
    self_update: none
    owner: continuity
    note: "Whether generated checkout payload reclaim is enabled. This removes ignored/cache/build payloads only after lifecycle and idle gates pass."
  LIMEN_RECLAIM_GENERATED_MAX:
    default: 80
    env: LIMEN_RECLAIM_GENERATED_MAX
    self_update: none
    owner: continuity
    note: "Maximum generated payload paths reclaimed per reclaim-worktrees run."
  LIMEN_RECLAIM_GENERATED_TIMEOUT:
    default: 120
    env: LIMEN_RECLAIM_GENERATED_TIMEOUT
    self_update: none
    owner: continuity
    note: "Heartbeat timeout in seconds for generated-only reclaim."
  LIMEN_RECLAIM_TIMEOUT:
    default: 300
    env: LIMEN_RECLAIM_TIMEOUT
    self_update: none
    owner: continuity
    note: "Heartbeat timeout in seconds for the broader reclaim-worktrees pass."
  LIMEN_DISK_PRESSURE_PATH:
    default: "$LIMEN_ROOT"
    env: LIMEN_DISK_PRESSURE_PATH
    self_update: none
    owner: continuity
    note: "Filesystem path used by async dispatch to measure local free space before launching more work."
  LIMEN_DISK_FLOOR_GIB:
    default: 60
    env: LIMEN_DISK_FLOOR_GIB
    self_update: none
    owner: continuity
    note: "Minimum local free space in GiB before async dispatch should prefer low-burn value-first work or stop opening new local-heavy lanes."
  LIMEN_DISK_PRESSURE_VALUE_ONLY:
    default: "1"
    env: LIMEN_DISK_PRESSURE_VALUE_ONLY
    self_update: none
    owner: continuity
    note: "When true, disk pressure gates async dispatch toward value-first continuations instead of broad local checkout churn."
  LIMEN_LOW_BURN_VALUE_FIRST:
    default: "1"
    env: LIMEN_LOW_BURN_VALUE_FIRST
    self_update: none
    owner: continuity
    note: "When true, async dispatch chooses prompt/revenue/value-first work under pressure instead of generic queue draining."
  LIMEN_VALUE_GATE:
    default: "1"
    env: LIMEN_VALUE_GATE
    self_update: none
    owner: limen-daemon
    note: "When enabled, serial, parallel, and async dispatch reserve only value-tier, lifecycle, blocker-clearing, or explicit owner work from the candidate set."
  LIMEN_VALUE_GATE_STRICT:
    default: "0"
    env: LIMEN_VALUE_GATE_STRICT
    self_update: none
    owner: limen-daemon
    note: "When true, dispatch applies the value gate even if the value-repo list is empty, so empty configuration fails closed instead of draining generic queue work."
  LIMEN_ALWAYS_WORKING_MIN_FREE_GIB:
    default: 60
    env: LIMEN_ALWAYS_WORKING_MIN_FREE_GIB
    self_update: none
    owner: continuity
    note: "Minimum free-space threshold used by always-working receipts when judging substrate pressure."
  LIMEN_REPO_SCAN_DEPTH:
    default: 4
    env: LIMEN_REPO_SCAN_DEPTH
    self_update: none
    owner: continuity
    note: "Maximum directory depth for repo-surface ledger discovery."
  LIMEN_PROMPT_SOURCES:
    default: ""
    env: LIMEN_PROMPT_SOURCES
    self_update: none
    owner: continuity
    note: "Optional prompt source roots for product-ledger lifecycle counting. Empty means use bounded local defaults."
  LIMEN_ARCHIVE_TARGETS:
    default: ""
    env: LIMEN_ARCHIVE_TARGETS
    self_update: none
    owner: continuity
    note: "Optional archive target list for substrate/product ledger classification. Read-only; no archive mutation."
  LIMEN_AGY_ARCHIVE_ROOT:
    default: "$LIMEN_ROOT/.limen-private/agy-scratch-preserve"
    env: LIMEN_AGY_ARCHIVE_ROOT
    self_update: none
    owner: continuity
