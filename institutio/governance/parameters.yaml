    owner: tabularius
    note: "Dark escalation for the macOS 26.6 fork/os_log crash (see LIMEN_FORK_SAFETY_CHECK). When 1, a cli/src/sitecustomize.py shim rewrites qualifying subprocess.Popen calls to a /bin/sh -c 'cd; exec' wrapper with cwd=None AND close_fds=False so CPython takes the posix_spawn path (which runs no atfork handlers). This is INVASIVE and PARTIAL — it cannot cover start_new_session group-kill callers (dispatch.py:_run_capture), and on macOS close_fds=True (the default) forks near-universally, so the OS_ACTIVITY_MODE mitigation is strictly more complete. Off-by-default is the design: arm ONLY if the beat predicate ever reports a post-mitigation recurrence. Not built until then."

