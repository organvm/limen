    self_update: none
    owner: limen-daemon
    note: "The effector for the local-MCP-boot invariant (scripts/mcp-server-boot.py --apply, sensor section 0b2, gated by args_when). Dry-run by default (reports the cure, mutates nothing). When 1, the beat heals via ianva's EXISTING verbs — `ianva install-configs --apply` re-lands a dropped agent entry (the opencode gap) and an npx-cache clear cures the corrupt-cache crash class — then re-probes once. It never guesses ianva UPSTREAMS (that set is a registry decision, not a probe result — deploy ianva/upstreams.example.json or `ianva add-upstream`). OFF by default because auto-writing agent configs is an authorization, not a default (mirrors LIMEN_LAUNCHAGENT_HEAL). Owner arms it in the daemon env (~/.limen.env) or as a his-hand lever. Set 0 to silence."
