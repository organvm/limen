    owner: substrate
    note: "Cadence (every N beats) of the backblaze-exclusions sensor. Exclusions change at most once (a pane visit), so a slow cadence is honest — the rung exists to close the lever and to catch a future estate extension, not to poll."
  LIMEN_GITVS:
