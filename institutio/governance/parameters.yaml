    owner: tabularius
    note: "Beat gate for the fork-safety predicate (scripts/check-fork-safety.py --check) run each beat by metabolize.sh section 0g2. The macOS 26.6 crash ('python keeps crashing') is Apple's Network.framework pthread_atfork child handler segfaulting in os_log on the child side of fork()+exec(); the OS_ACTIVITY_MODE=disable mitigation (#831/#229) fixes the os_log layer. Because the crash is a timing RACE, 'no recurrence' was a hope, not a predicate. This asserts every beat that the mitigation is still present in the beat scripts AND that no .ips crash report (scans ~/Library/Logs/DiagnosticReports/ + Retired/) matching the atfork/os_log signature is newer than the mitigation boundary (git author-date of the OS_ACTIVITY_MODE commit — derived, never hardcoded). A recurrence exits non-zero (the effector) and is the documented trigger to arm LIMEN_FORK_SAFE. macOS-only signal; fail-open on non-darwin / no git. Set 0 to silence."

