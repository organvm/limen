# VIGILIA — THE PARAMETER PANEL (the spine; the "100x").
#
# Mandate: every name, path, threshold, and secret-REFERENCE the body uses is ONE
# declared parameter here — with a default, an env override, and (where it makes
# sense) a self-update rule. No hardcodes. This is enforced by a CI gate (build
# order #3), the same way the nomenclator gate already fails the build on a bad name.
#
# This file is a SEED, not the finished panel. The excavation found ~70 LIMEN_* vars
# scattered across 5 env files + 7 YAML + 3 JSON + 3 py-defaults. Folding all of them
# in here — and pointing the code at this panel — is its own focused PR.
#
# param schema:
#   <KEY>:
#     default:     the reversible default
#     env:         the env var that overrides it (usually the key itself)
#     self_update: none | <rule>   # how/whether the body may re-tune it
#     owner:       which organ owns it (see registry/organs.yaml)
#     note:        optional

schema_version: 0.1

parameters:

  # --- the institution names ITSELF as the first parameter ---------------------
  INSTITVTIO_NOMEN:
    default: "VIGILIA"          # provisional codename — NOT ratified
    env: INSTITVTIO_NOMEN
    self_update: "ratified once, via INDEX·NOMINVM"
    owner: index-nominum
    note: "Even the name is a parameter. Do not treat VIGILIA as final."

  INSTITVTIO_HOME:
    default: "limen/institutio"  # provisional; may extract to its own repo
    env: INSTITVTIO_HOME
    self_update: none
    owner: the-seat
    note: "Repo home is a decision, not a constant. Extracting later is a clean git subtree."

  # --- VITALS: the missing executive's thresholds (build order #1) --------------
  # These are the published 'reaction function' the heartbeat will enact. Seeds —
  # tune against _diagnostics FIND-005 ('treat 16GB as a budget, not a floor').
  VITALS_PRESSURE_GAUGE:
    default: "kern.memorystatus_vm_pressure_level"
    env: LIMEN_VITALS_GAUGE
    self_update: none
    owner: vitals
    note: "The kernel's own jetsam signal — correct gauge; free-pages stays ~0 even when healthy."
  VITALS_PRESSURE_WARN:
    default: 2                  # macOS gauge: 1=normal, 2=warn, 4=critical
    env: LIMEN_VITALS_WARN
    self_update: none
    owner: vitals
    note: "At >=warn (2): stop opening new dispatch lanes (idle beat, mirror #224 offline gate). Seed said 1, but 1 IS normal — that would idle every beat; corrected to the kernel's warn level."
  VITALS_PRESSURE_CRITICAL:
    default: 4
    env: LIMEN_VITALS_CRIT
    self_update: none
    owner: vitals
    note: "At >=critical (4): also shed running discretionary load (e.g. ollama) before jetsam escalates."
  VITALS_HEAVY_SURFACE_LIMIT:
    default: 1
    env: LIMEN_VITALS_HEAVY_LIMIT
    self_update: none
    owner: vitals
    note: "FIND-005: one heavy AI surface at a time on a 16GB host."
  VITALS_SHED_OLLAMA:
    default: "1"
    env: LIMEN_VITALS_SHED_OLLAMA
    self_update: none
    owner: vitals
    note: "Kill switch for the critical-pressure ollama shed. 1=shed loaded models at >=critical; 0=record only."

  # --- CONTINUITY: make hand-recovery automatic (build order #1) ----------------
  CONTINUITY_MIN_SUMMARY_CHARS:
    default: 400
    env: LIMEN_CONTINUITY_MIN_SUMMARY
    self_update: none
    owner: continuity
    note: "A handoff summary shorter than this is degenerate (this session got 200). Trigger transcript reconstruction."
  CONTINUITY_TRANSCRIPT_GLOB:
    default: "~/.claude/projects/*/*.jsonl"
    env: LIMEN_CONTINUITY_TRANSCRIPTS
    self_update: none
    owner: continuity

  # --- INTEGRITY: govern the autoupdater lever (build order #1) ------------------
  INTEGRITY_AUTOUPDATER:
    default: "disabled"        # the institution's POLICY: keep the autoupdater off
    env: LIMEN_INTEGRITY_AUTOUPDATER
    self_update: none
    owner: integrity
    note: "Intended policy state ('disabled'|'enabled'). The MECHANISM is the DISABLE_AUTOUPDATER=1 env lever, checked separately as 'actual' (don't conflate the two value spaces). Version-path churn is the root of the corrupt-app dialog + TCC re-prompts."
  INTEGRITY_VERIFY_TARGETS:
    default:
      - "/Applications/Claude.app"
      - "~/.local/bin/claude"
    env: LIMEN_INTEGRITY_TARGETS
    self_update: none
    owner: integrity
    note: "codesign --verify on the heartbeat; alert on signature/version drift."

  # --- EVOCATOR: the summoner (keep canonical truths present in every channel) ---
  LIMEN_EVOCATOR:
    default: "1"               # ON — a portal that doesn't run isn't a portal
    env: LIMEN_EVOCATOR
    self_update: none
    owner: evocator
    note: "Gate for the EVOCATOR organ. =0 rolls it back; the FLAME canon block persists regardless (git-tracked)."
  LIMEN_BEAT_EVOCATOR:
    default: 6                  # cadence: summon every 6 beats
    env: LIMEN_BEAT_EVOCATOR
    self_update: none
    owner: evocator
    note: "How often the summoner reconciles every channel. Idempotent (writes only on change) → safe to run often."
  LIMEN_EVOCATOR_CANON:
    default: "limen/spec/evocator/canon.yaml"
    env: LIMEN_EVOCATOR_CANON
    self_update: none
    owner: evocator
    note: "The declarative canon of truths the organ summons everywhere."
  LIMEN_KNOWLEDGE_CORPUS:
    default: "~/Workspace/knowledge-corpus"
    env: LIMEN_KNOWLEDGE_CORPUS
    self_update: none
    owner: evocator
    note: "Path to the knowledge-corpus repo; the corpus channel writes a collection shot here (guarded, fail-open)."
  LIMEN_PRIVATE_ROOT:
    default: "$LIMEN_ROOT/.limen-private"
    env: LIMEN_PRIVATE_ROOT
    self_update: none
    owner: continuity
    note: "Ignored local private cartridge root (parent of session-corpus, photos-universe, etc.). Full media-dedup paths/hashes live here and are never committed; public receipts carry aggregates only."
  LIMEN_PRIVATE_SESSION_CORPUS:
    default: "$LIMEN_ROOT/.limen-private/session-corpus"
    env: LIMEN_PRIVATE_SESSION_CORPUS
    self_update: none
    owner: continuity
    note: "Ignored local raw/private session cartridge. Stores manifests and optional content-addressed object copies; never committed."
  LIMEN_CURRENT_SESSION_JSONL:
    default: ""
    env: LIMEN_CURRENT_SESSION_JSONL
    self_update: none
    owner: continuity
    note: "Optional explicit Codex session JSONL for current-session fanout. Blank means derive the latest local Codex transcript."
  LIMEN_MIN_CODEX_PLANNERS:
    default: 10
    env: LIMEN_MIN_CODEX_PLANNERS
    self_update: none
    owner: continuity
    note: "Minimum Codex planner packets emitted by current-session fanout before executor waterfalling."
  LIMEN_CURRENT_SESSION_FANOUT_REPO:
    default: "organvm/limen"
    env: LIMEN_CURRENT_SESSION_FANOUT_REPO
