  LIMEN_REMOTE_REAP_MAX:
    default: 100
    env: LIMEN_REMOTE_REAP_MAX
    self_update: none
    owner: gitvs
    note: "Max remote branches reap-remote-branches.py deletes per run; the remainder is logged and taken next run. Bounds the blast radius of the irreversible remote delete."
  LIMEN_REMOTE_REAP_EVERY_MIN:
