  LIMEN_MAIL_STATUS_OUT:
    default: "$LIMEN_ROOT/logs/uma-mail-status.json"
    env: LIMEN_MAIL_STATUS_OUT
    self_update: none
    owner: mail
    note: "UMA mail status receipt path consumed by Limen mail wrappers."
  LIMEN_MAIL_STATUS_MAX_AGE_HOURS:
    default: 24
    env: LIMEN_MAIL_STATUS_MAX_AGE_HOURS
    self_update: none
    owner: mail
    note: "Maximum accepted age for UMA mail status receipts before wrappers refresh."
  LIMEN_MAIL_SWEEP:
    default: 1
    env: LIMEN_MAIL_SWEEP
    self_update: none
    owner: mail
    note: "Master gate for the C_MAIL mutating inbound sweep (flag fires / archive folder-store noise, reversible; Gmail flag-only). 0 skips the sweep but still rebuilds the obligations ledger + face. The sweep touches Apple Mail, so it needs the one-time macOS Automation grant (lever L-MAIL-AUTOMATION-GRANT); it fails SAFE when the grant is absent."
  LIMEN_MAIL_SWEEP_LIMIT:
    default: 80
    env: LIMEN_MAIL_SWEEP_LIMIT
    self_update: none
    owner: mail
    note: "Max most-recent messages inbox_sweep.py reads per account each C_MAIL beat — bounds the AppleScript reads so the sweep is a couple of paged reads, not the whole inbox."
  LIMEN_MAIL_GMAIL_ARCHIVE:
    default: 1
    env: LIMEN_MAIL_GMAIL_ARCHIVE
    self_update: none
    owner: mail
    note: "Gate for the C_MAIL raw-IMAP Gmail archive (mail-beat.sh step 1b → gmail_imap_sweep.py --apply): drops the \\Inbox label over IMAP — the TRUE archive Apple Mail cannot do on a Gmail label store. Reversible (stays in All Mail, receipt = undo manifest, starred/protected gated; never deletes/sends). Runs ONLY when the keyed credential is hydrated (GMAIL_APP_PASSWORD + GMAIL_USER); a no-op that logs the skip otherwise. 0 disables it entirely."
  LIMEN_MAIL_DRAFTS:
    default: 0
    env: LIMEN_MAIL_DRAFTS
    self_update: none
    owner: mail
    note: "Effector arm for draft_writer.py --save (observable-before-autonomous, the LIMEN_CENSOR_APPLY pattern). 0 (default) = enrich-only: the voice-matched draft_text lands in the ledger/face without touching the mailbox. 1 = persist real Drafts (idempotent), which drives Apple Mail and needs the one-time macOS Automation grant (lever L-MAIL-AUTOMATION-GRANT). Never sends."
  LIMEN_MAIL_LEDGER_MAX_AGE_HOURS:
    default: 12
    env: LIMEN_MAIL_LEDGER_MAX_AGE_HOURS
    self_update: none
    owner: mail
    note: "Max obligations-ledger age before scripts/check-mail-answered.py fails: a ledger not rebuilt within this window means the C_MAIL beat/effector is not running (the 2026-06 silent-freeze failure mode)."
  LIMEN_UMA_ROOT:
    default: "~/Workspace/universal-mail--automation"
    env: LIMEN_UMA_ROOT
    self_update: none
    owner: mail
    note: "Checkout path of the universal-mail--automation engine (the C_MAIL effector). scripts/check-mail-tiers.py reads core/protocols.py from here to cross-check that every dangerous protocol class is held; absent (e.g. CI) → that cross-check advisory-skips, never fails."
  LIMEN_MAIL_SEND:
    default: 0
    env: LIMEN_MAIL_SEND
    self_update: none
    owner: mail
    note: "The auto-send arm for send_drafts.py (the tiered fail-closed sender), the send analog of LIMEN_MAIL_DRAFTS. 0 (default) = DISARMED: the beat dry-runs the sender (logs would-sends, sends nothing). 1 = armed: send only opt-in SAFE-tier obligations with complete bracket-free text per mail-tiers.yaml; legal/money/personal HOLD is never sent, and absent a keyed SMTP credential it still fails closed. His valve — the safe set grows on trust."
  LIMEN_MAIL_SEND_MAX:
    default: 10
    env: LIMEN_MAIL_SEND_MAX
    self_update: none
    owner: mail
    note: "Safety cap on how many SAFE-tier replies send_drafts.py may send per run, so an armed run can never blast the whole ledger."
  LIMEN_MAIL_HOLD_SEND:
    default: "safe_only"
    env: LIMEN_MAIL_HOLD_SEND
    self_update: none
    owner: mail
    note: "The switchable HOLD-send boundary for the explicit KEYED FIRE (send_drafts.py --fire-obligation … --fire) — the runtime override of mail-tiers.yaml send_mode. One of: safe_only (default — the system transmits SAFE-tier only; HOLD/legal stays in the operator's client), keyed_all (the operator's explicit --fire may transmit any tier, incl. a HOLD reply with attachments), per_matter (HOLD is draft-only unless the obligation carries send_ok:true). INVARIANT in every value: the beat auto-sender (LIMEN_MAIL_SEND) never transmits HOLD — this knob governs ONLY the explicit keyed fire, and --fire (or LIMEN_MAIL_SEND=1) still gates the actual transmission. Not itself a send arm."
  LIMEN_MAIL_ANSWERED_CHECK:
    default: 1
    env: LIMEN_MAIL_ANSWERED_CHECK
    self_update: none
    owner: mail
    note: "Beat gate for the mail-answered sensor (scripts/check-mail-answered.py): 1 (default) surfaces a stale ledger or a reply-owed-without-draft in the beat log — the sensor that would have caught the 2026-06 silent freeze. 0 skips it."
  LIMEN_CORRESPONDENCE_WALK:
    default: 1
    env: LIMEN_CORRESPONDENCE_WALK
    self_update: none
    owner: mail
    note: "Beat gate for the correspondence walk-to-terminal effector (mail-beat.sh 2d → scripts/correspondence-walk.py --drain): 1 (default) stamps every reply-owed obligation with a terminal disposition each C_MAIL beat — the 'never a one-off' driver. It classifies, composes held drafts, and records dispositions; it NEVER auto-sends HOLD. 0 skips the walk."
  LIMEN_CORRESPONDENCE_TERMINAL_CHECK:
    default: 1
    env: LIMEN_CORRESPONDENCE_TERMINAL_CHECK
    self_update: none
    owner: mail
    note: "Beat gate for the correspondence-terminal sensor (scripts/check-correspondence-terminal.py): 1 (default) goes red in the beat log when a reply-owed row is un-walked or a HOLD row lacks a composed draft — the machine half of the AUTONOMY_PAUSED release predicate. 0 skips it."
  LIMEN_CORRESPONDENCE_FIRE:
    default: 0
    env: LIMEN_CORRESPONDENCE_FIRE
    self_update: none
    owner: mail
    note: "Arm for the walk's SAFE-tier auto-send in --drain: 0 (default) = the walk only classifies/drafts/records and PROPOSES keyed fires (writes the ready send_drafts.py --fire command to the sealed sidecar); it transmits nothing. 1 = the walk may auto-fire SAFE-tier rows (still gated by LIMEN_MAIL_SEND + keyed SMTP creds). HOLD/legal/money is NEVER transmitted here regardless — that invariant lives in send_drafts.py."
  LIMEN_CORRESPONDENCE_MAX:
    default: 10
    env: LIMEN_CORRESPONDENCE_MAX
    self_update: none
    owner: mail
    note: "Safety cap on how many keyed fires the walk may propose/perform per run, mirroring LIMEN_MAIL_SEND_MAX, so a single walk can never blast the whole ledger."
  LIMEN_CORRESPONDENCE_DISPOSITIONS:
    default: "$LIMEN_ROOT/logs/correspondence-dispositions.json"
    env: LIMEN_CORRESPONDENCE_DISPOSITIONS
    self_update: none
    owner: mail
    note: "Path override for the correspondence disposition ledger (counts-only, gitignored) that correspondence-walk.py writes and check-correspondence-terminal.py reads. Default lives under logs/; overridable for tests/alt hosts."
  LIMEN_CORRESPONDENCE_SENT_CHECK:
    default: 1
    env: LIMEN_CORRESPONDENCE_SENT_CHECK
    self_update: none
    owner: mail
    note: "SENT-state truth gate for correspondence-walk.py: 1 (default) opens one read-only IMAP connection and flips a reply-owed row to `awaiting-them` when a reply already exists in [Gmail]/Sent Mail (answered by the operator, a peer agent, or another channel — the out-of-band send the ledger's requires_reply is blind to). Fail-open: no creds / no UMA / connect error ⇒ skipped, never suppresses a genuine reply-owed row. 0 disables the check (ledger-only dispositions)."
  LIMEN_CORRESPONDENCE_AWAIT_STALE_DAYS:
    default: 14
    env: LIMEN_CORRESPONDENCE_AWAIT_STALE_DAYS
    self_update: none
    owner: mail
    note: "Age threshold (days) for the stale-awaiting-them nudge in correspondence-walk.py::_disposition: when the SENT-state check finds our last reply to a thread is older than this and the counterparty has not answered, the row flips from a silent, ageless `awaiting-them` to a `needs-human` nudge (follow up or drop). A stale nudge is NOT recorded as answered, so it keeps surfacing until the operator acts, and a growing pile auto-reddens the drain-trend sensor's needs_human signal. 0 disables the nudge (awaiting-them behaves exactly as before). Needs the SENT-state check active (LIMEN_CORRESPONDENCE_SENT_CHECK=1 + IMAP creds); with no date available the row stays awaiting-them, fail-open."
  LIMEN_CORRESPONDENCE_DRAIN_TREND:
    default: 1
    env: LIMEN_CORRESPONDENCE_DRAIN_TREND
    self_update: none
    owner: mail
    note: "Beat gate for the correspondence drain-trend sensor (scripts/check-correspondence-drain-trend.py --check): 1 (default) goes red in the beat log when reply_owed or needs_human is RISING across a day-plus window, or a HOLD draft is persistently missing — the loop-closure the fixed-point snapshot can't see (is the ledger draining, or stalled at a high plateau?). Flat-at-floor reads as converged, never red. 0 skips it."
  LIMEN_CORRESPONDENCE_TREND_FILE:
    default: "$LIMEN_ROOT/logs/correspondence-drain-trend.jsonl"
    env: LIMEN_CORRESPONDENCE_TREND_FILE
    self_update: none
    owner: mail
    note: "Path override for the append-only drain-trend series (counts-only, gitignored) that correspondence-walk.py::_append_trend writes one point-per-ledger-rebuild to and check-correspondence-drain-trend.py reads. Default lives under logs/; overridable for tests/alt hosts."
  LIMEN_CORRESPONDENCE_TREND_MAX_ROWS:
    default: 2000
    env: LIMEN_CORRESPONDENCE_TREND_MAX_ROWS
    self_update: none
    owner: mail
    note: "Soft cap on the append-only drain-trend series length: correspondence-walk.py keeps only the last N points so the beat-read tail stays cheap (the series is one point per ledger rebuild, ~one per beat)."
  LIMEN_CORRESPONDENCE_TREND_WINDOW:
    default: 8
    env: LIMEN_CORRESPONDENCE_TREND_WINDOW
    self_update: none
    owner: mail
    note: "How many most-recent drain-trend points check-correspondence-drain-trend.py assesses for slope (default 8 beats). The verdict is a DIRECTION over this window, never an absolute reply_owed floor."
  LIMEN_CORRESPONDENCE_TREND_MIN_POINTS:
    default: 3
    env: LIMEN_CORRESPONDENCE_TREND_MIN_POINTS
    self_update: none
    owner: mail
    note: "Minimum drain-trend points before a slope is judgeable: below this the sensor reports insufficient-history and exits 0 (never reds a cold-started series)."
  LIMEN_CORRESPONDENCE_TREND_STALE_HOURS:
    default: 24
    env: LIMEN_CORRESPONDENCE_TREND_STALE_HOURS
    self_update: none
    owner: mail
    note: "The drain-trend window must span at least this many hours before a rising reply_owed/needs_human counts as a real stall (not a brief inflow spike). Below this span the sensor reports too-fresh and exits 0."
  LIMEN_MAIL_SENT_MAILBOX:
    default: "[Gmail]/Sent Mail"
    env: LIMEN_MAIL_SENT_MAILBOX
    self_update: none
    owner: mail
    note: "IMAP mailbox name for the account's Sent folder — the mailbox correspondence-walk.py (and UMA's mail_send/send_drafts) search to verify/detect a sent reply. Gmail default; overridable for alt providers (iCloud/Outlook) as rung-5 multi-account send lands."
  LIMEN_PRIVATE_MAIL_STORY:
    default: "$LIMEN_ROOT/.limen-private/mail-story"
    env: LIMEN_PRIVATE_MAIL_STORY
    self_update: none
    owner: mail
    note: "Private working root for mail-story raw atom inventory and snapshots."
  # --- CVSTOS: the keeper of the host (chat-app/local debt + factory invariant + reaper proprioception) ---
  LIMEN_BEAT_CVSTOS:
    default: 24                 # cadence: census the host every 24 beats (filesystem walk ⇒ rare)
    env: LIMEN_BEAT_CVSTOS
    self_update: none
    owner: cvstos
    note: "How often CVSTOS censuses chat-app/local debt + measures the factory-host invariant + probes reaper liveness. Read-only (surface), lockless, fail-open."
