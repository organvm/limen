  LIMEN_WORKTREE_ROOT:
    default: ""
    env: LIMEN_WORKTREE_ROOT
    self_update: none
    owner: continuity
    note: "Optional local worktree root scanned for repo/product surfaces by repo-surface ledger. Empty means no extra worktree root."
  LIMEN_REPO_SCAN_DEPTH:
