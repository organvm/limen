    self_update: none
    owner: continuity
    note: "How many residue sessions the beat resumes per cycle (--walk N). Small by design: each walk is a full headless agent run; 2/beat drains a 100-session backlog in under a day without starving the beat."
  LIMEN_SESSION_WALK_GIVE_UP:
    default: 2
    env: LIMEN_SESSION_WALK_GIVE_UP
    self_update: none
    owner: continuity
    note: "Walk attempts per session before the organ stops resuming it (the QUICKEN escalate-after-2 precedent: an identical re-walk of a session parked on a gated lever is waste). A given-up session stays visible in logs/session-walk-residue.md."
  LIMEN_SESSION_WALK_TIMEOUT:
    default: 900
    env: LIMEN_SESSION_WALK_TIMEOUT
    self_update: none
    owner: continuity
    note: "Seconds each headless walk (claude --resume / codex exec resume) may run before the organ moves on. Mirrors LIMEN_QUICKEN_BREATHE_TIMEOUT."
  LIMEN_WALK_RESIDUE_CAP:
    default: 500
    env: LIMEN_WALK_RESIDUE_CAP
    self_update: none
    owner: continuity
    note: "Maximum residue rows retained in the census artifact and ledger (newest first). A cap, not a filter — raise it if the estate ever carries more unwalked sessions than this."

  # --- await-pr: the one sanctioned synchronous PR-gate waiter -------------------
  LIMEN_AWAIT_PR_TIMEOUT:
    default: 1200
    env: LIMEN_AWAIT_PR_TIMEOUT
    self_update: none
    owner: verify
    note: "Hard deadline (seconds) for scripts/await-pr.sh, the ONE sanctioned synchronous waiter on a PR merge gate (2026-07-15 endless-watcher incident: sessions hand-rolled unbounded background poll loops that outlived them). 20 min covers a full pr-gate run; anything longer belongs to the beat's merge rung (scripts/merge-drain.py via scripts/drain.sh), not a longer wait."
  LIMEN_AWAIT_PR_INTERVAL:
    default: 45
    env: LIMEN_AWAIT_PR_INTERVAL
    self_update: none
    owner: verify
    note: "Poll interval (seconds) between merge-policy.sh runs inside scripts/await-pr.sh. 45 s keeps a full 20-min wait under ~30 GitHub reads while every poll prints a loud one-liner."
  LIMEN_MERGE_POLICY_BIN:
    default: ""                # empty = scripts/merge-policy.sh; set only in tests
    env: LIMEN_MERGE_POLICY_BIN
    self_update: none
    owner: merge-policy
    note: "Test seam: overrides the merge-policy predicate binary consumed by scripts/await-pr.sh (and the governor's pause-release completion). Empty (the default) resolves to scripts/merge-policy.sh; tests point it at a scripted-verdict stub so the verdict matrix is hermetic. Never set on the live host."

  # --- disk-capacity sensor (sensors.yaml 0g7) ------------------------------------
  LIMEN_DISK_CAPACITY:
    default: "1"               # ON — assert /System/Volumes/Data stays below capacity threshold each beat
    env: LIMEN_DISK_CAPACITY
    self_update: none
    owner: tabularius
    note: "Beat gate for the disk-capacity sensor (scripts/disk-capacity.py --check, sensor 0g7 in sensors.yaml). Closes the disk-full silent-failure root cause: the fleet stalled with no beat-visible signal when the host ran out of space. Green ⟺ /System/Volumes/Data percent-used < LIMEN_DISK_CAPACITY_THRESHOLD (default 80%). Fail-open when the volume is absent (CI / non-macOS). The armed effector is LIMEN_DISK_CAPACITY_APPLY. Set 0 to silence."

  LIMEN_DISK_CAPACITY_THRESHOLD:
    default: 80
    env: LIMEN_DISK_CAPACITY_THRESHOLD
    self_update: none
    owner: tabularius
    note: "Percent-used high-water mark for /System/Volumes/Data checked by disk-capacity.py --check. Breaching this threshold exits non-zero and surfaces the escalation in the beat log. Default 80 leaves room before genuine space-out; lower for earlier warnings, raise if the host routinely saturates purgeable space (the APFS df%-lies precedent) without real impact. Override via env or --threshold flag."

  LIMEN_BEAT_DISK_CAPACITY:
    default: 4
    env: LIMEN_BEAT_DISK_CAPACITY
    self_update: none
    owner: tabularius
    note: "Cadence (every N beats) of the disk-capacity sensor (sensors.yaml 0g7) in the scheduled metabolize derive lane. 4 follows the launch-agent-liveness precedent for a cheap check guarding a critical infrastructure invariant. The generic scheduled runner resolves this override."

  LIMEN_DISK_CAPACITY_TIMEOUT:
    default: 30
    env: LIMEN_DISK_CAPACITY_TIMEOUT
    self_update: none
    owner: tabularius
    note: "Per-run timeout (seconds) for the disk-capacity sensor. The check is a single df(1) call; 30s is generous headroom for a slow volume or a busy CI runner."

  LIMEN_DISK_CAPACITY_APPLY:
    default: "1"               # ARMED — the effector. Arms removal of gitignored heal-probe artifacts + heartbeat error-log truncation.
    env: LIMEN_DISK_CAPACITY_APPLY
    self_update: none
    owner: tabularius
    note: "Arms the disk-capacity effector (scripts/disk-capacity.py --apply, sensor 0g7 args_when). When 1 (default), the beat removes every git-check-ignored .heal-probe-*.yaml artifact under LIMEN_ROOT (gitignored transient probes; always safe to delete) and truncates logs/heartbeat.err.log when it exceeds LIMEN_DISK_LOG_CAP_MB (default 50 MiB), writing a receipt to logs/disk-capacity-apply.json. Shipped dark; armed 2026-07-16 — /System/Volumes/Data at 87% vs 80% threshold. Set 0 to disarm."

  LIMEN_DISK_LOG_CAP_MB:
    default: 50
    env: LIMEN_DISK_LOG_CAP_MB
    self_update: none
    owner: tabularius
    note: "Size cap in MiB for logs/heartbeat.err.log checked by disk-capacity.py --apply. When the log exceeds this, the effector truncates it to zero. Default 50 MiB; raise if the heartbeat emits legitimate high-volume stderr that should be preserved longer, lower for tighter disk hygiene."

  LIMEN_RELATIONSHIP_REVIEW:
    default: "1"
    env: LIMEN_RELATIONSHIP_REVIEW
    self_update: none
    owner: tabularius
    note: "Gate for the relationship-review-delta beat sensor (weekly review-due detector for the relationship-pipeline slugs). ON by default: it is read-only (a bounded, immutable sqlite count of chat.db) and fails open, so it cannot red the beat or leak. Its only public output is a PII-clean count; per-person detail lands only in the sealed _people-private estate."
  LIMEN_BEAT_RELATIONSHIP_REVIEW:
    default: 168
    env: LIMEN_BEAT_RELATIONSHIP_REVIEW
    self_update: none
    owner: tabularius
    note: "Cadence (every N beats) of the relationship-review-delta sensor. 168 ≈ weekly at the 60s beat floor. Resolved by the generic scheduled runner (beat-sensors.py --run --source heartbeat --scheduled-only); heartbeat-loop.sh carries no sensor-specific cadence constant."
  LIMEN_RELATIONSHIP_REVIEW_TIMEOUT:
    default: 300
    env: LIMEN_RELATIONSHIP_REVIEW_TIMEOUT
    self_update: none
    owner: tabularius
    note: "Per-run timeout (seconds) for the relationship-review-delta sensor. The work is a handful of read-only sqlite COUNT queries; 300s is generous headroom if chat.db is large or the volume is slow."
  LIMEN_RELATIONSHIP_REVIEW_NOTIFY:
    default: "1"
    env: LIMEN_RELATIONSHIP_REVIEW_NOTIFY
    self_update: none
    owner: tabularius
    note: "Safety-valve arg for the relationship-review-delta effector (--notify). When 1, review-due detections append to the sealed private log ~/Workspace/_people-private/review-due.jsonl (ARCA-sealed, never public). ON by default because the write target is private-only; set 0 to run detection without recording."
  LIMEN_RELATIONSHIP_REVIEW_THRESHOLD:
    default: 20
    env: LIMEN_RELATIONSHIP_REVIEW_THRESHOLD
    self_update: none
    owner: tabularius
    note: "How many NEW inbound messages since a person's last review make a delta dice-up worth running (relationship-review-delta.py). Default 20 — a meaningful wave, not a single text. Raise to reduce noise, lower to trigger sooner."

  LIMEN_OPPORTUNITY_PIPELINE:
    default: "1"
    env: LIMEN_OPPORTUNITY_PIPELINE
    self_update: none
    owner: mail
    note: "Gate for the opportunity-pipeline beat sensor (inbound-lead review-due detector for the UMA inbound-lead-hire/deploy/linkedin classes). ON by default: it is read-only over obligations-ledger.json and fails open, so it cannot red the beat or leak. Its only public output is a PII-clean count (logs/opportunity-status.json); per-lead detail lands only in the sealed _people-private/opportunities estate."
  LIMEN_BEAT_OPPORTUNITY_PIPELINE:
    default: 12
    env: LIMEN_BEAT_OPPORTUNITY_PIPELINE
    self_update: none
    owner: mail
    note: "Cadence (every N beats) of the opportunity-pipeline sensor. 12 beats keeps warm inbound leads moving faster than the weekly relationship cadence. Resolved by the generic scheduled runner (beat-sensors.py --run --source heartbeat --scheduled-only); heartbeat-loop.sh carries no sensor-specific cadence constant."
  LIMEN_OPPORTUNITY_PIPELINE_TIMEOUT:
    default: 300
    env: LIMEN_OPPORTUNITY_PIPELINE_TIMEOUT
    self_update: none
    owner: mail
    note: "Per-run timeout (seconds) for the opportunity-pipeline sensor. The work is a ledger read plus (when application-pipeline is present) one bounded opportunity_sync.py subprocess; 300s is generous headroom."
  LIMEN_OPPORTUNITY_NOTIFY:
    default: "1"
    env: LIMEN_OPPORTUNITY_NOTIFY
    self_update: none
    owner: mail
    note: "Safety-valve arg for the opportunity-pipeline effector (--notify). When 1, review-due detections append COUNT-ONLY events to the sealed private log ~/Workspace/_people-private/opportunities/review-due.jsonl (ARCA-sealed, never public) and push a count-only line through the existing notify cascade. ON by default because both write targets are private/count-only; set 0 to run detection without recording."
