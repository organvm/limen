    env: LIMEN_STORAGE_FREE_FLOOR_GIB
    self_update: none
    owner: continuity
    note: "Minimum free-space floor used by substrate-ledger status classification."
  LIMEN_STORAGE_USAGE_CEILING_PCT:
    default: 95
    env: LIMEN_STORAGE_USAGE_CEILING_PCT
    self_update: none
    owner: continuity
    note: "Maximum storage usage percentage before substrate-ledger marks a root constrained."
  LIMEN_SUBSTRATE_CONFIG:
