    owner: gitvs
    note: "--check only: a landed remote branch younger than this many minutes is digesting, not lingering. Default 1440 (24h), WIDER than the local reaper's 60m — a remote delete is not reflog-recoverable and other clones/CI may still hold the ref."
  LIMEN_REMOTE_REAP_PROTECT:
