    owner: observatory
    note: "Arms P2-SYNTH — the weekly KEEP/TEST/REJECT synthesis (observatory/synthesis.py), the 5th executive pipeline stage. 0 (default) = inert (status 'off', writes nothing). 1 = at most once per ISO week (a state-file gate), fold mechanisms.jsonl history into standing priors: KEEP (recurs with transferable priority), TEST (too new to judge), REJECT (recurs but never pays off). Writes recommendations to synthesis-weekly-latest.json only — never edits the human-curated mechanisms.yaml. Fail-open."
  LIMEN_MARKETPLACE_APPLY:
    default: 0
    env: LIMEN_MARKETPLACE_APPLY
