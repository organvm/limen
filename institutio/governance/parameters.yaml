  LIMEN_CVSTOS_DEBT_CAP_GB:
    default: 5                  # evictable chat-app cache over this ⇒ --check reports eviction owed
    env: LIMEN_CVSTOS_DEBT_CAP_GB
    self_update: none
    owner: cvstos
    note: "Evictable chat-app cache (GB) above which the host is not at factory — the eviction stage is owed. A derived threshold, not a pinned truth."
  LIMEN_CVSTOS_REAPER_STALE_H:
    default: 48                 # a reaper voice-stamp older than this ⇒ stale
    env: LIMEN_CVSTOS_REAPER_STALE_H
    self_update: none
    owner: cvstos
    note: "Hours after which a reaper (worktree/clone/branch/preserve) with no fresh voice-stamp is treated as stale in the proprioception roof."
  LIMEN_CVSTOS_SCAN_CAP:
    default: 600000             # bound the filesystem walk so a pathological tree can't hang the beat
    env: LIMEN_CVSTOS_SCAN_CAP
    self_update: none
    owner: cvstos
    note: "Max directory entries the debt-sizing walk visits before returning an approximate total. Bounds the beat's cost; never blocks."
