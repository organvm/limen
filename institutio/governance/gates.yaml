# GATES — the verification-gate registry (the parameter-panel pattern, one domain over).
#
# One declaration per gate: what runs, which paths implicate it, how expensive it is,
# whether it must serialize machine-wide. Consumers DERIVE from this file instead of
# hardcoding their own copies: scripts/verify.py (selection + execution — PR2),
# scripts/merge-policy.sh (deploy regex — PR3), scripts/verify-whole.sh (file lists — PR4),
# CLAUDE.md (points here — PR4). scripts/check-gates.py is the drift predicate; the
# `ratchets:` block below arms each consumers-derive check as that consumer converts.
#
# Deliberate non-consumers: .github/workflows/* (GitHub requires job definitions in-tree —
# the registry only CHECKS them, never generates), scripts/closeout-fast.sh (a receipt-flow,
# not a gate list), and verify-whole.sh's LIMEN_VERIFY_LIVE tail (env-gated live probes that
# need tokens/URLs — they live only in verify-whole.sh by design).
#
# Path semantics: GitHub Actions path-filter globs (`**` crosses slashes, `*` does not),
# so deploy_triggers can be set-compared byte-for-byte against deploy*.yml `on.push.paths`.
#
# Field defaults: tier: cheap · serialize: false · scoped: true. `owner` and `note` are
# required on every gate (parameters.yaml discipline). `ci_job` is set only where the CI
# mirror is GUARANTEED per-change (the job runs whenever the gate's paths change); gates
# whose CI coverage is incidental carry none — that absence is information, not an omission.

schema_version: 0.1

# Consumers-derive ratchets — armed per-PR as each consumer converts (check-gates.py
# enforces the armed ones; unarmed ones are recorded intent, like the check-params baseline).
ratchets:
  verify_scoped_wrapper: true    # ARMED (PR2): verify-scoped.sh is a thin exec of verify.py --changed
  merge_policy_derives: true     # ARMED (PR3): merge-policy.sh has no literal deploy regex
  verify_whole_derives: true     # ARMED (PR4): verify-whole.sh has no literal py_compile/bash -n lists
  claude_md_pointer: true        # ARMED (PR4): CLAUDE.md carries the pointer, not the path lists

# 1:1 mirror of deploy*.yml `on.push.paths` — check-gates.py enforces exact set equality.
# A merge to main touching one of these IS a live deploy. Deploy sensitivity is a property
# of PATHS, not gates: a docs PR touching tasks.yaml is website-sensitive even though it
# implicates only cheap gates.
deploy_triggers:
  dashboard:
    workflow: .github/workflows/deploy.yml
    paths:
      - "web/app/**"
      - "firebase.json"
      - "tasks.yaml"
      - ".github/workflows/deploy.yml"
  api:
    workflow: .github/workflows/deploy-api.yml
    paths:
      - "web/api/**"
      - "cli/**"
      - "scripts/preflight-cloud-run.sh"
      - ".github/workflows/deploy-api.yml"

# Derived file sets — what verify-whole.sh's hardcoded py_compile and bash -n argv lines
# become (PR4). PR1 transcribes today's curated lists EXACTLY; widening py-syntax to all of
# scripts/*.py is a deliberate later ratchet-tighten, pre-flighted before landing. Every
# exclude entry must carry a note or check-gates.py fails it.
file_sets:
  py-syntax:
    include:
      - "web/api/main.py"
      - "cli/src/limen/*.py"
      - "scripts/*.py"
    exclude: []
  bash-syntax:
    include:
      - "scripts/*.sh"
      - "scripts/tests/*.sh"
      - "scripts/hooks/*.sh"
    exclude: []

gates:
  # ── the always-on floor ─────────────────────────────────────────────────────
  syntax-changed:
    kind: per_file
    per_file:
      ".py": "python3 -m py_compile {file}"
      ".sh": "bash -n {file}"
    paths: ["**"]
    owner: verify
    note: "Syntax on exactly the files touched — the floor under every push; the resolver's built-in."
  diff-hygiene:
    command: "git diff --check"
    paths: ["**"]
    owner: verify
    note: "Whitespace/conflict-marker hygiene; closes every run, scoped and whole."

  # ── whole-matrix file-set syntax (derived from file_sets above in PR4) ──────
  py-syntax-set:
    kind: file_set
    file_set: py-syntax
    command_template: "python3 -m py_compile {files}"
    scoped: false
    ci_job: "pr-gate.yml:pr-gate"
    owner: verify
    note: "Whole-matrix compile of the registered Python estate (pr-gate compiles the package subset of it on every PR)."
  bash-syntax-set:
    kind: file_set
    file_set: bash-syntax
    command_template: "bash -n {files}"
    scoped: false
    owner: verify
    note: "Whole-matrix syntax pass over the operational shell fleet."
  plist-lint:
    command: "plutil -lint container/launchd/com.user.netmeter.plist container/launchd/com.limen.overnight-watch.plist"
    paths: ["container/launchd/**"]
    scoped: false
    owner: verify
    note: "macOS-only; the whole matrix guards it behind `command -v plutil`."

  # ── organ record validators (no guaranteed CI mirror: organs/** is outside ci.yml filters) ──
  cvrsvs-seed:
    command: "python3 organs/governance/validate-seed.py --strict-graph --quiet"
    paths: ["organs/governance/**"]
    scoped: false
    owner: governance
    note: "Validates the external cvrsvs-honorvm seed when present; verify-whole passes the resolved seed path and no-ops if absent."
  consulting-records:
    command: "python3 organs/consulting/validate-consulting.py --fleet --quiet"
    paths: ["organs/consulting/**"]
    scoped: false
    owner: consulting
    note: "Sovereign Systems engagement records stay schema-clean."
  artist-records:
    command: "python3 organs/artist/validate-artist.py --fleet --quiet"
    paths: ["organs/artist/**"]
    scoped: false
    owner: artist
    note: "A-MAVS-OLEVM chamber governance records stay schema-clean."
  social-records:
    command: "python3 organs/social/validate-social.py --fleet --quiet"
    paths: ["organs/social/**"]
    scoped: false
    owner: social
    note: "Koinonia relationship-posture briefs stay schema-clean."

  # ── predicate regression tests (scoped where verify-scoped.sh runs them today) ──
  merge-policy-test:
    command: "bash scripts/tests/merge-policy.test.sh"
    paths: ["scripts/merge-policy.sh", "scripts/tests/merge-policy.test.sh", "institutio/governance/gates.yaml"]
    owner: merge-policy
    note: "Verdict-matrix regression for the self-merge predicate; gates.yaml is implicated because deploy_triggers feed the verdict (PR3)."
  verify-resolver-test:
    command: "bash scripts/tests/verify-resolver.test.sh"
    paths: ["scripts/verify.py", "scripts/tests/verify-resolver.test.sh", "institutio/governance/gates.yaml"]
    owner: verify
    note: "Selection-equivalence fixtures — the resolver must implicate exactly the registered gates."
  enactment-test:
    command: "bash scripts/tests/enactment-audit.test.sh"
    paths: ["scripts/enactment-audit.py", "scripts/tests/enactment-audit.test.sh"]
    owner: enactment
    note: "Declared-ON fleet flags are actually wired live, not just merged."
  enactment-wiring:
    command: "python3 scripts/enactment-audit.py --check --wiring-only"
    paths: ["scripts/enactment-audit.py"]
    scoped: false
    owner: enactment
    note: "The wiring rung (deterministic); the liveness rung reads live-host daemon state in the beat."
  armed-valve-test:
    command: "bash scripts/tests/armed-valve-audit.test.sh"
    paths: ["scripts/armed-valve-audit.py", "scripts/tests/armed-valve-audit.test.sh"]
    scoped: false
    owner: valves
    note: "Parked levers vs silently-off valves."
  armed-valve-contract:
    command: "python3 scripts/armed-valve-audit.py --check --contract --offline --stamp /dev/null"
    paths: ["scripts/armed-valve-audit.py", "spec/armed-valves.json"]
    scoped: false
    owner: valves
    note: "Registry-completeness rung (repo-deterministic); env/url liveness runs in the beat."
  ship-gate-test:
    command: "bash scripts/tests/ship-gate.test.sh"
    paths: ["scripts/ship-gate.py", "scripts/tests/ship-gate.test.sh"]
    scoped: false
    owner: ship-gate
    note: "Product-facing done requires a reachable artifact (fixture rung; live probes in the beat)."
  heal-convergence-test:
    command: "bash scripts/tests/heal-convergence.test.sh"
    paths: ["scripts/heal-convergence.py", "scripts/tests/heal-convergence.test.sh"]
    scoped: false
    owner: heal
    note: "Chronic heal stalls trip; receipts carry outcomes (fixture rung)."
  ask-gate-test:
    command: "bash scripts/tests/ask-gate.test.sh"
    paths: ["scripts/ask-gate.py", "scripts/tests/ask-gate.test.sh"]
    scoped: false
    owner: intake
    note: "Intake asks are predicate-shaped, bounded, owned (fixture rung)."
  worktree-guard-test:
    command: "bash scripts/tests/worktree-commit-guard.test.sh"
    paths: ["scripts/hooks/worktree-commit-guard.sh", "scripts/tests/worktree-commit-guard.test.sh"]
    scoped: false
    owner: lifecycle
    note: "Live-main commit deny matrix (hermetic fixture); transcribed when the hook landed on main in parallel with PR1."
  trusted-bash-hook-test:
    command: "bash scripts/tests/allow-trusted-cd-git.test.sh"
    paths: ["scripts/hooks/allow-trusted-cd-git.sh", "scripts/tests/allow-trusted-cd-git.test.sh"]
    scoped: false
    owner: lifecycle
    note: "Path-aware trusted-Bash decision matrix (hermetic fixture) — the permission-hang killer; destructive verbs auto-approved only on disposable/in-repo paths, force-push/shred never."
  worktree-session-launcher-test:
    command: "bash scripts/tests/start-worktree-session.test.sh"
    paths: ["scripts/start-worktree-session.sh", "scripts/tests/start-worktree-session.test.sh"]
    scoped: false
    owner: lifecycle
    note: "Task-agent launcher denies shared-checkout starts unless the live checkout is explicit control plane, then proves each task gets a distinct worktree."
  dispatch-admission:
    command: "python3 scripts/check-dispatch-admission.py"
    paths: ["scripts/dispatch-admission.py", "scripts/check-dispatch-admission.py"]
    scoped: false
    owner: dispatch
    note: "Dispatch admission cannot be bypassed by overnight launch paths; transcribed when it landed on main in parallel with PR3."
  omega-test:
    command: "bash scripts/tests/omega.test.sh"
    paths: ["scripts/omega.sh", "scripts/tests/omega.test.sh"]
    scoped: false
    owner: omega
    note: "The fixed-point composer's tally/exit/stamp contract; SKIP is never a silent PASS."

  # ── session/docs/board predicates ───────────────────────────────────────────
  session-orient:
    command: "bash scripts/done-session-orient.sh"
    paths: ["scripts/session-orient.py", "scripts/hooks/session-orient.sh", "scripts/session-lifecycle-pressure.py", "scripts/hooks/session-lifecycle-pressure.sh", "scripts/done-session-orient.sh"]
    scoped: false
    owner: continuity
    note: "Session orientation + lifecycle-pressure hooks stay wired and PII-clean."
  agent-docs:
    command: "python3 scripts/check-agent-docs.py"
    paths: ["CLAUDE.md", "AGENTS.md", "GEMINI.md", "CONTRIBUTING.md", "docs/agent-instruction-standard.md", "scripts/check-agent-docs.py"]
    owner: docs
    note: "Agent-instruction docs match the canonical task-state vocabulary; referenced scripts exist."
  removal-acceptance:
    command: "python3 scripts/check-removal-acceptance.py"
    paths: ["scripts/check-removal-acceptance.py", "scripts/reap_acceptance.py"]
    scoped: false
    owner: lifecycle
    note: "Local removal acceptance contracts require archive and redaction proof."
  reap-remote-branches-test:
    command: "bash scripts/tests/reap-remote-branches.test.sh"
    paths: ["scripts/reap-remote-branches.py", "scripts/tests/reap-remote-branches.test.sh"]
    owner: gitvs
    note: "Safety regression for the REMOTE-branch reaper: classify() KEEP-by-default invariants (protected/checked-out/open-PR/not-landed never reap) and the double-dark arming gate (unarmed --apply stays dry-run). A remote delete is not reflog-recoverable, so these must never regress."
  task-board:
    command: "python3 scripts/validate-task-board.py"
    paths: ["tasks.yaml", "scripts/validate-task-board.py"]
    owner: board
    note: "Task-board statuses match the canonical vocabulary (pr-gate separately guards parse/load)."
  worktree-debt:
    command: "python3 scripts/worktree-debt.py --fail-over-cap --fail-reapable-over-cap"
    paths: ["scripts/worktree-debt.py", "cli/src/limen/worktree_debt.py", "cli/src/limen/worktree_roots.py", "scripts/reclaim-worktrees.py"]
    scoped: false
    owner: lifecycle
    note: "Hard lifecycle-debt gate: dirty/unpushed roots stay capped, and clean remote-preserved roots must be reaped or explicitly blocked."
  workflow-yaml:
    command: "python3 -c \"import pathlib, yaml; [yaml.safe_load(p.read_text()) for p in sorted(pathlib.Path('.github/workflows').glob('*.y*ml'))]\""
    paths: [".github/workflows/**"]
    owner: ci
    note: "Every workflow file parses as YAML before it can brick CI."

  # ── governance ratchets ─────────────────────────────────────────────────────
  check-params:
    command: "python3 scripts/check-params.py"
    paths: ["institutio/governance/parameters.yaml", "scripts/check-params.py", "scripts/**", "cli/**", "web/**"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: governance
    note: "No-hardcode ratchet: new LIMEN_* vars must be declared in the parameter panel."
  check-gates:
    command: "python3 scripts/check-gates.py"
    paths: ["institutio/governance/gates.yaml", "scripts/check-gates.py", "scripts/verify.py", ".github/workflows/**", "scripts/verify-scoped.sh", "scripts/verify-whole.sh", "scripts/merge-policy.sh", "CLAUDE.md"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: governance
    note: "This registry's own drift predicate: schema, command existence, deploy-trigger parity, CI mirrors, consumer ratchets."
  check-test-hygiene:
    command: "python3 scripts/check-test-hygiene.py"
    paths: ["cli/tests/**", "web/api/tests/**", "scripts/check-test-hygiene.py", "institutio/governance/test-hygiene-baseline.txt"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: governance
    note: "Keeps the suite order-independent so pr-gate can't silently go red: every test root must carry the autouse os.environ-restore conftest, and no NEW direct os.environ writes may appear beyond the baseline (use monkeypatch)."
  check-sensors:
    command: "python3 scripts/check-sensors.py"
    paths: ["institutio/governance/sensors.yaml", "scripts/check-sensors.py", "scripts/beat-sensors.py", "scripts/metabolize.sh", "scripts/heartbeat-loop.sh"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: governance
    note: "SENSORS registry drift: the beat's continuous-runtime sensors are declared data (sensors.yaml), the third VIGILIA axis beside GATES + PARAMETERS. Asserts schema, that every step's script exists, every gate is declared (panel or baseline), and every registry gate appears in the beat sources — a drifted sensor is a red check, not a memory chore."

  # ── GitHub estate (GITVS — the GitHub custodian) ────────────────────────────
  gitvs-parity:
    command: "python3 scripts/gitvs.py doctor --offline --parity-only"
    paths: ["scripts/gitvs.py", "institutio/github/estate.yaml", "scripts/setup-rulesets.py", "scripts/reap-branches.py", "scripts/sync-marketplace-config.py"]
    owner: gitvs
    note: "The GitHub-estate registry's own drift predicate (deterministic class-H rung): schema, wiring-integrity (every status:active resource type + active integration is wired + its delegate/reap effector scripts exist — the sensor-without-effector law), required_checks name real .github/workflows jobs. Cheap + deterministic, so scoped: runs whenever its inputs change; the live A–G posture rungs run in the beat, never as a PR gate."
  gitvs-test:
    command: "bash scripts/tests/gitvs.test.sh"
    paths: ["scripts/gitvs.py", "institutio/github/estate.yaml", "scripts/tests/gitvs.test.sh"]
    owner: gitvs
    note: "Parity + drift fixtures for the GITVS predicate: an unwired active resource type, a bad required_check, and a missing effector script must each red the doctor; a clean estate must pass."
  sync-marketplace-config-test:
    command: "bash scripts/tests/sync-marketplace-config.test.sh"
    paths: ["scripts/sync-marketplace-config.py", "scripts/tests/sync-marketplace-config.test.sh", "institutio/github/estate.yaml"]
    owner: gitvs
    note: "Safety regression for the GITVS config-push effector: the DOUBLE-DARK gate holds (--apply without LIMEN_MARKETPLACE_APPLY opens no PR), a missing conductor config source reddens, and the real estate's active integrations are all satisfied at the root."

  # ── python estate ───────────────────────────────────────────────────────────
  ruff-lint:
    command: "python3 -m ruff check cli/src cli/tests web/api mcp ianva"
    paths: ["cli/**", "web/api/**", "mcp/**", "ianva/**"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: verify
    note: "Lint the whole Python estate whenever any Python surface changes."
  pytest-cli:
    command: "env -u LIMEN_API_TOKEN -u LIMEN_OWNER_TOKEN -u LIMEN_CLIENT_TOKEN python3 -m pytest cli/tests -q"
    paths: ["cli/**"]
    tier: heavy
    ci_job: "pr-gate.yml:pr-gate"
    owner: verify
    note: "Env-scrubbed: ambient persona tokens must not leak into test behavior."
  pytest-api:
    command: "env -u LIMEN_API_TOKEN -u LIMEN_OWNER_TOKEN -u LIMEN_CLIENT_TOKEN python3 -m pytest web/api/tests -q"
    paths: ["web/api/**", "cli/**"]
    tier: heavy
    ci_job: "pr-gate.yml:pr-gate"
    owner: verify
    note: "web/api imports limen — a cli change implicates the API suite too."

  # ── node/web estate (the host-exhausting gates; serialized machine-wide) ────
  web-build:
    command: "bash -c 'cd web/app && npm run generate:data && npm run build' && node scripts/validate-contract-schemas.mjs"
    paths: ["web/app/**", "spec/**"]
    tier: heavy
    serialize: true
    ci_job: "ci.yml:web"
    owner: surfaces
    note: "Surface generation, contract schemas, dashboard production build — one at a time per host."
  lifecycle-adapters:
    command: "scripts/validate-lifecycle-adapters.py"
    paths: ["web/app/**", "web/api/**", "web/worker/**"]
    scoped: false
    owner: surfaces
    note: "Adapter parity; requires generated surface data, so it runs after generation in the whole matrix."
  contract-schemas:
    command: "node scripts/validate-contract-schemas.mjs"
    paths: ["spec/**", "web/app/**"]
    scoped: false
    ci_job: "ci.yml:web"
    owner: surfaces
    note: "Standalone schema validation in the whole matrix; scoped runs cover it inside web-build."
  worker-check:
    command: "bash -c 'cd web/worker && npm run check'"
    paths: ["web/worker/**"]
    tier: heavy
    ci_job: "ci.yml:worker"
    owner: worker
    note: "Worker lint/typecheck; the live runtime deploys on-demand via wrangler, not on merge."
  moneta-tests:
    command: "bash -c 'cd moneta && npm test'"
    paths: ["moneta/**"]
    tier: heavy
    serialize: true
    ci_job: "moneta.yml:moneta"
    owner: moneta
    note: "vitest + tsc for the sovereign mint; npm install makes it a serialized heavy gate."

  # ── local server probes (whole-matrix only: they boot servers) ──────────────
  probe-runtime:
    command: "scripts/probe-local-runtime.sh"
    paths: ["web/api/**", "cli/**"]
    tier: heavy
    serialize: true
    scoped: false
    owner: runtime
    note: "Boots uvicorn and probes the FastAPI adapter contract over HTTP."
  probe-worker:
    command: "scripts/probe-local-worker.sh"
    paths: ["web/worker/**"]
    tier: heavy
    serialize: true
    scoped: false
    owner: runtime
    note: "Boots wrangler-dev (workerd) and probes the Worker contract over HTTP; CI=1 guards against interactive login."

  # ── personal-facts registry drift nets (PERSONA-FEDERATA) ───────────────────
  personal-facts-drift:
    command: "python3 scripts/check-personal-facts.py"
    paths: ["institutio/governance/personal-facts.yaml", "scripts/identity.py", "scripts/fill-*.py"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: identity
    note: "Registry self-coherence: required fields, tier/verify enums, crown-jewel⇒op-only rule, single-home, consumer files exist. A drifted personal-facts.yaml is RED."
  fact-wall:
    command: "python3 scripts/fact-wall.py --check"
    paths: ["scripts/fill-*.py", "institutio/governance/personal-facts.yaml"]
    ci_job: "pr-gate.yml:pr-gate"
    owner: identity
    note: "A form-filler may only consume personal-fact classes the registry HOMES. An un-homed atom in a CONSUMES manifest is RED before any fill — the phi.pdf chat-ask defect killed at the root."
