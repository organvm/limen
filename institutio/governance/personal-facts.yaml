    consumers: []

  # ── immigration / right-to-work (life) ──────────────────────────────────────
  immigration.work_authorization:
    domain: life
    home: _life-private/documents.json
    atom: work_authorization.status
    tier: sensitive
    applicable: unknown         # derivable N/A for a US citizen; left unknown until derived
    required: false
    verify: non_empty
    consumers: []

  # ── pointers (federation-not-fusion): the fact lives in another store ────────
  employer.name:
    domain: matters
    home: _matters-private/stpauls-nursing-ny/matter.json
    atom: employer.name
    tier: private
    applicable: unknown
    required: false
    verify: pointer_resolves
    consumers: []
  emergency_contact.primary:
    domain: people
    home: _people-private/people
    atom: emergency_contact
    tier: sensitive
    applicable: unknown
    required: false
    verify: pointer_resolves
    consumers: []
  dependents.household:
    domain: people
    home: _people-private/people
    atom: dependents
    tier: sensitive
    applicable: unknown
    required: false
    verify: pointer_resolves
    consumers: []
