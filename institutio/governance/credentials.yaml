# credentials.yaml — the CLAVIS credential-provisioning POLICY registry.
#
# The fourth governance sibling of gates.yaml / sensors.yaml / parameters.yaml — but it does NOT
# re-list the secrets. The per-secret registry already lives in code: scripts/creds-hydrate.py
# DEFAULT_MAP (op:// provenance + env-var name + validity probe, values never in-repo). Duplicating
# it here would be drift-by-construction. This file declares only what DEFAULT_MAP does not: the
# service-account identity and the ONE vault it reads — the policy the provisioner (scripts/
# creds-provision.py) enforces and the predicate (creds-provision.py --check) verifies.
#
# THE INVARIANT (why this exists): a 1Password service account's vault access is set at CREATION and
# is IMMUTABLE (https://developer.1password.com/docs/service-accounts/get-started/). You cannot add a
# vault to a live SA. Therefore the only stable shape is a SINGLE SA-owned vault that holds EVERY
# fleet secret — add a secret by creating it IN that vault, never by re-granting. This registry names
# that vault and the SA; creds-provision.py owns bringing the estate into conformance; the predicate
# fails until every REQUIRED op-sourced secret in DEFAULT_MAP resolves to an SA-readable vault.

# The single SA-owned vault that is the canonical home for every op-sourced fleet secret.
# The service account is created with read on exactly this vault (least privilege) + --can-create-vaults
# so it can self-manage. Change this name only in lockstep with a re-bootstrap (SA grants are immutable).
automation_vault: Limen-Automation

# Vaults the fleet service account can read. MUST stay a subset of what the SA was created against.
# Least privilege: exactly the one automation vault. Any op:// ref in DEFAULT_MAP whose vault is not
# in this list is an OUTLIER the provisioner must migrate (and the predicate flags until it is).
sa_readable_vaults:
  - Limen-Automation

# The fleet service account CLAVIS provisions and installs. The token file is the promptless auth
# source (scripts/op-service-account.sh install); the value never lands in-repo.
service_account:
  name: limen-fleet
  token_file: ~/.config/op/service-account-token
  # Permissions granted AT CREATION (immutable thereafter): read+write on the automation vault so the
  # SA can materialize new secrets into it, plus can-create-vaults so bootstrap is self-sufficient.
  create_flags: "--vault Limen-Automation:read_items,write_items --can-create-vaults"

# Provisioning policy the predicate enforces.
policy:
  # A REQUIRED op-sourced secret (DEFAULT_MAP entry with `ref`, `required: true`, and no pure `derive`
  # fallback) whose vault is not SA-readable is a HARD failure (creds-provision --check exit 1). This
  # is what makes the mail credential's absence loud and keeps the estate from silently regressing.
  required_must_be_sa_readable: true
  # Non-required outliers are reported as "migration pending" (warn), not a hard failure — so parked
  # / derive-backed lanes don't redden the beat before bootstrap.
  warn_on_nonrequired_outliers: true
  # `derive`-backed lanes (e.g. gh token from the keyring) do NOT need op vault access — the derive is
  # the promptless source; op:// is only a last-resort fallback. Exempt from the SA-readability check.
  derive_exempt: true

# The one-time root-of-trust seed (codified, homed — not a console click, not a chat recitation).
# `creds-provision.py bootstrap` runs this ONCE with an owner `op` session; thereafter the SA owns the
# automation vault and the estate is self-maintaining. Homed on the credential Wall (#320).
bootstrap:
  wall_issue: 320
  # The existing installed SA carries ZERO vault grants and — because grants are immutable — cannot be
  # fixed in place. Bootstrap MINTS a new fleet SA (above) and revokes the inert one.
  supersedes_inert_sa: true
