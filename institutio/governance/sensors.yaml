# SENSORS registry — the beat's continuous-runtime invariants, as declared data.
#
# The third axis of the VIGILIA spine: pre-merge is GATES (gates.yaml), configuration is PARAMETERS
# (parameters.yaml), and continuous-runtime is SENSORS (here). Before this file the beat sensors were
# 20 hand-wired `── 0x ──` shell blocks in metabolize.sh — check-params.py and armed-valve-audit.py had
# to GREP the shell to find their gates. Now they are one entry each: adding a sensor is one registry
# entry, and a drifted copy is a red check (check-sensors.py), not a memory chore.
# Same parameter-panel pattern as GATES, one domain over.
#
# Each sensor: the beat section it runs as, the gate env that toggles it (declared in parameters.yaml)
# and its default, which beat source(s) run it, an owner, and one or more steps. Scheduled sensors may
# declare cadence/timeout as ``{env, default}``; conditional argv lives in ``args_when``; fixed-point
# checks live in ``omega_eligible``; and a conditional behavior valve carries ``armed_valve_type``.
# These are capabilities, not special sensor names: consumers must work unchanged if an id is renamed.
# Each step is a command plus the exact escalation echoed on non-zero and its severity:
#   advisory  → `  ↑ <escalation>`  (surfaced with the ↑ marker; never breaks the beat)
#   silent    → `  (<escalation>)`  (quiet skip note; never breaks the beat)
#   fatal     → non-zero propagates and breaks the beat  (none today — the beat is fail-open)
# `when_env` on a step runs it only when that env var is truthy (nested conditionals in the shell).
#
# Consumers: metabolize.sh runs `scripts/beat-sensors.py --run --source metabolize` (the whole sensor
# loop derives from here — the hand-wired blocks are gone); check-params.py and armed-valve-audit.py read
# these gates from this registry instead of grepping the shell; omega.sh derives its registry-declared
# fixed-point rungs via `beat-sensors.py --list-omega`/`--run-omega` (the `omega_eligible` capability).
# Drift-check: scripts/check-sensors.py.

schema_version: 0.2

sensors:
  creds-hydrate:
    section: "0a"
    title: "hydrate credentials (1Password → ~/.limen.env → every lane; never re-login)"
    gate: LIMEN_CREDS_HYDRATE
    default: "1"
    source: [metabolize]
    owner: tabularius
    # This sensor WRITES ~/.limen.env (creds-hydrate --apply). reload_env re-sources it into the
    # runner's environment after this sensor's steps so every downstream sensor inherits the fresh
    # keys — the ordering metabolize.sh hard-codes as `set -a; . ~/.limen.env` right after block 0a,
    # now declared data instead of shell tribal knowledge.
    reload_env: "~/.limen.env"
    steps:
      - command: "python3 scripts/creds-hydrate.py --apply"
        severity: silent
        escalation: "creds-hydrate skipped — op locked/absent"
      - command: "python3 scripts/creds-hydrate.py --verify"
        severity: advisory
        escalation: "DEAD credential(s) above — re-mint into the op:// item, then they self-heal next beat"

  creds-provision:
    section: "0a1"
    title: "CLAVIS — every required op-sourced secret is readable by the fleet service account"
    gate: LIMEN_CREDS_PROVISION
    default: "1"
    source: [metabolize]
    owner: tabularius
    # The PROVISIONING predicate, sibling of creds-hydrate's consumption. creds-hydrate --verify
    # catches a DEAD/absent materialized value; this catches the upstream cause — a secret sitting in
    # a vault the service account cannot read, so it never materializes at all. Read-only. Stays red
    # until the one-time `creds-provision bootstrap` homes every required secret in the SA-owned
    # automation vault; then green forever. See institutio/governance/credentials.yaml, Wall #320.
    steps:
      - command: "python3 scripts/creds-provision.py check"
        severity: advisory
        escalation: "a REQUIRED secret is not SA-readable — the estate is not SA-homed; run `creds-provision bootstrap` (one owner-op seed, Wall #320)"

  identity-verify:
    section: "0a2"
    title: "verify personal-fact atoms present (personal-facts registry; sibling of creds — atoms don't rotate)"
    gate: LIMEN_IDENTITY_VERIFY
    default: "1"
    source: [metabolize]
    owner: identity
    steps:
      - command: "python3 scripts/identity.py verify"
        severity: advisory
        escalation: "identity atoms missing/blank above — one-time populate (op hydrate or entry); see lever L-IDENTITY-POPULATE"

  mcp-auth-verify:
    section: "0b"
    title: "verify MCP connector consent (Lane B — surface lapsed claude.ai connectors in the log)"
    gate: LIMEN_MCP_VERIFY
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/mcp-auth-verify.py"
        severity: advisory
        escalation: "REQUIRED MCP connector(s) unauthenticated — pull L-IANVA-CLOUD (#263) to end the class"

  mcp-server-boot:
    section: "0b2"
    title: "verify local MCP servers boot (Lane A — every agent CLI's stdio servers actually start)"
    gate: LIMEN_MCP_BOOT_VERIFY
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/mcp-server-boot.py"
        args_when:
          - env: LIMEN_MCP_BOOT_HEAL
            equals: "1"
            args: ["--apply"]
            armed_valve_type: deliverable
        severity: advisory
        escalation: "configured MCP server(s) fail to boot/reach above — arm LIMEN_MCP_BOOT_HEAL=1 so the beat re-lands dropped agent entries + clears corrupt npx caches; an empty ianva registry is a registry decision (deploy ianva/upstreams.example.json or `ianva add-upstream`). Ω = scripts/verify-mcp-estate.sh"

  cartridge-connected:
    section: "0c"
    title: "verify the cartridge is plugged into the real source (host-is-factory invariant)"
    gate: LIMEN_CARTRIDGE_CHECK
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/cartridge-connected.py"
        severity: advisory
        escalation: "cartridge UNPLUGGED (above) — bring domus-genoma current, then re-point chezmoi at it"

  chezmoi-drift:
    section: "0c'"
    title: "verify config hydrates from the CURRENT cartridge (no wedge / no stale / no orphan)"
    gate: LIMEN_CHEZMOI_DRIFT_CHECK
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/chezmoi-drift.py"
        severity: advisory
        escalation: "config is NOT hydrating from the current cartridge (above) — nothing is local; reconcile per the hint"

  enactment-audit:
    section: "0d"
    title: "verify enactment — every declared-ON fleet flag is actually LIVE (not just merged)"
    gate: LIMEN_ENACTMENT_CHECK
    default: "1"
    source: [metabolize, heartbeat]   # heartbeat-loop.sh runs it inline too (the live-loop home)
    owner: tabularius
    steps:
      - command: "python3 scripts/enactment-audit.py --check"
        severity: advisory
        escalation: "un-enacted fleet flag above — wire it in heartbeat-loop.sh, or kickstart the daemon (launchctl kickstart -k gui/$(id -u)/com.limen.heartbeat)"

  github-estate-reconcile:
    section: "heartbeat"
    title: "reconcile the declared GitHub estate resource graph"
    gate: LIMEN_GITVS
    default: "1"
    source: [heartbeat]
    owner: gitvs
    cadence:
      env: LIMEN_BEAT_GITVS
      default: 8
    timeout:
      env: LIMEN_GITVS_TIMEOUT
      default: 120
    steps:
      - command: "python3 scripts/gitvs.py reconcile"
        args_when:
          - env: LIMEN_GITVS_APPLY
            default: "0"
            equals: "1"
            args: ["--apply"]
            armed_valve_type: safety
        severity: silent
        escalation: "GitHub estate reconciliation skipped or exceeded its bound"
    omega_eligible:
      - label: "GitHub estate parity"
        tier: det
        command: "python3 scripts/gitvs.py doctor --offline --parity-only"
      - label: "GitHub estate posture"
        tier: live
        command: "python3 scripts/gitvs.py doctor"

  github-actions-usage:
    section: "heartbeat"
    title: "Actions spend telemetry — projected monthly net within budget AND the account-billing canary green"
    gate: LIMEN_GH_USAGE
    default: "1"
    source: [heartbeat]
    owner: gitvs
    cadence:
      env: LIMEN_BEAT_GH_USAGE
      default: 24
    timeout:
      env: LIMEN_GH_USAGE_TIMEOUT
      default: 120
    steps:
      - command: "python3 scripts/gitvs.py usage --check"
        severity: advisory
        escalation: "Actions spend over budget or the account-billing canary is red — read docs/github-actions-usage.json; roots: L-CARD-FRAUD-HOLD (#182) then L-ORG-TEAM-UPGRADE (docs/github-estate-runbook.md)"
    omega_eligible:
      - label: "GitHub Actions budget"
        tier: live
        command: "python3 scripts/gitvs.py usage --check"

  seo-drift:
    section: "heartbeat"
    title: "SEO drift — public-portal surface: audit sweep -> metadata drift check -> bounded task filing (dry until armed)"
    gate: LIMEN_SEO_DRIFT
    default: "1"
    source: [heartbeat]
    owner: gitvs
    cadence:
      env: LIMEN_BEAT_SEO
      default: 24
    timeout:
      env: LIMEN_SEO_TIMEOUT
      default: 300
    steps:
      - command: "python3 scripts/seo-audit.py --sweep"
        quiet_output: true
        severity: silent
        escalation: "seo audit sweep skipped or exceeded its bound"
      - command: "python3 scripts/repo-metadata-sync.py --check"
        severity: advisory
        escalation: "repo metadata drift above — the effector converges it once lever L-SEO-METADATA arms LIMEN_REPO_METADATA_APPLY=1 (rides the github-estate-reconcile beat)"
      - command: "python3 scripts/generate-seo-backlog.py"
        args_when:
          - env: LIMEN_SEO_BACKLOG_APPLY
            default: "0"
            equals: "1"
            args: ["--apply"]
            armed_valve_type: safety
        severity: silent
        escalation: "seo backlog generation skipped or exceeded its bound"
    omega_eligible:
      - label: "seo registry parity"
        tier: det
        command: "python3 scripts/seo-audit.py --doctor"
      - label: "seo estate posture"
        tier: live
        command: "python3 scripts/seo-audit.py --check"

  observatory-run:
    section: "heartbeat"
    title: "run the OBSERVATORY legibility-and-traction loop (ships dark; armed by L-OBSERVATORY-ACTIVATE)"
    gate: LIMEN_OBSERVATORY
    default: "0"
    source: [metabolize]
    owner: observatory
    cadence:
      env: LIMEN_BEAT_OBSERVATORY
      default: 24
    timeout:
      env: LIMEN_OBSERVATORY_TIMEOUT
      default: 480
    steps:
      - command: "python3 scripts/observatory-beat.py"
        args_when:
          - env: OBSERVATORY_APPLY
            default: "0"
            equals: "1"
            args: ["--apply"]
            armed_valve_type: safety
        severity: silent
        escalation: "OBSERVATORY loop skipped or exceeded its bound"
    omega_eligible:
      - label: "observatory wiring"
        tier: det
        command: "python3 scripts/observatory-beat.py --doctor"

  prompt-corpus-control:
    section: "heartbeat"
    title: "incrementally reconcile prompt occurrences into the ask-atom control plane"
    gate: LIMEN_PROMPT_ATOM_CONTROL
    default: "1"
    source: [heartbeat]
    owner: tabularius
    note: "ARMED 2026-07-15 (PR fix/agy-steps-schema-v2). agy steps schema extended to admit 3 vendor-drift columns (has_subtrajectory, permissions, step_format); 567 unsupported-columns units resolved; canary: unbounded pass 219.9s (567 schema errors → 0), bounded pass 198.9s exit-0, --check-cursor PASS. Prior note: 2026-07-14 canary (PR fix/prompt-corpus-missing-source-exclusion) drained 20,487-unit obligation deadlock (unresolved 20,487 -> 566, zero stale-version orphans; probe: python3 scripts/prompt-atom-ledger.py --check-cursor). Dark condition (when LIMEN_PROMPT_ATOM_CONTROL=0): source cursor not bound to private checkpoint — reseal via python3 scripts/prompt-atom-ledger.py --scan. agy columns (has_subtrajectory/permissions/step_format) are already admitted in cli/src/limen/prompt_sources.py; the skip reason is cursor-checkpoint unbind in prompt-atom-ledger, not the schema adapter gap."
    cadence:
      env: LIMEN_BEAT_PROMPT_ATOMS
      default: 4
    timeout:
      env: LIMEN_PROMPT_ATOM_TIMEOUT
      default: 300
    steps:
      - command: 'python3 scripts/prompt-atom-ledger.py --scan --days "${LIMEN_PROMPT_ATOM_DAYS:-2}" --max-files "${LIMEN_PROMPT_ATOM_MAX_FILES:-80}" --write'
        quiet_output: true
        severity: silent
        escalation: "prompt atom reconciliation skipped or exceeded its bound"

  bifrons-portal:
    section: "heartbeat"
    title: "metabolize the BIFRONS star<->contribution portal (absorb->map->prepare; never submits)"
    gate: LIMEN_BIFRONS
    default: "1"
    source: [heartbeat]
    owner: bifrons
    cadence:
      env: LIMEN_BEAT_BIFRONS
      default: 24
    timeout:
      env: LIMEN_BIFRONS_TIMEOUT
      default: 180
    steps:
      - command: "python3 scripts/bifrons-organ.py"
        severity: silent
        escalation: "BIFRONS portal beat skipped or exceeded its bound"
      - command: "python3 scripts/bifrons-organ.py --check"
        severity: advisory
        escalation: "BIFRONS PORTAL.md drift — a re-render is owed"
    omega_eligible:
      - label: "bifrons portal render"
        tier: det
        command: "python3 scripts/bifrons-organ.py --check"
      - label: "bifrons portal liveness"
        tier: live
        command: "python3 scripts/bifrons-organ.py --doctor"

  fable-balance:
    section: "0e"
    title: "refresh the weekly Fable balance meter + surface an over-cap / unaccepted Fable run"
    gate: LIMEN_FABLE_BALANCE
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/fable-allotment.py balance"
        quiet_output: true
        severity: silent
        escalation: "fable balance meter skipped — see logs"
      - command: 'python3 scripts/claude-workflow-guard.py audit-transcript "${LIMEN_LATEST_SESSION_JSONL}"'
        when_env: LIMEN_LATEST_SESSION_JSONL
        quiet_output: true
        severity: advisory
        escalation: "unaccepted / over-budget Fable run above — accept it (scripts/fable-allotment.py accept …) or drop off Fable (docs/fable-allotment.md)"

  armed-valve-audit:
    section: "0e2"
    title: "armed-valve audit — parked levers vs silently-off valves"
    gate: LIMEN_VALVE_AUDIT
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/armed-valve-audit.py --check"
        severity: advisory
        escalation: "SILENTLY-OFF deliverable valve above — arm it, or file its lever in his-hand-levers.json"

  ship-gate:
    section: "0f"
    title: "ship gate — product-facing done requires a reachable external artifact"
    gate: LIMEN_SHIP_GATE
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/ship-gate.py --check"
        severity: advisory
        escalation: "product-facing done-claim with NO reachable artifact above — deploy it or reopen the task"

  heal-convergence:
    section: "0g"
    title: "heal convergence — the healer must converge, not re-spend capacity on a wall"
    gate: LIMEN_HEAL_CONVERGENCE
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/heal-convergence.py --check"
        severity: advisory
        escalation: "CHRONIC heal non-convergence above — fix the named check at its root or park the repo with a chronic receipt"

  fork-safety:
    section: "0g2"
    title: "fork-safety — the macOS 26.6 atfork/os_log crash must stay fixed, provably"
    gate: LIMEN_FORK_SAFETY_CHECK
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/check-fork-safety.py --check"
        severity: advisory
        escalation: "fork/os_log crash RECURRED or mitigation removed above — restore OS_ACTIVITY_MODE=disable, or arm the posix_spawn escalation (LIMEN_FORK_SAFE=1; see scripts/check-fork-safety.py)"

  trunk-green:
    section: "0g3"
    title: "trunk-green — main's required CI must stay green, or nothing can merge"
    gate: LIMEN_MAIN_GREEN_CHECK
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/check-main-green.py"
        severity: advisory
        escalation: "main trunk RED above — a heal PR is needed (arm LIMEN_MAIN_GREEN_APPLY=1 to auto-emit one canonical HEAL-mainred task); see scripts/check-main-green.py"

  launch-agent-liveness:
    section: "0g4"
    title: "launch-agent liveness — critical organs (mint, tunnel, creds, ianva) must stay alive"
    gate: LIMEN_LAUNCHAGENT_LIVENESS_CHECK
    default: "1"
    # heartbeat + cadence make this rung REACHABLE from the live loop: the daemon's only derive call
    # is `--source heartbeat --scheduled-only`, which runs cadence-declaring heartbeat sensors only —
    # declared as [metabolize] with no cadence, this sensor had zero live executions ever.
    source: [metabolize, heartbeat]
    owner: tabularius
    cadence:
      env: LIMEN_BEAT_LAUNCHAGENT_LIVENESS
      default: 4                # cheap check guarding the revenue rail (prompt-corpus-control precedent)
    timeout:
      env: LIMEN_LAUNCHAGENT_LIVENESS_TIMEOUT
      default: 300              # founding incident: 4-agent quiesce restore ≈ 264 s; gitvs's 120 would kill it mid-restore
    steps:
      - command: "python3 scripts/launch-agent-liveness.py --check"
        args_when:
          - env: LIMEN_LAUNCHAGENT_HEAL
            equals: "1"
            args: ["--apply"]
            armed_valve_type: deliverable
        severity: advisory
        escalation: "critical launch-agent DOWN above (spec/critical-launch-agents.json) — arm LIMEN_LAUNCHAGENT_HEAL=1 so the beat auto-restores it (mint/tunnel/credential organ), else it stays dark"

  sensor-canary:
    section: "0g5"
    title: "sensor canary — every scheduled sensor observed live within bounds (merged ≠ running)"
    gate: LIMEN_SENSOR_CANARY
    default: "1"
    source: [metabolize, heartbeat]
    owner: tabularius
    # Mechanizes the canary ritual that used to live only in operator memory: the runner already
    # stamps logs/.voice/<id> per visit, so NEVER-RAN / STALE is derived data. A stamp records
    # visited, not armed (arming is armed-valve-audit's axis); a metabolize-only scheduled sensor
    # (e.g. a lever-parked organ) is owner-routed, never red. First run after landing may self-flag
    # never-visited sensors once — they clear as the scheduled lane visits them.
    cadence:
      env: LIMEN_BEAT_SENSOR_CANARY
      default: 8
    steps:
      - command: "python3 scripts/beat-sensors.py --canary"
        severity: advisory
        escalation: "scheduled sensor NEVER-RAN or STALE above — a lane is dark or a rung is unreachable (merged is not running); check LIMEN_BEAT_DERIVE and the sensor's source/cadence"
    omega_eligible:
      - label: "sensor canary — scheduled lane observed live"
        tier: live                # reads the live daemon's voice stamps — offline omega SKIPs it visibly
        command: "python3 scripts/beat-sensors.py --canary"

  reclassify-needs-human:
    section: "0g6"
    title: "needs_human truth — drain mislabeled fleet-buildable / chronic tasks from his queue"
    gate: LIMEN_RECLASSIFY
    default: "1"
    source: [metabolize]
    owner: tabularius
    # The queue lied at 64% chronic fleet-debt (154→406 refill in 13h, 2026-07-13) until the
    # chronic inflow was routed by ownership (heal-dispatch + scripts/_human_signals.py). This
    # sensor keeps it truthful on cadence: DRY by default (five visible buckets →
    # docs/RECLASSIFY-PROPOSAL.md); the flip/park effector is the safety valve below.
    cadence:
      env: LIMEN_BEAT_RECLASSIFY
      default: 12
    timeout:
      env: LIMEN_RECLASSIFY_TIMEOUT
      default: 60
    steps:
      - command: "python3 scripts/reclassify-needs-human.py"
        args_when:
          - env: LIMEN_RECLASSIFY_APPLY
            default: "1"
            equals: "1"
            args: ["--apply"]
            armed_valve_type: safety
        severity: silent
        escalation: "needs_human reclassify pass skipped or exceeded its bound"

  orphan-watcher:
    section: "0g7"
    title: "orphan watchers — no session-spawned PR poll shell outlives its session"
    gate: LIMEN_ORPHAN_WATCHER_CHECK
    default: "1"
    source: [metabolize, heartbeat]
    owner: tabularius
    # The 2026-07-15 endless-watcher incident: four concurrent session background shells
    # hand-rolling `gh pr`/merge-policy poll loops (one silent-on-FAIL, a 28-min stall), and
    # nothing audited what a dead session left running. Detection is read-only every visit;
    # the reap effector is the armed valve (house law: sensor without effector = defect — the
    # effector is named here, dry until armed). Sanctioned alternatives the escalation points
    # at: scripts/await-pr.sh (bounded, loud) or the merge rung (scripts/merge-drain.py via
    # scripts/drain.sh).
    cadence:
      env: LIMEN_BEAT_ORPHAN_WATCHER
      default: 4
    timeout:
      env: LIMEN_ORPHAN_WATCHER_TIMEOUT
      default: 60
    steps:
      - command: "python3 scripts/orphan-watchers.py --check"
        args_when:
          - env: LIMEN_ORPHAN_WATCHER_REAP
            default: "0"
            equals: "1"
            args: ["--reap"]
            armed_valve_type: safety
        severity: advisory
        escalation: "orphan PR-watcher shell(s) above — a session hand-rolled a poll loop and died; use scripts/await-pr.sh or hand off to the merge rung (arm LIMEN_ORPHAN_WATCHER_REAP=1 to auto-reap)"

  disk-capacity:
    section: "0g8"
    title: "disk capacity — /System/Volumes/Data must stay below threshold; heal-probe artifacts + heartbeat err log reaped when armed"
    gate: LIMEN_DISK_CAPACITY
    default: "1"
    source: [metabolize]
    owner: tabularius
    cadence:
      env: LIMEN_BEAT_DISK_CAPACITY
      default: 4
    timeout:
      env: LIMEN_DISK_CAPACITY_TIMEOUT
      default: 30
    steps:
      - command: "python3 scripts/disk-capacity.py --check"
        args_when:
          - env: LIMEN_DISK_CAPACITY_APPLY
            default: "1"
            equals: "1"
            args: ["--apply"]
            armed_valve_type: safety
        severity: advisory
        escalation: "disk capacity BREACHED — arm LIMEN_DISK_CAPACITY_APPLY=1 so the beat removes gitignored probes and truncates the heartbeat error log"
    omega_eligible:
      - label: "disk capacity below threshold"
        tier: det
        command: "python3 scripts/disk-capacity.py --check"

  dialogs-silenced:
    section: "0g8b"
    title: "dialogs silenced — the agent-curable macOS dialog estate self-heals (hook-drift + cask + lsregister-stub) then verifies"
    # Replaces the three hand-wired hygiene hooks in heartbeat-loop.sh with ONE registry-derived sensor:
    # each armed LIMEN_*_HEAL effector runs on the hygiene cadence, then --agent-curable-only verifies
    # the beat-healable estate is silent. The human-gated classes (settings.json self-mod, firewall)
    # stay levers (L-DIALOGS-HEAL cites the three deliverable valves so an unarmed host reads PARKED,
    # not SILENT-OFF). See docs plan + [[macos-tcc-gatekeeper-dialogs-solved]].
    gate: LIMEN_DIALOGS_SILENCED
    default: "1"
    source: [heartbeat]
    owner: tabularius
    cadence:
      env: LIMEN_BEAT_DIALOGS
      default: 8                # the hygiene cadence (C_HYGIENE) the three effectors rode as hand-wired hooks
    timeout:
      env: LIMEN_DIALOGS_TIMEOUT
      default: 120
    steps:
      - command: "bash scripts/heal-hook-drift.sh"
        args_when:
          - env: LIMEN_HOOK_DRIFT_HEAL
            default: "0"
            equals: "1"
            args: ["--apply"]   # armed → inject --apply (the healer also honors LIMEN_HOOK_DRIFT_HEAL); registers the deliverable valve
            armed_valve_type: deliverable
        severity: advisory
        escalation: "PreToolUse trust hook drifted (class 1b) — arm LIMEN_HOOK_DRIFT_HEAL=1 so the beat reinstalls the canonical hook, else the compound-cd guard re-prompts every fleet job"
      - command: "bash scripts/heal-claude-cask.sh"
        args_when:
          - env: LIMEN_CASK_DUPLICATE_HEAL
            default: "0"
            equals: "1"
            args: ["--apply"]   # armed → inject --apply (the healer also honors LIMEN_CASK_DUPLICATE_HEAL); registers the deliverable valve
            armed_valve_type: deliverable
        severity: advisory
        escalation: "duplicate Homebrew claude-code cask (class 4) — arm LIMEN_CASK_DUPLICATE_HEAL=1 so the beat uninstalls it, else brew re-quarantines it every upgrade"
      - command: "bash scripts/heal-claude-lsregister.sh"
        args_when:
          - env: LIMEN_CLAUDE_LSREGISTER_HEAL
            default: "0"
            equals: "1"
            args: ["--apply"]   # armed → inject --apply (the healer also honors LIMEN_CLAUDE_LSREGISTER_HEAL); registers the deliverable valve
            armed_valve_type: deliverable
        severity: advisory
        escalation: "malformed ClaudeCode.app stub registered (class 4b) — arm LIMEN_CLAUDE_LSREGISTER_HEAL=1 so the beat unregisters + removes it, else 'damaged, move to Trash' recurs every launch"
      - command: "bash scripts/dialogs-silenced.sh --agent-curable-only"
        severity: advisory
        escalation: "an agent-curable dialog class still prompts after the heal pass — arm the matching LIMEN_*_HEAL valve (lever L-DIALOGS-HEAL) so it self-cures"
    omega_eligible:
      - label: "dialogs silenced (agent-curable)"
        tier: live
        command: "bash scripts/dialogs-silenced.sh --agent-curable-only"

  dispatch-continuity:
    section: "0h"
    title: "dispatch continuity — detect a silent lane while queue + budget exist"
    gate: LIMEN_CONTINUITY_CHECK
    default: "1"
    source: [metabolize]
    owner: continuity
    steps:
      - command: "python3 scripts/dispatch-continuity-check.py"
        severity: silent
        escalation: "continuity skipped"

  lane-fitness-refresh:
    section: "0h2"
    title: "lane-fitness refresh — recompute per-(agent, task_class) conversion fitness from dispatch_log into logs/lane-fitness.json"
    gate: LIMEN_LANE_FITNESS
    default: "1"
    source: [metabolize]
    owner: dispatch
    # dispatch._lane_fitness consults logs/lane-fitness.json at reservation time (fail-open). Without
    # a beat-wired refresh the file goes stale and the fitness signal either never seeds (cold start)
    # or anchors on history from a previous run. Reading tasks.yaml dispatch_log only; PII-clean;
    # runs in seconds. Cadence 4 keeps the table current without paying per-beat I/O on every cycle.
    cadence:
      env: LIMEN_BEAT_LANE_FITNESS
      default: 4
    timeout:
      env: LIMEN_LANE_FITNESS_TIMEOUT
      default: 60
    steps:
      - command: "python3 scripts/lane-fitness.py --write"
        severity: silent
        escalation: "lane-fitness refresh skipped or exceeded its bound — dispatch continues fail-open"

  ask-gate:
    section: "0i"
    title: "ask gate — every intake-window ask carries one done-predicate, or gets split"
    gate: LIMEN_ASK_GATE
    default: "1"
    source: [metabolize]
    owner: tabularius
    steps:
      - command: "python3 scripts/ask-gate.py --audit --since 7 --top 8"
        severity: silent
        escalation: "ask-gate report failed — non-fatal"

  omega:
