  closeout-reconcile:
    section: "0z"
    title: "closeout reconciliation — every claimed-done outcome carries a verified receipt"
    gate: LIMEN_SESSION_CLOSEOUT
    default: "0"
    source: [metabolize]
    owner: censor
    # verify-dispatch babysits status=dispatched; this babysits the COMPLEMENT — status=done CLOSEOUT
    # claims. Reuses verify-dispatch.gh_pr_state to probe each cited PR; a done-claim citing an unmerged
    # PR is DONE_UNVERIFIED (the #1203 "solved at root" false-closeout). Ships DARK (default 0); arming is
    # a separate lever. Findings route via insight-route.py (org/repo -> board task, censor -> residual).
    steps:
      - command: "python3 scripts/reconcile-closeouts.py --check"
        severity: advisory
