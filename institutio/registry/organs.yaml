# VIGILIA — THE SEAT: the single registry of every organ of the body.
#
# This is the legibility gift: one place that holds it all. Seeded from the
# 2026-06-25 excavation (creds / permissions / config + diagnostics/institution map).
# Each organ records its own home and its own residual work (per the closeout charter).
#
# layer:    spine | autonomic | somatic | face
# status:   built | partial | missing
# residual: the cheapest path to its remaining 10% (or [] if none)

schema_version: 0.1
seeded_from: "excavation 2026-06-25 (sessions 38f777fe; packets recovered into 6b107f0b)"

organs:

  # ----------------------------------------------------------------- SPINE / GENOME
  - name: parameter-panel
    layer: spine
    home: "limen/institutio/governance/parameters.yaml + scripts/check-params.py (the no-hardcode gate)"
    status: partial
    role: "Every name/path/threshold/secret-ref = one declared parameter. The '100x'."
    residual: "No-hardcode gate BUILT (build #3, 2026-06-25): scripts/check-params.py ratchets against undeclared-params-baseline.txt — wired into pr-gate.yml + ci.yml, fails on any NEW undeclared LIMEN_* var. Excavation found ~258 LIMEN_* vars (not the seed's ~70); 22 declared so far. Residual = fold the remaining vars in incrementally (each fold prunes the baseline via --update); not a big-bang."

  - name: index-nominum
    layer: spine
    home: organvm/limen (scripts/nomenclator.py) + IRF-IDX-002
    status: built
    role: "Naming institution (U>V…). CI gate already fails on bad names."
    residual: []

  - name: mat
    layer: somatic
    home: "limen/scripts/mat-organ.py (beat C_MAT) -> private daily-engine tree (mode-700, off-repo)"
    status: built
    role: "Daily-engine keeper: idempotent ChatGPT-session pull, day-card pre-compose (iCloud mirror freshness), roadblocks-queue refresh. Counts-only state in logs/mat-organ-state.json; ~20h self-throttle."
    residual: []

  - name: the-seat
    layer: spine
    home: limen/institutio/registry/organs.yaml
    status: partial
    role: "This registry — the single index of every organ. Legibility."
    residual: "Auto-derive liveness per organ from organ-health.py rather than hand-maintained status."

  # ----------------------------------------------------------------- AUTONOMIC (keep-self-alive)
  - name: vitals
    layer: autonomic
    home: "SENSE: 4444J99/_diagnostics (sysdiag, memdiag) | EXECUTE: limen/cli/src/limen/vigilia/vitals.py (wired into heartbeat-loop.sh as the VITALS GATE)"
    status: built              # build #1: the executive now rides the heartbeat
    role: "mem/cpu/disk/swap → don't crash. Sheds fleet load before pressure → panic."
    evidence: "08:47 kernel panic; FIND-005 'treat 16GB as a budget' diagnosed a month ago, never acted on. Hand built 2026-06-25 (the missing executive)."
    residual: "Reads kern.memorystatus_vm_pressure_level on the beat; >=warn(2)=idle beat, >=critical(4)=shed ollama. Tune thresholds against _diagnostics; add a proprioception stamp so organ-health reads its liveness."

  - name: continuity
    layer: autonomic
    home: "limen/cli/src/limen/vigilia/continuity.py (heartbeat) + organvm/session-meta + corpus feed (claude_projects.py)"
    status: built
    role: "Session thread → don't forget. Survives crash/rollover; reconstructs from transcript."
    evidence: "~13:42 auto-compaction handed off a 200-char stub; full thread recovered by hand. The by-hand recovery is now automatic (built 2026-06-25)."
    residual: "On a degenerate handoff (<CONTINUITY_MIN_SUMMARY_CHARS) the beat reconstructs from ~/.claude/projects/*.jsonl → logs/vigilia/. The trigger is a best-effort scan; the upstream fix (Claude Code's rollover path) is out of our reach — surface, don't depend on it."

  - name: integrity
    layer: autonomic
    home: "limen/cli/src/limen/vigilia/integrity.py (heartbeat) — governs the DISABLE_AUTOUPDATER lever"
    status: built
    role: "app/binary/signature → don't self-corrupt. Pin + verify the operating apps."
    evidence: "'Claude app is corrupt' dialog this session; CLI symlink flipped version dir 06-24. Signature verify + autoupdater governance built 2026-06-25."
    residual: "codesign --verify INTEGRITY_VERIFY_TARGETS each beat + alert on drift / autoupdater not disabled. Alert-only (read-only); auto-remediation (re-pin/re-disable) is a deliberate next step, not silent."

  - name: identity
    layer: autonomic
    home: limen (creds-hydrate.py, _load_limen_env, com.limen.creds-hydrate.plist)
    status: partial
    role: "creds/secrets/env → don't break, don't re-ask. 1Password → ~/.limen.env → tools."
    residual: "6 of 7 creds never minted/wired; Claude auth deliberately disabled; Gmail app-pw not in the map (op://Private/gmail-app-pw-2026-06-06 → GH secret GMAIL_APP_PASSWORD). Mostly his-lever mints + 2 wiring fixes."

  - name: authority
    layer: autonomic
    home: ~/.claude (settings.json allowlist, hooks/allow-trusted-cd-git.sh)
    status: partial
    role: "permissions/dialogs → stop asking for consent already granted."
    residual: "Hook isn't silent; daemon still execs bare binary (upstream); no TCC audit view. Largely solved."

  # ----------------------------------------------------------------- SOMATIC (do-the-work; indexed, not absorbed)
  - name: limen-daemon
    layer: somatic
    home: limen (scripts/heartbeat-loop.sh, metabolize.sh; cli/src/limen/dispatch.py)
    status: built
    role: "Metabolism / heartbeat / dispatch. ~9 self-* organs on cadence."
    residual: "Indexed here; governed by the seat, not absorbed."

  - name: arms-agents
    layer: somatic
    home: limen dispatch lanes (agent-all / _arms) + vendor fleet
    status: built
    role: "The vendor lanes that act (claude/gemini/codex/jules/opencode/…)."
    residual: "Indexed here; the parameter panel owns its limits/cadences."

  - name: proprioception
    layer: somatic
    home: limen (scripts/organ-health.py, watchdog.py, autonomy-governor.py, usage-telemetry.py)
    status: built
    role: "The body feels whether its own organs are firing (9-rung liveness + self-heal)."
    residual: "Feed the-seat: organ-health.json should drive this registry's per-organ status."

  - name: correspondence
    layer: somatic
    home: "limen (scripts/mail-beat.sh = C_MAIL effector; institutio/governance/mail-tiers.yaml = tier registry; scripts/check-mail-answered.py = the mail-answered sensor; scripts/creds-hydrate.py = the keyed gmail lanes) + universal-mail--automation (obligations_build/draft_writer/send_drafts; IMAPProvider.append/create_draft = the headless draft path)"
    status: partial
    role: "The inbound mail voice: sweep → obligations ledger → tiered draft (headless via keyed IMAP APPEND) → fail-closed SAFE-tier send. Answers reply-owed mail so the operator is never the default send button."
    residual: "Sender ships DISARMED (LIMEN_MAIL_SEND=0); SAFE tier is opt-in and currently empty (grows on trust) — arming is the operator's valve. The keyed headless draft path is BUILT (UMA #168 + creds-hydrate gmail lanes, 2026-07-14): it designs out the macOS TCC grant for Gmail drafts, downgrading lever L-MAIL-AUTOMATION-GRANT #960 to an optional fallback (non-Gmail accounts only). status→full once a SAFE intent is deliberately opted in and armed."

  # ----------------------------------------------------------------- FACE
  - name: face
    layer: face
    home: "limen/cli/src/limen/vigilia/face.py (python -m limen.vigilia face) | tui / portus / web/app"
    status: built
    role: "One pane onto the seat — how the operator sees & steers."
    residual: "Renders the C-suite from this registry (officers + organs) + logs/vigilia/status.json, deriving the officer list from the seat (no hardcode). Build order #4 done 2026-06-25. Next: surface in web/app + overlay organ-health.json."

  - name: gitvs
    layer: governance
    home: "limen/institutio/github/estate.yaml + scripts/gitvs.py (census/doctor/reconcile) | the GitHub-custodian organ"
    status: building
    role: "GitHub as ONE declarative resource graph under ONE closed loop (observe→diff→reconcile, drift=∅) — the single owner of the ~301-repo estate."
    residual: "Spine shipped 2026-07-10: estate.yaml (the SSOT) + gitvs.py census/doctor (#900) + remote reaper (#901, double-dark). THIS chunk: the reconcile dispatcher (the three total effector sinks, ships dark) + beat voice C_GITVS + rank-14 ladder seat + levers L-LIMENBOT-INSTALL (#910) / L-BRANCH-PROTECTION (#257) + omega det/live rungs; remote_branch flipped active (its reaper landed). Auto-discovered by organ-health.py via the C_GITVS cadence decl. Next: live posture classes A–G in the beat; the §3 integrations pillar (harness CodeRabbit/Trunk/Renovate as $0 labor); the envisioned resource types (release/webhook/team/…) promoted row-by-row."

# ============================ THE C-SUITE (officers) ============================
# HIERARCHY.md rendered as data: which officer convenes which organs. Federation,
# not fusion — organs stay themselves; this is the map the face renders from (no
# hardcoded officer list). This is also the CISO fold (build order #2): identity ·
# authority · integrity gathered under one office.
officers:
  CEO:
    mandate: "run the beat"
    organs: [limen-daemon]
  CFO:
    mandate: "don't crash — vitals & budget"
    organs: [vitals]
  CISO:
    mandate: "don't break · stop asking · don't self-corrupt"
    organs: [identity, authority, integrity]
  CKO:
    mandate: "don't forget — continuity & memory"
    organs: [continuity]
  CTO:
    mandate: "architecture & genome — the spine"
    organs: [parameter-panel, index-nominum, the-seat]
  COO:
    mandate: "get the work done — the arms"
    organs: [arms-agents]
  GC:
    mandate: "tell the truth — judiciary + proprioception"
    organs: [proprioception]
  CCO:
    mandate: "one pane to see & steer"
    organs: [face]
