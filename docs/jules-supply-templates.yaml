# JULES SUPPLY registry — declared data for scripts/jules-supply.py (IF-SENSOR-REGISTRY sibling).
#
# Each template is a RENEWABLE series of bounded, loan-complete packets: the generator mints
# `<id_prefix>-NNN` for the next unused NNN, so honest supply never runs dry while the floor
# holds. Adding supply = adding one entry here — never a hand-minting session. `{n}` in title
# and behavior interpolates the round number.
schema_version: limen.jules_supply.v1
floor_env: LIMEN_JULES_SUPPLY_FLOOR   # default floor derives from the jules capacity target
per_run_cap: 25
repos:
  - repo: organvm/victoroff-os
    owner_surface: victoroff-governance
    workstream: governance
    target_agent: jules
    forbidden_paths: "tasks.yaml, AGENTS.md, .github/**, package.json, pnpm-lock.yaml"
    authority: >-
      public/synthetic only; do not invent, ratify, approve, deploy, transfer, spend,
      use real BBNC data, or represent client authority.
    templates:
      - id_prefix: VIC-CONTRACT-DEEPEN
        title: "Contracts validation deepening, round {n}"
        allowed: "packages/contracts/**"
        behavior: >-
          Add one adversarial round of validator coverage to @victoroff/contracts:
          new negative cases for every exported validator (malformed shapes, boundary
          values, duplicate keys), each asserting the exact rejection reason. Keep the
          existing test script; do not weaken any existing assertion.
        predicate: "pnpm --filter @victoroff/contracts test"
        value_case: "Each round hardens the contract layer against a class of malformed input."
        budget_cost: 1
      - id_prefix: VIC-DOMAIN-DEEPEN
        title: "Seven-intent resolver deepening, round {n}"
        allowed: "packages/domain/**"
        behavior: >-
          Add one adversarial round of resolver tests to @victoroff/domain: new orderings,
          conflicting-citation cases, and tie-break determinism checks for the seven-intent
          resolver. Keep exactly-one-next-action invariants; do not weaken existing tests.
        predicate: "pnpm --filter @victoroff/domain test"
        value_case: "Each round pins resolver behavior against a new ordering/conflict class."
        budget_cost: 1
      - id_prefix: VIC-FIXTURES-DEEPEN
        title: "Synthetic fixture expansion, round {n}"
        allowed: "packages/fixtures/**"
        behavior: >-
          Extend the synthetic fixtures package with one new public-safe scenario set
          (happy path, ambiguity, conflict) plus invariant tests proving no duplicates,
          citations present, and synthetic-only markers on every record.
        predicate: "pnpm --filter @victoroff/fixtures test"
        value_case: "Each round grows the shared synthetic corpus every package tests against."
        budget_cost: 1
      - id_prefix: VIC-GOV-DEEPEN
        title: "Governance manifest hardening, round {n}"
        allowed: "docs/governance/**"
        behavior: >-
          Add one hardening round to the governance manifest validators: a new drift or
          tamper class (reordered sources, checksum case drift, truncated manifest) with
          node:test coverage naming the exact failing source.
        predicate: "node --test docs/governance/*.test.mjs"
        value_case: "Each round makes manifest drift detection name one more tamper class."
        budget_cost: 1
      - id_prefix: VIC-UI-DEEPEN
        title: "UI visual-contract tests, round {n}"
        allowed: "packages/ui/**"
        behavior: >-
          Add one round of UI contract tests: black-and-white token compliance, accessible
          names, and data-bound progress fractions for one more component or state. No new
          color literals; no hand-set progress numbers.
        predicate: "pnpm --filter @victoroff/ui test"
        value_case: "Each round encodes another slice of the visual contract as executable tests."
        budget_cost: 1
      - id_prefix: VIC-PUB-DEEPEN
        title: "Publication boundary checks, round {n}"
        allowed: "packages/publication/**"
        behavior: >-
          Add one round of publication-boundary checks: a new leak class (identity string,
          telemetry marker, missing noindex/synthetic disclosure) with tests proving the
          violation is rejected and the reason is named.
        predicate: "pnpm --filter @victoroff/publication test"
        value_case: "Each round turns one more publication risk into an executable refusal."
        budget_cost: 1
      - id_prefix: VIC-SITE-DEEPEN
        title: "Site progress-surface tests, round {n}"
        allowed: "apps/site/**, tests/**"
        behavior: >-
          Add one round of pitch-site tests: phase-progress aggregation equals checkpoint
          sums, no hand-set totals, progress never exceeds 100%, and one more page-level
          accessibility assertion.
        predicate: "pnpm test"
        value_case: "Each round mechanically binds one more delivery-status claim to data."
        budget_cost: 1
